                            { q: "Đâu là yếu tố đạo đức của con người cần loại bỏ để phòng, ngừa tham nhũng?", a: ["Bảo thủ, cố chấp, trọng sĩ diện, chưa nêu cao tinh thần tự phê bình.", "Tính bảo thủ.", "Cố chấp.", "Trọng sĩ diện."], c: 0, r: "Phương án A bao hàm đầy đủ nhất các thói hư tật xấu, cái tôi cá nhân ích kỷ cần phải loại bỏ để rèn luyện sự liêm chính." },
                            { q: "Nguyên nhân nào khiến con người có hành vi tham nhũng?", a: ["Không tự chủ, không kiềm chế được lòng tham bất chính, thiếu ý thức rèn luyện đạo đức, coi thường pháp luật.", "Không kiềm chế được lòng tham.", "Quyền lực, đồng tiền là tất cả.", "Coi thường pháp luật."], c: 0, r: "Nguyên nhân gốc rễ xuất phát từ sự sa ngã của cá nhân: không thắng nổi lòng tham, thiếu tu dưỡng đạo đức và coi thường sự trừng phạt của pháp luật." },
                            { q: "Theo Kết luận của Ban Chấp hành Trung ương Đảng tại Hội nghị Trung ương lần thứ 5 (khóa XI), Ban Chỉ đạo phòng, chống tham nhũng được thành lập ở cấp nào?", a: ["Trung ương.", "Cấp tỉnh.", "Cấp huyện.", "Cả 3 phương án trên."], c: 0, r: "Tại Hội nghị này, Trung ương đã quyết định thành lập Ban Chỉ đạo Trung ương về phòng, chống tham nhũng trực thuộc Bộ Chính trị để trực tiếp lãnh đạo." },
                            { q: "Việc huy động và sử dụng các khoản đóng góp của nhân dân để đầu tư xây dựng công trình địa phương phải được thực hiện như thế nào?", a: ["Phải lấy ý kiến nhân dân và được HĐND cùng cấp xem xét, quyết định.", "Phải được công khai để nhân dân giám sát.", "Công khai mục đích huy động, mức đóng góp, việc sử dụng, kết quả và báo cáo quyết toán.", "Cả 3 phương án trên."], c: 3, r: "Các khoản đóng góp tự nguyện của nhân dân phải minh bạch tuyệt đối, được HĐND thông qua và phải công khai mọi khâu thu chi để dân giám sát." },
                            { q: "Theo quy định, tài sản nào sau đây của người có nghĩa vụ kê khai tài sản khi tăng thêm phải giải trình nguồn gốc?", a: ["Tăng về số lượng, diện tích hoặc thay đổi về cấp nhà, công trình, loại đất so với kỳ kê khai trước đó.", "Sổ tiết kiệm tăng thêm 45 triệu đồng.", "Đá quý trị giá 49 triệu đồng.", "Xe máy trị giá 40 triệu đồng."], c: 0, r: "Mọi sự thay đổi, gia tăng về bất động sản (số lượng, diện tích, cấp nhà) đều bắt buộc phải giải trình rõ nguồn gốc tiền mua. Các tài sản động sản khác trong đáp án chưa đạt mức quy định phải giải trình (50 triệu)." },
                            { q: "Việc công khai bản kê khai tài sản, thu nhập của người có nghĩa vụ kê khai được công khai ở đâu?", a: ["Tại trụ sở Ủy ban nhân dân nơi người đó cư trú.", "Trong cơ quan, tổ chức, đơn vị nơi người có nghĩa vụ kê khai thường xuyên làm việc.", "Trên phương tiện thông tin đại chúng.", "Cả 3 phương án trên."], c: 1, r: "Bản kê khai tài sản của cán bộ phải được công khai tại cơ quan, đơn vị nơi người đó đang trực tiếp công tác để đồng nghiệp, cấp dưới dễ dàng giám sát." },
                            { q: "Công chức kê khai tài sản, thu nhập, giải trình nguồn gốc tài sản tăng thêm không trung thực tùy theo mức độ vi phạm phải bị áp dụng một trong các hình thức kỷ luật nào?", a: ["Khiển trách, cảnh cáo, cách chức, bãi nhiệm.", "Khiển trách, cảnh cáo, hạ bậc lương, giáng chức, cách chức.", "Khiển trách, cảnh cáo, phạt tiền, hạ ngạch, giáng chức, cách chức.", "Khiển trách, cảnh cáo, hạ bậc lương, hạ ngạch, giáng chức, cách chức."], c: 1, r: "Sự không trung thực trong kê khai tài sản sẽ bị xử lý kỷ luật nghiêm khắc theo Luật Cán bộ, công chức với các hình thức: Khiển trách, cảnh cáo, hạ bậc lương, giáng chức, cách chức." },
                            { q: "Hành vi nào sau đây được coi là nhận hối lộ?", a: ["Đồng nghiệp tặng quà cho nhau.", "Để nhận được sự đề bạt của cấp trên, nhân viên mang món quà trị giá 1,5 triệu đồng đến biếu sếp.", "Nhân dịp sinh nhật con trai, nhân viên mang tặng lãnh đạo một bình hoa cổ trị giá 50 triệu đồng.", "Cả B & C."], c: 3, r: "Hành vi tặng quà nhằm đổi lấy sự thiên vị trong công việc (đề bạt) hay việc tặng những món quà có giá trị vật chất quá lớn (50 triệu) đều có dấu hiệu của việc đưa và nhận hối lộ biến tướng." },
                            { q: "Khi nhận được tố cáo hành vi tham nhũng, người đứng đầu cơ quan, tổ chức có thẩm quyền phải làm gì?", a: ["Xem xét, xử lý; thông báo kết quả giải quyết cho người tố cáo khi có yêu cầu.", "Giữ bí mật họ, tên, địa chỉ và các thông tin khác của người tố cáo.", "Áp dụng kịp thời các biện pháp cần thiết để bảo vệ người tố cáo khi bị đe doạ, trả thù.", "Cả 3 phương án trên."], c: 3, r: "Cơ quan tiếp nhận phải có trách nhiệm giải quyết, phản hồi kết quả, giữ bí mật tuyệt đối danh tính và bảo vệ an toàn cho người tố cáo tham nhũng." },
                            { q: "Theo Luật PCTN, những việc nào sau đây cán bộ, công chức, viên chức không được làm?", a: ["Cửa quyền, hách dịch, gây khó khăn, phiền hà.", "Tham gia quản lý, điều hành doanh nghiệp tư nhân, công ty TNHH, cổ phần, bệnh viện tư... trừ trường hợp luật có quy định khác.", "Làm tư vấn cho doanh nghiệp, tổ chức trong và ngoài nước về các việc liên quan đến bí mật nhà nước, việc thuộc thẩm quyền mình giải quyết.", "Cả 3 phương án trên."], c: 3, r: "Cả 3 hành vi trên (hách dịch, điều hành công ty tư nhân bên ngoài, làm tư vấn cho việc mình quản lý) đều bị nghiêm cấm để phòng ngừa nguy cơ tham nhũng, lợi ích nhóm." }
                        ]
                    },
                    5: {
                        group: "TRẮC NGHIỆM ĐÚNG/SAI",
                        title: "1. Những vấn đề cơ bản về Nhà nước và Pháp luật",
                        questions: [
                             // --- Nguồn gốc, Bản chất, Chức năng, Hình thức của Nhà nước ---
                            { q: "Nhà nước là một hiện tượng vĩnh viễn, tồn tại cùng với sự tồn tại của xã hội loài người.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Theo quan điểm Mác - Lênin, nhà nước không phải là hiện tượng vĩnh viễn mà là một hiện tượng xã hội mang tính lịch sử, chỉ xuất hiện khi xã hội phân chia giai cấp [1]." },
                            { q: "Nhà nước ra đời khi xã hội xuất hiện chế độ tư hữu về tư liệu sản xuất và mâu thuẫn giai cấp không thể điều hòa.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Khi mâu thuẫn trở nên gay gắt, cần có một bộ máy quyền lực đặc biệt để duy trì trật tự và bảo vệ lợi ích giai cấp thống trị, đó chính là Nhà nước [1]." },
                            { q: "Nhà nước chỉ thực hiện chức năng bảo vệ lợi ích của giai cấp thống trị mà không quan tâm đến lợi ích chung của xã hội.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Bản chất nhà nước gồm 2 mặt: Tính giai cấp và Tính xã hội. Nhà nước vẫn phải giải quyết các công việc chung của xã hội (an sinh, môi trường, y tế...) để duy trì trật tự [2]." },
                            { q: "Chức năng đối nội của nhà nước bao gồm việc phòng thủ đất nước, chống xâm lược từ bên ngoài.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Phòng thủ đất nước và chống xâm lược là chức năng đối ngoại. Chức năng đối nội là tổ chức quản lý kinh tế, văn hóa, giữ vững an ninh chính trị [3, 4]." },
                            { q: "Trong lịch sử xã hội loài người có 5 kiểu nhà nước tương ứng với 5 hình thái kinh tế - xã hội.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Trong lịch sử chỉ có 4 kiểu nhà nước có giai cấp: Chủ nô, Phong kiến, Tư sản và Xã hội chủ nghĩa [4, 5]." },
                            { q: "Hình thức cấu trúc nhà nước là sự phân chia lãnh thổ quốc gia thành các đơn vị hành chính.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Hình thức cấu trúc là sự phân chia lãnh thổ (ví dụ: Nhà nước đơn nhất như Việt Nam hoặc Nhà nước liên bang như Mỹ) [5]." },
                            { q: "Hình thức chính thể là phương pháp thực hiện quyền lực nhà nước.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Phương pháp thực hiện quyền lực nhà nước gọi là 'Chế độ chính trị'. 'Hình thức chính thể' là cách thức tổ chức các cơ quan quyền lực cao nhất (Quân chủ hoặc Cộng hòa) [5]." },
                            
                            // --- Nguồn gốc, Bản chất, Chức năng, Thuộc tính của Pháp luật ---
                            { q: "Sự xuất hiện của nhà nước chính là nguyên nhân và nguồn gốc ra đời của pháp luật.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Nhà nước và pháp luật ra đời cùng một nguyên nhân. Nhà nước cần pháp luật làm công cụ để quản lý xã hội [6]." },
                            { q: "Pháp luật chỉ được hình thành thông qua việc nhà nước ban hành các văn bản quy phạm pháp luật mới.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Pháp luật hình thành qua 2 con đường: (1) Nhà nước thừa nhận, cải tạo các tập quán, quy phạm xã hội; (2) Nhà nước sáng tạo, ban hành văn bản pháp luật [7]." },
                            { q: "Tính giai cấp của pháp luật thể hiện ở việc pháp luật luôn phản ánh nhu cầu, lợi ích chung của toàn xã hội.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Việc phản ánh nhu cầu, lợi ích chung là 'Tính xã hội'. 'Tính giai cấp' là việc pháp luật thể hiện ý chí và bảo vệ lợi ích của giai cấp thống trị [7, 8]." },
                            { q: "Chức năng điều chỉnh các quan hệ xã hội của pháp luật chỉ được thực hiện thông qua việc cấm đoán (không được làm gì).", a: ["Đúng", "Sai"], c: 1, r: "Sai. Cách thức điều chỉnh của pháp luật rất đa dạng: Cho phép (được làm gì), bắt buộc (phải làm gì) hoặc cấm đoán (không được làm gì) [9]." },
                            { q: "Chức năng giáo dục của pháp luật được thực hiện bằng cách áp dụng các biện pháp chế tài như phạt tiền, phạt tù.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Việc áp dụng chế tài phạt tiền, phạt tù thuộc về 'Chức năng bảo vệ'. Chức năng giáo dục là tác động vào ý thức, tư tưởng để con người tự giác tuân thủ [9, 10]." },
                            { q: "Pháp luật là phương tiện chủ yếu để nhà nước quản lý xã hội.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là một trong ba vai trò trọng tâm của pháp luật đối với đời sống nhà nước và xã hội [10]." },
                            { q: "Tính xác định chặt chẽ về mặt hình thức đòi hỏi văn bản luật phải rõ ràng, chính xác, một nghĩa.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là một thuộc tính cơ bản của pháp luật, yêu cầu pháp luật phải được thể hiện dưới dạng các nguồn luật quy định cụ thể, một nghĩa [11]." },

                            // --- Về Cấu trúc Quy phạm pháp luật ---
                            { q: "Bộ phận Giả định trong quy phạm pháp luật trả lời cho câu hỏi: Hậu quả pháp lý bất lợi thế nào nếu vi phạm?", a: ["Đúng", "Sai"], c: 1, r: "Sai. Bộ phận trả lời cho câu hỏi về hậu quả pháp lý là 'Chế tài'. 'Giả định' trả lời cho câu hỏi: Ai? Trong điều kiện, hoàn cảnh nào? [12, 13]." },
                            { q: "Bộ phận Quy định thường chứa các từ mang tính chất mệnh lệnh, chỉ dẫn như: 'phải', 'có quyền', 'nghiêm cấm'.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Quy định là bộ phận trung tâm đặt ra các khuôn mẫu xử sự bắt buộc chủ thể phải tuân theo [13, 14]." },

                            // --- Các câu hỏi tổng hợp và áp dụng cuối đề cương ---
                            { q: "Trong xã hội có giai cấp, pháp luật là tiêu chuẩn duy nhất để đánh giá hành vi của con người.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Trong xã hội có giai cấp, ngoài pháp luật còn có các quy phạm về đạo đức, tôn giáo... để đánh giá hành vi con người [15]." },
                            { q: "Những quan hệ pháp luật mà Nhà nước tham gia với tư cách chủ thể thì luôn là quan hệ mang tính chất quyền lực phục tùng.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Khi tham gia vào quan hệ dân sự với tư cách là một bên chủ thể, Nhà nước và chủ thể khác có quan hệ mang tính chất ngang bằng [15, 16]." },
                            { q: "Trong bộ máy nhà nước CHXHCN Việt Nam, Quốc hội được quyền ban hành tất cả các văn bản quy phạm pháp luật.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Một số văn bản quy phạm pháp luật như lệnh, thông tư, thông tư liên tịch... không thuộc thẩm quyền ban hành của Quốc hội [16]." },
                            { q: "Chủ thể của quan hệ pháp luật dân sự chỉ có thể là cá nhân có đủ năng lực hành vi dân sự.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Chủ thể còn bao gồm cả pháp nhân. Ngoài ra, cá nhân có năng lực hành vi dân sự chưa đầy đủ vẫn có thể là chủ thể quan hệ dân sự [16, 17]." },
                            { q: "Mọi chủ thể thực hiện hành vi trái pháp luật đều phải gánh chịu trách nhiệm pháp lý.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Hành vi trái pháp luật chỉ là một yếu tố (mặt khách quan). Chủ thể phải thực sự vi phạm pháp luật (có lỗi, có năng lực trách nhiệm) mới bị truy cứu trách nhiệm pháp lý [17]." },
                            { q: "Nhà nước chỉ lập ra chỉ để duy trì và bảo vệ lợi ích của giai cấp thống trị.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Bên cạnh bảo vệ lợi ích giai cấp thống trị, nhà nước còn phải đảm bảo lợi ích chung của toàn xã hội (tính xã hội) [18]." },
                            { q: "Trong xã hội của nhà nước, pháp luật là quy tắc xử sự duy nhất điều chỉnh các quan hệ xã hội.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Ngoài pháp luật, các quan hệ xã hội còn được điều chỉnh bằng phong tục tập quán, đạo đức, quy phạm xã hội, tín điều tôn giáo... [18]." },
                            { q: "Bộ giáo dục và đào tạo là cơ quan thuộc chính phủ.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Bộ GD&ĐT là cơ quan nằm trong cơ cấu tổ chức của chính phủ (ngang Bộ). Nó không phải là 'cơ quan thuộc Chính phủ' (cơ quan có địa vị thấp hơn Bộ) [19]." },
                            { q: "Thẩm quyền áp dụng hình phạt trong Luật hình sự thuộc về mọi cơ quan nhà nước.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Hình phạt chỉ do Tòa án quyết định áp dụng đối với người hoặc pháp nhân thương mại phạm tội [19]." },
                            { q: "Mọi cơ quan trong bộ máy nhà nước CHXHCN VN đều thực hiện hoạt động quản lí nhà nước.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Chỉ có cơ quan hành chính (thuộc nhánh hành pháp) mới thực hiện hoạt động quản lý nhà nước [19, 20]." },
                            { q: "Các biện pháp xử lí vi phạm hành chính chỉ áp dụng đối với cá nhân thực hiện hành vi vi phạm hành chính.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Biện pháp xử lý vi phạm hành chính áp dụng đối với cả tổ chức thực hiện hành vi vi phạm [20]." },
                            { q: "Năng lực pháp luật và năng lực hành vi của một chủ thể (là một tổ chức) xuất hiện tại cùng một thời điểm.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đối với một tổ chức/pháp nhân, năng lực pháp luật và năng lực hành vi xuất hiện cùng lúc ngay khi tổ chức đó được thành lập hợp pháp [20]." },
                            { q: "Mọi vấn đề do cơ quan Nhà nước có thẩm quyền ban hành đều là văn bản quy phạm pháp luật.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Một số loại văn bản do nhà nước ban hành là văn bản áp dụng pháp luật (Ví dụ: Quyết định bổ nhiệm, bản án của Tòa án) [21]." },
                            { q: "Tất cả các cơ quan quyền lực nhà nước trong bộ máy nhà nước CHXHCN Việt Nam đều do nhân dân cả nước bầu ra.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Nhân dân chỉ trực tiếp bầu ra cơ quan quyền lực nhà nước ở địa phương và Quốc hội. Không phải mọi cơ quan quyền lực đều do toàn thể nhân dân trực tiếp bầu [22]." },
                            // --- BÀI TẬP NHẬN ĐỊNH VỀ NHÀ NƯỚC (CHƯƠNG 1) ---
                            { 
                            q: "Thuyết khế ước xã hội cho rằng nhà nước do giai cấp thống trị lập ra để bảo vệ quyền và lợi ích cho giai cấp mình.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Thuyết khế ước xã hội cho rằng nhà nước hình thành là do bản hợp đồng được ký kết của những người trong trạng thái tự do nguyên thuỷ; chủ quyền nhà nước thuộc về nhân dân [1]." 
                            },
                            { 
                            q: "Thẩm quyền ban hành và quản lý xã hội bằng pháp luật được thực hiện bởi Nhà nước và các đảng phái chính trị.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Nhà nước là tổ chức duy nhất có quyền ban hành pháp luật và thực hiện sự quản lý nhà nước bằng pháp luật [2]." 
                            },
                            { 
                            q: "Bản chất nhà nước và bản chất giai cấp của nhà nước là hai khái niệm hoàn toàn đồng nhất.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Bản chất của nhà nước bao gồm hai mặt: tính giai cấp (bảo vệ lợi ích giai cấp thống trị) và tính xã hội (quản lý các công việc chung của xã hội), do đó không hoàn toàn đồng nhất [3]." 
                            },
                            { 
                            q: "Ở đâu có xã hội loài người, ở đó có sự xuất hiện của nhà nước.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trong chế độ cộng sản nguyên thuỷ, hình thái đầu tiên của xã hội loài người, chưa có sự phân hóa giai cấp nên chưa xuất hiện nhà nước [4], [5]." 
                            },
                            { 
                            q: "Cơ sở kinh tế, xã hội của chế độ cộng sản nguyên thủy là chế độ sở hữu chung về tư liệu sản xuất và phân hóa về giai cấp.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Cơ sở của chế độ cộng sản nguyên thủy là chế độ sở hữu chung về tư liệu sản xuất, nhưng trong xã hội này chưa có sự phân hóa giai cấp [5]." 
                            },
                            { 
                            q: "Theo quan điểm chủ nghĩa Mác - Lênin, nhà nước là sản phẩm của xã hội loài người.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Theo học thuyết Mác - Lênin, nhà nước là sản phẩm của một xã hội đã phát triển tới một giai đoạn nhất định khi xuất hiện tư hữu và mâu thuẫn giai cấp [4]." 
                            },
                            { 
                            q: "Quyền lực công cộng đặc biệt là dấu hiệu đặc trưng của Nhà nước và Đảng cầm quyền trong xã hội.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Việc thiết lập một quyền lực công cộng đặc biệt (có bộ máy cưỡng chế riêng) là đặc trưng cơ bản chỉ có ở nhà nước so với các tổ chức khác trong xã hội [6]." 
                            },
                            { 
                            q: "Không chỉ Nhà nước mới có bộ máy chuyên làm nhiệm vụ cưỡng chế mà trong xã hội công xã nguyên thủy cũng tồn tại bộ máy này.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trong xã hội cộng sản nguyên thủy, quyền lực do dân cư tự tổ chức ra, không mang tính chính trị và không có bộ máy cưỡng chế chuyên nghiệp [7]." 
                            },
                            { 
                            q: "Nhà nước quản lý dân cư theo sự phân chia khác biệt về chính trị và địa vị giai cấp.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Khi nhà nước ra đời đã phân chia dân cư theo lãnh thổ để họ thực hiện quyền và nghĩa vụ theo nơi cư trú, không kể họ thuộc thị tộc, bộ lạc hay địa vị nào [8], [2]." 
                            },
                            { 
                            q: "Quyền lực của Vua trong chính thể quân chủ luôn là vô hạn.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trong chính thể quân chủ hạn chế (lập hiến), quyền lực của nhà vua bị hạn chế bởi một cơ quan quyền lực tối cao khác là Nghị viện [9], [10]." 
                            },
                            { 
                            q: "Ở chính thể cộng hòa đại nghị không có chức danh tổng thống chỉ có thủ tướng do nghị viện lập ra.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trong cộng hòa đại nghị vẫn có vị trí Tổng thống (nguyên thủ quốc gia) nhưng quyền lực thực tế bị hạn chế, Chính phủ do Thủ tướng đứng đầu nắm quyền hành pháp [11]." 
                            },
                            { 
                            q: "Chế độ chính trị càng dân chủ thì vai trò quản lý của Nhà nước càng giảm.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Bản chất dân chủ không làm giảm vai trò quản lý của nhà nước, nhà nước vẫn sử dụng pháp luật để quản lý xã hội, bảo vệ lợi ích công cộng [12], [13]." 
                            },
                            { 
                            q: "Mặc dù nhà nước liên bang có từ hai hay nhiều nước thành viên hợp lại nhưng chỉ tồn tại một chủ quyền chung và lãnh thổ toàn vẹn thống nhất.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trong nhà nước liên bang tồn tại hai cấp chủ quyền: chủ quyền của nhà nước liên bang và chủ quyền của các bang thành viên [14]." 
                            },
                            { 
                            q: "Nhà nước xã hội chủ nghĩa không cho phép sự tồn tại và hoạt động của các đảng phái chính trị khác ngoài Đảng cộng sản.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Tùy thuộc vào truyền thống lịch sử, một số nhà nước XHCN vẫn cho phép tồn tại nhiều đảng phái hoạt động dưới sự lãnh đạo của Đảng Cộng sản [12]." 
                            },
                            { 
                            q: "Trong nhà nước xã hội chủ nghĩa không còn chức năng trấn áp giai cấp.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Nhà nước XHCN vẫn còn thực hiện chức năng đối nội là trấn áp đối với những phần tử chống đối chế độ [15]." 
                            },
                            { 
                            q: "Nhà nước xã hội chủ nghĩa là nhà nước phi giai cấp.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Không có nhà nước nào là phi giai cấp. Nhà nước XHCN mang bản chất và là học thuyết tiến bộ của giai cấp công nhân và nhân dân lao động [15], [16]." 
                            },

                            // --- BÀI TẬP NHẬN ĐỊNH VỀ PHÁP LUẬT (CHƯƠNG 2) ---
                            { 
                            q: "Pháp luật chỉ có thể được hình thành bằng con đường ban hành của Nhà nước.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Pháp luật được hình thành bằng hai con đường: Nhà nước thừa nhận, cải tạo các tập quán, quy tắc đạo đức sẵn có; hoặc Nhà nước trực tiếp đặt ra (ban hành) các quy phạm mới [17]." 
                            },
                            { 
                            q: "Ngôn ngữ pháp lý rõ ràng, chính xác thể hiện tính quy phạm phổ biến của pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Ngôn ngữ diễn đạt chính xác, rõ ràng, cụ thể là biểu hiện của tính xác định chặt chẽ về mặt hình thức, không phải tính quy phạm phổ biến [18]." 
                            },
                            { 
                            q: "Tiền lệ pháp là hình thức pháp luật lạc hậu, thể hiện trình độ pháp lý thấp.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Tiền lệ pháp vẫn đang được áp dụng phổ biến ở các nước phát triển theo hệ thống thông luật (Anh, Mỹ, Úc...), giúp khắc phục tính lạc hậu, lỗi thời của văn bản luật [19]." 
                            },
                            { 
                            q: "Ở Việt Nam, chỉ có Quốc hội và Ủy ban Thường vụ Quốc hội mới có quyền ban hành Nghị quyết là văn bản quy phạm pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Ngoài Quốc hội, Hội đồng Thẩm phán Tòa án nhân dân tối cao và Hội đồng nhân dân các cấp cũng có quyền ban hành Nghị quyết là văn bản quy phạm pháp luật [20], [21]." 
                            },
                            { 
                            q: "Chỉ có quy phạm pháp luật mới có tính quy phạm.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Tính quy phạm (khuôn mẫu, quy tắc) tồn tại ở tất cả các loại quy phạm xã hội như quy phạm đạo đức, luân lý, tôn giáo, tập quán [22]." 
                            },
                            { 
                            q: "Tập quán pháp là hình thức pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Tập quán pháp là một trong ba hình thức cơ bản của pháp luật, trong đó nhà nước thừa nhận các phong tục, tập quán sẵn có trong xã hội [23]." 
                            },
                            { 
                            q: "Pháp luật Việt Nam thừa nhận tập quán pháp, tiền lệ pháp là nguồn chủ yếu của pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Ở Việt Nam, nguồn chủ yếu và cơ bản nhất của pháp luật là văn bản quy phạm pháp luật. Tập quán pháp và tiền lệ pháp chỉ mang tính chất bổ sung [24], [25]." 
                            },
                            { 
                            q: "Chủ thể pháp luật chính là chủ thể quan hệ pháp luật và ngược lại.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Chủ thể pháp luật là cá nhân/tổ chức có năng lực chủ thể. Nhưng để trở thành 'chủ thể quan hệ pháp luật', họ phải thực sự tham gia vào một quan hệ pháp lý cụ thể trên thực tế [26], [27]." 
                            },
                            { 
                            q: "Chủ thể không có năng lực hành vi thì không thể tham gia vào các quan hệ pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Chủ thể không có năng lực hành vi (trẻ em, người mất trí) vẫn có thể tham gia quan hệ pháp luật gián tiếp thông qua hành vi của người đại diện theo pháp luật [28]." 
                            },
                            { 
                            q: "Trách nhiệm pháp lý là hệ quả của quan hệ pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trách nhiệm pháp lý là hậu quả bất lợi mà chủ thể phải gánh chịu trước Nhà nước khi có hành vi vi phạm pháp luật, chứ không phải hệ quả của một quan hệ pháp luật thông thường [29], [30]." 
                            }
                        ]
                    },
                     6: {
                        group: "TRẮC NGHIỆM ĐÚNG/SAI",
                        title: "2. Vi phạm pháp luật và Trách nhiệm pháp lý",
                        questions: [
                            // --- Khái niệm và Các mặt cấu thành Vi phạm pháp luật ---
                            { q: "Mọi hành vi trái pháp luật đều bị coi là vi phạm pháp luật và phải gánh chịu trách nhiệm pháp lý.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Hành vi trái pháp luật chỉ là một yếu tố trong mặt khách quan. Để cấu thành vi phạm pháp luật và bị truy cứu trách nhiệm pháp lý, chủ thể còn phải có lỗi và có năng lực trách nhiệm pháp lý [1, 2]." },
                            { q: "Mặt khách quan của vi phạm pháp luật bao gồm yếu tố lỗi, động cơ và mục đích của chủ thể vi phạm.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Lỗi, động cơ và mục đích thuộc về 'Mặt chủ quan'. 'Mặt khách quan' là những biểu hiện ra bên ngoài như: Hành vi trái pháp luật, hậu quả, mối quan hệ nhân quả, thời gian, địa điểm, công cụ... [1, 3, 4]." },
                            { q: "Khách thể của vi phạm pháp luật là những quan hệ xã hội được pháp luật bảo vệ nhưng bị hành vi vi phạm xâm hại tới.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Khách thể của vi phạm pháp luật là các quan hệ xã hội được pháp luật điều chỉnh và bảo vệ, bị hành vi vi phạm gây thiệt hại hoặc đe dọa gây thiệt hại [1, 4]." },
                            { q: "Yếu tố lỗi (cố ý trực tiếp, cố ý gián tiếp, vô ý do quá tự tin, vô ý do cẩu thả) là một bộ phận thuộc mặt chủ quan của vi phạm pháp luật.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Mặt chủ quan là những biểu hiện tâm lý bên trong của người vi phạm, bao gồm: Lỗi, động cơ và mục đích thực hiện hành vi [3, 4]." },
                            { q: "Chủ thể của vi phạm pháp luật chỉ có thể là các cá nhân có năng lực hành vi dân sự.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Chủ thể vi phạm pháp luật có thể là cá nhân hoặc tổ chức có năng lực trách nhiệm pháp lý thực hiện hành vi vi phạm [3, 4]." },
                            
                            // --- Phân loại Vi phạm pháp luật ---
                            { q: "Vi phạm hình sự (tội phạm) là hành vi nguy hiểm cho xã hội được quy định trong Bộ luật Hình sự.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là định nghĩa chuẩn xác về vi phạm hình sự (tội phạm) theo đề cương ôn tập [3]." },
                            { q: "Vi phạm hành chính là hành vi nguy hiểm cho xã hội, có mức độ vi phạm đến mức phải bị truy cứu trách nhiệm hình sự.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Vi phạm hành chính là hành vi vi phạm các quy định về quản lý nhà nước nhưng chưa đến mức độ nguy hiểm để bị truy cứu trách nhiệm hình sự [3]." },
                            { q: "Vi phạm dân sự là hành vi trái pháp luật và có lỗi xâm phạm tới các quan hệ tài sản hoặc quan hệ nhân thân được pháp luật bảo vệ.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Hành vi xâm hại đến quan hệ tài sản và quan hệ nhân thân do luật dân sự bảo vệ chính là vi phạm dân sự [5]." },
                            { q: "Vi phạm kỷ luật là hành vi vi phạm các quy định của pháp luật về quản lý nhà nước.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Hành vi vi phạm quy định quản lý nhà nước là Vi phạm hành chính. 'Vi phạm kỷ luật' là hành vi trái với quy chế, nội quy trật tự trong nội bộ một cơ quan, tổ chức, doanh nghiệp hoặc nhà trường [3, 5]." },

                            // --- Trách nhiệm pháp lý ---
                            { q: "Trách nhiệm pháp lý là hậu quả bất lợi mà Nhà nước buộc chủ thể vi phạm pháp luật phải gánh chịu bằng các biện pháp cưỡng chế.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là định nghĩa chuẩn của trách nhiệm pháp lý, nó mang lại những tước đoạt về quyền lợi (phạt tiền, tước giấy phép, phạt tù...) đối với người vi phạm [5, 6]." },
                            { q: "Cơ sở duy nhất làm phát sinh trách nhiệm pháp lý là khi có hành vi vi phạm pháp luật xảy ra.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Trách nhiệm pháp lý chỉ phát sinh dựa trên cơ sở duy nhất là khi trên thực tế có tồn tại hành vi vi phạm pháp luật [6]." },
                            { q: "Trách nhiệm pháp lý có thể do bất kỳ tổ chức xã hội nào áp dụng đối với người vi phạm pháp luật.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Trách nhiệm pháp lý mang tính cưỡng chế, do đó chỉ có cơ quan nhà nước có thẩm quyền mới được quyền áp dụng theo trình tự, thủ tục luật định [6]." },
                            
                            // --- Các loại Trách nhiệm pháp lý cụ thể ---
                            { q: "Thẩm quyền áp dụng hình phạt trong Luật hình sự thuộc về mọi cơ quan nhà nước.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Trách nhiệm hình sự là loại trách nhiệm nghiêm khắc nhất, do Tòa án (và chỉ Tòa án) được quyền quyết định áp dụng đối với người phạm tội [6, 7]." },
                            { q: "Trách nhiệm hành chính do các cơ quan quản lý nhà nước áp dụng đối với các cá nhân, tổ chức vi phạm hành chính.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Các biện pháp xử phạt hành chính (như phạt tiền, cảnh cáo) thuộc thẩm quyền xử lý của các cơ quan quản lý nhà nước [6]." },
                            { q: "Các biện pháp xử lý vi phạm hành chính chỉ áp dụng đối với cá nhân thực hiện hành vi vi phạm hành chính.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Các biện pháp xử lý vi phạm hành chính được áp dụng đối với cả cá nhân và tổ chức thực hiện hành vi vi phạm hành chính [6, 8]." },
                            { q: "Trách nhiệm dân sự do thủ trưởng cơ quan, giám đốc công ty áp dụng đối với cán bộ, nhân viên vi phạm.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Trách nhiệm do thủ trưởng cơ quan áp dụng gọi là 'Trách nhiệm kỷ luật'. 'Trách nhiệm dân sự' do Tòa án áp dụng đối với các chủ thể vi phạm dân sự (ví dụ buộc bồi thường thiệt hại) [9]." },
                            { q: "Trách nhiệm kỷ luật do Tòa án áp dụng đối với các cá nhân vi phạm nội quy, quy chế của cơ quan.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Trách nhiệm kỷ luật do thủ trưởng cơ quan, giám đốc công ty, xí nghiệp áp dụng đối với cán bộ, nhân viên vi phạm nội quy (như phạt cảnh cáo, hạ bậc lương) chứ không phải do Tòa án [9]." },

                            // --- Bài tập tổng hợp ---
                            { q: "Trong quan hệ pháp luật, 'khách thể' là các cá nhân, tổ chức tham gia vào quan hệ đó.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Cá nhân, tổ chức tham gia quan hệ gọi là 'Chủ thể'. 'Khách thể' của quan hệ pháp luật là những giá trị vật chất, tinh thần mà các bên hướng tới để thỏa mãn nhu cầu [10]." },
                            { q: "Khi Nguyễn Văn B (20 tuổi) cố ý trộm cắp 50 triệu đồng, động cơ 'muốn có tiền tiêu xài' của B thuộc về mặt khách quan của vi phạm pháp luật.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Động cơ và mục đích phạm tội là những diễn biến tâm lý bên trong, do đó chúng thuộc về 'Mặt chủ quan' của vi phạm pháp luật [11, 12]." },
                            { q: "Hành vi lén lút cạy tủ trộm cắp tài sản thuộc về mặt khách quan của vi phạm pháp luật.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Hành vi lén lút cạy tủ là biểu hiện ra bên ngoài thế giới khách quan, do đó nó cấu thành 'Mặt khách quan' của vi phạm pháp luật [11]." },
                             // --- BỔ SUNG: BÀI TẬP NHẬN ĐỊNH VỀ PHÁP LUẬT VÀ VI PHẠM PHÁP LUẬT (CHƯƠNG 2) ---
                            { 
                            q: "Mọi hành vi vi phạm pháp luật đều là hành vi trái pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Vi phạm pháp luật trước hết phải là hành vi xác định của con người trái với quy định của pháp luật [7]." 
                            },
                            { 
                            q: "Mọi hành vi trái pháp luật đều là hành vi vi phạm pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Có những hành vi trái pháp luật nhưng không có lỗi (như phòng vệ chính đáng, tình thế cấp thiết) hoặc chủ thể không có đủ năng lực trách nhiệm pháp lý thì không bị xem là vi phạm pháp luật [8, 9]." 
                            },
                            { 
                            q: "Sự thiệt hại về vật chất là dấu hiệu bắt buộc của vi phạm pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Hậu quả nguy hiểm cho xã hội do vi phạm pháp luật gây ra có thể là những thiệt hại về người và của, hoặc những thiệt hại phi vật chất khác [10]." 
                            },
                            { 
                            q: "Không thấy trước hành vi của mình là nguy hiểm cho xã hội thì không bị xem là có lỗi.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trong trường hợp lỗi vô ý do cẩu thả, người vi phạm không nhận thức được hậu quả nguy hiểm do hành vi của mình mặc dù có trách nhiệm phải biết và có thể biết [11]." 
                            },
                            { 
                            q: "Pháp luật Việt Nam chỉ thừa nhận nguồn hình thành pháp luật duy nhất là các văn bản quy phạm pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Mặc dù văn bản quy phạm pháp luật là nguồn chủ yếu, pháp luật Việt Nam còn thừa nhận Tiền lệ pháp (án lệ) và Tập quán pháp là các hình thức pháp luật [4, 5]." 
                            },
                            { 
                            q: "Một quan hệ xã hội không thể cùng bị điều chỉnh bởi pháp luật và quy phạm tập quán.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Nhà nước có thể thừa nhận các phong tục, tập quán sẵn có trong xã hội (Tập quán pháp) và dùng quyền lực nhà nước để đảm bảo thực hiện [5]." 
                            },
                            { 
                            q: "Cá nhân tham gia vào quan hệ pháp luật sẽ trở thành chủ thể của quan hệ pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Chủ thể của quan hệ pháp luật là những cá nhân, tổ chức... trở thành các bên tham gia thực hiện quyền và nghĩa vụ pháp lý trong quan hệ pháp luật cụ thể [6]." 
                            },
                            { 
                            q: "Trách nhiệm pháp lý là hệ quả của hành vi vi phạm pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Trách nhiệm pháp lý là hậu quả bất lợi mà chủ thể phải gánh chịu trước Nhà nước khi có hành vi vi phạm pháp luật [12]." 
                            },
                            { 
                            q: "Trách nhiệm pháp lý là hệ quả của quan hệ pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trách nhiệm pháp lý là hậu quả bất lợi phát sinh do có hành vi vi phạm pháp luật xảy ra, chứ không phải là hệ quả của một quan hệ pháp luật thông thường [12]." 
                            },
                            { 
                            q: "Chủ thể của vi phạm pháp luật có thể chịu đồng thời nhiều trách nhiệm pháp lý.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Tùy thuộc vào hành vi vi phạm pháp luật mà chủ thể vi phạm có thể phải chịu nhiều loại trách nhiệm pháp lý khác nhau cùng lúc, ví dụ như: hình sự - dân sự, hành chính - dân sự [13]." 
                            }
                        ]
                    },
                    7: {
                        group: "TRẮC NGHIỆM ĐÚNG/SAI",
                        title: "3. Luật Hiến pháp",
                        questions: [
                            // --- Khái niệm, Vị trí và Đối tượng điều chỉnh ---
                            { q: "Luật Hiến pháp là một ngành luật độc lập nhưng chỉ có giá trị pháp lý ngang bằng với các ngành luật khác như Luật Dân sự, Luật Hình sự.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Theo đề cương, Luật Hiến pháp là ngành luật gốc, luật chủ đạo. Tất cả các ngành luật khác đều hình thành trên nền tảng của Hiến pháp và không được trái với Hiến pháp." },
                            { q: "Đối tượng điều chỉnh của Luật Hiến pháp là những quan hệ xã hội cơ bản nhất, nền tảng nhất gắn liền với việc tổ chức quyền lực nhà nước.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là khái niệm cốt lõi của Luật Hiến pháp, nó không điều chỉnh những quan hệ nhỏ lẻ mà chỉ điều chỉnh những quan hệ vĩ mô, nền tảng của nhà nước." },
                            { q: "Trong Luật Hiến pháp, nhân dân tham gia vào các quan hệ xã hội với tư cách là những cá nhân công dân độc lập.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Nhân dân tham gia không phải với tư cách cá nhân công dân, mà là tư cách 'cộng đồng dân tộc' trong một nhà nước thống nhất, là chủ thể của luật hiến pháp." },
                            { q: "Việc quy định về tên nước, quốc huy, quốc ca, quốc kỳ và thủ đô thuộc phạm vi điều chỉnh của Luật Hành chính.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Những quan hệ thuộc về chủ quyền của một quốc gia (như tên nước, quốc huy, quốc kỳ...) là những quan hệ cơ bản nhất thuộc đối tượng điều chỉnh của Luật Hiến pháp." },
                            { q: "Trật tự thay đổi Hiến pháp và hiệu lực của Hiến pháp cũng là một nội dung thuộc đối tượng điều chỉnh của Luật Hiến pháp.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Luật Hiến pháp quy định rõ cơ chế, trình tự, thủ tục đặc biệt để sửa đổi, bổ sung và ban hành Hiến pháp." },
                            { q: "Luật Hiến pháp không điều chỉnh các quan hệ xã hội trong lĩnh vực kinh tế như chế độ sở hữu hay thành phần kinh tế.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Đề cương ghi rõ: Luật Hiến pháp củng cố cơ sở kinh tế, điều chỉnh các quan hệ nền tảng trong kinh tế như chế độ sở hữu, thành phần kinh tế, chiến lược kinh tế." },

                            // --- Chế độ chính trị và Tổ chức quyền lực nhà nước ---
                            { q: "Theo Hiến pháp 2013, Nhà nước Cộng hòa Xã hội Chủ nghĩa Việt Nam là nhà nước pháp quyền xã hội chủ nghĩa của Nhân dân, do Nhân dân, vì Nhân dân.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là đặc trưng bản chất bao trùm nhất về chế độ chính trị của nhà nước ta được hiến định." },
                            { q: "Theo Hiến pháp 2013, tất cả quyền lực nhà nước thuộc về Đảng Cộng sản Việt Nam.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Hiến pháp quy định tất cả quyền lực nhà nước thuộc về Nhân dân. Đảng Cộng sản Việt Nam giữ vai trò là 'lực lượng lãnh đạo' Nhà nước và xã hội." },
                            { q: "Nền tảng của quyền lực nhà nước ở Việt Nam là khối đại đoàn kết toàn dân tộc, không phân biệt giai cấp.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Mặc dù nhà nước đại diện cho toàn dân, nhưng Hiến pháp quy định rõ nền tảng của quyền lực nhà nước là 'liên minh giữa giai cấp công nhân với giai cấp nông dân và đội ngũ trí thức'." },
                            { q: "Quyền lực nhà nước ở Việt Nam được phân chia độc lập, tách biệt hoàn toàn thành ba quyền theo mô hình tam quyền phân lập.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Khác với phương Tây, quyền lực nhà nước ở Việt Nam là 'thống nhất', có sự phân công, phối hợp, kiểm soát giữa các cơ quan trong việc thực hiện quyền lập pháp, hành pháp, tư pháp." },
                            { q: "Ở Việt Nam, quyền lực nhà nước là thống nhất, có sự phân công, phối hợp, kiểm soát giữa các cơ quan nhà nước trong việc thực hiện các quyền lập pháp, hành pháp, tư pháp.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là nguyên tắc tổ chức bộ máy nhà nước đặc trưng của Việt Nam được ghi nhận trong Hiến pháp 2013." },

                            // --- Quyền con người, Quyền và nghĩa vụ cơ bản của công dân ---
                            { q: "Quyền con người là các quyền tự nhiên, phổ quát của mọi cá nhân, được Nhà nước công nhận, tôn trọng, bảo vệ và bảo đảm.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Khái niệm này khẳng định tính tự nhiên, sinh ra đã có của quyền con người và trách nhiệm bảo đảm của nhà nước." },
                            { q: "Quyền con người là quyền tuyệt đối, cá nhân có thể thực hiện quyền này mà không bị giới hạn bởi bất kỳ điều kiện nào.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Theo đề cương, quyền con người phải được thực hiện trong khuôn khổ Hiến pháp, pháp luật và gắn với trách nhiệm tôn trọng quyền của người khác, lợi ích cộng đồng." },
                            { q: "Đặc điểm của quyền con người là mang tính phổ quát, áp dụng cho mọi người bất kể họ mang quốc tịch nào.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là điểm khác biệt lớn nhất: Quyền con người mang tính phổ quát quốc tế, còn quyền công dân chỉ áp dụng cho người có quốc tịch của quốc gia đó." },
                            { q: "Quyền con người và quyền công dân là hai khái niệm hoàn toàn đồng nhất với nhau.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Quyền con người áp dụng cho tất cả mọi người, còn quyền công dân bị giới hạn trong khuôn khổ quốc gia, dựa trên mối quan hệ pháp lý giữa nhà nước và công dân nước đó." },
                            { q: "Theo Hiến pháp 2013, quyền công dân luôn độc lập và tách rời với nghĩa vụ công dân.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Nguyên tắc Hiến định của nước ta là: 'Quyền công dân không tách rời nghĩa vụ công dân'. Được hưởng quyền thì phải có trách nhiệm gánh vác nghĩa vụ." },
                            
                            // --- Phân loại các nhóm quyền công dân ---
                            { q: "Quyền bầu cử, ứng cử và tham gia quản lý nhà nước và xã hội được xếp vào nhóm quyền tự do cá nhân của công dân.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Theo cách phân loại trong đề cương, quyền bầu cử, ứng cử, tham gia quản lý nhà nước thuộc về nhóm 'Quyền chính trị'." },
                            { q: "Quyền bất khả xâm phạm về thân thể, chỗ ở, thư tín, điện thoại, tự do đi lại và cư trú là những quyền thuộc nhóm quyền tự do cá nhân.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là những quyền cơ bản nhất bảo vệ sự an toàn và tự do sinh hoạt hàng ngày của mỗi cá nhân công dân." },
                            { q: "Quyền bình đẳng trước pháp luật, tự do ngôn luận, tín ngưỡng, tôn giáo được Hiến pháp phân loại vào nhóm quyền dân sự.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Những quyền liên quan đến sự bình đẳng, tự do tư tưởng, tự do bày tỏ quan điểm thuộc về nhóm quyền dân sự." },
                            { q: "Quyền sở hữu tài sản, quyền được chăm sóc sức khỏe và giáo dục thuộc nhóm quyền chính trị của công dân.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Quyền sở hữu tài sản, chăm sóc sức khỏe, giáo dục, lao động được xếp vào nhóm 'Quyền kinh tế, xã hội, văn hóa'." },
                            { q: "Việc tuân theo Hiến pháp, pháp luật và trung thành với Tổ quốc là những nghĩa vụ cơ bản của công dân.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là nghĩa vụ thiêng liêng và bắt buộc đối với mọi công dân mang quốc tịch Việt Nam." },
                            { q: "Công dân có quyền đóng thuế và thực hiện các nghĩa vụ tài chính, nhưng đây không phải là nghĩa vụ bắt buộc.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Đóng thuế không phải là quyền mà là 'nghĩa vụ cơ bản của công dân' được Hiến pháp quy định rõ ràng nhằm đóng góp xây dựng đất nước." },
                            { q: "Thực hiện nghĩa vụ quân sự và tham gia bảo vệ an ninh quốc gia là nghĩa vụ cơ bản của công dân được quy định trong Hiến pháp.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Bảo vệ Tổ quốc là nghĩa vụ thiêng liêng và quyền cao quý của công dân." },
                            { q: "Quyền sống là một trong những quyền con người tiêu biểu được Hiến pháp 2013 ghi nhận.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Quyền sống là quyền thiêng liêng nhất của con người được Nhà nước tôn trọng và bảo vệ tuyệt đối." },
                            { q: "Quyền bí mật đời tư, thư tín, điện thoại chỉ áp dụng cho công dân Việt Nam, người nước ngoài không được Hiến pháp bảo vệ quyền này.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Bí mật đời tư, thư tín là quyền thuộc nhóm 'Quyền con người'. Do mang tính phổ quát, nên bất kỳ ai (kể cả người nước ngoài) sống trên lãnh thổ Việt Nam đều được bảo vệ." },
                            // --- BỔ SUNG: BÀI TẬP NHẬN ĐỊNH VỀ LUẬT HIẾN PHÁP (TỪ GIÁO TRÌNH) ---
                            { 
                            q: "Hiến pháp ra đời cùng với sự ra đời của nhà nước.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Nhà nước ra đời từ khi xã hội phân chia giai cấp (nhà nước chủ nô), nhưng Hiến pháp là sản phẩm của cuộc cách mạng tư sản. Bản hiến pháp đầu tiên trên thế giới là Hiến pháp Mỹ năm 1787 [1]." 
                            },
                            { 
                            q: "Ở nước ta hiện nay, nhân dân chỉ thực hiện quyền lực nhà nước gián tiếp thông qua Quốc hội và Hội đồng nhân dân các cấp.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Theo Hiến pháp 2013, nhân dân thực hiện quyền lực nhà nước bằng dân chủ trực tiếp (biểu quyết, trưng cầu ý dân...) và dân chủ đại diện (gián tiếp) thông qua Quốc hội, HĐND và các cơ quan khác của Nhà nước [2]." 
                            },
                            { 
                            q: "Trong hệ thống chính trị nước ta hiện nay, nhà nước giữ vai trò là lực lượng lãnh đạo.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Trong hệ thống chính trị Việt Nam, Đảng Cộng sản Việt Nam mới là lực lượng lãnh đạo Nhà nước và xã hội, còn Nhà nước đóng vai trò quản lý [3]." 
                            },
                            { 
                            q: "Quyền con người, quyền công dân là hai phạm trù hoàn toàn đồng nhất với nhau.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Quyền con người mang tính phổ quát toàn nhân loại (dùng từ 'mọi người', 'không ai'). Còn quyền công dân gắn liền với quốc tịch của một quốc gia cụ thể (chỉ áp dụng cho 'công dân' nước đó) [4], [5]." 
                            },
                            { 
                            q: "Theo quy định của Hiến pháp hiện hành, quyền con người, quyền công dân chỉ có thể bị hạn chế theo quy định của pháp luật.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Khoản 2 Điều 14 Hiến pháp 2013 quy định quyền con người, quyền công dân chỉ có thể bị hạn chế theo quy định của 'luật' (văn bản do Quốc hội ban hành), chứ không phải 'pháp luật' nói chung (bao gồm cả nghị định, thông tư...) [6]." 
                            },
                            { 
                            q: "Uỷ ban thường vụ Quốc hội là cơ quan chuyên môn của Quốc hội.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Uỷ ban thường vụ Quốc hội là cơ quan thường trực của Quốc hội. Các cơ quan chuyên môn của Quốc hội là Hội đồng dân tộc và các Uỷ ban của Quốc hội [7]." 
                            },
                            { 
                            q: "Theo quy định của pháp luật hiện hành, Chủ tịch nước có quyền phủ quyết các đạo luật do Quốc hội ban hành.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Ở nước ta, Quốc hội là cơ quan quyền lực nhà nước cao nhất, cơ quan duy nhất có quyền lập hiến và lập pháp [8], [9]. Chủ tịch nước chỉ có trách nhiệm công bố Hiến pháp, luật đã được Quốc hội thông qua chứ không có quyền phủ quyết [10]." 
                            },
                            { 
                            q: "Chính phủ do Quốc hội bầu ra.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Quốc hội chỉ trực tiếp 'bầu' ra Thủ tướng Chính phủ. Còn các thành viên khác của Chính phủ (Phó Thủ tướng, Bộ trưởng...) là do Quốc hội 'phê chuẩn' dựa trên đề nghị của Thủ tướng [10]." 
                            },
                            { 
                            q: "Tất cả các thành viên của Chính phủ đều phải là đại biểu Quốc hội.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Theo quy định, chỉ có chức danh Thủ tướng Chính phủ là bắt buộc phải được bầu ra trong số các đại biểu Quốc hội. Các thành viên khác của Chính phủ không bắt buộc phải là đại biểu Quốc hội." 
                            },
                            { 
                            q: "Theo Hiến pháp 2013, hệ thống Toà án nhân dân bao gồm: Toà án nhân dân tối cao, Toà án nhân dân cấp tỉnh, toà án nhân dân cấp huyện và các toà án quân sự.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. So với trước đây, Luật Tổ chức Tòa án nhân dân 2014 đã bổ sung thêm một cấp tòa mới. Hệ thống hiện nay gồm: TAND tối cao, TAND cấp cao, TAND cấp tỉnh, TAND cấp huyện và các Tòa án quân sự [11]." 
                            }
                        ]
                    },
                    8: {
                        group: "TRẮC NGHIỆM ĐÚNG/SAI",
                        title: "4. Luật Hình sự",
                        questions: [
                            // --- Khái niệm và Đối tượng điều chỉnh ---
                            { q: "Luật Hình sự điều chỉnh các quan hệ tài sản và quan hệ nhân thân phát sinh trên cơ sở bình đẳng, tự nguyện của các chủ thể.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Điều chỉnh quan hệ tài sản và nhân thân bình đẳng là của Luật Dân sự. Đối tượng điều chỉnh của Luật Hình sự là quan hệ xã hội phát sinh giữa Nhà nước và người phạm tội (hoặc pháp nhân thương mại phạm tội) mang tính quyền lực - phục tùng [1], [2]." },
                            { q: "Trong quan hệ pháp luật hình sự, cơ quan Công an, Viện kiểm sát, Tòa án là bên mang quyền lực đại diện cho Nhà nước.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Trong quan hệ này, Nhà nước là bên mang quyền lực (thông qua các cơ quan tiến hành tố tụng), còn người phạm tội là bên gánh chịu nghĩa vụ (chấp hành hình phạt) [2]." },
                            
                            // --- Khái niệm Tội phạm ---
                            { q: "Chủ thể của tội phạm quy định trong Bộ luật Hình sự chỉ có thể là các cá nhân con người cụ thể.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Theo đề cương, chủ thể thực hiện hành vi tội phạm có thể là người (cá nhân) có năng lực trách nhiệm hình sự hoặc là pháp nhân thương mại [3]." },
                            { q: "Mọi hành vi nguy hiểm cho xã hội bị coi là tội phạm đều phải do người phạm tội thực hiện với lỗi cố ý.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Tội phạm là hành vi nguy hiểm cho xã hội do chủ thể thực hiện một cách cố ý HOẶC vô ý (ví dụ: vô ý làm chết người) [3]." },

                            // --- 4 Mặt Cấu thành tội phạm ---
                            { q: "Khách thể của tội phạm là các cá nhân, tổ chức bị hành vi phạm tội trực tiếp gây thiệt hại về sức khỏe, tài sản.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Cá nhân/tổ chức bị hại không phải là khách thể. Khách thể của tội phạm là các 'quan hệ xã hội' được luật hình sự bảo vệ (ví dụ: quyền sở hữu, trật tự trị an, chủ quyền quốc gia) bị tội phạm xâm hại [4]." },
                            { q: "Hành vi nguy hiểm cho xã hội, hậu quả nguy hiểm và mối quan hệ nhân quả giữa hành vi - hậu quả là những yếu tố thuộc mặt khách quan của tội phạm.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Mặt khách quan là những biểu hiện bên ngoài của tội phạm diễn ra trong thế giới khách quan, bao gồm hành vi, hậu quả, mối quan hệ nhân quả, công cụ, phương tiện, hoàn cảnh... [4]." },
                            { q: "Động cơ và mục đích phạm tội là những dấu hiệu bắt buộc thuộc mặt khách quan của cấu thành tội phạm.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Động cơ và mục đích là những biểu hiện tâm lý bên trong, do đó chúng thuộc về 'Mặt chủ quan' của tội phạm chứ không phải mặt khách quan [4]." },
                            { q: "Mặt chủ quan của tội phạm là những biểu hiện tâm lý bên trong của tội phạm được phản ánh qua yếu tố lỗi, động cơ và mục đích.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là khái niệm chuẩn xác về mặt chủ quan của cấu thành tội phạm theo đề cương ôn tập [4]." },
                            { q: "Mọi cá nhân đạt đến một độ tuổi nhất định do Bộ luật hình sự quy định đều có thể trở thành chủ thể của tội phạm.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Đạt độ tuổi quy định chỉ là một điều kiện. Chủ thể của tội phạm còn bắt buộc phải là người 'có đủ năng lực trách nhiệm hình sự' (không bị mắc bệnh tâm thần làm mất khả năng nhận thức/điều khiển hành vi) [5]." },

                            // --- Phân loại Tội phạm ---
                            { q: "Tội phạm ít nghiêm trọng là tội phạm gây nguy hại không lớn cho xã hội, có mức cao nhất của khung hình phạt đến 5 năm tù.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Theo phân loại, Tội phạm ít nghiêm trọng có mức cao nhất là hình phạt đến 3 năm tù (chứ không phải 5 năm) [5]." },
                            { q: "Tội phạm nghiêm trọng là tội phạm gây nguy hại lớn cho xã hội, có mức cao nhất của khung hình phạt đến 7 năm tù.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là định nghĩa chuẩn xác về mức độ nguy hiểm và khung hình phạt của Tội phạm nghiêm trọng [5]." },
                            { q: "Hình phạt tử hình hoặc tù chung thân chỉ được áp dụng đối với Tội phạm đặc biệt nghiêm trọng.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Tội phạm đặc biệt nghiêm trọng là tội phạm gây nguy hại đặc biệt lớn, có mức cao nhất của khung hình phạt trên 15 năm tù, tù chung thân, hoặc tử hình [5], [6]." },
                            { q: "Tội phạm rất nghiêm trọng có mức cao nhất của khung hình phạt từ trên 7 năm tù đến 15 năm tù.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Theo định nghĩa, tội phạm rất nghiêm trọng gây nguy hại rất lớn, mức cao nhất là khung hình phạt đến 15 năm tù [5]." },

                            // --- Trách nhiệm hình sự và Hình phạt ---
                            { q: "Hình phạt là biện pháp cưỡng chế nghiêm khắc nhất của Nhà nước do Cơ quan điều tra, Viện kiểm sát và Tòa án quyết định áp dụng.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Thẩm quyền áp dụng hình phạt là độc quyền. Hình phạt CHỈ do Tòa án quyết định áp dụng, các cơ quan khác (Công an, Viện kiểm sát) không có quyền ra bản án phạt [6]." },
                            { q: "Mục đích của việc áp dụng hình phạt là nhằm tước bỏ hoặc hạn chế quyền, lợi ích của người hoặc pháp nhân thương mại phạm tội.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là bản chất của hình phạt - biện pháp cưỡng chế nghiêm khắc nhất nhằm tước bỏ/hạn chế quyền (tự do, tài sản, chức vụ...) của chủ thể phạm tội [6]." },
                            { q: "Hệ thống hình phạt trong Luật Hình sự được chia thành hai loại: Hình phạt chính và Hình phạt bổ sung.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Theo đề cương, hệ thống hình phạt được phân thành hai nhóm rõ rệt là Hình phạt chính (cơ bản, độc lập) và Hình phạt bổ sung (đi kèm) [6], [7]." },
                            { q: "Hình phạt bổ sung có thể được Tòa án tuyên áp dụng độc lập mà không cần đi kèm với bất kỳ hình phạt chính nào.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Theo quy định, Hình phạt bổ sung là hình phạt 'không được tuyên độc lập' mà chỉ có thể được tuyên theo (đi kèm) hình phạt chính [7]." },
                            { q: "Các hình thức như cảnh cáo, cải tạo không giam giữ, trục xuất, tù có thời hạn là những hình phạt bổ sung trong Luật Hình sự.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Cảnh cáo, cải tạo không giam giữ, trục xuất, tù có thời hạn, tù chung thân và tử hình là các hình thức thuộc nhóm 'Hình phạt chính' [6]." },
                            { q: "Trục xuất và phạt tiền là hai hình thức chế tài có thể được Tòa án tuyên vừa là hình phạt chính, vừa có thể là hình phạt bổ sung.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Theo đề cương, trục xuất và phạt tiền xuất hiện ở cả danh mục Hình phạt chính (tuyên độc lập) và Hình phạt bổ sung (tuyên đi kèm hình phạt khác) [6], [7]." },
                            { q: "Cấm đảm nhiệm chức vụ, cấm cư trú, quản chế là những hình phạt chính được áp dụng rộng rãi cho người phạm tội.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Cấm đảm nhiệm chức vụ, cấm cư trú, quản chế... là các ví dụ điển hình của nhóm 'Hình phạt bổ sung' (chỉ được tuyên kèm theo hình phạt chính) [7]." },
                            // --- Khái niệm và Đặc điểm Tội phạm ---
                            { 
                            q: "Tội phạm là hành vi nguy hiểm cho xã hội do người có năng lực trách nhiệm hình sự hoặc pháp nhân thương mại thực hiện.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Theo định nghĩa của Bộ luật Hình sự, chủ thể thực hiện tội phạm bao gồm cả cá nhân có năng lực trách nhiệm hình sự và pháp nhân thương mại [1], [2]." 
                            },
                            { 
                            q: "Một hành vi gây nguy hiểm đáng kể cho xã hội thì luôn bị coi là tội phạm dù chủ thể thực hiện không có lỗi.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Một người thực hiện hành vi mang tính nguy hiểm đáng kể cho xã hội cũng không được xem là tội phạm nếu hành vi đó không có lỗi. Lỗi là dấu hiệu bắt buộc [3]." 
                            },
                            { 
                            q: "Một hành vi nguy hiểm cho xã hội dù chưa được quy định trong Bộ luật Hình sự vẫn có thể bị coi là tội phạm và bị xét xử.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Nguyên tắc cơ bản là 'chỉ người nào phạm một tội đã được Bộ luật hình sự quy định mới phải chịu trách nhiệm hình sự'. Nếu hành vi chưa được quy định trong BLHS thì không bị coi là tội phạm [4], [5]." 
                            },
                            { 
                            q: "Tội phạm đặc biệt nghiêm trọng có mức cao nhất của khung hình phạt là từ trên 15 năm tù đến 20 năm tù, tù chung thân hoặc tử hình.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Đây là định nghĩa chuẩn xác về mức hình phạt đối với tội phạm đặc biệt nghiêm trọng do Bộ luật Hình sự quy định [6]." 
                            },

                            // --- Cấu thành Tội phạm & Tuổi chịu TNHS ---
                            { 
                            q: "Động cơ và mục đích phạm tội là những dấu hiệu thuộc mặt khách quan của cấu thành tội phạm.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Động cơ và mục đích của người phạm tội là hoạt động tâm lý bên trong, do đó chúng thuộc về 'Mặt chủ quan' của tội phạm chứ không phải mặt khách quan [7]." 
                            },
                            { 
                            q: "Người từ đủ 14 tuổi trở lên phải chịu trách nhiệm hình sự về mọi tội phạm.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Theo Điều 12 BLHS, người từ đủ 16 tuổi trở lên mới phải chịu TNHS về mọi tội phạm. Người từ đủ 14 đến dưới 16 tuổi chỉ chịu TNHS về tội rất nghiêm trọng và đặc biệt nghiêm trọng thuộc một số điều luật cụ thể [8]." 
                            },

                            // --- Các giai đoạn thực hiện & Đồng phạm ---
                            { 
                            q: "Người tự ý nửa chừng chấm dứt việc phạm tội (tự mình không thực hiện tội phạm đến cùng dù không có gì ngăn cản) vẫn phải chịu hình phạt về tội định phạm.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Theo quy định, người tự ý nửa chừng chấm dứt việc phạm tội sẽ 'được miễn trách nhiệm hình sự' về tội định phạm [9], [10]." 
                            },
                            { 
                            q: "Trong đồng phạm, người xúi giục là người trực tiếp thực hiện tội phạm.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. 'Người thực hành' mới là người trực tiếp thực hiện tội phạm. Còn 'Người xúi giục' là người kích động, dụ dỗ, thúc đẩy người khác thực hiện tội phạm [10]." 
                            },
                            { 
                            q: "Người đồng phạm phải chịu trách nhiệm hình sự về hành vi vượt quá của người thực hành.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Pháp luật quy định rõ người đồng phạm KHÔNG phải chịu trách nhiệm hình sự về hành vi vượt quá của người thực hành [11]." 
                            },

                            // --- Loại trừ tính chất nguy hiểm & Hình phạt ---
                            { 
                            q: "Phòng vệ chính đáng không phải là tội phạm, trừ khi hành vi chống trả rõ ràng quá đáng, vượt quá giới hạn phòng vệ chính đáng.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Gây thiệt hại trong phòng vệ chính đáng không phải là tội phạm. Tuy nhiên, nếu vượt quá giới hạn phòng vệ thì phải chịu trách nhiệm hình sự [11], [12]." 
                            },
                            { 
                            q: "Hình phạt tù có thời hạn có thể được áp dụng đối với pháp nhân thương mại phạm tội.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Đối với pháp nhân thương mại, hình phạt chính chỉ bao gồm: Phạt tiền, đình chỉ hoạt động có thời hạn hoặc vĩnh viễn. Hình phạt tù chỉ áp dụng cho cá nhân con người [13], [14]." 
                            },

                            // --- Các tội phạm cụ thể ---
                            { 
                            q: "Vô ý làm chết người cũng được coi là cấu thành Tội giết người (Điều 123 BLHS).", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Tội giết người bắt buộc phải là hành vi 'cố ý' tước đoạt mạng sống của người khác. Hành vi vô ý làm chết người thuộc về một tội danh khác [15], [16]." 
                            },
                            { 
                            q: "Tội cướp tài sản là hành vi lén lút chiếm đoạt tài sản của người khác.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Hành vi lén lút chiếm đoạt là đặc trưng của Tội trộm cắp tài sản. Tội cướp tài sản phải là hành vi dùng vũ lực hoặc đe dọa dùng vũ lực ngay tức khắc [17], [18]." 
                            },
                            { 
                            q: "Chủ thể của tội tham ô tài sản không bắt buộc phải là người có chức vụ, quyền hạn.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Chủ thể của tội tham ô tài sản là chủ thể đặc biệt, bắt buộc phải là người có chức vụ, quyền hạn và có trách nhiệm quản lý đối với tài sản bị chiếm đoạt [19], [20]." 
                            },

                            // --- Tố tụng hình sự ---
                            { 
                            q: "Cơ quan điều tra có quyền quyết định áp dụng hình phạt đối với người phạm tội.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Hình phạt là biện pháp cưỡng chế nghiêm khắc nhất của nhà nước CHỈ do Tòa án quyết định áp dụng đối với người phạm tội hoặc pháp nhân phạm tội [21], [13]." 
                            },
                            { 
                            q: "Chỉ được khởi tố vụ án hình sự khi đã xác định có dấu hiệu tội phạm.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Căn cứ khởi tố vụ án hình sự bắt buộc phải dựa trên việc đã xác định có dấu hiệu tội phạm thông qua tố giác, tin báo, hoặc người phạm tội tự thú... [22]." 
                            }
                        ]
                    },
                    9: {
                        group: "TRẮC NGHIỆM ĐÚNG/SAI",
                        title: "5. Luật Dân sự",
                        questions: [
                            // --- Khái niệm và Đối tượng điều chỉnh ---
                            { q: "Luật Dân sự điều chỉnh các quan hệ tài sản và quan hệ nhân thân dựa trên tính chất mệnh lệnh và phục tùng.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Luật Dân sự điều chỉnh các quan hệ tài sản và nhân thân phát sinh trên cơ sở bình đẳng, tự nguyện, tự chịu trách nhiệm của các chủ thể [1]." },
                            { q: "Quan hệ tài sản trong Luật Dân sự là những quan hệ mang tính chất ý chí và có thể trị giá được thành tiền.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là quan hệ giữa người với người gắn liền với tài sản hữu hình hoặc vô hình (sở hữu, mua bán, vay mượn...), mang tính ý chí và trị giá được thành tiền [2]." },
                            { q: "Quyền đối với họ tên, danh dự, nhân phẩm là quan hệ nhân thân gắn liền với tài sản và có thể chuyển giao cho người khác.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Quan hệ nhân thân là những giá trị tinh thần gắn liền với một chủ thể nhất định và không thể dịch chuyển cho người khác. Quyền đối với họ tên, danh dự thuộc nhóm quan hệ nhân thân không gắn liền với tài sản [2], [3]." },
                            { q: "Chủ thể của quan hệ pháp luật dân sự chỉ có thể là cá nhân có đủ năng lực hành vi dân sự.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Chủ thể quan hệ dân sự bao gồm cả cá nhân và pháp nhân. Hơn nữa, cá nhân có năng lực hành vi dân sự chưa đầy đủ vẫn có thể tham gia là chủ thể của quan hệ dân sự [4], [5]." },
                            
                            // --- Hợp đồng dân sự ---
                            { q: "Hợp đồng dân sự là sự thỏa thuận giữa các bên về việc xác lập, thay đổi hoặc chấm dứt quyền và nghĩa vụ dân sự.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Hợp đồng là căn cứ pháp lý phổ biến nhất làm phát sinh các quan hệ dân sự như mua bán, thuê, vay tài sản, tặng cho... [3]." },
                            { q: "Trong quá trình giao kết hợp đồng, các bên có thể tự do thỏa thuận mọi nội dung kể cả việc vi phạm điều cấm của luật.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Nguyên tắc giao kết hợp đồng đòi hỏi sự tự do, tự nguyện thỏa thuận nhưng bắt buộc không được vi phạm điều cấm của luật và không được trái đạo đức xã hội [6]." },
                            { q: "Một hợp đồng dân sự sẽ có hiệu lực ngay cả khi các bên tham gia bị ép buộc, miễn là nội dung hợp đồng đúng pháp luật.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Một trong những điều kiện bắt buộc để hợp đồng dân sự có hiệu lực là các bên tham gia phải hoàn toàn tự nguyện [7]." },

                            // --- Thừa kế và Di chúc ---
                            { q: "Thừa kế là việc chuyển dịch tài sản của người đã chết cho người còn sống chỉ được thực hiện theo quy định của pháp luật.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Việc chuyển dịch tài sản của người đã chết cho người còn sống (thừa kế) có thể được thực hiện theo ý chí qua di chúc, hoặc theo quy định của pháp luật [8]." },
                            { q: "Để một bản di chúc được coi là hợp pháp thì người lập di chúc phải minh mẫn, sáng suốt và hoàn toàn tự nguyện.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Đây là hai điều kiện tiên quyết về mặt ý chí, bên cạnh yêu cầu nội dung không trái pháp luật, đạo đức và hình thức phù hợp quy định [8], [9]." },
                            { q: "Thừa kế theo pháp luật chỉ được áp dụng trong trường hợp người để lại di sản không có di chúc.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Thừa kế theo pháp luật còn được áp dụng khi có di chúc nhưng di chúc không hợp pháp, hoặc người được chỉ định trong di chúc từ chối nhận di sản / không có quyền hưởng [9]." },
                            
                            // --- Diện và Hàng thừa kế ---
                            { q: "Cha mẹ nuôi và con nuôi không được xếp vào hàng thừa kế thứ nhất của nhau.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Pháp luật bảo vệ quan hệ nuôi dưỡng, do đó hàng thừa kế thứ nhất bao gồm: Vợ, chồng; cha đẻ, mẹ đẻ; cha nuôi, mẹ nuôi; con đẻ, con nuôi của người chết [9]." },
                            { q: "Ông bà nội, ông bà ngoại và anh, chị, em ruột của người chết thuộc hàng thừa kế thứ hai theo quy định của pháp luật.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Những người này cùng với cháu ruột (mà người chết là ông bà nội/ngoại) được xếp vào hàng thừa kế thứ hai [9], [10]." },
                            { q: "Những người ở hàng thừa kế thứ hai có quyền hưởng di sản cùng lúc với những người ở hàng thừa kế thứ nhất nếu họ có quan hệ thân thiết.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Nguyên tắc phân chia là: Hàng thừa kế sau chỉ được hưởng khi không còn ai ở hàng thừa kế trước (do đã chết, bị truất quyền hoặc từ chối nhận di sản) [10]." },
                            
                            // --- Thời điểm và Địa điểm mở thừa kế ---
                            { q: "Thời điểm mở thừa kế được xác định là thời điểm những người thừa kế tiến hành họp mặt gia đình để phân chia di sản.", a: ["Đúng", "Sai"], c: 1, r: "Sai. Theo luật định, thời điểm mở thừa kế chính là thời điểm người để lại tài sản chết [10]." },
                            { q: "Địa điểm mở thừa kế là nơi cư trú cuối cùng của người chết.", a: ["Đúng", "Sai"], c: 0, r: "Đúng. Trong trường hợp không xác định được nơi cư trú cuối cùng thì địa điểm mở thừa kế là nơi có toàn bộ hoặc phần lớn di sản [10]." },
                            // --- Đối tượng và Phương pháp điều chỉnh ---
                            { 
                            q: "Đối tượng điều chỉnh của Luật Dân sự chỉ bao gồm các quan hệ tài sản mang tính chất hàng hóa - tiền tệ.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Đối tượng điều chỉnh của Luật Dân sự gồm 2 nhóm quan hệ: quan hệ tài sản và quan hệ nhân thân [1]." 
                            },
                            { 
                            q: "Quyền nhân thân là quyền dân sự gắn liền với mỗi cá nhân và tuyệt đối không thể chuyển giao cho người khác trong mọi trường hợp.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Quyền nhân thân không thể chuyển giao cho người khác, trừ trường hợp pháp luật có quy định khác [2]." 
                            },

                            // --- Quyền sở hữu ---
                            { 
                            q: "Quyền định đoạt là quyền khai thác công dụng, hưởng hoa lợi, lợi tức từ tài sản.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Quyền khai thác công dụng, hưởng hoa lợi, lợi tức là Quyền sử dụng. Quyền định đoạt là quyền năng để quyết định về số phận của vật (như bán, cho thuê, tiêu dùng hay hủy bỏ) [3, 4]." 
                            },

                            // --- Thừa kế (Thời điểm, địa điểm, di sản) ---
                            { 
                            q: "Thời điểm mở thừa kế được xác định là thời điểm những người thừa kế nhận được thông báo về việc chia di sản.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Theo khoản 1 Điều 611 BLDS 2015, thời điểm mở thừa kế là thời điểm người có tài sản chết [5]." 
                            },
                            { 
                            q: "Địa điểm mở thừa kế luôn luôn là nơi có toàn bộ hoặc phần lớn di sản của người chết.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Địa điểm mở thừa kế ưu tiên là nơi cư trú cuối cùng của người để lại di sản; chỉ khi không xác định được nơi cư trú cuối cùng thì địa điểm mở thừa kế mới là nơi có toàn bộ hoặc phần lớn di sản [6]." 
                            },
                            { 
                            q: "Di sản thừa kế không bao gồm quyền sử dụng đất vì đất đai thuộc sở hữu toàn dân.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Quyền sử dụng đất cũng thuộc di sản thừa kế và được để lại thừa kế theo quy định của Bộ luật Dân sự 2015 [7]." 
                            },
                            { 
                            q: "Thời hiệu để người thừa kế yêu cầu chia di sản đối với bất động sản và động sản đều là 10 năm kể từ thời điểm mở thừa kế.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Thời hiệu yêu cầu chia di sản là 30 năm đối với bất động sản và 10 năm đối với động sản kể từ thời điểm mở thừa kế [8]." 
                            },

                            // --- Thừa kế theo di chúc ---
                            { 
                            q: "Di chúc miệng chỉ có hiệu lực khi tính mạng của người lập di chúc bị đe dọa nghiêm trọng và phải có ít nhất 02 người làm chứng.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Di chúc miệng chỉ được lập trong trường hợp thật đặc biệt khi tính mạng bị đe dọa nghiêm trọng, phải có ít nhất hai người làm chứng ghi ra văn bản, ký tên và phải đem đi công chứng/chứng thực trong 5 ngày [9, 10]." 
                            },
                            { 
                            q: "Người từ đủ 15 tuổi đến chưa đủ 18 tuổi có quyền lập di chúc bằng miệng nếu được cha, mẹ hoặc người giám hộ đồng ý.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Người từ đủ 15 tuổi đến chưa đủ 18 tuổi có thể lập di chúc nhưng bắt buộc phải lập 'bằng văn bản' và được cha, mẹ hoặc người giám hộ đồng ý [11]." 
                            },
                            { 
                            q: "Người để lại di sản hoàn toàn có quyền truất quyền thừa kế của con đã thành niên nhưng không có khả năng lao động mà không cần lý do.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Con đã thành niên mà không có khả năng lao động thuộc nhóm người được hưởng di sản không phụ thuộc nội dung di chúc. Dù bị truất quyền, họ vẫn được hưởng phần di sản bằng 2/3 suất của một người thừa kế theo pháp luật [12, 13]." 
                            },

                            // --- Thừa kế theo pháp luật ---
                            { 
                            q: "Anh ruột, chị ruột, em ruột của người chết thuộc hàng thừa kế thứ nhất.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Anh ruột, chị ruột, em ruột của người chết thuộc hàng thừa kế thứ hai. Hàng thừa kế thứ nhất chỉ gồm: vợ, chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, con đẻ, con nuôi của người chết [14, 15]." 
                            },
                            {

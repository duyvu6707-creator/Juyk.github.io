                            { q: "Tỉ suất giá trị thặng dư biểu hiện", a: ["trình độ bóc lột của tư bản đối với lao động làm thuê.", "quy mô bóc lột của tư bản đối với lao động làm thuê.", "tính chất bóc lột của tư bản đối với lao động làm thuê.", "phạm vi bóc lột của tư bản đối với lao động làm thuê."], c: 0, r: "Tỷ suất giá trị thặng dư (m') chỉ rõ phần thời gian thặng dư gấp mấy lần thời gian tất yếu, phản ánh chính xác trình độ bóc lột của nhà tư bản [4, 8]." },
                            { q: "Khối lượng giá trị thặng dư phản ánh điều gì?", a: ["Trình độ bóc lột của tư bản đối với lao động làm thuê", "Quy mô bóc lột của tư bản đối với lao động làm thuê", "Tính chất bóc lột của tư bản đối với lao động làm thuê", "Phạm vi bóc lột của tư bản đối với lao động làm thuê"], c: 1, r: "Khối lượng giá trị thặng dư (M = m' * V) cho biết tổng số lượng giá trị thặng dư mà nhà tư bản thu được, qua đó phản ánh quy mô của sự bóc lột [4, 8]." },
                            { q: "Phương pháp sản xuất giá trị thặng dư tương đối là gì?", a: ["Kéo dài ngày lao động, trong khi thời gian lao động tất yếu không đổi", "Tăng cường độ lao động", "Rút ngắn thời gian lao động tất yếu, giữ nguyên hoặc rút ngắn độ dài ngày lao động", "Tăng cường độ lao động và kéo dài thời gian lao động"], c: 2, r: "Sản xuất giá trị thặng dư tương đối dựa trên việc rút ngắn thời gian lao động tất yếu để kéo dài tương ứng thời gian lao động thặng dư [4, 8]." },
                            { q: "Để tăng cường bóc lột giá trị thặng dư tương đối cần phải", a: ["cải tiến kĩ thuật, tăng năng suất lao động.", "tăng cường độ lao động trong các ngành sản xuất ra tư liệu sinh hoạt.", "tăng năng suất lao động trong các ngành sản xuất tư liệu sinh hoạt.", "kéo dài thời gian lao động trong các ngành sản xuất ra tư liệu sinh hoạt."], c: 2, r: "Chìa khóa để hạ thấp giá trị sức lao động (thời gian lao động tất yếu) là phải tăng năng suất lao động trong các ngành sản xuất tư liệu sinh hoạt [4, 8, 9]." },
                            { q: "Chi phí sản xuất tư bản chủ nghĩa là", a: ["hao phí lao động quá khứ và phần lao động sống được trả công.", "hao phí tư bản bất biến, tư bản khả biến và giá trị thặng dư.", "hao phí tư bản bất biến để tạo ra hàng hoá.", "hao phí tư bản khả biến để tạo ra hàng hoá."], c: 0, r: "Chi phí sản xuất (k) gồm chi phí tư liệu sản xuất (c - lao động quá khứ) và tiền lương (v - phần lao động sống được trả công) [4, 9]." },
                            { q: "Nguyên nhân nào dẫn đến sự bình quân hoá lợi nhuận?", a: ["Cạnh tranh giữa các nước", "Cạnh tranh trong nội bộ ngành", "Cạnh tranh giữa các ngành", "Cạnh tranh giữa các khu vực"], c: 2, r: "Sự di chuyển vốn qua lại giữa các ngành để tìm kiếm tỷ suất lợi nhuận cao hơn (cạnh tranh giữa các ngành) đã dẫn tới việc cào bằng và hình thành tỷ suất lợi nhuận bình quân [4, 9]." },
                            { q: "Công thức chung của tư bản là gì?", a: ["H – T – H", "T – H – T’", "T – H – T", "H – T – H’"], c: 1, r: "Công thức lưu thông của tư bản luôn bắt đầu bằng Tiền và kết thúc bằng Tiền với số lượng lớn hơn ban đầu (T' = T + m) [4, 9]." },
                            { q: "Lợi nhuận bình quân là gì?", a: ["Lợi nhuận trung bình của các nhà tư bản kinh doanh trong lĩnh vực ngân hàng", "Lợi nhuận trung bình của các nhà tư bản kinh doanh trong lĩnh vực công nghiệp", "Lợi nhuận bằng nhau của những tư bản như nhau đầu tư vào các ngành khác nhau", "Lợi nhuận trung bình tính cho 1 đồng vốn sau khi đã trừ đi mọi chi phí"], c: 2, r: "Lợi nhuận bình quân là số lợi nhuận bằng nhau của những lượng tư bản bằng nhau, bất kể đầu tư vào ngành sản xuất nào [4, 9]." },
                            { q: "Giá cả sản xuất bằng", a: ["chi phí sản xuất cộng với lợi nhuận bình quân.", "toàn bộ chi phí bỏ ra trong quá trình sản xuất.", "giá cả thị trường trừ đi lợi nhuận của các nhà tư bản công nghiệp.", "giá trị hàng hoá cộng với lợi nhuận của các nhà tư bản thương nghiệp."], c: 0, r: "Khi lợi nhuận bình quân hình thành, giá trị hàng hóa chuyển hóa thành giá cả sản xuất. Công thức: Giá cả sản xuất = Chi phí sản xuất (k) + Lợi nhuận bình quân [4, 9]." },
                            { q: "Giá trị sử dụng hàng hoá sức lao động khác với giá trị sử dụng hàng hoá thông thường ở điểm nào?", a: ["Tạo ra giá trị nhiều hơn giá trị hàng hoá thông thường", "Phụ thuộc vào yếu tố tinh thần", "Phụ thuộc vào yếu tố lịch sử", "Phụ thuộc vào yếu tố tinh thần và lịch sử"], c: 3, r: "Theo bảng đáp án của giáo trình là D. (Lưu ý: Theo lý luận Mác - Lênin, yếu tố tinh thần và lịch sử thường là đặc điểm của 'giá trị' sức lao động, chứ không phải 'giá trị sử dụng') [4, 5]." },
                            { q: "Công thức tính khối lượng giá trị thặng dư là", a: ["M = m × V.", "M = m/v × m'.", "M = V/m × V.", "M = m' × V."], c: 3, r: "Khối lượng giá trị thặng dư (M) được tính bằng tỷ suất giá trị thặng dư (m') nhân với tổng tư bản khả biến (V) đã được sử dụng [4, 5]." },
                            { q: "Bản chất của tư bản là gì?", a: ["Tiền", "Tư liệu sản xuất", "Quan hệ sản xuất xã hội", "Tư liệu lao động"], c: 2, r: "Tư bản không phải là một vật, bản chất sâu xa của nó là một quan hệ sản xuất xã hội, phản ánh sự bóc lột của giai cấp tư sản đối với lao động làm thuê [4, 5]." },
                            { q: "Dựa vào căn cứ nào để phân chia tư bản thành tư bản bất biến và tư bản khả biến?", a: ["Tốc độ vận động của mỗi loại tư bản", "Đặc điểm của mỗi loại tư bản", "Vai trò của từng bộ phận tư bản trong việc sản xuất ra giá trị thặng dư", "Sự chu chuyển giá trị của mỗi loại tư bản"], c: 2, r: "Sự phân chia thành tư bản bất biến (c) và tư bản khả biến (v) dựa vào vai trò khác nhau của từng bộ phận trong quá trình tạo ra giá trị thặng dư [4, 5]." },
                            { q: "Vì sao sức lao động là hàng hoá đặc biệt?", a: ["Sức lao động là yếu tố quan trọng nhất của mọi nền sản xuất xã hội.", "Sức lao động được mua bán trên thị trường đặc biệt.", "Khi sử dụng nó thì tạo ra được một lượng giá trị lớn hơn giá trị bản thân nó.", "Sức lao động là yếu tố quan trọng nhất của phương thức sản xuất tư bản chủ nghĩa."], c: 2, r: "Sự đặc biệt nằm ở công dụng của nó: khi được tiêu dùng (làm việc), nó có khả năng tạo ra một lượng giá trị mới (v+m) lớn hơn giá trị bản thân nó (v) [4, 5]." },
                            { q: "Nhân tố quan trọng nhất để tăng năng suất lao động là", a: ["tổ chức quản lí.", "điều kiện tự nhiên.", "kĩ năng lao động.", "kĩ thuật công nghệ."], c: 3, r: "Sự tiến bộ của khoa học - kỹ thuật công nghệ là đòn bẩy và nhân tố quyết định nhất để nâng cao năng suất lao động xã hội [4, 5]." },
                            { q: "Cạnh tranh giữa các ngành dẫn đến hình thành", a: ["giá cả thị trường.", "lợi nhuận siêu ngạch.", "lợi nhuận bình quân.", "giá trị xã hội của hàng hoá."], c: 2, r: "Cạnh tranh giữa các ngành làm cho tư bản dịch chuyển từ ngành lợi nhuận thấp sang ngành lợi nhuận cao, dẫn tới hình thành lợi nhuận bình quân [4, 5, 10]." },
                            { q: "Tỉ suất lợi nhuận phản ánh điều gì?", a: ["Trình độ bóc lột của tư bản đối với lao động", "Tính chất bóc lột của tư bản đối với lao động", "Phạm vi bóc lột của tư bản đối với lao động", "Mức doanh lợi đầu tư tư bản"], c: 3, r: "Tỷ suất lợi nhuận (p') là tỷ số tính theo % giữa giá trị thặng dư và toàn bộ tư bản ứng trước, nó phản ánh mức doanh lợi của việc đầu tư [4, 10]." },
                            { q: "Công thức tính giá cả sản xuất là", a: ["k + P", "k + m", "k + P(ngang)", "k - P(ngang)"], c: 2, r: "Giá cả sản xuất = Chi phí sản xuất (k) + Lợi nhuận bình quân (ký hiệu là P ngang) [4, 10]." },
                            { q: "Tỉ suất lợi nhuận là chỉ tiêu đánh giá", a: ["trình độ bóc lột.", "hiệu quả sử dụng lao động sống.", "hiệu quả sử dụng vốn đầu tư.", "hiệu quả sử dụng lao động quá khứ."], c: 2, r: "Tỷ suất lợi nhuận đo lường tỷ lệ sinh lời trên tổng số tư bản (vốn) đầu tư ứng trước, do đó nó là thước đo hiệu quả sử dụng vốn đầu tư [4, 10]." },
                            { q: "Động lực mạnh nhất thúc đẩy các nhà tư bản đổi mới công nghệ là", a: ["giá trị thặng dư.", "giá trị tuyệt đối.", "giá trị thặng dư tương đối.", "giá trị thặng dư siêu ngạch."], c: 3, r: "Giá trị thặng dư siêu ngạch thu được khi năng suất cá biệt cao hơn năng suất xã hội. Săn lùng phần lợi nhuận này là động lực thúc đẩy các tư bản đổi mới công nghệ [4, 10]." },
                            { q: "Chỉ tiêu phản ánh mức doanh lợi đầu tư tư bản vào một ngành kinh tế là", a: ["P", "P’", "P (ngang)", "P (ngang)’"], c: 1, r: "Mức doanh lợi của tư bản được phản ánh qua tỷ suất lợi nhuận, ký hiệu là p' (hoặc P') [4, 10]." },
                            { q: "Tỉ suất giá trị thặng dư là chỉ tiêu đánh giá", a: ["hiệu quả sử dụng vốn đầu tư.", "mức doanh lợi của việc đầu tư tư bản.", "hiệu quả sử dụng lao động quá khứ.", "hiệu quả sử dụng lao động sống."], c: 3, r: "Tỉ suất giá trị thặng dư (m') phản ánh mức độ bóc lột và hiệu quả sử dụng trực tiếp lao động sống của người công nhân [4, 10]." },
                            { q: "Công thức tính tỉ suất lợi nhuận là", a: ["p = p / (c + v)", "p = p / (c + v) x 100%", "p = p / v x 100%", "p = p / c x 100%"], c: 1, r: "Tỷ suất lợi nhuận (p') được tính bằng lợi nhuận (p) chia cho tổng tư bản ứng trước (c+v) nhân với 100% [4, 10]." },
                            { q: "Tỉ suất giá trị thặng dư được tính theo công thức nào?", a: ["m' = m / c", "m' = m / v", "m' = m / v x 100%", "m' = m / (c + v) x 100%"], c: 2, r: "Tỷ suất giá trị thặng dư (m') bằng khối lượng giá trị thặng dư (m) chia cho tư bản khả biến (v) nhân với 100% [3, 4]." },
                            { q: "Chủ nghĩa tư bản càng phát triển thì tỉ suất lợi nhuận sẽ như thế nào?", a: ["Tăng nhanh", "Có xu hướng tăng dần", "Lúc tăng lúc giảm", "Có xu hướng giảm dần"], c: 0, r: "Theo bảng đáp án chuẩn của sách là A (Tăng nhanh). Tuy nhiên, nếu áp dụng đúng quy luật kinh tế của C. Mác thì cấu tạo hữu cơ tăng sẽ làm cho tỷ suất lợi nhuận có xu hướng giảm sút [3, 4]." },
                            { q: "Chủ nghĩa tư bản càng phát triển thì tỉ suất lợi nhuận có xu hướng giảm nhưng tổng lợi nhuận có xu hướng", a: ["giảm.", "giảm dần.", "giảm nhanh.", "tăng nhanh."], c: 3, r: "Do quy mô tư bản tích lũy tăng lên rất lớn nên dù tỷ suất lợi nhuận (p') có giảm thì tổng khối lượng lợi nhuận (P) vẫn có xu hướng tăng nhanh [3, 4]." },
                            { q: "Hàng hoá tư liệu sản xuất trong quá trình sản xuất sẽ", a: ["được bảo tồn không tăng thêm giá trị.", "tạo ra giá trị mới.", "bị mất đi cả về giá trị và giá trị sử dụng.", "tạo ra giá trị thặng dư."], c: 0, r: "Tư liệu sản xuất (tư bản bất biến c) được lao động cụ thể bảo tồn và di chuyển nguyên vẹn giá trị vào sản phẩm mới, không hề tăng thêm [3, 4]." },
                            { q: "Hai điều kiện để sức lao động trở thành hàng hoá là", a: ["tư liệu sản xuất tập trung trong tay một số ít người và đa số người lao động mất hết tư liệu sản xuất.", "người lao động được tự do về thân thể và không có đủ những tư liệu sản xuất cần thiết để tự biết kết hợp với sức lao động của mình để tạo ra hàng hoá.", "chế độ tư hữu về tư liệu sản xuất và sự phân công lao động xã hội.", "sở hữu tư nhân về tư liệu sản xuất và bóc lột lao động làm thuê."], c: 1, r: "Người lao động phải là người tự do về thân thể (để có thể bán sức lao động) và họ không có tư liệu sản xuất (buộc phải bán sức lao động để sống) [3, 4]." },
                            { q: "Bản chất của tích luỹ tư bản là gì?", a: ["Làm tăng nguồn dự trữ về của cải", "Làm tăng tích trữ vốn tiền", "Biến giá trị thặng dư thành tư bản khả biến nhằm mua nhiều sức lao động", "Biến một phần giá trị thặng dư thành tư bản"], c: 3, r: "Tích lũy tư bản thực chất là việc tư bản hóa giá trị thặng dư, tức là nhà tư bản dùng một phần thặng dư thu được để biến thành tư bản phụ thêm [3, 4]." },
                            { q: "Nhân tố nào quan trọng nhất để tăng quy mô của tích luỹ tư bản?", a: ["Nâng cao trình độ khai thác sức lao động", "Nâng cao lao động xã hội", "Tăng sự tiết kiệm tiêu dùng của nhà tư bản", "Tăng sự cạnh tranh giữa các nhà tư bản để có nhiều giá trị thặng dư"], c: 0, r: "Nâng cao trình độ bóc lột sức lao động (thông qua tăng cường độ hoặc kéo dài ngày lao động) là nhân tố quan trọng nhất để thu được khối lượng giá trị thặng dư nhiều hơn, từ đó tăng quy mô tích luỹ." },
                            { q: "Nếu khối lượng giá trị thặng dư đã được xác định thì nhân tố chủ yếu ảnh hưởng đến quy mô tích luỹ tư bản là", a: ["lượng tư bản khả biến.", "lượng giá trị hàng hoá không đi vào tiêu dùng.", "lượng tư bản cố định.", "tỉ lệ phân chia giữa tích luỹ và tiêu dùng."], c: 3, r: "Khi m (khối lượng GTTD) đã xác định, m được chia thành hai quỹ: quỹ tích lũy và quỹ tiêu dùng. Tỷ lệ phân chia này sẽ quyết định trực tiếp quy mô của tích lũy tư bản lớn hay nhỏ." },
                            { q: "Tích tụ tư bản là", a: ["sự tăng thêm quy mô của tư bản cá biệt bằng cách tư bản hoá giá trị thặng dư.", "nơi mở rộng quy mô sản xuất của xí nghiệp để bóc lột giá trị thặng dư.", "kết hợp nhiều tư bản nhỏ thành một tư bản lớn hơn.", "quá trình tái sản xuất mở rộng cho tư bản xã hội tăng lên."], c: 0, r: "Tích tụ tư bản là việc làm tăng quy mô tư bản cá biệt thông qua quá trình biến một phần giá trị thặng dư thành tư bản phụ thêm (tư bản hóa GTTD) tại chính doanh nghiệp đó." },
                            { q: "Tập trung tư bản là gì?", a: ["Kết hợp nhiều xí nghiệp nhỏ thành một xí nghiệp lớn", "Sự tăng lên của quy mô tư bản cá biệt mà không làm tăng quy mô tư bản xã hội do hợp nhất các tư bản cá biệt vào một chỉnh thể tạo thành một tư bản cá biệt lớn hơn", "Tập trung sản xuất vào một xí nghiệp lớn để hạ giá thành sản phẩm, do đó thu được nhiều lợi nhuận hơn", "Đầu tư thêm tư bản vào nhiều ngành sản xuất đem lại nhiều lợi nhuận hơn"], c: 1, r: "Tập trung tư bản là sự sáp nhập, hợp nhất nhiều tư bản cá biệt nhỏ có sẵn trong xã hội thành một tư bản cá biệt lớn, do đó nó không làm tăng tổng quy mô tư bản của toàn xã hội." },
                            { q: "Điểm giống nhau giữa tích tụ và tập trung tư bản là", a: ["làm tăng tổng tư bản xã hội.", "quan hệ giữa các nhà tư bản với nhau.", "quan hệ giữa các nhà tư bản với giai cấp công nhân.", "tăng phương tiện bóc lột lao động làm thuê."], c: 3, r: "Dù thông qua con đường tích tụ hay tập trung thì kết quả cuối cùng đều làm tăng quy mô của tư bản cá biệt, từ đó tăng cường khả năng và phương tiện bóc lột lao động làm thuê." },
                            { q: "Cấu tạo hữu cơ của tư bản là gì?", a: ["Cấu tạo kĩ thuật", "Cấu tạo giá trị", "Cấu tạo giá trị khi phản ánh sự biến đổi của cấu tạo kĩ thuật của tư bản", "Sự phân chia các yếu tố cấu thành tư bản"], c: 2, r: "Cấu tạo hữu cơ của tư bản (c/v) là cấu tạo giá trị do cấu tạo kỹ thuật quyết định và phản ánh sự thay đổi của cấu tạo kỹ thuật đó." },
                            { q: "Khi tỉ lệ phân chia giữa tích luỹ và tiêu dùng đã được xác định thì quy mô tích luỹ phụ thuộc vào khối lượng giá trị thặng dư. Muốn tăng khối lượng m thì nhân tố quyết định là", a: ["tăng cường bóc lột giá trị thặng dư.", "tăng năng suất lao động.", "chênh lệch giữa tư bản sử dụng và tư bản tiêu dùng.", "quy mô của tư bản ứng trước."], c: 1, r: "Tăng năng suất lao động làm giảm giá trị tư liệu sinh hoạt, do đó làm giảm giá trị sức lao động, giúp tăng khối lượng giá trị thặng dư và mở rộng quy mô tích lũy." },
                            { q: "Yếu tố làm tăng nhanh quy mô của tư bản xã hội là", a: ["tập trung tư bản.", "tích tụ tư bản.", "giá trị thặng dư.", "tỉ suất giá trị thặng dư."], c: 1, r: "Chỉ có tích tụ tư bản (vì nó dựa trên nguồn giá trị thặng dư mới tạo ra thêm) mới làm tăng quy mô của tư bản xã hội, còn tập trung tư bản thì không." },
                            { q: "Tích luỹ tư bản là", a: ["địa tô được tư bản hoá.", "giá trị thặng dư được tư bản hoá.", "kết hợp nhiều tư bản nhỏ thành tư bản lớn.", "tăng tỉ suất giá trị thặng dư."], c: 1, r: "Bản chất của tích lũy tư bản chính là quá trình biến một phần giá trị thặng dư ngược trở lại thành tư bản phụ thêm (tư bản hóa giá trị thặng dư)." },
                            { q: "Cấu tạo hữu cơ (c/v) phản ánh", a: ["trình độ ứng dụng khoa học – kĩ thuật vào sản xuất.", "trình độ phát triển của quy mô sản xuất.", "mức độ bóc lột của tư bản đối với lao động làm thuê.", "sự phát triển của nền sản xuất xã hội theo chiều sâu."], c: 0, r: "Cấu tạo hữu cơ (tỉ lệ giữa tư bản bất biến c và khả biến v) ngày càng tăng lên, phản ánh sự tiến bộ và mức độ ứng dụng khoa học kĩ thuật, máy móc vào sản xuất ngày càng cao." },
                            { q: "Tuần hoàn của tư bản là gì?", a: ["Sự vận động liên tục của tư bản tiền tệ", "Sự vận động liên tục từ hình thức tư bản tiền tệ sang hình thức tư bản sản xuất và tư bản hàng hoá", "Sự vận động liên tục qua các hình thức khác nhau để trở về hình thái ban đầu cùng với lượng giá trị thặng dư", "Sự vận động liên tục của tư bản cố định và tư bản lưu thông"], c: 2, r: "Tuần hoàn tư bản là sự vận động liên tục trải qua 3 giai đoạn, mang 3 hình thái chức năng (tiền tệ, sản xuất, hàng hóa) để quay trở về hình thái ban đầu kèm theo giá trị thặng dư." },
                            { q: "Nhân tố nào ảnh hưởng đến tốc độ chu chuyển của tư bản?", a: ["Thời gian sản xuất trong một vòng", "Thời gian tồn tại của tư bản cố định trong một vòng tuần hoàn.", "Thời gian sản xuất và thời gian lưu thông để thực hiện một vòng tuần hoàn.", "Thời gian lưu thông để bán hàng hoá và thu về giá trị thặng dư."], c: 2, r: "Tốc độ chu chuyển tư bản nhanh hay chậm phụ thuộc trực tiếp vào thời gian thực hiện một vòng chu chuyển, trong đó bao gồm thời gian sản xuất và thời gian lưu thông." },
                            { q: "Dựa vào căn cứ nào để phân chia tư bản thành tư bản cố định và tư bản lưu động?", a: ["Xác định nguồn gốc của giá trị thặng dư", "Phương thức chu chuyển giá trị của tư bản sản xuất vào giá trị sản phẩm", "Phương thức khấu hao tư bản cố định trong quá trình sản xuất", "Tốc độ chu chuyển của tư bản"], c: 1, r: "Việc phân chia thành tư bản cố định và lưu động được căn cứ vào phương thức dịch chuyển giá trị của chúng vào sản phẩm mới (dịch chuyển từng phần hay dịch chuyển toàn bộ một lần)." },
                            { q: "Giải pháp quan trọng nhất để giảm thời gian sản xuất, tăng tốc độ chu chuyển của tư bản là", a: ["sử dụng nguồn lao động có tay nghề thành thạo.", "sử dụng máy móc thiết bị công nghệ hiện đại.", "cải tiến, thay đổi các biện pháp tổ chức quản lí sản xuất.", "chính sách thưởng, phạt hợp lí đối với người lao động."], c: 1, r: "Ứng dụng máy móc công nghệ hiện đại giúp rút ngắn thời gian tác động cơ học và vật lí lên đối tượng lao động, từ đó giảm thiểu đáng kể thời gian sản xuất." },
                            { q: "Biện pháp nào quan trọng nhất để giảm thời gian lưu thông, tăng tốc độ chu chuyển của tư bản?", a: ["Sản xuất ra hàng hoá chất lượng tốt đáp ứng nhu cầu của người tiêu dùng", "Sản xuất ra hàng hoá có mẫu mã, hình thức đẹp", "Tăng cường thông tin quảng cáo để kích cầu", "Bán hàng có khuyến mại"], c: 0, r: "Hàng hóa có chất lượng tốt, phù hợp thị hiếu sẽ tiêu thụ rất nhanh, làm giảm thiểu thời gian nằm ứ đọng ở khâu lưu thông, giúp tư bản quay vòng vốn nhanh." },
                            { q: "Thời gian của một vòng chu chuyển của tư bản bao gồm", a: ["thời gian mua và thời gian bán.", "thời gian lao động, thời gian gián đoạn và thời gian dự trữ.", "thời gian sản xuất và thời gian bán hàng.", "thời gian sản xuất và thời gian lưu thông."], c: 3, r: "Một vòng chu chuyển tư bản hoàn chỉnh bao trọn cả hai khâu: thời gian nằm trong lĩnh vực sản xuất và thời gian nằm trong lĩnh vực lưu thông (mua và bán)." },
                            { q: "Nguyên nhân cơ bản làm cho tư bản cố định hao mòn hữu hình là", a: ["ứng dụng tiến bộ khoa học – kĩ thuật mới.", "cung lớn hơn cầu về tư bản cố định.", "tăng năng suất lao động trong ngành chế tạo máy.", "do sử dụng và tác động của tự nhiên gây ra."], c: 3, r: "Hao mòn hữu hình là sự tổn thất về vật chất và giá trị, nguyên nhân chính là do quá trình sử dụng (chạy máy móc) và sự bào mòn của các yếu tố tự nhiên (rỉ sét, hỏng hóc...)." },
                            { q: "Sự tăng lên của năng suất lao động sản xuất tư liệu lao động mới có năng suất cao gây ra", a: ["hao mòn vô hình.", "hao mòn hữu hình.", "hao mòn về giá trị sử dụng.", "hao mòn vô hình và hao mòn hữu hình."], c: 0, r: "Khi có máy móc mới hiện đại hơn hoặc rẻ hơn ra đời, máy móc cũ dù còn tốt cũng bị mất giá trị thuần túy do tiến bộ kĩ thuật, hiện tượng này gọi là hao mòn vô hình." },
                            { q: "Hao mòn vô hình tư bản cố định khác hao mòn hữu hình ở chỗ", a: ["tuỳ thuộc vào thời gian khấu hao.", "tuỳ thuộc vào cường độ sử dụng.", "ảnh hưởng tiến bộ kĩ thuật.", "tuỳ thuộc vào tổng lượng giá trị tư bản cố định."], c: 2, r: "Sự khác biệt cốt lõi là hao mòn vô hình xảy ra do sự tiến bộ của khoa học công nghệ làm mất đi giá trị tư bản, chứ không phải do hao mòn vật lý khi sử dụng." },
                            { q: "Biểu hiện của tư bản cố định là gì?", a: ["Máy móc thiết bị, nhà xưởng", "Nguyên, nhiên, vật liệu", "Giá trị sức lao động", "Giá trị tư liệu sản xuất"], c: 0, r: "Tư bản cố định là bộ phận tư bản sản xuất tham gia toàn bộ vào quá trình sản xuất nhưng giá trị của nó chỉ chuyển dần từng phần vào sản phẩm (ví dụ: máy móc, nhà xưởng...)." },
                            { q: "Tư bản lưu động biểu hiện thành", a: ["giá trị tư liệu sản xuất.", "máy móc thiết bị.", "nguyên, nhiên, vật liệu và giá trị sức lao động.", "nhà xưởng."], c: 2, r: "Tư bản lưu động là bộ phận tư bản chuyển toàn bộ giá trị một lần vào sản phẩm sau một chu kỳ sản xuất, bao gồm tiền mua nguyên nhiên vật liệu và trả lương (sức lao động)." },
                            { q: "Tiền công trong chủ nghĩa tư bản là gì?", a: ["Số tiền mà nhà đầu tư đã trả để đổi lấy toàn bộ số lượng lao động mà người công nhân đã bỏ ra khi tiến hành sản xuất", "Số tiền mà chủ tư bản trả cho người lao động", "Giá cả lao động của người công nhân làm thuê", "Giá cả của hàng hoá sức lao động"], c: 3, r: "Tiền công trong chủ nghĩa tư bản che giấu bản chất bóc lột, nó không phải là trả cho 'lao động', mà thực chất là giá cả của 'hàng hoá sức lao động' mà công nhân bán cho nhà tư bản." },
                            { q: "Tư bản thương nghiệp là", a: ["tư bản dưới hình thái tư bản tiền tệ.", "tư bản dưới hình thái công nghiệp.", "tư bản trong lĩnh vực lưu thông hàng hoá.", "tư bản dùng để mua tư liệu sản xuất và mua sức lao động của công nhân."], c: 2, r: "Tư bản thương nghiệp là một bộ phận của tư bản công nghiệp tách ra, chuyên đảm nhận chức năng mua và bán trong lĩnh vực lưu thông hàng hóa." },
                            { q: "Nguồn gốc của lợi nhuận thương nghiệp là gì?", a: ["Bán hàng hoá với giá cả cao hơn giá trị của bản thân hàng hoá do nắm được khâu tiêu thụ", "Quay vòng vốn nhanh nên thu được lợi nhuận", "Một phần giá trị thặng dư trả cho nhà tư bản thương nghiệp trong việc tiêu thụ hàng hoá", "Lừa đảo trong quá trình mua bán hàng hoá"], c: 2, r: "Vì thương nhân đảm nhận khâu lưu thông giúp bán hàng, nên nhà tư bản công nghiệp phải nhường lại một phần giá trị thặng dư do công nhân tạo ra cho thương nhân dưới hình thức lợi nhuận thương nghiệp." },
                            { q: "Bản chất của lợi nhuận thương nghiệp là", a: ["một phần của giá trị thặng dư được tạo ra trong quá trình sản xuất.", "lao động thặng dư của nhân viên ngành thương nghiệp tạo ra.", "khoản chênh lệch giữa giá mua và giá bán.", "kết quả của hoạt động đầu cơ nâng giá, bóc lột người tiêu dùng."], c: 0, r: "Dù biểu hiện bề ngoài là khoản chênh lệch giữa giá mua - giá bán ở khâu lưu thông, nhưng nguồn gốc bản chất của nó vẫn là một phần giá trị thặng dư sinh ra trong quá trình sản xuất." },
                            { q: "Nguồn gốc của lợi tức là gì?", a: ["Một phần của giá trị thặng dư", "Do tuần hoàn của tư bản tiền tệ và sinh ra theo công thức T – T’", "Do lao động thặng dư của công nhân viên ngành ngân hàng tạo ra", "Giá trị thặng dư do một loại hàng hoá đặc biệt là tiền tệ tạo ra"], c: 0, r: "Lợi tức (z) thực chất là một phần của lợi nhuận bình quân mà nhà tư bản đi vay phải cắt ra để trả cho nhà tư bản cho vay, do đó cội nguồn của nó vẫn là giá trị thặng dư." },
                            { q: "Giới hạn của tỉ suất lợi tức là", a: ["trong những hoàn cảnh bình thường, tỉ suất lợi tức thường ngang với tỉ suất lợi nhuận của tư bản sản xuất.", "tỉ suất lợi tức thường lớn hơn tỉ suất lợi nhuận.", "thấp hơn tỉ suất lợi nhuận bình quân và lớn hơn 0.", "tỉ suất lợi tức có khi lớn hơn, có khi lại thấp hơn tỉ suất lợi nhuận tuỳ thuộc vào quan hệ cung – cầu về vốn trên thị trường."], c: 2, r: "Tỷ suất lợi tức (z') phải thỏa mãn điều kiện: 0 < z' < p' (tỷ suất lợi nhuận bình quân) để đảm bảo cả người cho vay và người đi vay kinh doanh đều có lợi." },
                            { q: "Loại tư bản nào đạt tới trình độ cao của việc che lấp bản chất đích thực của nó?", a: ["Tư bản công nghiệp", "Tư bản thương nghiệp", "Tư bản cho vay", "Tư bản kinh doanh nông nghiệp"], c: 2, r: "Công thức vận động của tư bản cho vay là T - T', tiền đẻ ra tiền một cách trực tiếp làm lu mờ hoàn toàn khâu sản xuất, che đậy kín kẽ nhất bản chất bóc lột giá trị thặng dư." },
                            { q: "Một trong những đặc điểm của tư bản cho vay là", a: ["từ T – T’, như vậy là không cần bóc lột giá trị thặng dư cũng có lợi tức cho nhà tư bản.", "tư bản cho vay độc lập với tư bản sản xuất và tư bản thương nghiệp.", "tách rời giữa quyền sử dụng và quyền sở hữu – che giấu việc bóc lột giá trị thặng dư một cách tinh vi nhất.", "không trực tiếp thuê công nhân nên lợi tức của họ thu được không phải là do bóc lột."], c: 2, r: "Đặc điểm lớn nhất của nó là sự tách rời giữa quyền sở hữu (người cho vay) và quyền sử dụng (người đi vay kinh doanh), làm mờ đi bản chất bóc lột lao động." },
                            { q: "Lợi tức tư bản cho vay biến động theo quan hệ cung – cầu về tư bản cho vay thông qua", a: ["cung = cầu, lợi tức tăng.", "cung > cầu, lợi tức giảm.", "cung < cầu, lợi tức giảm.", "cung = cầu, lợi tức giảm."], c: 1, r: "Tư bản cho vay cũng vận động như một loại hàng hoá, khi nguồn cung ứng vốn dư thừa (cung lớn hơn cầu) thì giá cả của việc vay vốn (lợi tức) sẽ giảm xuống." },
                            { q: "Địa tô tư bản chủ nghĩa là", a: ["một phần của giá trị thặng dư trong nông nghiệp.", "sản phẩm thặng dư và cả một phần sản phẩm tất yếu do công nhân nông nghiệp tạo ra bị chủ ruộng chiếm đoạt.", "toàn bộ giá trị thặng dư do công nhân nông nghiệp tạo ra.", "một phần giá trị thặng dư mà tư bản công nghiệp trích trong lợi nhuận bình quân của mình để trả cho chủ ruộng đất."], c: 0, r: "Bản chất của địa tô tư bản chủ nghĩa là phần lợi nhuận siêu ngạch dôi ra ngoài lợi nhuận bình quân, do công nhân nông nghiệp tạo ra và nộp cho chủ đất." },
                            { q: "Địa tô chênh lệch I là gì?", a: ["Lợi nhuận siêu ngạch do sản xuất trên những ruộng đất có vị trí thuận lợi tạo ra", "Lợi nhuận siêu ngạch do sản xuất trên những ruộng đất tốt tạo ra", "Lợi nhuận siêu ngạch do sản xuất trên những ruộng đất tốt và độ màu mỡ cao, điều kiện tự nhiên thuận lợi tạo ra", "Lợi nhuận siêu ngạch do đầu tư thêm tư bản để thâm canh tạo ra"], c: 2, r: "Địa tô chênh lệch I là phần địa tô thu được nhờ canh tác trên những mảnh đất có độ màu mỡ tự nhiên cao hoặc có vị trí địa lý thuận lợi (gần nơi tiêu thụ)." },
                            { q: "Địa tô chênh lệch II là", a: ["lợi nhuận siêu ngạch do sản xuất trên những ruộng đất tốt tạo ra.", "lợi nhuận siêu ngạch do đầu tư thêm tư bản để thâm canh, làm tăng độ màu mỡ của đất tạo ra.", "lợi nhuận siêu ngạch do đầu tư thêm tư bản để mở rộng diện tích canh tác tạo ra.", "lợi nhuận siêu ngạch do sản xuất trên những ruộng đất tốt và có vị trí thuận lợi."], c: 1, r: "Địa tô chênh lệch II phát sinh nhờ vào sự đầu tư thêm tư bản để thâm canh (như cải tạo đất, thuỷ lợi...) làm tăng độ màu mỡ nhân tạo của đất đai." },
                            { q: "Người được hưởng địa tô chênh lệch II là", a: ["nhà tư bản nông nghiệp phải trả cho chủ ruộng khi còn thuê đất.", "nhà tư bản nông nghiệp được hưởng một khoản lợi tức mà người chủ đất phải trả lại cho nhà tư bản với tư cách người đã bỏ vốn đầu tư.", "nhà tư bản nông nghiệp được hưởng trong thời hạn thuê đất.", "chủ ruộng và tư bản nông nghiệp chia nhau cùng hưởng."], c: 2, r: "Trong thời hạn hợp đồng thuê đất, phần lợi nhuận dôi ra do thâm canh sẽ thuộc về nhà tư bản nông nghiệp. Tuy nhiên khi hết hạn hợp đồng, chủ đất thường sẽ tìm cách tăng giá thuê." },
                            { q: "Địa tô tuyệt đối là gì?", a: ["Giá trị thặng dư mà chủ ruộng đất bóc lột trực tiếp công nhân nông nghiệp", "Phần giá trị thặng dư ngoài lợi nhuận bình quân khi canh tác trên tất cả các loại đất kể cả đất xấu nhất", "Lợi nhuận siêu ngạch thu được do đầu tư thêm các yếu tố kĩ thuật", "Lợi nhuận siêu ngạch thu được do sản xuất trên ruộng đất tốt và trung bình"], c: 1, r: "Địa tô tuyệt đối là loại địa tô sinh ra do độc quyền sở hữu ruộng đất, nên mọi nhà tư bản đi thuê đất đều phải nộp, kể cả khi thuê mảnh đất xấu nhất." },
                            { q: "Địa tô tuyệt đối là địa tô thu được", a: ["trên tất cả các loại ruộng đất.", "chỉ ở trên ruộng đất xấu nhất.", "trên ruộng đất đặc biệt.", "do đầu tư thêm tư bản."], c: 0, r: "Vì quyền tư hữu ruộng đất gây ra độc quyền, nên bất kể mảnh đất đó tốt, trung bình hay xấu nhất, người thuê đều bắt buộc phải nộp địa tô tuyệt đối." },
                            { q: "Chính sách giao ruộng đất lâu dài cho người nông dân ở nước ta dựa trên cơ sở lí luận địa tô", a: ["chênh lệch I.", "tuyệt đối.", "chênh lệch II.", "độc quyền."], c: 2, r: "Chính sách giao đất lâu dài tạo tâm lý an tâm để nông dân mạnh dạn bỏ vốn đầu tư thâm canh, cải tạo đất, qua đó tự mình hưởng lợi ích từ địa tô chênh lệch II." },
                            { q: "Ý nào dưới đây là đúng khi định nghĩa về tư bản?", a: ["Tư bản là giá trị mang lại giá trị thặng dư.", "Tư bản là tiền và tư liệu sản xuất của nhà tư bản để tạo ra giá trị thặng dư.", "Tư bản là giá trị đem lại giá trị thặng dư bằng cách bóc lột lao động làm thuê.", "Tư bản là tiền đẻ ra tiền."], c: 2, r: "Tư bản không phải là một vật thể (như tiền hay máy móc), mà bản chất là một quan hệ xã hội - là giá trị mang lại giá trị thặng dư thông qua việc bóc lột công nhân làm thuê." },
                            { q: "Trong quá trình sản xuất giá trị thặng dư, giá trị tư liệu sản xuất đã tiêu dùng sẽ", a: ["được tái sản xuất.", "không được tái sản xuất.", "được bù đắp.", "được lao động cụ thể của người công nhân bảo tồn và chuyển vào giá trị sản phẩm mới."], c: 3, r: "Tư liệu sản xuất (tư bản bất biến c) không tự tăng lên, giá trị của nó chỉ được lao động cụ thể của người công nhân bảo tồn và chuyển dịch nguyên vẹn vào sản phẩm." },
                            { q: "Nội dung nào dưới đây không đúng khi xem xét phương pháp sản xuất giá trị thặng dư tuyệt đối?", a: ["Giá trị sức lao động không đổi.", "Thời gian lao động cần thiết thay đổi.", "Ngày lao động thay đổi.", "Thời gian lao động thặng dư thay đổi."], c: 1, r: "Sản xuất giá trị thặng dư tuyệt đối được thực hiện dựa trên việc kéo dài ngày lao động trong khi thời gian lao động tất yếu (cần thiết) giữ nguyên không đổi." },
                            { q: "Vai trò của máy móc trong quá trình tạo ra giá trị thặng dư là gì?", a: ["Máy móc là nguồn gốc của giá trị thặng dư.", "Máy móc là tiền đề vật chất cho việc tạo ra giá trị thặng dư.", "Máy móc và sức lao động đều tạo ra giá trị thặng dư.", "Máy móc là yếu tố quyết định tạo ra giá trị thặng dư."], c: 1, r: "Máy móc (thuộc tư bản bất biến) chỉ là tiền đề, phương tiện vật chất giúp tăng năng suất, còn nguồn gốc thực sự tạo ra giá trị thặng dư duy nhất là sức lao động." },
                            { q: "Tiền công trong tư bản chủ nghĩa là", a: ["giá trị của lao động.", "sự trả công cho lao động.", "giá trị sức lao động.", "giá cả của sức lao động."], c: 3, r: "Tiền công che giấu bản chất bóc lột vì biểu hiện bề ngoài như là 'trả công cho lao động', nhưng thực chất nó là giá cả của hàng hóa sức lao động." },
                            { q: "Khẳng định nào dưới đây không đúng về lợi nhuận?", a: ["Lợi nhuận là hình thức biến tướng của giá trị thặng dư.", "Lợi nhuận là giá trị thặng dư được coi là con đẻ của tư bản ứng trước.", "Lợi nhuận là hiệu số giữa tổng doanh thu trừ đi tổng chi phí.", "Lợi nhuận là hình thức biểu hiện ra bên ngoài của giá trị thặng dư."], c: 1, r: "Theo C. Mác, xét về bản chất sâu xa, việc coi lợi nhuận là 'con đẻ của toàn bộ tư bản ứng trước' là sự đánh lừa thị giác của CNTB, vì thực chất nó chỉ sinh ra từ tư bản khả biến (v)." },
                            { q: "Cơ sở chung của giá trị thặng dư tương đối và giá trị thặng dư siêu ngạch là", a: ["tăng năng suất lao động.", "tăng năng suất lao động xã hội.", "tăng năng suất lao động cá biệt.", "giá trị sức lao động giảm."], c: 0, r: "Cả hai phương pháp này đều dựa trên một điểm tựa cơ bản là phải tăng năng suất lao động (cá biệt hoặc xã hội) để rút ngắn thời gian lao động." },
                            { q: "Tái sản xuất là gì?", a: ["Quá trình tái sản xuất", "Quá trình sản xuất liên tục được lặp đi lặp lại không ngừng", "Sự khôi phục sản xuất", "Quá trình tái chế sản phẩm"], c: 1, r: "Tái sản xuất là quá trình sản xuất được lặp đi lặp lại và phục hồi không ngừng để duy trì sự tồn tại của xã hội loài người." },
                            { q: "Ý nào dưới đây không đúng về tích luỹ tư bản?", a: ["Tích luỹ tư bản là biến một phần giá trị thặng dư thành tư bản.", "Nguồn gốc của tích luỹ tư bản là giá trị thặng dư.", "Động cơ của tích luỹ tư bản cũng là giá trị thặng dư.", "Tích luỹ cơ bản là sự tiết kiệm tư bản."], c: 3, r: "Tích lũy tư bản không phải là sự tằn tiện hay 'tiết kiệm tư bản' để nằm im, mà thực chất là quá trình tư bản hóa giá trị thặng dư để đem đi tái sản xuất mở rộng." },
                            { q: "Tích tụ và tập trung tư bản có điểm nào giống nhau?", a: ["Có nguồn gốc trực tiếp giống nhau", "Có vai trò quan trọng như nhau", "Đều làm tăng quy mô tư bản cá biệt", "Đều làm tăng quy mô tư bản xã hội"], c: 2, r: "Dù nguồn gốc và cách thức khác nhau (tích tụ dựa trên giá trị thặng dư, tập trung dựa trên việc sáp nhập), nhưng cả hai đều có chung kết quả là làm tăng quy mô của tư bản cá biệt." },
                            { q: "Khẳng định nào không đúng khi cấu tạo hữu cơ của tư bản tăng lên?", a: ["Phản ánh sự phát triển của lực lượng sản xuất", "c tăng tuyệt đối và tương đối", "v không tăng", "v tăng tuyệt đối, giảm tương đối"], c: 2, r: "Khi cấu tạo hữu cơ tăng, do quy mô tích lũy của nhà tư bản rất lớn nên lượng tư bản khả biến (v) vẫn có thể tăng lên về mặt tuyệt đối, chỉ là tỷ trọng (tương đối) của nó giảm đi so với (c). Vì vậy khẳng định 'v không tăng' là sai." },
                            { q: "Yếu tố nào dưới đây không thuộc tư bản bất biến?", a: ["Máy móc, thiết bị, nhà xưởng", "Kết cấu hạ tầng sản xuất", "Tiền lương, tiền thưởng", "Điện nước, nguyên liệu"], c: 2, r: "Tiền lương và tiền thưởng là bộ phận tư bản dùng để mua sức lao động, do đó nó thuộc về tư bản khả biến (v), chứ không phải tư bản bất biến (c)." },
                            { q: "Căn cứ để phân chia tư bản thành tư bản bất biến và tư bản khả biến là", a: ["tốc độ chu chuyển của tư bản.", "vai trò của các bộ phận tư bản trong quá trình sản xuất giá trị thặng dư.", "phương thức chu chuyển giá trị các bộ phận tư bản sang sản phẩm.", "hao mòn hữu hình hoặc vô hình."], c: 1, r: "Việc phân chia thành c và v được dựa trên tiêu chí là sự khác nhau về vai trò của từng bộ phận trong việc trực tiếp sinh ra giá trị thặng dư." },
                            { q: "Căn cứ để phân chia tư bản thành tư bản cố định và tư bản lưu động là", a: ["tốc độ chu chuyển chung của tư bản.", "phương thức chu chuyển giá trị của các bộ phận tư bản sang sản phẩm.", "vai trò các bộ phận tư bản trong sản xuất giá trị thặng dư.", "sự thay đổi về lượng trong quá trình sản xuất."], c: 1, r: "Việc phân loại tài sản thành cố định hay lưu động phụ thuộc vào phương thức dịch chuyển giá trị của chúng vào sản phẩm mới (chuyển dần từng phần hay chuyển toàn bộ một lần)." },
                            { q: "Những dấu hiệu nào không thuộc phạm trù hao mòn hữu hình?", a: ["Giảm khả năng sử dụng", "Do sử dụng", "Tác động của tự nhiên", "Khấu hao nhanh"], c: 3, r: "Khấu hao nhanh là biện pháp quản trị tài chính của nhà tư bản nhằm thu hồi vốn gấp để đối phó với hao mòn vô hình, chứ không phải là đặc điểm vật lý của hao mòn hữu hình." },
                            { q: "Hình thức nào không phải biểu hiện của giá trị thặng dư?", a: ["Lợi nhuận", "Lợi tức", "Địa tô", "Tiền lương"], c: 3, r: "Tiền lương (tiền công) là biểu hiện bằng tiền của giá trị sức lao động (v), nó hoàn toàn không phải là hình thức biểu hiện của giá trị thặng dư (m)." },
                            { q: "Lợi nhuận có nguồn gốc từ", a: ["lao động phức tạp.", "lao động quá khứ.", "lao động cụ thể.", "lao động không được trả công."], c: 3, r: "Nguồn gốc thực sự của lợi nhuận chính là phần lao động thặng dư (lao động không được trả công) do công nhân tạo ra." },
                            { q: "Khi hàng hoá bán đúng theo giá trị thì", a: ["p = m", "p > m", "p < m", "p = 0"], c: 0, r: "Nếu giá cả thị trường xoay quanh và bằng đúng với giá trị hàng hóa, thì nhà tư bản sẽ thu được mức lợi nhuận (p) bằng chính xác khối lượng giá trị thặng dư (m)." },
                            { q: "Giá cả sản xuất được xác định theo công thức nào?", a: ["c + v + m", "c + v", "k + p", "k + P (ngang)"], c: 3, r: "Khi tỷ suất lợi nhuận bình quân hình thành, giá trị hàng hóa chuyển hóa thành giá cả sản xuất. Công thức: Giá cả sản xuất = k (chi phí sản xuất) + P ngang (lợi nhuận bình quân)." },
                            { q: "Lợi nhuận thương nghiệp có được là do bán hàng hoá với mức giá như thế nào so với giá trị?", a: ["Cao hơn giá trị", "Bằng giá trị", "Bằng chi phí sản xuất tư bản chủ nghĩa", "Thấp hơn giá trị"], c: 1, r: "Thương nhân không mua rẻ bán đắt, mà nhà tư bản công nghiệp bán sỉ cho họ với giá thấp hơn giá trị, sau đó họ bán lại cho người tiêu dùng với giá bằng đúng giá trị để hưởng phần chênh lệch." },
                            { q: "Lợi tức là một phần của", a: ["lợi nhuận độc quyền.", "lợi nhuận siêu ngạch.", "lợi nhuận bình quân.", "lợi nhuận ngân hàng."], c: 2, r: "Lợi tức (z) là một phần của lợi nhuận bình quân mà nhà tư bản đi vay kinh doanh phải trích ra để trả cho nhà tư bản cho vay." },
                            { q: "Địa tô tư bản chủ nghĩa là phần còn lại sau khi khấu trừ", a: ["lợi nhuận ngân hàng.", "lợi nhuận siêu ngạch.", "lợi nhuận độc quyền.", "lợi nhuận bình quân."], c: 3, r: "Địa tô (R) là phần giá trị thặng dư dôi ra (lợi nhuận siêu ngạch) mà nhà tư bản kinh doanh nông nghiệp nộp cho chủ đất, sau khi đã giữ lại phần lợi nhuận bình quân của mình." },
                            { q: "Trong tư bản chủ nghĩa, giá cả nông phẩm được xác định theo giá cả của nông phẩm được sản xuất trên loại đất", a: ["tốt.", "trung bình.", "xấu.", "mức trung bình của các loại đất xấu."], c: 2, r: "Do ruộng đất khan hiếm nên xã hội phải canh tác cả trên đất xấu. Vì thế, giá cả phải định đoạt theo chi phí trên mảnh đất xấu nhất mới đảm bảo người làm trên đó không bị lỗ vốn." },
                            { q: "Địa tô chênh lệch II thu được trên loại ruộng đất nào?", a: ["Ruộng đất đã được đầu tư, thâm canh.", "Ruộng đất có độ màu mỡ trung bình.", "Ruộng đất có độ màu mỡ tốt.", "Ruộng đất có vị trí thuận lợi."], c: 0, r: "Địa tô chênh lệch II phát sinh do thâm canh, cải tạo làm tăng độ màu mỡ nhân tạo của ruộng đất." },
                            { q: "Tốc độ chu chuyển của tư bản tăng lên thì tỉ suất lợi nhuận sẽ", a: ["tăng lên.", "giảm xuống.", "không đổi.", "tuỳ điều kiện cụ thể."], c: 0, r: "Tốc độ chu chuyển vốn càng nhanh thì nhà tư bản càng thực hiện được nhiều vòng quay sinh lời, do đó làm tăng tỷ suất lợi nhuận thu về trong năm." },
                            { q: "Cạnh tranh giữa các ngành xảy ra khi có sự khác nhau về yếu tố nào?", a: ["Cung – cầu các loại hàng hoá", "Lợi nhuận khác nhau", "Tỉ suất lợi nhuận", "Giá trị thặng dư siêu ngạch"], c: 2, r: "Các ngành có tỉ suất sinh lời khác nhau sẽ kích thích các nhà tư bản dịch chuyển vốn từ ngành có tỉ suất lợi nhuận thấp sang ngành có tỉ suất lợi nhuận cao." },
                            { q: "Lợi nhuận bình quân của các ngành khác nhau phụ thuộc vào", a: ["tư bản ứng trước.", "tỉ suất giá trị thặng dư.", "cấu tạo hữu cơ của tư bản.", "tỉ suất lợi nhuận bình quân."], c: 0, r: "Lợi nhuận bình quân (P ngang) = Tỉ suất lợi nhuận bình quân (p' ngang) × Lượng tư bản ứng trước (K). Do vậy, với cùng một mức tỉ suất, lượng vốn đầu tư sẽ quyết định khối lượng lợi nhuận." },
                            { q: "Nhân tố dưới đây không ảnh hưởng đến tỉ suất lợi nhuận?", a: ["Tỉ suất giá trị thặng dư", "Cấu tạo hữu cơ của tư bản", "Tốc độ chu chuyển của tư bản", "Cạnh tranh"], c: 3, r: "Tỉ suất lợi nhuận bị chi phối bởi 4 nhân tố: tỷ suất GTTD, cấu tạo hữu cơ, tốc độ chu chuyển và sự tiết kiệm tư bản bất biến. Cạnh tranh ảnh hưởng đến giá cả chứ không phải là nhân tố hình thành p'." },
                            { q: "Xuất khẩu hàng hoá là đặc điểm của", a: ["sản xuất hàng hoá giản đơn.", "chủ nghĩa tư bản.", "chủ nghĩa tư bản tự do cạnh tranh.", "chủ nghĩa tư bản độc quyền."], c: 2, r: "Theo Lênin, xuất khẩu hàng hóa là đặc trưng chủ yếu của giai đoạn chủ nghĩa tư bản tự do cạnh tranh, còn xuất khẩu tư bản mới là của giai đoạn độc quyền." },
                            { q: "Phương pháp sản xuất giá trị thặng dư tuyệt đối là", a: ["Kéo dài ngày lao động, thời gian lao động tất yếu không thay đổi.", "Tiết kiệm chi phí sản xuất.", "Ứng dụng khoa học kĩ thuật hiện đại.", "Cải tiến tổ chức quản lí."], c: 0, r: "Bản chất của GTTD tuyệt đối là sự vắt kiệt thể lực bằng cách bóc lột thêm thời gian (kéo dài ngày lao động vượt quá thời gian tất yếu)." },
                            { q: "Phương pháp sản xuất giá trị thặng dư tương đối là", a: ["Kéo dài ngày lao động, thời gian lao động tất yếu không thay đổi.", "Độ dài ngày lao động không đổi, thời gian lao động tất yếu tăng lên.", "Kéo dài ngày lao động, thời gian lao động tất yếu tăng lên.", "Rút ngắn thời gian lao động tất yếu trong điều kiện độ dài ngày lao động không đổi hoặc rút ngắn."], c: 3, r: "GTTD tương đối dựa trên việc tăng năng suất lao động xã hội để hạ thấp giá trị sức lao động, từ đó rút ngắn thời gian tất yếu và kéo dài thời gian thặng dư." },
                            { q: "Ngày lao động là 8 giờ, tỉ suất giá trị thặng dư là m’ = 100%, nhà tư bản tăng ngày lao động lên 1 giờ và giá trị sức lao động giảm đi 25%. Vậy tỉ suất giá trị thặng dư mới sẽ là", a: ["150%.", "200%.", "250%.", "300%."], c: 1, r: "Ban đầu: m'=100% nghĩa là t(tất yếu) = 4h, t'(thặng dư) = 4h. Giá trị sức LĐ giảm 25% -> t(tất yếu) mới = 3h. Ngày LĐ tăng lên 9h -> t'(thặng dư) mới = 9 - 3 = 6h. Vậy m' mới = (6/3) * 100% = 200%." },
                            { q: "Nguyên nhân hình thành tỉ suất lợi nhuận bình quân là?", a: ["Cạnh tranh", "Chạy theo giá trị thặng dư", "Cạnh tranh giữa các ngành", "Cạnh tranh trong nội bộ ngành"], c: 2, r: "Sự di chuyển nguồn vốn qua lại một cách tự do giữa các ngành nghề khác nhau (cạnh tranh giữa các ngành) đã vô tình cào bằng và hình thành tỉ suất lợi nhuận chung." },
                            { q: "Tư bản bất biến là", a: ["tư bản mà giá trị của nó chuyển dần vào sản phẩm qua khấu hao.", "là tư bản cố định.", "tư bản mà giá trị của nó lớn lên trong quá trình sản xuất.", "tư bản mà giá trị của nó không thay đổi về lượng và được chuyển nguyên sang sản phẩm."], c: 3, r: "Tư bản bất biến (ký hiệu là c) là bộ phận tư liệu sản xuất mà giá trị của nó được bảo tồn và chuyển nguyên vẹn vào sản phẩm, không hề sinh thêm giá trị." },
                            { q: "Khẳng định nào dưới đây không đúng về tư bản cố định?", a: ["Tư bản cố định là nguồn gốc của giá trị thặng dư.", "Tư bản cố định là điều kiện tăng năng suất lao động.", "Tư bản cố định là điều kiện để giảm giá trị hàng hoá.", "Tư bản cố định là bộ phận chủ yếu của tư bản bất biến."], c: 0, r: "Nguồn gốc duy nhất tạo ra giá trị thặng dư là sức lao động của công nhân (tư bản khả biến), chứ không phải do máy móc thiết bị (tư bản cố định)." },
                            { q: "Ý kiến nào dưới đây không đúng về hàng hoá sức lao động?", a: ["Thể hiện dưới hình thức bán chịu", "Giá cả = giá trị mới do sức lao động tạo ra", "Mua bán có thời hạn", "Giá trị sử dụng quyết định giá trị"], c: 1, r: "Giá cả sức lao động chỉ xoay quanh 'giá trị bản thân' của nó (v), còn 'giá trị mới' mà công nhân tạo ra (v+m) lớn hơn rất nhiều so với giá trị sức lao động. Sự chênh lệch này là giá trị thặng dư." },
                            { q: "Ý nào dưới đây không đúng về sản xuất giá trị thặng dư tương đối?", a: ["Ngày lao động không đổi", "Giá trị sức lao động không đổi", "Hạ thấp giá trị sức lao động", "Tỉ suất giá trị thặng dư thay đổi"], c: 1, r: "Mấu chốt cốt lõi của việc sản xuất GTTD tương đối là phải làm hạ thấp (giảm) giá trị sức lao động thông qua tăng năng suất xã hội, do đó nói 'giá trị sức lao động không đổi' là sai." }
                        ]
                    },
                      4: {
                        title: "Chương 4: Cạnh tranh và độc quyền trong nền kinh tế thị trường",
                        questions: [
                            { q: "Sự hình thành các tổ chức độc quyền dựa trên cơ sở", a: ["sản xuất nhỏ phân tán.", "tích tụ tập trung sản xuất và sự ra đời của các xí nghiệp quy mô lớn.", "sự xuất hiện các thành tựu mới của khoa học.", "sự hoàn thiện quan hệ sản xuất – tư bản chủ nghĩa."], c: 1, r: "Tự do cạnh tranh đẻ ra tập trung sản xuất, và sự tập trung sản xuất này khi phát triển tới một mức độ nhất định sẽ dẫn tới độc quyền với sự xuất hiện của các xí nghiệp quy mô lớn." },
                            { q: "Sự ra đời của tư bản tài chính là kết quả của sự phát triển", a: ["độc quyền ngân hàng.", "sự phát triển của thị trường tài chính.", "độc quyền công nghiệp.", "quá trình xâm nhập liên kết độc quyền ngân hàng với độc quyền công nghiệp."], c: 3, r: "Tư bản tài chính là kết quả của sự dung hợp, thâm nhập và bện chặt vào nhau giữa độc quyền ngân hàng và độc quyền công nghiệp." },
                            { q: "Vai trò mới của ngân hàng trong giai đoạn chủ nghĩa tư bản độc quyền là gì?", a: ["Đầu tư tư bản", "Khống chế hoạt động của nền kinh tế tư bản chủ nghĩa", "Trung tâm tín dụng", "Trung tâm thanh toán"], c: 1, r: "Trong giai đoạn độc quyền, ngân hàng từ chỗ chỉ là trung gian thanh toán đã chuyển thành những kẻ có quyền lực vạn năng, khống chế toàn bộ hoạt động kinh tế của xã hội." },
                            { q: "“Chế độ tham dự” của tư bản tài chính được thiết lập do", a: ["quyết định của nhà nước.", "yêu cầu tổ chức của các ngân hàng.", "yêu cầu của các tổ chức độc quyền công nghiệp.", "số cổ phiếu khống chế nắm công ty mẹ, con, cháu."], c: 3, r: "Chế độ tham dự là cách thức các đầu sỏ tài chính dùng một lượng tư bản nhỏ để mua số cổ phiếu khống chế ở công ty mẹ, từ đó gián tiếp kiểm soát công ty con, công ty cháu." },
                            { q: "Xuất khẩu tư bản là đặc điểm của", a: ["các nước giàu có.", "chủ nghĩa tư bản.", "chủ nghĩa tư bản độc quyền.", "chủ nghĩa tư bản tự do cạnh tranh."], c: 2, r: "Theo V.I.Lênin, nếu tự do cạnh tranh có đặc trưng là xuất khẩu hàng hoá, thì đặc trưng nổi bật của giai đoạn CNTB độc quyền chính là xuất khẩu tư bản." },
                            { q: "Trong chủ nghĩa tư bản độc quyền, vì sao cạnh tranh không bị thủ tiêu?", a: ["Vì các tổ chức độc quyền cạnh tranh với nhau", "Vì tổ chức độc quyền cạnh tranh với các công ty ngoài độc quyền", "Vì các xí nghiệp trong nội bộ tổ chức độc quyền cạnh tranh với nhau", "Vì cạnh tranh là quy luật khách quan của kinh tế hàng hoá"], c: 3, r: "Độc quyền sinh ra từ tự do cạnh tranh nhưng nó không bao giờ thủ tiêu được cạnh tranh, bởi vì cạnh tranh là một quy luật khách quan, tất yếu của nền sản xuất hàng hóa." },
                            { q: "Các cuộc xâm chiếm thuộc địa của các nước đế quốc diễn ra mạnh mẽ vào thời gian nào?", a: ["Thế kỉ XVII", "Cuối thế kỉ XVII – đầu thế kỉ XVIII", "Thế kỉ XIX", "Cuối thế kỉ XIX – đầu thế kỉ XX"], c: 3, r: "Giai đoạn chuyển biến sang CNTB độc quyền (cuối thế kỷ XIX - đầu thế kỷ XX) là lúc các cường quốc ráo riết nhất trong việc xâm chiếm và phân chia thuộc địa trên thế giới." },
                            { q: "Cuối thế kỉ XIX đầu thế kỉ XX, nước đế quốc có thuộc địa nhiều nhất là", a: ["Anh", "Pháp", "Nga", "Mỹ"], c: 0, r: "Đế quốc Anh là cường quốc đi đầu và sở hữu hệ thống thuộc địa khổng lồ nhất thế giới lúc bấy giờ, được mệnh danh là 'đế quốc mặt trời không bao giờ lặn'." },
                            { q: "Các tổ chức độc quyền sử dụng loại giá cả nào?", a: ["Giá cả chính trị", "Giá cả độc quyền cao", "Giá cả độc quyền thấp", "Giá cả sản xuất"], c: 1, r: "Để thu được lợi nhuận siêu ngạch, các tổ chức độc quyền thường áp đặt giá cả độc quyền cao khi bán hàng hóa ra thị trường." },
                            { q: "Mục đích của các tổ chức độc quyền là", a: ["chiếm đoạt giá trị thặng dư của người khác.", "khống chế thị trường.", "gây thiệt hại cho các đối thủ cạnh tranh.", "củng cố vai trò của tổ chức độc quyền."], c: 0, r: "Mục đích tối cao của mọi tổ chức độc quyền là tước đoạt giá trị thặng dư của những người khác nhằm thu được lợi nhuận độc quyền cao." },
                            { q: "Nhà nước tư sản đảm nhận đầu tư vào các ngành như thế nào?", a: ["Đầu tư lớn, thu hồi vốn nhanh, lợi nhuận ít", "Đầu tư lớn, thu hồi vốn chậm, lợi nhuận cao", "Đầu tư không lớn, thu hồi vốn nhanh, lợi nhuận cao", "Đầu tư lớn, thu hồi vốn chậm, lợi nhuận ít"], c: 3, r: "Nhà nước tư sản thường đứng ra gánh vác việc đầu tư vào các ngành kết cấu hạ tầng thiết yếu đòi hỏi vốn lớn, thu hồi chậm và biên lợi nhuận thấp để tạo nền tảng cho tư nhân kinh doanh." },
                            { q: "Bản chất của chủ nghĩa tư bản độc quyền nhà nước là", a: ["sự kết hợp tổ chức độc quyền tư nhân và nhà nước tư sản.", "nhà nước tư sản can thiệp vào kinh tế, chỉ phối độc quyền.", "các tổ chức độc quyền phụ thuộc vào nhà nước.", "sự thoả hiệp giữa nhà nước và tổ chức độc quyền."], c: 0, r: "Bản chất của nó là sự dung hợp (kết hợp) sức mạnh của các tổ chức độc quyền tư nhân với sức mạnh của bộ máy nhà nước tư sản thành một cơ chế thống nhất." },
                            { q: "Sự ra đời của chủ nghĩa tư bản độc quyền nhà nước nhằm mục đích gì?", a: ["Phục vụ lợi ích của chủ nghĩa tư bản", "Phục vụ lợi ích của tổ chức độc quyền tư nhân", "Phục vụ lợi ích của nhà nước tư sản", "Phục vụ lợi ích của tổ chức độc quyền tư nhân và cứu nguy cho chủ nghĩa tư bản"], c: 3, r: "Nó được sinh ra nhằm bảo vệ lợi ích của giới tư bản độc quyền, đồng thời là giải pháp tình thế để cứu nguy cho CNTB khỏi những cuộc khủng hoảng đe dọa sự tồn vong của chế độ." },
                            { q: "Sở hữu độc quyền nhà nước là sự kết hợp của", a: ["sở hữu nhà nước và sở hữu tư nhân chủ nghĩa tư bản.", "sở hữu nhà nước và sở hữu độc quyền tư nhân.", "sở hữu của nhà nước tư sản.", "sở hữu của nhiều nước tư bản."], c: 1, r: "Sở hữu độc quyền nhà nước thực chất là sự đan xen, dung hợp hữu cơ giữa sở hữu của bộ máy nhà nước với sở hữu của các tập đoàn độc quyền tư nhân." },
                            { q: "Trong chủ nghĩa tư bản ngày nay, trùm tài chính thống trị nền kinh tế thông qua", a: ["“chế độ tham dự”.", "“chế độ uỷ nhiệm”.", "kết hợp “chế độ tham dự” và “chế độ uỷ nhiệm”.", "các tổ chức tài chính quốc tế."], c: 2, r: "Ngày nay, để thích ứng, các trùm tài chính không chỉ dùng 'chế độ tham dự' truyền thống mà còn kết hợp 'chế độ uỷ nhiệm' thông qua các quỹ đầu tư, ngân hàng tín thác để kiểm soát nền kinh tế." },
                            { q: "Lợi nhuận là gì?", a: ["Là tỉ lệ phần lãi trên tổng số tư bản", "Là tiền công mà doanh nhân tự trả cho mình", "Là hình thức biến tướng của giá trị thặng dư", "Là hiệu số giữa giá trị hàng hoá và chi phí sản xuất"], c: 2, r: "Về mặt bản chất lý luận, lợi nhuận thực chất chỉ là hình thái biểu hiện ra bên ngoài, là sự biến tướng của giá trị thặng dư do tư bản khả biến (sức lao động) sinh ra." },
                            { q: "Độc quyền là sự liên minh giữa các doanh nghiệp lớn, có khả năng thâu tóm việc sản xuất và tiêu thụ một số loại hàng hoá, có khả năng định ra giá cả độc quyền, nhằm thu", a: ["giá trị thặng dư tuyệt đối.", "giá trị thặng dư tương đối.", "lợi nhuận bình quân.", "lợi nhuận độc quyền cao."], c: 3, r: "Mục đích cuối cùng của việc liên minh thâu tóm và định giá là để chèn ép thị trường, từ đó thu được mức lợi nhuận độc quyền cao." },
                            { q: "Yếu tố nào dưới đây không phải là nguyên nhân dẫn đến sự hình thành độc quyền?", a: ["Sự phát triển của lực lượng sản xuất", "Sự thủ tiêu cạnh tranh trong giai đoạn độc quyền", "Khủng hoảng kinh tế trong toàn bộ nền sản xuất tư bản chủ nghĩa", "Sự phát triển của hệ thống tín dụng tư bản chủ nghĩa"], c: 1, r: "Độc quyền không thể và không bao giờ thủ tiêu được cạnh tranh, do đó nhận định 'Sự thủ tiêu cạnh tranh' là sai lầm." },
                            { q: "Yếu tố nào dưới đây không phải là nguồn gốc lợi nhuận của lợi nhuận độc quyền cao?", a: ["Lao động của công nhân làm việc trong các xí nghiệp độc quyền", "Lao động không công của công nhân làm việc trong các xí nghiệp ngoài độc quyền", "Giá trị thặng dư của các nhà tư bản vừa và nhỏ thu được", "Lao động thặng dư và đôi khi cả phần lao động tất yếu của những người sản xuất nhỏ, nhân dân lao động ở các nước tư bản và các nước thuộc địa và phụ thuộc"], c: 2, r: "Các nhà tư bản nhỏ cũng là nạn nhân bị chèn ép, phần lợi nhuận độc quyền cao là do bóc lột lao động làm thuê hoặc mua rẻ bán đắt chứ không phải nguồn gốc là 'GTTD của các nhà tư bản nhỏ thu được' theo nghĩa họ tự nguyện nhường lại." },
                            { q: "Các tổ chức độc quyền áp đặt giá cả độc quyền như thế nào?", a: ["Giá cả cao khi bán và giá cả thấp khi mua", "Giá cả thấp khi bán và giá cả cao khi mua", "Giá cả cao khi bán và giá cả thị trường khi mua", "Giá cả thị trường khi bán và giá cả thấp khi mua"], c: 0, r: "Bằng vị thế thống trị, chúng áp đặt 'mua rẻ - bán đắt' tức là giá cao khi bán hàng hóa ra và giá rất thấp khi thu mua nguyên liệu, sức lao động." },
                            { q: "Độc quyền nhà nước trong chủ nghĩa tư bản hình thành nhằm", a: ["phục vụ lợi ích của các tổ chức độc quyền, duy trì sự phát triển của tự do cạnh tranh trong sản xuất.", "phục vụ lợi ích của các tổ chức độc quyền tư nhân và tiếp tục duy trì, phát triển chủ nghĩa tư bản.", "giảm bớt lợi ích của các tổ chức độc quyền tư nhân, thay đổi nền sản xuất tư bản chủ nghĩa.", "gia tăng lợi ích của tất cả chủ thể trong nền kinh tế, duy trì sự bình đẳng trong cạnh tranh."], c: 1, r: "Sự can thiệp của nhà nước nhằm hai mục đích cốt lõi: bảo vệ lợi ích cho giới độc quyền và duy trì, phát triển sự tồn tại của hệ thống CNTB." },
                            { q: "Loại cạnh tranh nào dưới đây không thể hiện sự cạnh tranh giữa các tổ chức độc quyền?", a: ["Cạnh tranh giữa các tổ chức độc quyền với các doanh nghiệp ngoài độc quyền", "Cạnh tranh giữa các tổ chức độc quyền với nhau", "Cạnh tranh giữa các chủ thể sản xuất kinh doanh nhỏ và vừa", "Cạnh tranh trong nội bộ các tổ chức độc quyền"], c: 2, r: "Cạnh tranh giữa các doanh nghiệp nhỏ và vừa là đặc trưng của giai đoạn tự do cạnh tranh trước đó, không phản ánh tính chất của cạnh tranh độc quyền." },
                            { q: "Khẳng định nào dưới đây là sai khi nói về quan hệ cạnh tranh trong trạng thái độc quyền?", a: ["Độc quyền không thủ tiêu cạnh tranh, trái lại làm cho cạnh tranh trở nên đa dạng, gay gắt hơn.", "Độc quyền thủ tiêu cạnh tranh, làm cho cạnh tranh giữa các chủ thể sản xuất trở nên bình đẳng.", "Độc quyền sinh ra từ cạnh tranh tự do.", "Cạnh tranh và độc quyền luôn cùng tồn tại song hành với nhau."], c: 1, r: "Độc quyền không làm thủ tiêu cạnh tranh mà còn làm nó trở nên khốc liệt, tàn bạo hơn, do vậy nói nó thủ tiêu cạnh tranh và tạo ra bình đẳng là hoàn toàn sai." },
                            { q: "Dưới chủ nghĩa tư bản, tích tụ và tập trung sản xuất cao, biểu hiện ở", a: ["số lượng các xí nghiệp tư bản lớn chiếm tỉ trọng nhỏ trong nền kinh tế, nhưng nắm giữ và chi phối thị trường.", "số lượng các xí nghiệp tư bản lớn chiếm tỉ trọng lớn trong nền kinh tế, nắm giữ và chi phối thị trường.", "số lượng các xí nghiệp tư bản nhỏ chiếm tỉ trọng lớn trong nền kinh tế, nắm giữ và chi phối thị trường.", "số lượng các xí nghiệp tư bản nhỏ chiếm tỉ trọng lớn trong nền kinh tế, không nắm giữ và chi phối thị trường."], c: 0, r: "Một lượng rất nhỏ (vài phần trăm) các xí nghiệp khổng lồ nhưng lại tập trung phần lớn vốn, nhân công và chi phối tuyệt đối sản lượng của toàn bộ thị trường." },
                            { q: "Các hình thức liên kết của tổ chức độc quyền là", a: ["liên kết ngang và liên kết dọc.", "liên kết giữa xí nghiệp độc quyền với xí nghiệp ngoài độc quyền.", "liên kết giữa các xí nghiệp ngoài độc quyền với nhau.", "liên kết dọc và liên kết giữa các xí nghiệp ngoài độc quyền."], c: 0, r: "Các tổ chức độc quyền phát triển thông qua việc thâu tóm các đối thủ cùng ngành (liên kết ngang) và thâu tóm toàn bộ chuỗi cung ứng từ nguyên liệu đến tiêu thụ (liên kết dọc)." },
                            { q: "Chọn phương án đúng về thứ tự từ thấp đến cao của các hình thức tổ chức độc quyền?", a: ["Syndicate, cartel, trust, consortium", "Cartel, syndicate, trust, consortium", "Trust, cartel, syndicate, consortium", "Cartel, consortium, syndicate, trust"], c: 1, r: "Theo lịch sử phát triển, mức độ chặt chẽ tăng dần là: Cartel (giá/thị trường) -> Syndicate (lưu thông) -> Trust (sản xuất & lưu thông) -> Consortium (đa ngành)." },
                            { q: "Sự ra đời của tư bản tài chính là kết quả của sự phát triển", a: ["độc quyền ngân hàng.", "sự phát triển của thị trường tài chính.", "độc quyền công nghiệp.", "quá trình xâm nhập liên kết độc quyền ngân hàng với độc quyền công nghiệp."], c: 3, r: "Tư bản tài chính là sự dung hợp vững chắc giữa tư bản ngân hàng độc quyền với tư bản công nghiệp độc quyền." },
                            { q: "Mục đích của xuất khẩu tư bản là", a: ["nhằm thu được giá trị thặng dư và các nguồn lợi nhuận khác ở các nước nhập khẩu tư bản.", "xuất khẩu hàng hoá ra nước ngoài để bán, nhằm thu được lợi nhuận cao hơn.", "nhằm thúc đẩy sản xuất và trao đổi giữa các quốc gia trong nền kinh tế thế giới.", "nhằm thu được giá trị thặng dư và các nguồn lợi nhuận khác ở các nước xuất khẩu tư bản."], c: 0, r: "Xuất khẩu tư bản thực chất là việc mang vốn (tư bản) ra nước ngoài đầu tư để bóc lột nhân công giá rẻ, nhằm thu về giá trị thặng dư cao hơn ở chính quốc." },
                            { q: "Hình thức xuất khẩu tư bản để xây dựng xí nghiệp mới hoặc mua lại những xí nghiệp đang hoạt động ở nước nhận đầu tư là", a: ["đầu tư gián tiếp.", "đầu tư trực tiếp.", "viện trợ không hoàn lại.", "cho vay để thu lợi tức."], c: 1, r: "Khi nhà tư bản trực tiếp bỏ vốn xây dựng nhà máy hoặc mua lại xí nghiệp và trực tiếp quản lý sản xuất, đó được gọi là Đầu tư trực tiếp (FDI)." },
                            { q: "Hình thức đầu tư thông qua việc cho vay để thu lợi tức, mua cổ phần, cổ phiếu, trái phiếu, các giấy tờ có giá khác mà nhà đầu tư không trực tiếp tham gia quản lí hoạt động đầu tư là", a: ["đầu tư gián tiếp.", "đầu tư trực tiếp.", "viện trợ không hoàn lại.", "hỗ trợ phát triển chính thức."], c: 0, r: "Việc chỉ rót vốn qua thị trường tài chính (mua chứng khoán) hoặc cho vay để hưởng lãi suất mà không tham gia điều hành thực tế gọi là Đầu tư gián tiếp (FPI)." },
                            { q: "Biểu hiện mới của tích tụ và tập trung tư bản là", a: ["sự xuất hiện của các tổ chức độc quyền: cartel, syndicate.", "sự xuất hiện của các tổ chức độc quyền trust, consortium.", "sự xuất hiện của các tổ chức độc quyền tư nhân, các doanh nghiệp quy mô lớn.", "sự xuất hiện của các công ty độc quyền xuyên quốc gia bên cạnh sự phát triển của các xí nghiệp vừa và nhỏ."], c: 3, r: "Sự bành trướng vươn ra toàn cầu của các Công ty xuyên quốc gia (MNCs/TNCs) chính là biểu hiện nổi bật nhất của tích tụ tư bản trong giai đoạn hiện đại." },
                            { q: "Ở các nước tư bản phát triển hiện nay, nguyên nhân nào dẫn đến sự xuất hiện của các doanh nghiệp vừa và nhỏ?", a: ["Việc ứng dụng thành tựu khoa học và công nghệ cho phép tiêu chuẩn hoá và chuyên môn hoá sản xuất sâu, dẫn đến hình thành hệ thống gia công; các doanh nghiệp nhỏ có những thế mạnh riêng", "Sự tích tụ và tập trung sản xuất dẫn đến hình thành các xí nghiệp quy mô vừa và nhỏ", "Các doanh nghiệp có quy mô lớn bị phá sản, các doanh nghiệp vừa và nhỏ có cơ hội nắm bắt nhu cầu của thị trường", "Các doanh nghiệp quy mô nhỏ có lợi thế về vốn, độc lập trong sản xuất kinh doanh"], c: 0, r: "Khoa học công nghệ, tự động hóa và sự chuyên môn hóa cao (outsourcing) tạo không gian sinh tồn linh hoạt cho các doanh nghiệp nhỏ phát huy lợi thế riêng mà công ty lớn khó làm được." },
                            { q: "Biểu hiện mới của xuất khẩu tư bản thể hiện ở đại bộ phận dòng đầu tư tư bản", a: ["chảy qua chảy lại giữa các nước đang phát triển với nhau.", "từ các nước tư bản phát triển sang các nước kém phát triển.", "chảy qua chảy lại giữa các nước tư bản phát triển với nhau.", "từ các nước đang phát triển sang các nước phát triển."], c: 2, r: "Khác với thế kỷ XX (vốn chảy về nước thuộc địa/kém phát triển), ngày nay do yêu cầu công nghệ cao, dòng vốn chủ yếu chảy qua lại giữa ba trung tâm tư bản (Mỹ - Tây Âu - Nhật Bản)." },
                            { q: "Biểu hiện mới của xuất khẩu tư bản thể hiện ở chủ thể xuất khẩu tư bản có sự thay đổi lớn, trong đó nổi bật là", a: ["các công ty xuyên quốc gia; sự xuất hiện nhiều chủ thể xuất khẩu tư bản từ các nước đang phát triển.", "các công ty xuyên quốc gia; sự xuất hiện nhiều chủ thể xuất khẩu tư bản từ các nước phát triển.", "sự xuất hiện nhiều chủ thể xuất khẩu tư bản từ các nước phát triển; các doanh nghiệp vừa và nhỏ.", "sự xuất hiện nhiều chủ thể xuất khẩu tư bản từ các nước đang phát triển; các doanh nghiệp quy mô vừa và nhỏ."], c: 0, r: "Bên cạnh các TNCs khổng lồ nắm thế chủ đạo, ngày nay còn có sự trỗi dậy đáng kể của các luồng xuất khẩu tư bản xuất phát từ các nước đang phát triển hoặc mới nổi." },
                            { q: "Khẳng định nào dưới đây là sai khi nói về vai trò tích cực của chủ nghĩa tư bản?", a: ["Chủ nghĩa tư bản chuyển nền sản xuất nhỏ thành nền sản xuất lớn hiện đại.", "Chủ nghĩa tư bản thực hiện xã hội hoá sản xuất.", "Chủ nghĩa tư bản thúc đẩy lực lượng sản xuất phát triển nhanh chóng.", "Chủ nghĩa tư bản thực hiện tư nhân hoá sản xuất."], c: 3, r: "CNTB tạo ra sự xã hội hóa sản xuất cao độ (tập trung sản xuất, liên kết toàn cầu), chứ không phải chia nhỏ để 'tư nhân hóa sản xuất', do đó mệnh đề D là sai." },
                            { q: "Nhận định nào dưới đây là sai khi nói về giới hạn phát triển của chủ nghĩa tư bản?", a: ["Mục đích của nền sản xuất tư bản chủ nghĩa vẫn tập trung chủ yếu vì lợi ích của thiểu số giai cấp tư sản.", "Mục đích của nền sản xuất tư bản chủ nghĩa hiện nay tập trung chủ yếu vì lợi ích chung của tất cả các giai cấp.", "Chủ nghĩa tư bản đã và đang tiếp tục tham gia gây chiến tranh và xung đột ở nhiều nơi trên thế giới.", "Sự phân hoá giàu – nghèo trong lòng các nước tư bản và có xu hướng ngày càng sâu sắc."], c: 1, r: "Bản chất bóc lột của CNTB vẫn không hề thay đổi, nó chỉ phục vụ cho giai cấp tư sản cầm quyền, vì vậy nói nó vì 'lợi ích chung của tất cả các giai cấp' là hoàn toàn sai lầm." },
                            { q: "Mục đích chủ yếu của các conglomerate là", a: ["thu lợi nhuận từ sản xuất.", "thu lợi nhuận từ dịch vụ cho sản xuất.", "thu lợi nhuận từ kinh doanh chứng khoán.", "thu lợi nhuận từ sản xuất kinh doanh."], c: 2, r: "Conglomerate là hình thức độc quyền đa ngành trong thời đại mới, chúng tập trung chủ yếu vào việc thâu tóm và đầu cơ tài chính, kinh doanh chứng khoán để kiếm lời." },
                            { q: "Concern là hình thức tổ chức độc quyền", a: ["trong nội bộ ngành, gồm nhiều xí nghiệp có liên quan với nhau và được phân bố ở nhiều nước.", "đa ngành, gồm hàng trăm xí nghiệp có quan hệ với những ngành khác nhau và được phân bố ở nhiều nước.", "đa ngành, gồm một số ít xí nghiệp có quan hệ với những ngành khác nhau và được phân bố trong một quốc gia.", "trong nội bộ ngành, gồm một số ít xí nghiệp có quan hệ với những ngành khác nhau và được phân bố trong một quốc gia."], c: 1, r: "Concern là tổ chức độc quyền khổng lồ bao trùm đa ngành, sở hữu hàng trăm xí nghiệp thuộc nhiều lĩnh vực rải rác khắp các quốc gia trên thế giới." },
                            { q: "Các xí nghiệp tư bản tham gia trust trở thành những cổ đông để", a: ["thu lợi nhuận theo số lượng hàng hoá.", "thu lợi nhuận bình quân.", "thu lợi nhuận theo số lượng cổ phần.", "thu lợi nhuận tối đa."], c: 2, r: "Trong Trust, các xí nghiệp mất hoàn toàn độc lập, trở thành thành viên của một công ty cổ phần chung và được chia lợi nhuận dựa trên số lượng cổ phần họ nắm giữ." },
                            { q: "Hình thức tổ chức độc quyền trong đó các xí nghiệp tư bản lớn kí các hiệp nghị thoả thuận với nhau về giá cả, sản lượng hàng hoá, thị trường tiêu thụ, kì hạn thanh toán là", a: ["cartel.", "syndicate.", "trust.", "consortium."], c: 0, r: "Cartel (Cácten) là hình thức liên kết lỏng lẻo nhất, chỉ dựa trên các bản hiệp nghị về chia sẻ thị trường, ấn định giá, giới hạn sản lượng." },
                            { q: "Khẳng định nào dưới đây là sai khi nói về cartel?", a: ["Các xí nghiệp tham gia cartel vẫn độc lập cả về sản xuất và lưu thông hàng hoá", "Các thành viên tham gia cartel chỉ cam kết thực hiện đúng hiệp nghị đã kí, nếu làm sai sẽ bị phạt tiền theo quy định của hiệp nghị.", "Cartel là liên minh độc quyền vững chắc.", "Cartel thường tan vỡ trước kì hạn."], c: 2, r: "Do các thành viên vẫn giữ độc lập và luôn tìm cách chèn ép nhau vì lợi ích riêng, Cartel thực chất là một liên minh lỏng lẻo và rất dễ tan vỡ." },
                            { q: "Các xí nghiệp tư bản tham gia syndicate thì", a: ["vẫn giữ độc lập về sản xuất, chỉ không độc lập ở khâu lưu thông hàng hoá.", "vẫn giữ độc lập về lưu thông hàng hoá, mất độc lập ở khâu sản xuất.", "độc lập cả về sản xuất và lưu thông hàng hoá.", "không độc lập cả về sản xuất và lưu thông hàng hoá."], c: 0, r: "Syndicate (Xanhđica) chặt chẽ hơn Cartel ở chỗ việc lưu thông (mua nguyên liệu, bán sản phẩm) được tập trung vào một ban quản trị chung, các xí nghiệp chỉ còn độc lập ở khâu sản xuất." },
                            { q: "Mục đích của syndicate là", a: ["thống nhất việc sản xuất và tiêu thụ hàng hoá để thu được lợi nhuận theo số lượng cổ phần.", "thống nhất đầu mối mua và bán để mua nguyên liệu với giá rẻ, bán hàng hoá với giá đắt nhằm thu được lợi nhuận bình quân.", "thống nhất đầu mối mua và bán để mua nguyên liệu với giá rẻ, bán hàng hoá với giá đắt nhằm thu được lợi nhuận độc quyền cao.", "thống nhất việc sản xuất hàng hoá để thu được lợi nhuận độc quyền cao."], c: 2, r: "Việc gom toàn bộ khâu thương mại vào một mối duy nhất nhằm phát huy sức mạnh ép giá (mua vào cực rẻ, bán ra cực đắt) để tóm gọn lợi nhuận độc quyền cao." }
                        ]
                    },
                    5: {
                        title: "Chương 5: Kinh tế thị trường định hướng xã hội chủ nghĩa và các quan hệ lợi ích kinh tế ở Việt Nam",
                        questions: [
                            { q: "Điền từ ngữ thích hợp vào chỗ chấm: Kinh tế thị trường định hướng xã hội chủ nghĩa là nền kinh tế vận hành theo các ...(1)... của thị trường, đồng thời góp phần hướng tới từng bước xác lập một xã hội mà ở đó dân giàu, nước mạnh, ...(2)..., văn minh; có sự điều tiết của Nhà nước do Đảng Cộng sản Việt Nam ...(3)...", a: ["(1) nguyên tắc; (2) công bằng, dân chủ; (3) lãnh đạo", "(1) quy luật; (2) công bằng, dân chủ; (3) quản lí", "(1) quy luật; (2) dân chủ, công bằng; (3) lãnh đạo", "(1) nguyên tắc; (2) dân chủ, công bằng; (3) lãnh đạo"], c: 2, r: "Kinh tế thị trường định hướng XHCN phải tuân theo các quy luật khách quan của thị trường, hướng tới mục tiêu dân chủ, công bằng và đặt dưới sự lãnh đạo tuyệt đối của Đảng Cộng sản Việt Nam." },
                            { q: "Nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam với sự hoạt động kinh tế của các chủ thể, hướng tới góp phần xác lập một hệ giá trị toàn diện bao gồm", a: ["dân giàu, nước mạnh, dân chủ, công bằng, văn minh.", "phát triển, bình đẳng, dân chủ, đoàn kết, văn minh.", "dân giàu, tự chủ, tự do, công bằng, hiệu quả.", "hiệu quả, chất lượng, năng suất, tiến bộ, văn minh."], c: 0, r: "Mục tiêu và hệ giá trị toàn diện cao nhất mà nền kinh tế thị trường định hướng XHCN ở nước ta hướng tới là: 'dân giàu, nước mạnh, dân chủ, công bằng, văn minh'." },
                            { q: "Khẳng định nào dưới đây là đúng khi nói về đặc trưng của nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?", a: ["mang các đặc trưng chung vốn có của kinh tế thị trường nói chung, không bao hàm các đặc trưng riêng của Việt Nam.", "vừa bao hàm đầy đủ các đặc trưng chung vốn có của kinh tế thị trường nói chung vừa có những đặc trưng riêng của Việt Nam.", "không bao hàm đầy đủ các đặc trưng chung vốn có của kinh tế thị trường mà có những đặc trưng riêng của Việt Nam.", "chỉ bao hàm các đặc trưng của nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam."], c: 1, r: "Đây là một kiểu tổ chức kinh tế vừa tuân thủ các quy luật chung của kinh tế thị trường thế giới, vừa dựa trên những đặc thù lịch sử, chính trị và định hướng XHCN riêng của Việt Nam." },
                            { q: "Đảng ta khẳng định: Kinh tế thị trường định hướng xã hội chủ nghĩa là mô hình kinh tế tổng quát của thời kì quá độ lên chủ nghĩa xã hội ở nước ta, tại Đại hội đại biểu toàn quốc lần thứ mấy?", a: ["Đại hội đại biểu toàn quốc lần thứ VIII", "Đại hội đại biểu toàn quốc lần thứ IX", "Đại hội đại biểu toàn quốc lần thứ X", "Đại hội đại biểu toàn quốc lần thứ XI"], c: 1, r: "Khái niệm và mô hình kinh tế tổng quát này được Đảng ta chính thức khẳng định tại Đại hội đại biểu toàn quốc lần thứ IX (năm 2001)." },
                            { q: "Phát triển kinh tế thị trường định hướng xã hội chủ nghĩa là tất yếu ở Việt Nam, không xuất phát từ những lí do cơ bản nào dưới đây?", a: ["Sự phù hợp với xu hướng phát triển khách quan của Việt Nam trong bối cảnh thế giới hiện nay", "Tính ưu việt của kinh tế thị trường trong thúc đẩy phát triển Việt Nam theo định hướng xã hội chủ nghĩa", "Sự phù hợp với nguyện vọng mong muốn dân giàu, nước mạnh, dân chủ, công bằng, văn minh của người dân Việt Nam", "Xu hướng tự khắc phục các thất bại và khuyết tật của thị trường, không cần sự can thiệp của Nhà nước"], c: 3, r: "Thị trường luôn tồn tại những khuyết tật (khủng hoảng, phân hóa giàu nghèo, ô nhiễm...) mà bản thân nó không thể tự khắc phục được, bắt buộc phải có sự can thiệp điều tiết của Nhà nước. Do đó phương án D là sai." },
                            { q: "Kinh tế thị trường định hướng xã hội chủ nghĩa hướng tới phát triển lực lượng sản xuất, xây dựng cơ sở vật chất – kĩ thuật của chủ nghĩa xã hội; nâng cao đời sống nhân dân, thực hiện “dân giàu, nước mạnh, dân chủ, công bằng, văn minh” là nội dung thể hiện đặc trưng nào của kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?", a: ["Về quan hệ sở hữu", "Về quan hệ quản lí", "Về mục tiêu", "Về quan hệ phân phối"], c: 2, r: "Phát triển LLSX, nâng cao đời sống và xây dựng hệ giá trị 'dân giàu, nước mạnh...' chính là mục tiêu cao nhất của mô hình kinh tế này." },
                            { q: "Quan hệ giữa con người với con người trong quá trình sản xuất và tái sản xuất xã hội trên cơ sở chiếm hữu nguồn lực của quá trình sản xuất và kết quả lao động tương ứng của quá trình sản xuất hay tái sản xuất ấy trong một điều kiện lịch sử nhất định là nội dung thể hiện khái niệm nào?", a: ["Sở hữu", "Chiếm hữu", "Tư hữu", "Công hữu"], c: 0, r: "Sở hữu không chỉ là việc nắm giữ tài sản, mà bản chất của nó là quan hệ xã hội giữa con người với con người trong việc chiếm hữu các nguồn lực và kết quả lao động." },
                            { q: "Khi đề cập đến sở hữu, hàm ý trong đó không bao gồm yếu tố nào dưới đây?", a: ["Chủ thể sở hữu", "Đối tượng sở hữu", "Tính chất sở hữu", "Lợi ích từ đối tượng sở hữu"], c: 2, r: "Cấu thành cơ bản của sở hữu bao gồm chủ thể (ai sở hữu), đối tượng (sở hữu cái gì) và lợi ích thu được. Tính chất sở hữu là sự phân loại (như công hữu, tư hữu) chứ không phải là yếu tố cấu thành khái niệm." },
                            { q: "Sở hữu chịu sự quy định trực tiếp của yếu tố nào dưới đây?", a: ["Sự phát triển của kiến trúc thượng tầng", "Trình độ của lực lượng sản xuất", "Trình độ của quan hệ sản xuất", "Sự phù hợp của quan hệ sản xuất"], c: 1, r: "Theo chủ nghĩa duy vật lịch sử, trình độ phát triển của lực lượng sản xuất quyết định trực tiếp đến hình thức sở hữu tư liệu sản xuất tương ứng." },
                            { q: "Sở hữu bao gồm những nội dung nào?", a: ["Kinh tế và pháp lí", "Chủ thể sở hữu và đối tượng sở hữu", "Kinh tế và quản lí", "Chủ thể sở hữu và pháp lí"], c: 0, r: "Sở hữu có hai mặt: nội dung kinh tế (mang lại lợi ích kinh tế) và nội dung pháp lý (được nhà nước thừa nhận và bảo vệ bằng luật pháp)." },
                            { q: "Kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam là nền kinh tế", a: ["có nhiều hình thức sở hữu, nhiều thành phần kinh tế.", "có một hình thức sở hữu, nhiều thành phần kinh tế.", "có nhiều hình thức sở hữu, một thành phần kinh tế.", "có hai hình thức sở hữu, hai thành phần kinh tế."], c: 0, r: "Nền kinh tế nước ta tồn tại đa dạng các hình thức sở hữu (công hữu, tư hữu, sở hữu hỗn hợp), từ đó hình thành nên nhiều thành phần kinh tế cùng tồn tại." },
                            { q: "Sở hữu phản ánh việc chiếm hữu các yếu tố nào dưới đây?", a: ["Quá trình sản xuất và kết quả của lao động", "Quá trình trao đổi và kết quả của lao động", "Các nguồn lực của sản xuất và kết quả của lao động", "Các nguồn lực đầu vào và tổ chức quản lí sản xuất"], c: 2, r: "Bản chất của sở hữu là việc xác định ai là người nắm quyền chiếm đoạt các nguồn lực đầu vào của sản xuất và ai được quyền hưởng kết quả lao động làm ra." },
                            { q: "Các thành phần kinh tế dựa trên chế độ công hữu là", a: ["kinh tế nhà nước và kinh tế tư nhân.", "kinh tế nhà nước và kinh tế tập thể.", "kinh tế tư nhân và kinh tế tập thể.", "kinh tế tư nhân và kinh tế có vốn đầu tư nước ngoài."], c: 1, r: "Kinh tế nhà nước (sở hữu toàn dân) và kinh tế tập thể (sở hữu của nhóm người lao động) là hai thành phần được xây dựng trên nền tảng chế độ công hữu." },
                            { q: "Thành phần kinh tế tư nhân dựa trên chế độ sở hữu nào?", a: ["Công hữu", "Công cộng", "Tư nhân", "Tập thể"], c: 2, r: "Đúng như tên gọi, thành phần kinh tế tư nhân được hình thành và phát triển dựa trên nền tảng của chế độ sở hữu tư nhân về tư liệu sản xuất." },
                            { q: "Trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam, thành phần kinh tế nào dưới đây giữ vai trò chủ đạo?", a: ["Kinh tế tập thể", "Kinh tế nhà nước", "Kinh tế tư nhân", "Kinh tế có vốn đầu tư nước ngoài"], c: 1, r: "Kinh tế nhà nước giữ vai trò chủ đạo, là lực lượng vật chất quan trọng để Nhà nước định hướng và điều tiết nền kinh tế vĩ mô." },
                            { q: "Điền từ ngữ thích hợp vào chỗ chấm: Trong nền kinh tế thị trường định hướng xã hội chủ nghĩa, ...(1)... đóng vai trò chủ đạo, cùng với ...(2)... ngày càng trở thành nền tảng vững chắc của nền kinh tế quốc dân.", a: ["(1) kinh tế nhà nước; (2) kinh tế tư nhân", "(1) kinh tế nhà nước; (2) kinh tế tập thể", "(1) kinh tế tư nhân; (2) kinh tế tập thể", "(1) kinh tế tư nhân; (2) kinh tế nhà nước"], c: 1, r: "Văn kiện Đảng xác định: Kinh tế nhà nước đóng vai trò chủ đạo, kinh tế nhà nước cùng với kinh tế tập thể ngày càng trở thành nền tảng vững chắc của nền kinh tế quốc dân." },
                            { q: "Trong nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam, thành phần kinh tế nào là một động lực quan trọng của nền kinh tế quốc dân?", a: ["Kinh tế tư nhân", "Kinh tế nhà nước", "Kinh tế có vốn đầu tư nước ngoài", "Kinh tế tập thể"], c: 0, r: "Đảng ta khẳng định, kinh tế tư nhân là một động lực quan trọng của nền kinh tế, góp phần lớn vào giải quyết việc làm và tăng trưởng." },
                            { q: "Khẳng định nào dưới đây là sai khi nói về vai trò của kinh tế nhà nước?", a: ["Kinh tế nhà nước là đòn bẩy để thúc đẩy tăng trưởng nhanh, bền vững và giải quyết các vấn đề xã hội.", "Kinh tế nhà nước đứng độc lập, tách rời với toàn bộ nền kinh tế và các thành phần kinh tế khác.", "Kinh tế nhà nước mở đường, hướng dẫn, hỗ trợ các thành phần kinh tế khác cùng phát triển.", "Kinh tế nhà nước làm lực lượng vật chất để Nhà nước thực hiện chức năng điều tiết, quản lí nền kinh tế."], c: 1, r: "Kinh tế nhà nước không hề tách rời mà nó đan xen, gắn kết chặt chẽ, đóng vai trò mở đường, dẫn dắt và hỗ trợ các thành phần kinh tế khác cùng phát triển." },
                            { q: "Nhận định nào dưới đây là sai khi nói về vị trí, quan hệ giữa các thành phần kinh tế?", a: ["Mỗi thành phần kinh tế đều là một bộ phận cấu thành của nền kinh tế quốc dân.", "Các thành phần kinh tế cùng tồn tại và phát triển, đều bình đẳng trước pháp luật.", "Các chủ thể thuộc các thành phần kinh tế bình đẳng, hợp tác, cạnh tranh cùng phát triển theo pháp luật.", "Các thành phần kinh tế tách biệt, đối lập nhau và không bình đẳng trước pháp luật."], c: 3, r: "Chủ trương của Đảng và Nhà nước ta là các thành phần kinh tế hoạt động bình đẳng, hợp tác và cạnh tranh lành mạnh theo pháp luật, không có sự đối lập hay phân biệt đối xử." },
                            { q: "Nhà nước quản lí và thực hành cơ chế quản lí là Nhà nước pháp quyền xã hội chủ nghĩa của nhân dân, do nhân dân, vì nhân dân dưới sự lãnh đạo của Đảng Cộng sản, chịu sự làm chủ và giám sát của nhân dân là nội dung thể hiện đặc trưng nào của nền kinh tế thị trường định hướng xã hội chủ nghĩa ở Việt Nam?", a: ["Về mục tiêu", "Về quan hệ sở hữu và thành phần kinh tế", "Về quan hệ quản lí nền kinh tế", "Về quan hệ phân phối"], c: 2, r: "Yếu tố Nhà nước quản lý, cơ chế vận hành, sự lãnh đạo của Đảng và giám sát của nhân dân thuộc về đặc trưng quan hệ quản lý nền kinh tế." },
                            { q: "Trong điều kiện nền kinh tế thị trường hiện nay, Nhà nước thông qua cơ chế, chính sách và các công cụ quản lí kinh tế để tác động vào thị trường không nhằm mục đích nào dưới đây?", a: ["Bảo đảm tính bền vững của các cân đối kinh tế vĩ mô", "Khắc phục những khuyết tật của kinh tế thị trường", "Điều tiết nền kinh tế theo cơ chế kế hoạch hoá tập trung", "Hỗ trợ thị trường trong nước khi cần thiết"], c: 2, r: "Nước ta đã xóa bỏ cơ chế kế hoạch hóa tập trung quan liêu bao cấp từ năm 1986. Hiện nay Nhà nước điều tiết bằng các công cụ vĩ mô chứ không dùng mệnh lệnh hành chính tập trung." },

                            { q: "Đặc điểm truyền thống gia đình Bác Hồ?", a: ["Yêu nước, thương dân, căm thù giặc", "Dòng dõi quý tộc, nho gia", "Nhà nho, yêu nước", "Cả 3 phương án trên"], c: 0, r: "Gia đình Bác kế thừa trọn vẹn truyền thống yêu nước thương dân và tinh thần căm thù giặc sâu sắc của quê hương xứ Nghệ." },
                            { q: "Thân mẫu Bác Hồ làm nghề gì để nuôi gia đình những năm ở Huế?", a: ["Nghề nông", "Dạy học", "Nội trợ", "Dệt cửi"], c: 3, r: "Bà Hoàng Thị Loan làm nghề dệt cửi, tần tảo sớm hôm dệt vải để nuôi chồng ăn học và chăm sóc các con tại kinh thành Huế." },
                            { q: "Thân sinh của Bác Hồ mất tại đâu?", a: ["Nghệ An", "Huế", "Hà Nội", "Đồng tháp"], c: 3, r: "Cụ Nguyễn Sinh Sắc qua đời năm 1929 tại Cao Lãnh, Đồng Tháp." },
                            { q: "Thân sinh Bác Hồ vào Đồng Tháp năm 1911 với mục đích gì?", a: ["Hoạt động cách mạng", "Hoạt động trong phong trào cứu nước", "Làm nghề dạy học, chữa bệnh cứu người", "Cả 3 phương án trên"], c: 2, r: "Sau khi bị cách chức quan, cụ Nguyễn Sinh Sắc đi xuôi vào Nam, đến Cao Lãnh (Đồng Tháp) làm nghề bốc thuốc chữa bệnh và dạy học để sống qua ngày." },
                            { q: "Bác Hồ lớn lên trong hoàn cảnh nước ta thế nào?", a: ["Phong trào chống Pháp nổi dậy khắp nơi", "Khó khăn nhất trong lịch sử", "Triều đình Nguyễn cai trị bảo thủ phản động", "Cả 3 phương án trên"], c: 2, r: "Hoàn cảnh lịch sử lúc bấy giờ là triều đình nhà Nguyễn đã đầu hàng, trở thành công cụ tay sai bảo thủ, phản động của thực dân Pháp." },
                            { q: "Yếu tố nào có ý nghĩa quyết định việc hình thành tư tưởng Hồ Chí Minh?", a: ["Giá trị truyền thống dân tộc", "Tinh hoa văn hóa nhân loại", "Chủ nghĩa Mác – Lênin", "Phẩm chất cá nhân Hồ Chí Minh"], c: 3, r: "Nếu không có tư chất thiên tài, ý chí nghị lực phi thường và nhãn quan sắc bén (phẩm chất chủ quan), Bác đã không thể hấp thụ và vận dụng sáng tạo các yếu tố khách quan (Mác-Lênin) để tìm ra đường cứu nước." },
                            { q: "Thời kỳ hoạt động nào của Bác Hồ có ý nghĩa quyết định vạch con đường cách mạng Việt Nam?", a: ["Trước 1911", "1911 – 1920", "1921 – 1930", "1930 – 1941"], c: 1, r: "Giai đoạn 1911-1920 là thời kỳ khảo sát và tìm tòi, đỉnh cao là năm 1920 Người đọc được Luận cương của Lênin, chính thức vạch ra con đường cứu nước đúng đắn." },
                            { q: "Đảng ta quyết định lấy tư tưởng Hồ Chí Minh làm kim chỉ nam cho hành động vào năm nào?", a: ["1930", "1945", "1954", "1991"], c: 3, r: "Tại Đại hội VII (1991), Đảng chính thức ghi vào Cương lĩnh lấy Chủ nghĩa Mác - Lênin và Tư tưởng Hồ Chí Minh làm nền tảng tư tưởng." },
                            { q: "Những năm bôn ba tìm đường cứu nước, Bác Hồ đã phải rời xa Tổ quốc bao nhiêu năm?", a: ["30 năm", "40 năm", "50 năm", "60 năm"], c: 0, r: "Bác rời bến Nhà Rồng năm 1911 và trở về Pác Bó (Cao Bằng) năm 1941. Tổng cộng là 30 năm hoạt động bôn ba ở nước ngoài." },
                            { q: "Những năm bôn ba tìm đường cứu nước, Bác Hồ từng đến bao nhiêu quốc gia trên thế giới?", a: ["20", "21", "30", "40"], c: 2, r: "Dấu chân của Người đã in qua khoảng gần 30 quốc gia thuộc cả 4 châu lục (Á, Âu, Phi, Mỹ)." },
                            { q: "Những năm bôn ba tìm đường cứu nước, Bác Hồ đã xa quê hương bao nhiêu năm?", a: ["30", "35", "40", "50"], c: 3, r: "Tính từ khi theo cha rời làng Sen năm 1906, mãi đến tận năm 1957 Bác mới có dịp về thăm lại quê hương. Tổng cộng là hơn 50 năm xa quê." },
                            { q: "Vì sao các phong trào cứu nước Việt Nam cuối thế kỷ 19, đầu thế kỷ 20 đều thất bại?", a: ["Chưa huy động được sức mạnh toàn dân", "Chưa có đường lối đúng", "CNĐQ đã trở thành hệ thống thế giới", "Cả a, b, c"], c: 3, r: "Các phong trào trước khi có Đảng đều thất bại do thiếu đường lối khoa học, chưa tập hợp được sức mạnh khối đại đoàn kết và phải đối mặt với kẻ thù quá mạnh." },
                            { q: "Hạn chế lớn nhất của các phong trào cứu nước cuối thế kỷ 19 đầu thế kỷ 20?", a: ["Chưa tập hợp sức mạnh toàn dân", "Khủng hoảng đường lối", "Mang nặng tư tưởng tôn quân", "Cả 3 phương án"], c: 1, r: "Sự khủng hoảng, bế tắc về đường lối cứu nước (không biết đi theo quỹ đạo nào: phong kiến hay tư sản) là hạn chế lớn nhất đưa phong trào đến bế tắc." },
                            { q: "Khi tham gia phong trào chống thuế ở Huế, Bác đang làm gì?", a: ["Công nhân", "Dệt cửi", "Học sinh", "Thầy giáo"], c: 2, r: "Tháng 5/1908, khi đang là học sinh trường Quốc học Huế, Bác đã tham gia phong trào biểu tình chống thuế của nông dân Thừa Thiên." },
                            { q: "Năm 1910, Bác vào Phan Thiết với ý định gì?", a: ["Đi làm Cách mạng", "Tránh sự khủng bố của Mật thám", "Tìm đường vào Sài Gòn", "Tìm đường cứu nước"], c: 1, r: "Sau sự kiện chống thuế ở Huế, để tránh sự theo dõi gắt gao của mật thám Pháp, Bác xuôi vào Nam và dừng chân dạy học tạm thời tại Phan Thiết." },
                            { q: "Năm 1911, Bác sang Pháp với ý định gì?", a: ["Tìm đường cứu nước", "Xem họ làm thế nào để về giúp đồng bào", "Bôn ba nước ngoài", "Hoạt động cách mạng"], c: 1, r: "Người từng tâm sự: Tôi muốn ra ngoài xem nước Pháp và các nước khác làm như thế nào, sau đó sẽ trở về giúp đồng bào." },
                            { q: "Trong thời kỳ bôn ba cứu nước, Bác từng trải qua những nghề nào?", a: ["Phụ bếp, viết câu đối", "Cào tuyết, thông dịch", "Rửa ảnh Làm báo", "Cả 3 phương án"], c: 3, r: "Để có tiền sinh sống và hoạt động cách mạng, Bác đã trải qua vô vàn nghề lao động chân tay cực nhọc tại Pháp, Anh, Mỹ..." },
                            { q: "Bác từng hành nghề viết câu đối ở đâu?", a: ["Pháp", "Anh", "Mỹ", "Trung quốc"], c: 2, r: "Khi ở Mỹ (Boston), có thời gian Bác đã kiếm sống bằng nghề rửa ảnh và viết chữ (câu đối) thuê." },
                            { q: "Bác Hồ từng làm nghề thông dịch ở đâu?", a: ["Nga", "Pháp", "Anh", "Trung Quốc"], c: 3, r: "Khi từ Liên Xô về Quảng Châu (Trung Quốc) cuối 1924, Bác hoạt động dưới vỏ bọc là thông dịch viên cho phái đoàn cố vấn Borodin." },
                            { q: "“Mong manh áo vải hồn muôn trượng/ Hơn tượng đồng phơi những lối mòn”. Câu thơ này của tác giả nào?", a: ["Tố Hữu", "Chế Lan Viên", "Cù Huy Cận", "Trường Chinh"], c: 0, r: "Đây là 2 câu thơ nổi tiếng ngợi ca Bác Hồ trong bài thơ 'Bác ơi!' của nhà thơ Tố Hữu." },
                            { q: "“Gốc có vững cây mới bền / Xây lầu thắng lợi trên nền nhân dân”. Nền nhân dân ở đây theo Bác hàm ý gì?", a: ["Ý chí và nghị lực của dân", "Sức lực và của cải của dân", "Tinh thần đoàn kết của dân", "Cả 3 phương án trên"], c: 3, r: "Nhân dân là nền tảng, là cội nguồn sức mạnh bao gồm cả ý chí, sức lực, tài sản và tinh thần đoàn kết khổng lồ." },
                            { q: "“Gốc có vững cây mới bền / Xây lầu thắng lợi trên nền nhân dân”. Lầu thắng lợi ở đây hàm ý gì?", a: ["Hệ tư tưởng", "Nền văn hóa", "Đảng, nhà nước, chính phủ", "Kiến trúc thượng tầng"], c: 3, r: "Theo quan điểm Mác - Lênin, kiến trúc thượng tầng (chính trị, nhà nước, pháp luật) phải được xây dựng vững chắc dựa trên nền tảng (cơ sở hạ tầng, sức dân)." },
                            { q: "“Hôm nay châu chấu đá voi / Ngày mai voi sẽ bị lòi ruột ra”. Qua câu thơ, Bác muốn nói ý nào dưới đây?", a: ["Sức mạnh của bầy châu chấu", "Sức mạnh của sự đồng tâm hiệp lực", "Sức mạnh của liên minh giai cấp", "Cả 3 phương án trên"], c: 1, r: "Hình ảnh này được Bác dùng trong Đại hội II (1951) để nói về cuộc kháng chiến chống Pháp: Tuy ta yếu (châu chấu) nhưng nhờ đồng tâm hiệp lực, chiến tranh nhân dân, nhất định sẽ đánh bại đế quốc (voi)." },
                            { q: "Theo Nguyễn Ái Quốc, phong trào cứu nước của dân ta muốn giành được thắng lợi phải làm gì?", a: ["Đi tìm một con đường mới.", "Đi theo con đường các bậc tiền bối", "Cầu viện nước ngoài.", "Cả 3 phương án trên"], c: 0, r: "Bác nhận thấy con đường của cụ Phan Bội Châu là 'đưa hổ cửa trước rước beo cửa sau', nên quyết tâm phải đi tìm một con đường cứu nước hoàn toàn mới." },
                            { q: "Khi ở trong nước, nhận thức của Bác Hồ về con đường cách mạng Việt Nam như thế nào?", a: ["Chưa nhận thức được đặc điểm của thời đại.", "Thấy rõ con đường của các bậc cha anh là không kết quả.", "Phải đi ra nước ngoài tìm một con đường khác.", "Cả 3 phương án trên"], c: 1, r: "Tuy rất khâm phục tinh thần yêu nước của các bậc cha anh (Phan Đình Phùng, Phan Bội Châu...), nhưng Bác sớm nhận ra những hạn chế và sự thất bại tất yếu của các con đường đó." },
                            { q: "Tư tưởng Hồ Chí Minh hình thành từ nguồn gốc thực tiễn nào sau đây?", a: ["Giá trị truyền thống dân tộc Việt Nam", "Phong trào công nhân thế giới", "Phong trào giải phóng dân tộc thuộc địa", "Cả a,b,c"], c: 2, r: "Thực tiễn phong trào đấu tranh của các dân tộc bị áp bức ở các nước thuộc địa đã cung cấp chất liệu thực tiễn sống động cho tư tưởng của Người." },
                            { q: "Tư tưởng Hồ Chí Minh hình thành từ nguồn gốc tư tưởng nào của phương Tây?", a: ["Chủ nghĩa Mác – Lê nin", "Cách mạng tháng mười Nga", "Cách mạng tư sản Anh, Pháp, Mỹ", "Cả a,b,c"], c: 2, r: "Bác đã nghiên cứu và tiếp thu những tư tưởng tiến bộ về nhân quyền, dân quyền từ các cuộc cách mạng tư sản Anh, Pháp, Mỹ (dù nhận rõ bản chất không triệt để của chúng)." },
                            { q: "Tư tưởng Hồ Chí Minh tiếp thu yếu tố nào trong Tinh hoa văn hóa nhân loại?", a: ["Tinh hoa văn hóa nhân loại", "Tư tưởng cách mạng Mỹ", "Tư tưởng cách mạng Pháp", "Cả 3 phương án trên."], c: 2, r: "Người tiếp thu tư tưởng Tự do - Bình đẳng - Bác ái của cách mạng Pháp và coi đó là tinh hoa văn hóa chính trị của nhân loại." },
                            { q: "Tư tưởng Hồ Chí Minh hình thành từ nhân tố chủ quan nào sau đây?", a: ["Phẩm chất cá nhân Hồ Chí Minh", "Phẩm chất của các vị Giêsu, Các Mác, Tôn Dật Tiên, Khổng Tử …", "Phẩm chất các bậc cách mạng tiền bối", "Cả a,b,c"], c: 0, r: "Phẩm chất cá nhân (tư chất thông minh, ý chí kiên cường, nhãn quan sắc bén) là nhân tố chủ quan quyết định giúp Bác vượt qua mọi gian khó." },
                            { q: "Giá trị truyền thống dân tộc Việt Nam có điểm nổi bật nào?", a: ["Truyền thống yêu nước Việt Nam", "Truyền thống đoàn kết", "Đức tính cần cù, thông minh, sáng tạo", "Cả 3 phương án trên"], c: 1, r: "Truyền thống đoàn kết (tương thân tương ái, lá lành đùm lá rách) là sức mạnh cội nguồn giúp dân tộc Việt Nam tồn tại qua mọi thiên tai, địch họa." },
                            { q: "Một trong những giá trị truyền thống tốt đẹp của dân tộc Việt Nam là?", a: ["Lòng từ bi, bác ái, cứu khổ cứu nạn", "Lòng khoan dung độ lượng", "Tinh thần quốc tế cộng sản cao cả", "Cả 3 phương án trên"], c: 1, r: "Lòng khoan dung, độ lượng là truyền thống quý báu của dân tộc (đánh kẻ chạy đi không đánh người chạy lại). Lưu ý: Tinh thần quốc tế cộng sản không phải là truyền thống cổ đại của VN." },
                            { q: "Lần đầu tiếp xúc với chủ nghĩa Mác – Lênin, Hồ Chí Minh tâm đắc nhất điều gì?", a: ["Con đường cứu nước, giải phóng dân tộc mình.", "Con đường cứu nước, giải phóng dân tộc thuộc địa", "Phải tuân theo chủ trương của Quốc tế cộng sản.", "Cả 3 phương án trên"], c: 0, r: "Đọc Luận cương của Lênin, Bác vui mừng đến phát khóc vì đã tìm thấy 'Cái cẩm nang thần kỳ', con đường giải phóng cho dân tộc mình đang bị đọa đày." },
                            { q: "Đâu là truyền thống văn hóa cốt lõi và cao quý nhất của Việt Nam?", a: ["Yêu nước", "Tinh thần quốc tế vô sản", "Lòng từ bi bác ái", "Cả 3 phương án trên"], c: 0, r: "Chủ nghĩa yêu nước là dòng chảy chính, là truyền thống cao quý nhất xuyên suốt hàng ngàn năm lịch sử của dân tộc Việt Nam." },
                            { q: "Giá trị văn hóa phương Đông nào được Bác tiếp thu để hình thành tư tưởng của mình?", a: ["Truyền thống đoàn kết dân tộc Việt Nam", "Những mặt tích cực của tư tưởng nho giáo", "Yêu nước thương dân", "Tinh thần yêu nước Việt Nam"], c: 1, r: "Bác tiếp thu chọn lọc các mặt tích cực của Nho giáo như: triết lý hành động, nhập thế, tu dưỡng đạo đức cá nhân (tu thân)." },
                            { q: "Giá trị văn hóa phương Tây nào được Bác tiếp thu để hình thành tư tưởng của mình?", a: ["Tư tưởng cách mạng tư sản Anh, Pháp, Mỹ", "Tư tưởng chủ nghĩa tam dân của Tôn Trung Sơn", "Tư tưởng đoàn kết dân tộc Việt Nam", "Cả 3 phương án trên"], c: 0, r: "Lý tưởng tự do, bình đẳng, bác ái và quyền con người từ các cuộc cách mạng tư sản Âu - Mỹ đã được Bác kế thừa và phát triển." },
                            { q: "Nguồn gốc nền tảng sâu xa nhất hình thành tư tưởng Hồ Chí Minh là?", a: ["Tinh hoa văn hóa nhân loại", "Chủ nghĩa Mác – Lênin", "Chủ nghĩa yêu nước Việt Nam", "Cả 3 phương án trên"], c: 2, r: "Chủ nghĩa yêu nước là cội nguồn sâu xa, là động lực thôi thúc mãnh liệt nhất đưa người thanh niên Nguyễn Tất Thành ra đi tìm đường cứu nước." },
                            { q: "Bắt đầu thời kỳ nào, ở Bác hình thành tư tưởng yêu nước?", a: ["Trước năm 1911", "1911 đến 1920", "1921 đến 1930", "Cả 3 phương án trên"], c: 0, r: "Ngay từ thuở thiếu thời (trước 1911) sống trong gia đình Nho học và quê hương xứ Nghệ, tư tưởng yêu nước thương dân đã ăn sâu vào tâm trí Bác." },
                            { q: "Bước vào thời kỳ nào, ở Bác hình thành chí hướng cách mạng rõ nét?", a: ["1890 – 1911", "1911 – 1920", "1920 – 1930", "1930 – 1945"], c: 1, r: "Giai đoạn 1911-1920, qua quá trình lao động và khảo sát thực tiễn thế giới, Người đã chuyển từ chủ nghĩa yêu nước đến với chủ nghĩa Mác-Lênin, xác định rõ chí hướng vô sản." },
                            { q: "Giai đoạn nào, ở Bác bắt đầu định hình con đường cách mạng Việt Nam?", a: ["1911 – 1920", "1921 – 1930", "1930 – 1945", "Cả 3 phương án trên"], c: 1, r: "Thập niên 1921-1930 đánh dấu sự chín muồi trong tư tưởng của Bác với hàng loạt tác phẩm lý luận, kết tinh ở Cương lĩnh chính trị đầu tiên (1930)." },
                            { q: "“Nước Nga có chuyện lạ đời/ Biến người nô lệ thành người tự do”. Chuyện lạ đời theo Bác ở đây là gì?", a: ["Cách mạng tháng 10 Nga.", "Nhà nước công nông đầu tiên trong lịch sử", "Liên Xô đánh thắng 14 nước đế quốc", "Cả 3 phương án trên"], c: 1, r: "Sự ra đời của một Nhà nước do chính giai cấp công nông (những người từng bị áp bức) làm chủ là một điều chưa từng có (lạ đời) trong lịch sử nhân loại." },
                            { q: "Bác Hồ tâm đắc nhất ở Lênin ở điều gì?", a: ["Lênin đã giải phóng cho dân tộc mình", "Lênin là người thầy của cách mạng vô sản thế giới", "Lênin sáng lập quốc tế cộng sản", "Cả 3 phương án trên."], c: 0, r: "Bác kính trọng Lênin không chỉ vì lý luận, mà thực tiễn Lênin đã lãnh đạo thành công cách mạng Tháng Mười, giải phóng được nhân dân lao động Nga." },
                            { q: "“…Phải nhìn cho rộng, suy cho kỹ / Kiên quyết, không ngừng thế tấn công / Lạc nước, hai xe đành bỏ phí / Gặp thời, một tốt cũng thành công…” Ý trong bài thơ trên (Học đánh cờ) của Bác nói gì?", a: ["Chiến lược, chiến thuật cách mạng", "Thế giới quan của người cách mạng", "Chiến thuật đánh cờ", "Cả 3 phương án"], c: 0, r: "Mượn hình ảnh bàn cờ, Bác đã đúc kết bài học vô giá về nghệ thuật chỉ đạo chiến lược, chớp thời cơ và kiên quyết tấn công trong cách mạng." },
                            { q: "Tháng 2/1930, Bác chủ trì Hội nghị hợp nhất các tổ chức cộng sản trong nước để thành lập tổ chức chính trị nào?", a: ["Đảng cộng sản Việt Nam", "Đảng cộng sản Đông dương", "An Nam cộng sản Đảng", "Đông dương cộng sản Đảng"], c: 0, r: "Tại Cửu Long (Hồng Kông) tháng 2/1930, Bác đã nhất trí hợp nhất các tổ chức cộng sản lấy tên là Đảng Cộng sản Việt Nam (sau này tháng 10/1930 đổi thành ĐCS Đông Dương)." }
                        ]
                    },
                    6: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: "Phần 6: Tiểu sử & Bản án chế độ thực dân, Đường Kách mệnh",
                        questions: [
                            { q: "Từ năm 1905 đến năm 1910, Nguyễn Tất Thành học tại trường nào?", a: ["Quốc Tử giám, Hà Nội", "Trường làng, Nghệ An", "Trường Quốc học, Huế", "Trường Dục Thanh, Phan Thiết"], c: 2, r: "Từ 1905 - 1910, Nguyễn Tất Thành theo học tại trường Quốc học Huế, trước khi vào Phan Thiết dạy học ở trường Dục Thanh." },
                            { q: "Tác phẩm nào của Hồ Chí Minh là sự tập hợp những bài giảng của Người cho đội ngũ cán bộ cốt cán đầu tiên của Việt Nam nhằm chuẩn bị cho sự ra đời một chính đảng vô sản kiểu mới?", a: ["Người cùng khổ", "Đường Kách mệnh", "Vấn đề dân bản xứ", "Bản án chế độ thực dân Pháp"], c: 1, r: "Đường Kách mệnh (xuất bản 1927) là cuốn sách tập hợp các bài giảng của Bác tại lớp huấn luyện cán bộ ở Quảng Châu, nhằm chuẩn bị nền tảng lý luận cho việc thành lập Đảng." },
                            { q: "Vì sao Hồ Chí Minh hoàn toàn tin theo Lênin và Quốc tế III?", a: ["Vì thắng lợi của Cách mạng Tháng Mười Nga", "Vì đây là phương hướng mới", "Vì họ bênh vực cho các dân tộc bị áp bức", "Vì họ chiếm số đông trên thế giới"], c: 2, r: "Bác tin theo Lênin và Quốc tế III bởi vì đây là tổ chức duy nhất trên thế giới lúc bấy giờ lên tiếng bênh vực và ủng hộ cuộc đấu tranh của các dân tộc bị áp bức ở thuộc địa." },
                            { q: "Bạn hãy cho biết Hồ Chí Minh có bao nhiêu tên gọi, bút danh, bí danh?", a: ["150", "151", "152", "153"], c: 2, r: "Trong suốt cuộc đời hoạt động cách mạng bôn ba khắp thế giới, Bác Hồ đã sử dụng tới 152 tên gọi, bút danh và bí danh khác nhau." },
                            { q: "“Tất cả các dân tộc trên thế giới đều sinh ra bình đẳng, dân tộc nào cũng có quyền sống, quyền sung sướng và quyền tự do”. Câu trên trích từ tác phẩm nào của Hồ Chí Minh?", a: ["Bản án chế độ thực dân Pháp", "Chính cương sách lược vắn tắt", "Tuyên ngôn độc lập", "Đường cách mệnh"], c: 2, r: "Đây là câu nói nổi tiếng được Bác mở rộng từ Tuyên ngôn độc lập của nước Mỹ, đưa vào Bản Tuyên ngôn Độc lập của nước Việt Nam Dân chủ Cộng hòa." },
                            { q: "Giá trị của bản Tuyên ngôn Độc lập của nước Việt Nam mới được đánh giá là:", a: ["Có giá trị bình thường", "Có giá trị lịch sử to lớn", "Có giá trị lịch sử đặc biệt", "Là bản thiên cổ hùng văn"], c: 1, r: "Bản Tuyên ngôn Độc lập (1945) mang giá trị lịch sử to lớn, đánh dấu kỷ nguyên độc lập, tự do của dân tộc Việt Nam." },
                            { q: "Thực chất của vấn đề dân tộc thuộc địa trong tư tưởng Hồ Chí Minh là gì?", a: ["Đòi quyền bình đẳng giữa các dân tộc, thành lập nhà nước dân tộc độc lập...", "Đòi quyền tự do dân chủ cho nhân dân, thành lập nhà nước dân tộc độc lập...", "Đòi quyền tự trị dân tộc dưới sự bảo hộ của ngoại bang...", "Đấu tranh giải phóng dân tộc, thành lập nhà nước dân tộc độc lập, trong đó nhân dân là chủ thể tối cao của quyền lực nhà nước"], c: 3, r: "Thực chất vấn đề dân tộc thuộc địa là phải tiến hành đấu tranh giải phóng dân tộc để lập nên một nhà nước độc lập do nhân dân làm chủ." },
                            { q: "Theo Nguyễn Ái Quốc, cách mạng giải phóng dân tộc trong thời đại mới muốn giành được thắng lợi phải đi theo:", a: ["Con đường cứu nước mà những bậc tiền bối đã đi", "Con đường giành độc lập của người Mỹ", "Con đường giành độc lập của nhân dân Ấn Độ", "Con đường cách mạng vô sản"], c: 3, r: "Sau quá trình bôn ba, Bác khẳng định: Muốn cứu nước và giải phóng dân tộc không có con đường nào khác ngoài con đường cách mạng vô sản." },
                            { q: "Cách mạng giải phóng dân tộc trong thời đại mới muốn giành được thắng lợi phải do:", a: ["Giai cấp tư sản lãnh đạo", "Phải do một cá nhân xuất chúng lãnh đạo", "Do tầng lớp trí thức lãnh đạo", "Phải do Đảng Cộng sản lãnh đạo"], c: 3, r: "Sự lãnh đạo của Đảng Cộng sản (đội tiên phong của giai cấp công nhân) là nhân tố quyết định mọi thắng lợi của cách mạng giải phóng dân tộc." },
                            { q: "Cách mạng giải phóng dân tộc là sự nghiệp đoàn kết của:", a: ["Giai cấp công nhân với giai cấp nông dân", "Giai cấp công nhân với tầng lớp trí thức", "Của toàn dân trên cơ sở liên minh của giai cấp công nhân với giai cấp nông dân và trí thức", "Giai cấp công nhân với các nhà công thương giàu có"], c: 2, r: "Đó là sự nghiệp của toàn dân, được xây dựng trên nền tảng vững chắc là khối liên minh công - nông - trí thức." },
                            { q: "Cách mạng giải phóng dân tộc muốn giành được thắng lợi cần phải:", a: ["Dựa vào các nước có nền kinh tế phát triển cao", "Được tiến hành một cách chủ động và sáng tạo", "Dựa vào thắng lợi của cách mạng ở chính quốc", "Dựa vào thắng lợi ở các nước thuộc địa khác"], c: 1, r: "Bác cho rằng cách mạng thuộc địa không được thụ động ỷ lại vào cách mạng chính quốc, mà phải được tiến hành một cách chủ động, sáng tạo." },
                            { q: "Biện pháp hàng đầu để giành thắng lợi trong cách mạng giải phóng dân tộc phải:", a: ["Dựa vào bạo lực vũ trang thuần túy", "Dùng phương pháp đàm phán hòa bình", "Kêu gọi quân đội nước ngoài trợ giúp", "Sử dụng bạo lực cách mạng, kết hợp bạo lực chính trị của quần chúng với bạo lực vũ trang"], c: 3, r: "Bạo lực cách mạng theo tư tưởng Hồ Chí Minh là sức mạnh tổng hợp, kết hợp chặt chẽ giữa đấu tranh chính trị của quần chúng và đấu tranh vũ trang." },
                            { q: "Theo tư tưởng Hồ Chí Minh, lực lượng giải phóng dân tộc, giải phóng giai cấp, giải phóng con người là:", a: ["Đảng Cộng sản, Khối đại đoàn kết dân tộc mà nòng cốt là liên minh công, nông, trí thức", "Các lực lượng cách mạng thế giới, Khối đại đoàn kết dân tộc mà nòng cốt là liên minh công, nông, trí thức", "Đảng Cộng sản, Các lực lượng cách mạng thế giới, Khối đại đoàn kết dân tộc mà nòng cốt là liên minh công, nông, trí thức", "Cả 3 phương án đều sai"], c: 2, r: "Lực lượng tổng hợp bao gồm sức mạnh của Đảng lãnh đạo, sự ủng hộ của cách mạng thế giới và sức mạnh cốt lõi của đại đoàn kết dân tộc (liên minh công-nông-trí thức)." },
                            { q: "Theo Hồ Chí Minh, ai là người đầu tiên đã đặt cơ sở cho một thời đại mới, thật sự cách mạng trong các nước thuộc địa?", a: ["C. Mác", "Lênin", "Hô-xê-mác-ti", "Mao Trạch Đông"], c: 1, r: "Lênin là người đầu tiên chỉ ra mối quan hệ mật thiết giữa cách mạng vô sản và phong trào giải phóng dân tộc ở các nước thuộc địa, mở ra thời đại mới." },
                            { q: "“Cách mạng là phá cái cũ đổi ra cái mới, cái xấu đổi ra cái tốt”. Câu trên được trích từ tác phẩm nào của Hồ Chí Minh?", a: ["Sửa đổi lề lối làm việc", "Bản án chế độ thực dân Pháp", "Đường Kách mệnh", "Đạo đức cách mạng"], c: 2, r: "Đây là định nghĩa kinh điển về bản chất của cách mạng được Bác viết trong cuốn Đường Kách mệnh (1927). (Lưu ý: Một số giáo trình cũ đánh đáp án là Đạo đức cách mạng, nhưng nguồn gốc chuẩn xác là Đường Kách mệnh)." },
                            { q: "“Công - nông là gốc cách mệnh, còn học trò, nhà buôn nhỏ, điền chủ nhỏ… là bầu bạn cách mệnh của công – nông”. Câu trên được trích từ tác phẩm nào của Nguyễn Ái Quốc?", a: ["Thư gửi ủy ban hành chính các kỳ, bộ, tổng và làng", "Thư gửi đồng bào Nam bộ", "Sửa đổi lề lối làm việc", "Đường Kách mệnh"], c: 3, r: "Quan điểm nền tảng về lực lượng cách mạng và đại đoàn kết này được Bác vạch ra rõ ràng trong tác phẩm Đường Kách mệnh." },
                            { q: "Câu “chủ trương làm tư sản dân quyền cách mạng và thổ địa cách mạng để đi tới một xã hội cộng sản” trích từ văn kiện nào?", a: ["Đường cách mệnh", "Chính cương, sách lược vắn tắt", "Chương trình tóm tắt của Đảng", "Chương trình của mặt trận Việt Minh"], c: 1, r: "Đây là mục tiêu chiến lược cốt lõi của cách mạng Việt Nam được khẳng định ngay trong Chính cương vắn tắt của Đảng (đầu năm 1930)." },
                            { q: "“Trong lúc này, quyền lợi của dân tộc là cao hết thảy”. Kết luận trên là nội dung của hội nghị nào của Ban chấp hành Trung ương Đảng Cộng sản Đông Dương do Nguyễn Ái Quốc chủ trì?", a: ["Hội nghị Trung ương 6 (11/1939)", "Hội nghị Trung ương 7 (11/1940)", "Hội nghị Trung ương 8 (5/1941)", "Hội nghị toàn quốc của Đảng (8/1945)"], c: 2, r: "Tại Hội nghị Trung ương 8 (tháng 5/1941), Đảng ta quyết định đặt nhiệm vụ giải phóng dân tộc lên hàng đầu, cao hơn hết thảy mọi quyền lợi giai cấp." },
                            { q: "“Hỡi đồng bào yêu quý! Giờ quyết định vận mệnh của dân tộc đã đến. Toàn quốc đồng bào hãy đứng dậy, đem sức ta mà giải phóng cho ta”. Lời kêu gọi trên được trích từ tác phẩm nào?", a: ["Quân lệnh số một của ủy ban khởi nghĩa toàn quốc", "Lời kêu gọi toàn quốc kháng chiến của Hồ Chủ tịch", "Hiệu triệu tổng khởi nghĩa", "Tuyên ngộn độc lập"], c: 2, r: "Đây là lời hiệu triệu mang tính thức tỉnh mãnh liệt trong Thư (Hiệu triệu) kêu gọi Tổng khởi nghĩa của Bác gửi đồng bào cả nước tháng 8/1945." },
                            { q: "Bác Hồ căn dặn bộ đội “Ngày xưa, các vua Hùng đã có công dựng nước. Ngày nay, Bác cháu ta phải cùng nhau giữ lấy nước”. Đó là lời Bác dặn dò đơn vị nào trước khi về tiếp quản thủ đô?", a: ["Đại đoàn 312", "Đại đoàn 320", "Đại đoàn quân tiên phong", "Đơn vị bộ đội bảo vệ Bác"], c: 2, r: "Ngày 19/9/1954, tại Đền Hùng (Phú Thọ), Bác đã căn dặn các cán bộ, chiến sĩ Đại đoàn Quân Tiên Phong câu nói bất hủ này." },
                            { q: "“Không có gì quý hơn độc lập, tự do” được Bác Hồ khẳng định thời gian nào?", a: ["Năm 1945", "Năm 1954", "Năm 1966", "Năm 1968"], c: 2, r: "Chân lý này được Bác đọc trong Lời kêu gọi đồng bào và chiến sĩ cả nước vào ngày 17/7/1966 khi đế quốc Mỹ leo thang ném bom miền Bắc." },
                            { q: "Xác định phương án trả lời đúng với tư tưởng Hồ Chí Minh:", a: ["Cách mạng giải phóng dân tộc giành thắng lợi đồng thời với cách mạng vô sản ở chính quốc", "Cách mạng giải phóng dân tộc giành thắng lợi sau cách mạng vô sản ở chính quốc", "Cách mạng giải phóng dân tộc có khả năng giành thắng lợi trước cách mạng vô sản ở chính quốc", "Thắng lợi của cách mạng giải phóng dân tộc phụ thuộc vào thắng lợi của cách mạng vô sản ở chính quốc"], c: 2, r: "Đây là một luận điểm sáng tạo đột phá của Bác, trái ngược với quan điểm của Quốc tế Cộng sản lúc bấy giờ khi cho rằng thuộc địa phải phụ thuộc vào chính quốc." },
                            { q: "Hồ Chí Minh đã dùng hình ảnh nào dưới đây để chỉ chủ nghĩa tư bản?", a: ["Con bạch tuộc", "Con rồng tre", "Con đỉa 2 vòi", "Con voi"], c: 2, r: "Bác ví chủ nghĩa tư bản như một con đỉa có 2 vòi: một vòi bám vào vô sản chính quốc, một vòi bám vào nhân dân thuộc địa." },
                            { q: "Nội dung cốt lõi của tư tưởng Hồ Chí Minh là:", a: ["Chủ nghĩa yêu nước", "Chủ nghĩa xã hội", "Chủ nghĩa nhân đạo chiến đấu", "Độc lập dân tộc gắn liền với chủ nghĩa xã hội"], c: 3, r: "Sợi chỉ đỏ xuyên suốt toàn bộ hệ thống Tư tưởng Hồ Chí Minh chính là khát vọng độc lập dân tộc gắn liền với tiến lên Chủ nghĩa xã hội." },
                            { q: "Hồ Chí Minh là “Người khởi xướng cuộc đấu tranh giải phóng của các dân tộc thuộc địa trong thế kỷ XX”. Ai đánh giá sự nghiệp của Hồ Chí Minh như trên?", a: ["Đảng Cộng sản Việt Nam", "Ủy ban bảo vệ hòa bình thế giới", "Hội chữ thập đỏ quốc tế", "Cơ quan văn hóa – giáo dục của Liên hợp quốc (UNESCO)"], c: 3, r: "UNESCO (Cơ quan văn hóa, khoa học và giáo dục của Liên hợp quốc) đã đánh giá như vậy khi ra nghị quyết tôn vinh Bác vào năm 1987." },
                            { q: "“Phát động chủ nghĩa dân tộc bản xứ nhân danh Quốc tế cộng sản… khi chủ nghĩa dân tộc của họ thắng lợi, nhất định chủ nghĩa dân tộc ấy sẽ biến thành chủ nghĩa quốc tế”. Quan điểm trên của Bác Hồ được trích từ tác phẩm nào?", a: ["Hồ Chí Minh toàn tập, tập 1", "Hồ Chí Minh toàn tập, tập 2", "Hồ Chí Minh toàn tập, tập 3", "Hồ Chí Minh toàn tập, tập 4"], c: 0, r: "Luận điểm sâu sắc này được Bác viết trong Báo cáo về phong trào cách mạng ở Đông Dương (1924), hiện được in trong Hồ Chí Minh toàn tập, tập 1." },
                            { q: "Chủ nghĩa dân tộc mà Hồ Chí Minh coi là động lực lớn của đất nước là chủ nghĩa dân tộc gì?", a: ["Chủ nghĩa dân tộc nước lớn", "Chủ nghĩa dân tộc nhược tiểu", "Chủ nghĩa quốc gia", "Chủ nghĩa dân tộc chân chính"], c: 3, r: "Đó là chủ nghĩa dân tộc chân chính (chủ nghĩa yêu nước truyền thống), mang sức mạnh to lớn để đoàn kết toàn dân chống ngoại xâm." },
                            { q: "Hồ Chí Minh đứng trên quan điểm nào để giải quyết vấn đề dân tộc?", a: ["Quan điểm quốc gia dân tộc", "Quan điểm dân tộc hẹp hòi", "Quan điểm tư sản", "Quan điểm giai cấp công nhân"], c: 3, r: "Bác luôn đứng trên lập trường của giai cấp công nhân (chủ nghĩa Mác-Lênin) để phân tích và giải quyết triệt để vấn đề giải phóng dân tộc." },
                            { q: "“Chỉ có chủ nghĩa xã hội, chủ nghĩa cộng sản mới giải phóng được những dân tộc bị áp bức và những người lao động trên thế giới khỏi ách nô lệ”. Câu trên được Bác phát biểu năm nào?", a: ["Năm 1920", "Năm 1930", "Năm 1945", "Năm 1960"], c: 3, r: "Khẳng định chân lý vĩ đại này được Bác nêu ra vào năm 1960 trong bài viết 'Con đường dẫn tôi đến chủ nghĩa Lênin'." },
                            { q: "“Nước được độc lập mà dân không được hưởng hạnh phúc, tự do thì độc lập cũng chẳng có nghĩa lý gì”. Luận điểm trên được trích dẫn từ đâu?", a: ["Hồ Chí Minh toàn tập, tập 2", "Hồ Chí Minh toàn tập, tập 4", "Hồ Chí Minh toàn tập, tập 7", "Hồ Chí Minh toàn tập, tập 10"], c: 3, r: "Luận điểm này (thuộc Thư gửi Ủy ban nhân dân các kỳ, tỉnh, huyện và làng năm 1945) được tập hợp trong Hồ Chí Minh toàn tập (đáp án theo hệ thống bộ đề cũ là tập 10)." },
                            { q: "Xác định đúng quan điểm của Hồ Chí Minh:", a: ["Giải phóng giai cấp là tiền đề để giải phóng dân tộc", "Giải phóng con người là tiền đề để giải phóng dân tộc", "Giải phóng dân tộc là tiền đề để giải phóng giai cấp", "Giải phóng xã hội là tiền đề để giải phóng giai cấp"], c: 2, r: "Trái với lý luận chung ở châu Âu, Bác nhận định ở thuộc địa, dân tộc phải được giải phóng trước (giành độc lập) thì mới có cơ sở để giải phóng giai cấp." },
                            { q: "“Trong lúc này, quyền lợi của bộ phận, của giai cấp phải đặt dưới sự sinh tử, sự tồn vong của quốc gia dân tộc. Trong lúc này nếu không giải quyết được vấn đề dân tộc giải phóng... thì quyền lợi của bộ phận, của giai cấp đến vạn năm cũng không đòi lại được”. Bác nói câu này năm nào?", a: ["Năm 1945", "Năm 1948", "Năm 1960", "Năm 1941"], c: 3, r: "Đây là quyết định chiến lược vĩ đại tại Hội nghị Trung ương 8 (tháng 5/1941) do lãnh tụ Nguyễn Ái Quốc chủ trì." },
                            { q: "“Những tư tưởng dân tộc chân chính trong phong trào công nhân bao giờ cũng là những tư tưởng quốc tế chân chính”. Ai nói câu trên?", a: ["C. Mác", "Ph. Ăng-ghen", "Hồ Chí Minh", "Lênin"], c: 1, r: "Đây là một nhận định nổi tiếng của Ph. Ăng-ghen, khẳng định sự thống nhất biện chứng giữa lợi ích dân tộc và lợi ích quốc tế của giai cấp công nhân." },
                            { q: "Theo Hồ Chí Minh, mâu thuẫn chủ yếu trong xã hội thuộc địa phương Đông là gì?", a: ["Mâu thuẫn giữa giai cấp công nhân với giai cấp tư sản dân tộc", "Mâu thuẫn giữa giai cấp công nhân với địa chủ phong kiến", "Mâu thuẫn giữa giai cấp nông dân, công nhân, trí thức với địa chủ phong kiến", "Mâu thuẫn giữa dân tộc bị áp bức với chủ nghĩa thực dân"], c: 3, r: "Ở thuộc địa, mâu thuẫn cơ bản và gay gắt nhất bao trùm lên tất cả là mâu thuẫn giữa toàn thể dân tộc bị áp bức và bọn thực dân xâm lược." },
                            { q: "Đối tượng của cách mạng thuộc địa là:", a: ["Giai cấp tư sản bản địa", "Địa chủ phong kiến", "Bọn phản động, tay sai ôm chân đế quốc", "Chủ nghĩa thực dân và bọn tay sai phản động"], c: 3, r: "Đối tượng (kẻ thù) trực tiếp cần đánh đổ để giải phóng dân tộc chính là thực dân Pháp xâm lược và bọn tay sai, phong kiến phản động." },
                            { q: "Vấn đề cơ bản của cách mạng thuộc địa là:", a: ["Ruộng đất cho nông dân", "Là vấn đề dân chủ xã hội", "Cải thiện dân sinh", "Độc lập dân tộc"], c: 3, r: "Ở các nước thuộc địa, vấn đề sống còn, cơ bản và cấp bách nhất phải giải quyết đầu tiên chính là giành lại Độc lập dân tộc." },
                            { q: "“Không có gì quý hơn độc lập, tự do” được Hồ Chí Minh nói vào ngày, tháng, năm nào?", a: ["Ngày 13/5/1955", "Ngày 14/10/1960", "Ngày 14/5/1963", "Ngày 17/7/1966"], c: 3, r: "Chân lý này được công bố trong Lời kêu gọi đồng bào và chiến sĩ cả nước vào ngày 17/7/1966." },
                            { q: "Tên gọi Hồ Chí Minh có từ năm nào?", a: ["1930", "1942", "1945", "1960"], c: 1, r: "Tháng 8/1942, Bác lấy tên mới là Hồ Chí Minh để lấy danh nghĩa đại diện cho Việt Nam sang Trung Quốc liên lạc với lực lượng Đồng minh." },
                            { q: "Hai câu thơ: “Dân ta phải biết sử ta / Cho tường gốc tích nước nhà Việt Nam”. Được Hồ Chí Minh viết vào năm nào?", a: ["1941", "1942", "1969", "1968"], c: 0, r: "Hai câu thơ này mở đầu cho tác phẩm diễn ca 'Lịch sử nước ta', được Bác viết vào năm 1941 khi mới về nước." },
                            { q: "Hồ Chí Minh viết: “Để che đậy sự xấu xa của chế độ bóc lột giết người,… luôn luôn điểm trang cho cái huy chương mục nát của nó bằng những câu châm ngôn lý tưởng: bác ái, bình đẳng, v.v.”. Điền từ còn thiếu:", a: ["Chủ nghĩa dân tộc", "Chủ nghĩa tư bản", "Chủ nghĩa đế quốc", "Chủ nghĩa tư bản thực dân"], c: 3, r: "Bác dùng cụm từ 'Chủ nghĩa tư bản thực dân' để lột mặt nạ đạo đức giả của chúng ở các nước thuộc địa." },
                            { q: "Các Mác bàn nhiều về cuộc đấu tranh chống chủ nghĩa tư bản, Lênin bàn nhiều về cuộc đấu tranh chống chủ nghĩa đế quốc, Hồ Chí Minh tập trung bàn nhiều về cuộc đấu tranh nào? Chống…", a: ["Chống chủ nghĩa tư bản", "Chống chủ nghĩa dân tộc", "Chống chủ nghĩa thực dân", "Chống chủ nghĩa đế quốc"], c: 2, r: "Sự phát triển sáng tạo của Bác là tập trung mũi nhọn vào việc đánh đổ 'chủ nghĩa thực dân' ở các nước thuộc địa phương Đông." },
                            { q: "Theo tư tưởng Hồ Chí Minh, đối tượng cần phải đánh đổ của cách mạng ở thuộc địa là gì?", a: ["Chủ nghĩa thực dân", "Tay sai", "Địa chủ", "Chủ nghĩa thực dân và tay sai phản động"], c: 3, r: "Kẻ thù chính cần phải tiêu diệt trong cách mạng giải phóng dân tộc là đế quốc thực dân và bè lũ tay sai bán nước." },
                            { q: "Hồ Chí Minh đến với học thuyết cách mạng của chủ nghĩa Mác – Lênin và Người khẳng định: “Cách mạng giải phóng dân tộc muốn thắng lợi phải đi theo con đường…”. Điền từ còn thiếu:", a: ["Cách mạng thuộc địa", "Cách mạng tư sản", "Cách mạng giải phóng dân tộc", "Cách mạng vô sản"], c: 3, r: "Câu nói nổi tiếng: 'Muốn cứu nước và giải phóng dân tộc không có con đường nào khác con đường cách mạng vô sản'." },
                            { q: "Nguyễn Ái Quốc khẳng định: “Tất cả các đồng chí đều biết rằng hiện nay nọc độc và sức sống của con rắn độc….… đang tập trung ở các nước thuộc địa”. Điền từ còn thiếu:", a: ["Đế quốc", "Xâm lược", "Thực dân", "Tư bản chủ nghĩa"], c: 3, r: "Bác ví chủ nghĩa tư bản như một con rắn độc, cái đầu ở chính quốc nhưng sức sống và nọc độc lại tập trung ở các thuộc địa." },
                            { q: "Hồ Chí Minh khẳng định: “Chỉ có……. mới cứu nhân loại, đem lại cho mọi người không phân biệt chủng tộc và nguồn gốc sự tự do, bình đẳng, bác ái, đoàn kết, ấm no”. Điền từ còn thiếu:", a: ["Cách mạng vô sản", "Giải phóng giai cấp", "Chủ nghĩa cộng sản", "Giải phóng dân tộc"], c: 2, r: "Bác khẳng định vai trò tối cao của Chủ nghĩa cộng sản trong việc giải phóng hoàn toàn và đem lại tự do thực sự cho nhân loại." }
                        ]
                    },
                    7: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: "Phần 7: Con đường đi lên Chủ nghĩa Xã hội ở Việt Nam",
                        questions: [
                            { q: "“Chủ nghĩa xã hội là lấy nhà máy, xe lửa, ngân hàng…….. làm của chung. Ai làm nhiều thì ăn nhiều, ai làm ít thì ăn ít, ai không làm thì không ăn, tất nhiên là trừ những người già cả, đau yếu và trẻ con”. Định nghĩa này nhấn mạnh lĩnh vực nào?", a: ["Chính trị", "Xã hội", "Kinh tế", "Văn hóa"], c: 2, r: "Định nghĩa này của Bác nhấn mạnh đặc trưng về mặt kinh tế của Chủ nghĩa xã hội: chế độ công hữu về tư liệu sản xuất và nguyên tắc phân phối theo lao động." },
                            { q: "Quan niệm khái quát của Chủ tịch Hồ Chí Minh về chủ nghĩa xã hội là gì?", a: ["Là chế độ chính trị do nhân dân lao động làm chủ, không còn áp bức bóc lột, văn hóa, đạo đức phát triển cao...", "Là chế độ xã hội có nền kinh tế phát triển gắn với sự phát triển của khoa học kỹ thuật...", "Là chế độ chính trị phục vụ nhân dân, không còn áp bức bóc lột...", "Là chế độ không còn áp bức bóc lột, văn hóa, đạo đức phát triển cao, kinh tế phát triển gắn với khoa học kỹ thuật, do nhân dân lao động làm chủ."], c: 3, r: "Đây là định nghĩa khái quát, toàn diện nhất của Bác bao gồm cả 4 mặt: chính trị, kinh tế, văn hóa - đạo đức và các quan hệ xã hội." },
                            { q: "Trong quan niệm của Chủ tịch Hồ Chí Minh, chủ nghĩa xã hội có mấy mục tiêu cơ bản?", a: ["Hai mục tiêu", "Ba mục tiêu", "Bốn mục tiêu", "Năm mục tiêu"], c: 1, r: "Theo tư tưởng của Bác, Chủ nghĩa xã hội có 3 mục tiêu cơ bản về: Chính trị, Kinh tế và Văn hóa - Xã hội." },
                            { q: "Động lực quan trọng nhất của chủ nghĩa xã hội là gì?", a: ["Tiền vốn", "Tài nguyên thiên nhiên", "Khoa học – kỹ thuật", "Con người lao động"], c: 3, r: "Con người lao động vừa là mục tiêu, vừa là động lực quan trọng nhất, mang tính quyết định để xây dựng thành công Chủ nghĩa xã hội." },
                            { q: "Trong quan niệm của Bác, chủ nghĩa xã hội là chế độ chính trị mà trong đó:", a: ["Giai cấp công nhân là người làm chủ", "Giai cấp nông dân là người làm chủ", "Nhân dân lao động là người làm chủ", "Trí thức là người làm chủ"], c: 2, r: "Chủ nghĩa xã hội là chế độ dân chủ ưu việt nhất, nơi quyền lực thực sự thuộc về nhân dân lao động." },
                            { q: "Trong tư tưởng Hồ Chí Minh, nền kinh tế xã hội chủ nghĩa là nền kinh tế được tạo lập trên cơ sở đặc trưng nhất, đó là:", a: ["Nền công nghiệp hiện đại", "Nền nông nghiệp hiện đại", "Trên cơ sở công hữu về tư liệu sản xuất chủ yếu", "Nền công – nông nghiệp hiện đại"], c: 2, r: "Đặc trưng cốt lõi về kinh tế của Chủ nghĩa xã hội để phân biệt với Chủ nghĩa tư bản là chế độ công hữu về các tư liệu sản xuất chủ yếu." },
                            { q: "Theo quan điểm Hồ Chí Minh, trong thời kỳ quá độ, thành phần kinh tế được ưu tiên phát triển là:", a: ["Kinh tế hợp tác xã", "Kinh tế quốc doanh", "Kinh tế tư bản tư nhân", "Kinh tế cá thể, tiểu chủ"], c: 1, r: "Kinh tế quốc doanh (kinh tế nhà nước) mang tính chất xã hội chủ nghĩa, là thành phần lãnh đạo, định hướng nền kinh tế nên phải được ưu tiên phát triển." },
                            { q: "Quan niệm của chủ tịch Hồ Chí Minh về cách làm chủ nghĩa xã hội là:", a: ["Đem của dân, sức dân, tài dân làm lợi cho dân", "Quản lý nhà nước tập trung, bao cấp", "Phải dựa vào các nước xã hội chủ nghĩa", "Phải dựa vào các nước tiên tiến"], c: 0, r: "Đây là cách làm mang đậm tính nhân văn và triết lý dựa vào sức mạnh nội lực của Bác Hồ: lấy sức dân để mang lại hạnh phúc cho chính nhân dân." },
                            { q: "Theo Hồ Chí Minh, đâu là mâu thuẫn chủ yếu nhất trong thời kỳ quá độ ở nước ta?", a: ["Mâu thuẫn giai cấp trong xã hội", "Mâu thuẫn giữa cách mạng và phản cách mạng", "Mâu thuẫn giữa yêu cầu phát triển cao của đất nước với thực trạng nghèo nàn, lạc hậu", "Mâu thuẫn giữa các tầng lớp xã hội"], c: 2, r: "Do nước ta đi lên CNXH từ một nước nông nghiệp lạc hậu, nên mâu thuẫn lớn nhất là giữa khát vọng phát triển cao và nền tảng kinh tế yếu kém." },
                            { q: "Theo Hồ Chí Minh, nguyên tắc phân phối chủ yếu trong chủ nghĩa xã hội là gì?", a: ["Làm theo năng lực, hưởng theo nhu cầu", "Làm theo năng lực, hưởng theo lao động", "Phân phối bình quân", "Phân phối theo vốn và tài sản đóng góp"], c: 1, r: "Chủ nghĩa xã hội chưa đạt đến mức độ của cải dư thừa như Chủ nghĩa cộng sản, do đó nguyên tắc phân phối công bằng nhất là 'Ai làm nhiều hưởng nhiều, làm ít hưởng ít'." },
                            { q: "Theo Hồ Chí Minh, đặc trưng nổi bật nhất về chính trị trong chủ nghĩa xã hội là gì?", a: ["Nhà nước được xây dựng và hoạt động theo pháp luật", "Quyền lực nhà nước thuộc về nhân dân", "Chế độ công hữu về tư liệu sản xuất chủ yếu", "Đảng cộng sản lãnh đạo"], c: 3, r: "Sự lãnh đạo của Đảng Cộng sản là đặc trưng chính trị nổi bật nhất, mang tính tiên quyết để định hướng và bảo vệ chế độ xã hội chủ nghĩa." },
                            { q: "Trong cải tạo xã hội chủ nghĩa, Hồ Chí Minh chủ trương đối xử với giai cấp tư sản dân tộc như thế nào?", a: ["Xử bắn, xử tù họ", "Tịch thu tài sản của họ", "Cải tạo họ thành người lao động mới", "Coi họ là đối tượng nguy hiểm"], c: 2, r: "Bác luôn đề cao chính sách nhân đạo, cải tạo hòa bình để biến tầng lớp tư sản dân tộc thành những người lao động đóng góp cho xã hội mới." },
                            { q: "“Toàn Đảng, toàn dân ta đoàn kết phấn đấu xây dựng một nước Việt Nam hòa bình, thống nhất, dân chủ, độc lập và giàu mạnh, và góp phần xứng đáng vào sự nghiệp cách mạng thế giới”. Câu nói trên trích trong văn kiện nào?", a: ["Chính cương vắn tắt", "Tuyên ngôn độc lập", "Di chúc", "Lời kêu gọi toàn quốc kháng chiến"], c: 2, r: "Đây là điều mong muốn cuối cùng, là khát vọng tột bậc của Bác được ghi lại ở phần kết của bản Di chúc lịch sử." },
                            { q: "Năm 1960, Hồ Chí Minh nói: “Chỉ có chủ nghĩa xã hội, chủ nghĩa cộng sản mới giải phóng các dân tộc bị áp bức và… trên thế giới khỏi ách nô lệ”. Điền từ còn thiếu:", a: ["Chủ nghĩa xã hội", "Dân tộc", "Cộng sản chủ nghĩa", "Công nghiệp hóa, hiện đại hóa"], c: 0, r: "Mặc dù câu hỏi có chút nhầm lẫn từ gốc (đáp án trong ngân hàng là Chủ nghĩa xã hội, có thể câu đầy đủ là '...mới giải phóng các dân tộc bị áp bức tiến lên chủ nghĩa xã hội...'). Tuy nhiên, theo đáp án chuẩn của bộ đề là 'Chủ nghĩa xã hội'." },
                            { q: "Hồ Chí Minh khẳng định: “Yêu Tổ quốc, yêu nhân dân phải gắn liền với yêu…, vì có tiến lên chủ nghĩa xã hội thì nhân dân mình mỗi ngày một no ấm thêm...”. Điền từ còn thiếu:", a: ["Chủ nghĩa xã hội", "Dân tộc", "Cộng sản chủ nghĩa", "Công nghiệp hóa, hiện đại hóa"], c: 0, r: "Bác luôn khẳng định sự gắn bó hữu cơ: Yêu nước trong thời đại mới chính là yêu Chủ nghĩa xã hội." },
                            { q: "Theo quan điểm của Hồ Chí Minh: tiến lên… là bước phát triển tất yếu ở Việt Nam sau khi nước nhà đã giành độc lập theo con đường cách mạng vô sản. Điền từ còn thiếu:", a: ["Chủ nghĩa xã hội", "Chủ nghĩa cộng sản", "Dân chủ nhân dân", "Giải phóng dân tộc"], c: 0, r: "Tiến lên Chủ nghĩa xã hội là hệ quả logic và là bước phát triển tất yếu của cách mạng giải phóng dân tộc theo con đường vô sản." },
                            { q: "Hồ Chí Minh tiếp cận chủ nghĩa xã hội từ những phương diện nào?", a: ["Khát vọng giải phóng dân tộc Việt Nam", "Đạo đức", "Văn hoá", "Khát vọng giải phóng dân tộc Việt Nam, đạo đức và văn hoá"], c: 3, r: "Bác tiếp cận CNXH không chỉ từ góc độ lý luận kinh tế - chính trị Mác-xít mà còn gắn liền với khát vọng dân tộc, đạo đức và văn hóa nhân văn." },
                            { q: "Hồ Chí Minh nói: “Mục đích của chủ nghĩa xã hội là không ngừng nâng cao….... của nhân dân”. Điền từ còn thiếu:", a: ["Lối sống", "Nếp sống", "Mức sống", "Mức thu nhập"], c: 2, r: "Mục tiêu tối thượng của Chủ nghĩa xã hội là vì con người, không ngừng nâng cao mức sống (đời sống vật chất và tinh thần) cho nhân dân." },
                            { q: "Trong lý luận xây dựng con người xã hội chủ nghĩa, Hồ Chí Minh cho rằng: “Muốn có con người xã hội chủ nghĩa, phải có…”. Điền từ còn thiếu:", a: ["Lý luận chủ nghĩa Mác – Lênin", "Lý luận cách mạng xã hội chủ nghĩa", "Độc lập dân tộc", "Tư tưởng xã hội chủ nghĩa"], c: 3, r: "Bác nhấn mạnh tư tưởng đi trước một bước: Muốn xây dựng xã hội mới, trước hết phải xây dựng được những con người có tư tưởng xã hội chủ nghĩa." },
                            { q: "Theo tư tưởng Hồ Chí Minh, nguyên tắc phân phối chủ yếu trong chủ nghĩa xã hội là gì?", a: ["Làm theo năng lực, hưởng theo nhu cầu", "Làm theo năng lực, hưởng theo lao động", "Phân phối bình quân cho tất cả mọi người", "Phân phối ưu tiên lao động trí thức"], c: 1, r: "Nguyên tắc 'Làm theo năng lực, hưởng theo lao động' đảm bảo sự công bằng và khuyến khích người lao động cống hiến." },
                            { q: "Theo Hồ Chí Minh, nguồn lực quan trọng nhất để xây dựng chủ nghĩa xã hội là gì?", a: ["Khoa học – kỹ thuật", "Kinh tế", "Con người", "Văn hoá"], c: 2, r: "Mọi nguồn lực (vốn, tài nguyên, công nghệ) đều vô nghĩa nếu không có nguồn nhân lực (con người) làm chủ và khai thác chúng." },
                            { q: "Cương lĩnh xây dựng đất nước trong thời kỳ quá độ lên chủ nghĩa xã hội được thông qua tại Đại hội đại biểu toàn quốc của Đảng Cộng sản Việt Nam lần thứ mấy? Năm nào?", a: ["Đại hội lần thứ V, năm 1982", "Đại hội lần thứ VI, năm 1986", "Đại hội lần thứ VII, năm 1991", "Đại hội lần thứ VIII, năm 1992"], c: 2, r: "Đại hội VII năm 1991 đánh dấu cột mốc quan trọng khi Đảng ta chính thức thông qua Cương lĩnh xây dựng đất nước trong thời kỳ quá độ." },
                            { q: "Hồ Chí Minh khẳng định thời kỳ quá độ lên chủ nghĩa xã hội ở Việt Nam là một thời kỳ lịch sử như thế nào?", a: ["Lâu dài", "Lâu dài, đầy khó khăn", "Gian khổ", "Gay go"], c: 1, r: "Do xuất phát điểm thấp, bỏ qua giai đoạn phát triển tư bản chủ nghĩa, nên thời kỳ quá độ tất yếu phải diễn ra lâu dài và đầy khó khăn, thử thách." },
                            { q: "Trong xây dựng chủ nghĩa xã hội ở Việt Nam, Hồ Chí minh đã đề ra hai nguyên tắc có tính chất phương pháp luận nhằm mục đích gì?", a: ["Xác định bước đi và tìm cách làm phù hợp với Việt Nam", "Phát huy tính sáng tạo của nhân dân", "Nâng cao đời sống của nhân dân", "Xây dựng nước Việt Nam giàu mạnh"], c: 0, r: "Để tránh giáo điều, rập khuôn mô hình nước ngoài, Bác yêu cầu phải linh hoạt xác định bước đi và cách làm sao cho phù hợp với hoàn cảnh thực tiễn Việt Nam." },
                            { q: "Hồ Chí Minh đặt lên hàng đầu nhiệm vụ của cách mạng xã hội chủ nghĩa ở Việt Nam là gì?", a: ["Đào tạo con người", "Nâng cao đời sống nhân dân", "Phát triển kinh tế", "Phát triển khoa học – kỹ thuật"], c: 0, r: "Sự nghiệp 'Trồng người' (đào tạo con người) luôn được Bác coi là nhiệm vụ chiến lược, mang tính chất nền tảng hàng đầu." },
                            { q: "Mâu thuẫn của nước ta trong thời kỳ quá độ lên chủ nghĩa xã hội được Hồ Chí Minh đặc biệt lưu ý là gì?", a: ["Mâu thuẫn giữa nhu cầu phát triển cao của đất nước theo xu hướng tiến bộ và thực trạng kinh tế - xã hội quá thấp kém", "Mâu thuẫn giữa nhu cầu phát triển cao khoa học – kỹ thuật với trình độ yếu kém", "Thực trạng kinh tế xã hội kém phát triển", "Mâu thuẫn giữa các tầng lớp trong xã hội"], c: 0, r: "Đây là mâu thuẫn lớn nhất bao trùm toàn bộ thời kỳ quá độ, đòi hỏi nỗ lực phi thường để công nghiệp hóa, hiện đại hóa." },
                            { q: "Theo Hồ Chí Minh để hoàn thành được những mục tiêu của chủ nghĩa xã hội cần phải làm gì?", a: ["Phát huy động lực, triệt tiêu trở lực", "Phát huy sức mạnh đoàn kết của cả cộng đồng – dân tộc", "Phát huy quyền làm chủ và ý thức làm chủ của người lao động", "Xây dựng nền văn hoá tiên tiến, đậm đà bản sắc dân tộc"], c: 0, r: "Bác chỉ ra phương pháp biện chứng: Khơi dậy và phát huy tối đa các động lực (nhân dân, đoàn kết) đồng thời cương quyết loại bỏ các trở lực (tham ô, lãng phí, quan liêu)." },
                            { q: "“Một dân tộc dốt là một dân tộc yếu”. Câu trên được trích từ bài viết nào của Hồ Chí Minh?", a: ["Chống nạn thất học", "Thư gửi các học sinh", "Những nhiệm vụ cấp bách của Nhà nước Việt Nam Dân chủ Cộng hoà", "A và B"], c: 2, r: "Câu nói này được Bác phát biểu trong phiên họp đầu tiên của Hội đồng Chính phủ (3/9/1945) khi nêu ra 6 nhiệm vụ cấp bách." },
                            { q: "Điểm đặc sắc nhất trong tư tưởng Hồ Chí Minh về Nhà nước pháp quyền là gì?", a: ["Coi trọng luật pháp trong quản lý xã hội", "Đề cao đạo đức trong quản lý xã hội", "Đảm bảo tính nghiêm minh và hiệu lực của pháp luật", "Kết hợp nhuần nhuyễn cả pháp luật và đạo đức trong quản lý xã hội"], c: 2, r: "Điểm đặc sắc của Bác là không chỉ xây dựng hệ thống luật pháp mà còn đề cao tính nghiêm minh, đảm bảo pháp luật thực sự có hiệu lực đi vào cuộc sống." },
                            { q: "Hãy cho biết động lực bao trùm của chủ nghĩa xã hội theo tư tưởng Hồ Chí Minh?", a: ["Con người", "Kinh tế", "Dân chủ", "Tiến bộ, công bằng"], c: 0, r: "Mọi yếu tố khác (kinh tế, chính trị, văn hóa) đều hội tụ lại ở yếu tố con người. Con người là động lực bao trùm nhất." },
                            { q: "Đảng Cộng sản là sản phẩm của sự kết hợp giữa chủ nghĩa Mác và phong trào công nhân. Ai nói về quy luật ra đời của đảng Cộng sản như trên?", a: ["C. Mác", "Lê-nin", "S. Talin", "Hồ Chí Minh"], c: 1, r: "Đây là định nghĩa kinh điển của V.I. Lênin về quy luật ra đời của Đảng Cộng sản ở các nước tư bản phương Tây." },
                            { q: "“Chủ nghĩa Mác – Lenin kết hợp với phong trào công nhân và phong trào yêu nước dẫn tới sự ra đời của Đảng Cộng sản Việt Nam”. Câu trên trích từ tác phẩm nào?", a: ["Đường cách mệnh", "Thường thức chính trị", "Diễn văn chính trị đọc tại Đại hội III", "Ba mươi năm hoạt động của Đảng"], c: 3, r: "Quy luật ra đời đặc thù của Đảng ta (có thêm yếu tố phong trào yêu nước) được Bác đúc kết trong tác phẩm 'Ba mươi năm hoạt động của Đảng'." },
                            { q: "Ai soạn thảo “Chánh cương vắn tắt”, “Sách lược vắn tắt”, “Chương trình, điều lệ vắn tắt của Đảng”?", a: ["Trịnh Đình Cửu", "Trần Phú", "Nguyễn Ái Quốc", "Lê Hồng Phong"], c: 2, r: "Nguyễn Ái Quốc (Bác Hồ) là người trực tiếp khởi thảo các văn kiện mang tính Cương lĩnh đầu tiên này tại Hội nghị thành lập Đảng (đầu năm 1930)." },
                            { q: "Ai chủ trì hội nghị hợp nhất 3 tổ chức cộng sản của nước ta?", a: ["Trịnh Đình Cửu", "Trần Phú", "Nguyễn Ái Quốc", "Lê Hồng Phong"], c: 2, r: "Với uy tín tuyệt đối và tư cách phái viên của Quốc tế Cộng sản, Nguyễn Ái Quốc đã triệu tập và chủ trì thành công Hội nghị hợp nhất tại Hồng Kông." },
                            { q: "“Lực lượng của giai cấp công nhân và nhân dân lao động là rất to lớn, là vô cùng vô tận. Nhưng lực lượng ấy cần có Đảng lãnh đạo mới chắc chắn thắng lợi”. Câu trên trích từ đâu?", a: ["Hồ Chí Minh toàn tập, tập 9", "Đường cách mạng", "Chính cương sách lược vắn tắt", "Di chúc"], c: 0, r: "Nhận định này nhấn mạnh tầm quan trọng của Đảng như một đội tiên phong dẫn dắt lực lượng quần chúng khổng lồ, được tập hợp trong Hồ Chí Minh toàn tập (Tập 9)." }
                        ]
                    },
                    8: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: " Phần 8: Vai trò lãnh đạo của Đảng và Nhà nước của dân",
                        questions: [
                            { q: "Đảng Cộng sản Việt Nam, do Hồ Chí Minh sáng lập và lãnh đạo, hoạt động vì lợi ích của ai?", a: ["Vì lợi ích của bản thân Đảng", "Vì lợi ích của dân tộc Việt Nam", "Vì lợi ích của giai cấp công nhân", "Vì lợi ích của công nhân, nông dân, trí thức"], c: 1, r: "Bác luôn khẳng định Đảng ta không có lợi ích nào khác ngoài lợi ích của Tổ quốc, của nhân dân và của toàn dân tộc Việt Nam." },
                            { q: "Đảng lãnh đạo là nhân tố có ý nghĩa thế nào đối với thắng lợi cách mạng nước ta?", a: ["Có ý nghĩa quan trọng", "Có ý nghĩa rất quan trọng", "Có ý nghĩa quan trọng đặc biệt", "Có ý nghĩa quyết định hàng đầu thắng lợi của cách mạng nước ta"], c: 3, r: "Sự lãnh đạo đúng đắn của Đảng Cộng sản Việt Nam là nhân tố hàng đầu quyết định mọi thắng lợi của cách mạng nước ta." },
                            { q: "Hồ Chí Minh diễn đạt như thế nào về vấn đề “Đảng của ai”?", a: ["Đảng lao động là tổ chức cao nhất của giai cấp công nhân và nhân dân lao động...", "Đảng là Đảng của giai cấp lao động, mà cũng là Đảng của toàn dân...", "Đảng là Đảng của người lao động...", "Đảng là Đảng của giai cấp lao động, mà cũng là Đảng của toàn dân. Đảng lao động Việt Nam là Đảng của giai cấp công nhân và nhân dân lao động, nên nó phải là Đảng của dân tộc Việt Nam..."], c: 3, r: "Hồ Chí Minh luôn khẳng định Đảng là đội tiên phong của giai cấp công nhân, đồng thời là đại biểu trung thành lợi ích của nhân dân lao động và của cả dân tộc." },
                            { q: "Vì sao số đông nhân dân Việt Nam coi Đảng Cộng sản Việt Nam là Đảng của mình?", a: ["Vì Đảng tự nhận như thế", "Vì Đảng đang là lực lượng lãnh đạo đất nước", "Vì sách báo nói nhiều nên trở thành thói quen", "Vì Đảng hoạt động vì lợi ích của họ"], c: 3, r: "Nhân dân tự nguyện đi theo và gọi Đảng là 'Đảng của mình' vì họ nhận thấy rõ Đảng luôn hành động vì quyền lợi của chính bản thân họ." },
                            { q: "Trong các thuật ngữ chỉ vai trò Đảng lãnh đạo mà chủ tịch Hồ Chí Minh thường dùng sau đây thì thuật ngữ nào phản ánh rõ nhất, chính xác nhất vai trò lãnh đạo của Đảng?", a: ["Đảng nắm quyền, Đảng lãnh đạo chính quyền và Đảng phục vụ nhân dân", "Đảng nắm quyền, Đảng lãnh đạo chính quyền và Đảng cầm quyền", "Đảng lãnh đạo chính quyền, Đảng cầm quyền và Đảng phục vụ nhân dân", "Đảng cầm quyền, Đảng phục vụ nhân dân và Đảng lãnh đạo chính quyền"], c: 1, r: "Các thuật ngữ này phản ánh chính xác vị thế và trọng trách lãnh đạo toàn diện của Đảng đối với Nhà nước và xã hội." },
                            { q: "Trong tư tưởng Hồ Chí Minh, là người lãnh đạo, Đảng phải có những phẩm chất gì?", a: ["Tư cách, đạo đức, năng lực cần thiết. Đảng phải gắn bó mật thiết với nhân dân...", "Phải có khả năng làm cho dân tin, dân mến, dân phục, dân theo...", "Đảng phải gắn bó mật thiết với nhân dân...", "Tư cách, đạo đức, năng lực cần thiết. Phải có khả năng làm cho dân tin, dân mến, dân phục, dân theo. Đảng phải gắn bó mật thiết với nhân dân, nghe ý kiến của dân, học nhân dân, chịu sự kiểm soát của nhân dân…"], c: 3, r: "Để lãnh đạo được nhân dân, Đảng không chỉ cần có trí tuệ, năng lực mà còn phải có đạo đức cách mạng trong sáng, gắn bó máu thịt với dân." },
                            { q: "Chọn đáp án SAI trong những đáp án được rút ra từ mệnh đề sau: “Đảng ta vừa là người lãnh đạo, vừa là người đầy tớ thật trung thành của nhân dân”", a: ["Là tận tâm, tận lực phụng sự quần chúng", "Đầy tớ là tôi tớ, tôi đòi, theo đuôi quần chúng", "Là việc gì có lợi cho dân thì phải hết sức làm, việc gì có hại cho dân thì phải hết sức tránh", "Là khổ trước thiên hạ, vui sau thiên hạ"], c: 1, r: "Khái niệm 'Đầy tớ' của Bác mang nghĩa là tận tụy phục vụ nhân dân, chứ không phải là sự tôi tớ, theo đuôi quần chúng một cách mù quáng." },
                            { q: "Theo Hồ Chí Minh, nền tảng tư tưởng của Đảng Cộng sản Việt Nam là", a: ["Tinh hoa văn hóa dân tộc Việt Nam", "Tinh hoa văn hóa nhân loại", "Là tinh hoa dân tộc và tinh hoa văn hóa nhân loại", "Là chủ nghĩa Mác – Lenin"], c: 3, r: "Chủ nghĩa Mác – Lenin là cái 'cốt', là nền tảng tư tưởng và kim chỉ nam cho mọi hành động của Đảng." },
                            { q: "Trong tư tưởng Hồ Chí Minh, luận điểm: sự lãnh đạo của Đảng là nhân tố hàng đầu đưa cách mạng nước ta đến thắng lợi, là để", a: ["Xác định vị thế cầm quyền của Đảng", "Xác định mục đích của Đảng", "Xác định vai trò lãnh đạo của Đảng", "Xác định nhiệm vụ của Đảng"], c: 2, r: "Luận điểm này nhằm khẳng định rõ ràng vai trò lãnh đạo mang tính sống còn của Đảng đối với tiến trình cách mạng." },
                            { q: "Bản chất của Đảng Cộng sản Việt Nam được thể hiện ở chỗ:", a: ["Số lượng Đảng viên của Đảng", "Năng lực lãnh đạo của Đảng viên", "Nền tảng tư tưởng, đường lối lãnh đạo, nguyên tắc tổ chức của Đảng", "Số lượng Đảng viên là công nhân chiếm đa số trong Đảng"], c: 2, r: "Bản chất giai cấp công nhân của Đảng không nằm ở số lượng xuất thân, mà ở nền tảng tư tưởng Mác-Lênin, đường lối và nguyên tắc hoạt động." },
                            { q: "Trong tư tưởng Hồ Chí Minh, có mấy nội dung xây dựng Đảng?", a: ["2 nội dung", "3 nội dung", "4 nội dung", "5 nội dung"], c: 2, r: "Theo tư tưởng Hồ Chí Minh, công tác xây dựng Đảng bao gồm 4 nội dung cơ bản: chính trị, tư tưởng, tổ chức và đạo đức." },
                            { q: "“Đảng muốn vững, phải có chủ nghĩa làm cốt... Đảng mà không có chủ nghĩa cũng như người không có trí khôn, tàu không có bàn chỉ nam”. Chủ nghĩa mà Hồ Chí Minh nói ở đây là chủ nghĩa gì?", a: ["Chủ nghĩa quốc gia – dân tộc", "Chủ nghĩa tam dân", "Chủ nghĩa quốc tế", "Chủ nghĩa Mác – Lenin"], c: 3, r: "Chủ nghĩa Mác – Lenin là hệ tư tưởng khoa học soi đường, là nền tảng cốt lõi của Đảng." },
                            { q: "Trong xây dựng Đảng về chính trị, vấn đề nào là “cốt tử”?", a: ["Xây dựng và thực hiện nghị quyết của Đảng", "Xây dựng đường lối chính trị", "Củng cố lập trường chính trị", "Nâng cao bản lĩnh chính trị của Đảng viên"], c: 1, r: "Đường lối chính trị đúng đắn là sinh mệnh, là yếu tố cốt tử quyết định mọi thành bại của cách mạng." },
                            { q: "Trong tư tưởng Hồ Chí Minh, có mấy nguyên tắc xây dựng Đảng?", a: ["5 nguyên tắc", "6 nguyên tắc", "7 nguyên tắc", "4 nguyên tắc"], c: 0, r: "Có 5 nguyên tắc cốt lõi: Tập trung dân chủ; Tập thể lãnh đạo cá nhân phụ trách; Tự phê bình và phê bình; Kỷ luật nghiêm minh tự giác; Đoàn kết thống nhất." },
                            { q: "Đảng ta là một Đảng cầm quyền, các đồng chí từ chi bộ đến trung ương phải giữ gìn sự đoàn kết nhất trí trong Đảng như giữ gìn con ngươi của mắt mình. Câu trên trích từ tác phẩm nào của Hồ Chí Minh?", a: ["Diễn văn chính trị tại Đại hội III của Đảng", "Bài nói chuyện tại trường Nguyễn Ái Quốc trung ương năm 1957", "Di chúc", "Bài nói chuyện với cán bộ cao cấp quân đội nhân dân Việt Nam"], c: 2, r: "Đây là lời căn dặn thiết tha về sự đoàn kết trong phần nói về Đảng của bản Di chúc lịch sử." },
                            { q: "Trong tư tưởng Hồ Chí Minh, đặc trưng nổi bậc nhất của đạo đức cộng sản là gì?", a: ["Tình thương dành cho công nhân", "Tình thương dành cho người nghèo", "Tình thương dành cho con người", "Chủ nghĩa nhân đạo chiến đấu"], c: 3, r: "Đạo đức cộng sản không chỉ là tình thương chung chung, mà là 'chủ nghĩa nhân đạo chiến đấu', đấu tranh để giải phóng con người khỏi áp bức." },
                            { q: "Trong lực lượng toàn dân tộc, Hồ Chí Minh hết sức nhấn mạnh vai trò động lực cách mạng của công nhân và nông dân, Người khẳng định: “công nông là…....”", a: ["Then chốt", "Gốc cách mệnh", "Nòng cốt", "Yếu tố quyết định"], c: 1, r: "Trong tác phẩm Đường Kách mệnh, Bác khẳng định 'Công nông là gốc cách mệnh', là lực lượng đông đảo và cách mạng triệt để nhất." },
                            { q: "Đảng Cộng sản Việt Nam lấy Chủ nghĩa Mác – Lênin và tư tưởng Hồ Chí Minh làm nền tảng tư tưởng và kim chỉ nam cho hành động. Quan điểm trên được đề ra tại Đại hội... lần thứ mấy?", a: ["Đại hội VI (12/1986)", "Đại hội VII (6/1991)", "Đại hội VIII (6/1996)", "Đại hội IX (4/2001)"], c: 1, r: "Tại Đại hội VII (1991), Đảng ta đã chính thức đưa Tư tưởng Hồ Chí Minh vào Cương lĩnh, cùng với Chủ nghĩa Mác-Lênin làm nền tảng tư tưởng." },
                            { q: "Đảng Cộng sản Việt Nam đã vận dụng tư tưởng Hồ Chí Minh về xây dựng khối đại đoàn kết dân tộc trong công cuộc đổi mới hiện nay như thế nào?", a: ["Đại đoàn kết phải được củng cố và phát triển nhằm rửa được cái nhục đói nghèo, lạc hậu, tụt hậu...", "Chăm lo xây dựng khối đoàn kết giữa các dân tộc...", "Khơi dậy sức mạnh đại đoàn kết dân tộc...", "Phát huy vai trò lãnh đạo của Đảng Cộng sản Việt Nam."], c: 0, r: "Trong thời kỳ đổi mới, Đại đoàn kết mang sứ mệnh lớn lao là tạo sức mạnh tổng hợp để vượt qua nghèo nàn, lạc hậu, đưa đất nước vươn lên." },
                            { q: "Chủ tịch Hồ Chí Minh chỉ rõ: chủ nghĩa Mác – Lênin kết hợp với phong trào công nhân và phong trào yêu nước đã dẫn tới việc thành lập Đảng... được thể hiện trong tác phẩm nào?", a: ["Đường Kách mệnh", "Thường thức chính trị", "Nâng đạo đức cách mạng", "Sửa đổi lối làm việc"], c: 1, r: "Quy luật ra đời đặc thù của Đảng Cộng sản Việt Nam được Bác đúc kết và trình bày rõ trong tác phẩm Thường thức chính trị." },
                            { q: "Hồ Chí Minh được bầu làm Chủ tịch Đảng vào thời gian nào?", a: ["Tháng 8/1945", "Tháng 2/1951", "Tháng 9/1960", "Tháng 7/1954"], c: 1, r: "Tại Đại hội đại biểu toàn quốc lần thứ II của Đảng (tháng 2/1951), Bác được bầu làm Chủ tịch Ban Chấp hành Trung ương Đảng." },
                            { q: "Phong trào công nhân kết hợp với phong trào yêu nước vì hai phong trào có mục tiêu chung. Mục tiêu đó là gì?", a: ["Độc lập dân tộc và chủ nghĩa xã hội", "Giải phóng nhân dân lao động khỏi áp bức bóc lột", "Giải phóng dân tộc làm cho Việt Nam hoàn toàn độc lập, xây dựng đất nước hùng cường", "Xoá bỏ giai cấp thống trị"], c: 2, r: "Sự kết hợp này có được nhờ điểm giao thoa chung nhất là lòng yêu nước, khát vọng giải phóng dân tộc khỏi ách thực dân." },
                            { q: "“Đảng ta xứng đáng là đội tiên phong, là bộ tham mưu của giai cấp vô sản, của nhân dân lao động và của cả dân tộc”. Điều đó được Hồ Chí Minh khẳng định vào năm nào?", a: ["1930", "1951", "1960", "1965"], c: 3, r: "Khẳng định tự hào này được Bác viết nhân dịp kỷ niệm 35 năm ngày thành lập Đảng (1965)." },
                            { q: "Theo tư tưởng Hồ Chí Minh, nhân tố nào đảm bảo thắng lợi của cách mạng Việt Nam?", a: ["Giữ vững và tăng cường vai trò lãnh đạo của Đảng", "Nâng cao vai trò quản lý của Nhà nước", "Phát huy tính tích cực chủ động của các tổ chức chính trị - xã hội", "Đội ngũ cán bộ đủ đức, đủ tài"], c: 0, r: "Vai trò lãnh đạo của Đảng Cộng sản Việt Nam luôn là nhân tố then chốt, quyết định mọi thắng lợi của cách mạng." },
                            { q: "Khi nói đến phong trào yêu nước, Hồ Chí Minh đã đề cập đến lực lượng chủ yếu nào?", a: ["Công nhân", "Nông dân", "Tiểu tư sản và nhà buôn", "Trí thức"], c: 1, r: "Ở một nước nông nghiệp như Việt Nam, nông dân là lực lượng đông đảo nhất, mang trong mình truyền thống yêu nước mãnh liệt." },
                            { q: "Theo tư tưởng Hồ Chí Minh, giai cấp công nhân và giai cấp nông dân hợp thành đội quân nào của cách mạng?", a: ["Đội quân tiên phong của cách mạng", "Đội quân chủ lực của cách mạng", "Đội quân lãnh đạo cách mạng", "Đội quân số 1 của cách mạng"], c: 1, r: "Liên minh công - nông là khối liên minh nền tảng, tạo thành đội quân chủ lực, đông đảo nhất của cách mạng." },
                            { q: "Đảng ta trở thành Đảng cầm quyền từ năm nào?", a: ["1930", "1935", "1945", "1946"], c: 2, r: "Sau thành công của Cách mạng tháng Tám năm 1945, nhân dân ta giành được chính quyền, Đảng chính thức trở thành Đảng cầm quyền." },
                            { q: "Theo tư tưởng Hồ Chí Minh, công tác gốc của Đảng Cộng sản Việt Nam là gì?", a: ["Hoạch định đường lối đúng đắn", "Xây dựng đội ngũ cán bộ vừa “hồng” vừa “chuyên”", "Công tác cán bộ", "Giải phòng giai cấp"], c: 0, r: "Đường lối chính trị đúng đắn là công tác gốc, là kim chỉ nam để dẫn dắt toàn bộ phong trào cách mạng đi đúng hướng." },
                            { q: "Nội dung công tác xây dựng Đảng theo tư tưởng Hồ Chí Minh là gì?", a: ["Về tư tưởng, lý luận, chính trị, tổ chức, bộ máy, công tác cán bộ, đạo đức", "Về công tác tổ chức cán bộ", "Về lý luận và thực tiễn", "Về phương pháp đấu tranh cách mạng"], c: 0, r: "Xây dựng Đảng phải được tiến hành toàn diện trên tất cả các mặt: tư tưởng, lý luận, chính trị, tổ chức, đạo đức và cán bộ." },
                            { q: "Mặt trận Việt Minh đầu tiên được Hồ Chí Minh xây dựng thí điểm ở đâu?", a: ["Thái Nguyên", "Cao Bằng", "Tuyên Quang", "Lạng Sơn"], c: 1, r: "Sau khi về nước năm 1941, Bác đã chọn Cao Bằng làm nơi xây dựng thí điểm các tổ chức Cứu quốc của Mặt trận Việt Minh." },
                            { q: "“Đảng là trí tuệ, lương tâm, danh dự cả dân tộc và thời đại”. Hãy cho biết luận điểm trên là của ai?", a: ["C. Mác", "V. I. Lênin", "J. Stalin", "Hồ Chí Minh"], c: 3, r: "Dựa trên tinh thần của Lênin, Bác Hồ đã phát triển và tự hào khẳng định về Đảng Cộng sản Việt Nam như trí tuệ, lương tâm của dân tộc và thời đại." },
                            { q: "Theo Hồ Chí Minh, trong sự nghiệp kháng chiến, kiến quốc “lực lượng chính là ở dân”. Người khẳng định: “Không dùng toàn lực của…......về đủ mọi mặt để ứng phó, không thể nào thắng lợi được”.", a: ["Nhân dân", "Cách mạng", "Dân tộc", "Tầng lớp trí thức"], c: 0, r: "Sức mạnh của nhân dân là vô địch. Bác luôn nhắc nhở phải dựa vào sức dân, huy động toàn lực của nhân dân mới mong giành thắng lợi." },
                            { q: "Thế nào là Nhà nước pháp quyền có hiệu lực pháp lý mạnh mẽ theo tư tưởng Hồ Chí Minh?", a: ["Là một Nhà nước hợp pháp, hợp hiến", "Hoạt động quản lý Nhà nước bằng hiến pháp, pháp luật và chú trọng đưa pháp luật vào cuộc sống", "Xây dựng đội ngũ cán bộ, công chức đủ đức và tài", "Là một Nhà nước hợp pháp, hợp hiến, hoạt động quản lý Nhà nước bằng hiến pháp, pháp luật và chú trọng đưa pháp luật vào cuộc sống, xây dựng đội ngũ cán bộ, công chức đủ đức và tài"], c: 3, r: "Nhà nước pháp quyền của Bác không chỉ đòi hỏi sự hợp hiến mà còn phải thực thi pháp luật nghiêm minh với đội ngũ cán bộ trong sạch." },
                            { q: "Theo tư tưởng Hồ Chí Minh, dân chủ được thể hiện và bảo đảm trong đạo luật cơ bản nào?", a: ["Hiến pháp", "Luật dân sự và tố tụng dân sự", "Luật kinh doanh", "Luật hôn nhân và gia đình"], c: 0, r: "Hiến pháp là đạo luật cơ bản, mang tính tối cao, là công cụ pháp lý quan trọng nhất để ghi nhận và bảo đảm quyền dân chủ của nhân dân." },
                            { q: "Bản chất giai cấp công nhân của Nhà nước thể hiện ở nguyên tắc tổ chức hoạt động cơ bản nào?", a: ["Tập thể lãnh đạo, cá nhân phụ trách", "Tập trung dân chủ", "Tự phê bình và phê bình", "Đoàn kết thống nhất"], c: 1, r: "Tập trung dân chủ là nguyên tắc rường cột, là đặc trưng bản chất của Nhà nước kiểu mới mang bản chất giai cấp công nhân." },
                            { q: "Để thực hành dân chủ rộng rãi, theo Hồ Chí Minh cần phải dựa trên nền tảng nào?", a: ["Khối đoàn kết nhất trí trong Đảng", "Khối đại đoàn kết toàn dân tộc, nòng cốt là liên minh công – nông – trí thức", "Hệ thống pháp luật", "Chủ nghĩa Mác – Lênin"], c: 1, r: "Dân chủ thực sự chỉ có thể được thực hành khi dựa trên sức mạnh của khối đại đoàn kết toàn dân do liên minh công - nông - trí thức làm nòng cốt." },
                            { q: "Dân chủ ở nước ta được thể hiện ở những hình thức nào?", a: ["Dân chủ trực tiếp", "Dân chủ gián tiếp", "Dân chủ trực tiếp và dân chủ gián tiếp", "Dân chủ cho mọi tầng lớp nhân dân"], c: 2, r: "Nhân dân thực hiện quyền làm chủ thông qua việc bầu ra người đại diện (dân chủ gián tiếp) và trực tiếp tham gia quyết định các vấn đề lớn (dân chủ trực tiếp)." },
                            { q: "Hồ Chí Minh căn dặn: “Làm việc phải có công tâm, công đức... Chớ vì sợ mất địa vị mà dìm những kẻ có tài hơn mình, phải trung thành với Chính phủ, với đồng bào”. Lời căn dặn trên được trích trong tác phẩm nào?", a: ["Di chúc", "Đời sống mới", "Đường Kách mệnh", "Sửa đổi lối làm việc"], c: 3, r: "Trong tác phẩm Sửa đổi lối làm việc (1947), Bác nghiêm khắc cảnh tỉnh về công tác cán bộ, lên án tư tưởng vị kỷ, địa vị, hẹp hòi." },
                            { q: "Biểu hiện của “Hiếu với dân” theo tư tưởng Hồ Chí Minh là gì?", a: ["Thương dân, tin dân, phục vụ nhân dân hết lòng", "Phải làm theo tất cả những điều dạy bảo của dân", "Trước tiên phải phụng dưỡng tốt cho cha mẹ", "Hiểu dân, lấy dân làm gốc, làm theo dân"], c: 0, r: "Hiếu với dân trong tư tưởng Bác là khái niệm mở rộng từ hiếu với cha mẹ. Đó là phải kính trọng, yêu thương và tận tụy phục vụ nhân dân hết lòng." }
                        ]
                    },
                    9: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: "Phần 9: Văn hóa, Đạo đức và Xây dựng con người mới",
                        questions: [
                            { q: "Hồ Chí minh trình bày khái niệm văn hoá năm nào?", a: ["Tháng 8/1941", "Tháng 8/1942", "Tháng 8/1943", "Tháng 8/1944"], c: 2, r: "Khái niệm văn hóa được Bác định nghĩa rõ ràng vào tháng 8 năm 1943." },
                            { q: "Định nghĩa văn hóa của Hồ Chí Minh đã khắc phục được những quan niệm phiến diện nào?", a: ["Coi văn hóa là hiện tượng thuần túy tinh thần. Đồng nhất văn hóa với văn học – nghệ thuật. Đồng nhất văn hóa với yếu tốt truyền thống dân tộc.", "Đồng nhất văn hóa với văn học – nghệ thuật. Đồng nhất văn hóa với học vấn. Đồng nhất văn hóa với yếu tốt truyền thống dân tộc.", "Đồng nhất văn hóa với học vấn. Coi văn hóa là hiện tượng thuần túy tinh thần. Đồng nhất văn hóa với yếu tốt truyền thống dân tộc.", "Đồng nhất văn hóa với văn học – nghệ thuật. Đồng nhất văn hóa với học vấn. Coi văn hóa là hiện tượng thuần túy tinh thần."], c: 3, r: "Bác cho rằng văn hóa là tổng hợp mọi phương thức sinh hoạt của loài người, qua đó khắc phục việc đồng nhất văn hóa chỉ với học vấn hay nghệ thuật." },
                            { q: "Nội dung nền văn hóa mới, theo quan niệm của Hồ Chí Minh gồm mấy vấn đề?", a: ["3 vấn đề", "4 vấn đề", "5 vấn đề", "6 vấn đề"], c: 2, r: "Chương trình xây dựng nền văn hóa nước Việt Nam (1943) được Bác vạch ra bao gồm 5 điểm (5 vấn đề) cốt lõi." },
                            { q: "Hồ Chí Minh quan niệm văn hóa phải ở trong chính trị và kinh tế. Điều đó có nghĩa là gì?", a: ["Văn hóa phải phục vụ chính trị", "Văn hóa phải thúc đẩy kinh tế phát triển", "Kinh tế và chính trị cũng phải có tính văn hóa", "Văn hóa phải phục vụ chính trị, văn hóa phải thúc đẩy kinh tế phát triển, kinh tế và chính trị cũng phải có tính văn hóa"], c: 3, r: "Văn hóa không thể đứng ngoài mà phải gắn liền, phục vụ chính trị, thúc đẩy kinh tế; ngược lại, kinh tế, chính trị cũng cần thấm đẫm tính văn hóa." },
                            { q: "Trong quan niệm của chủ tịch Hồ Chí Minh, nền văn hóa mới có mấy tính chất?", a: ["2 tính chất", "3 tính chất", "4 tính chất", "5 tính chất"], c: 1, r: "Nền văn hóa mới phải bao gồm đủ 3 tính chất: Dân tộc, Khoa học và Đại chúng." },
                            { q: "“Văn hóa phục vụ ai? Cố nhiên, chúng ta phải nói là phục vụ công nông binh, tức là phục vụ đại đa số nhân dân”. Câu trên trích từ tác phẩm nào của chủ tịch Hồ Chí Minh?", a: ["Hồ Chí Minh toàn tập, tập 7", "Nhật ký trong tù", "Hồ Chí Minh toàn tập, tập 9", "Di chúc"], c: 0, r: "Quan điểm này khẳng định tính đại chúng của nền văn hóa, được tập hợp trong Hồ Chí Minh toàn tập (Tập 7)." },
                            { q: "Tính khoa học của nền văn hóa đối lập với những vấn đề gì trong văn hóa?", a: ["Phản tiến bộ. Quan niệm thần bí, mê tín, dị đoan. Quan điểm duy vật.", "Quan điểm duy tâm. Phản tiến bộ. Quan điểm duy vật.", "Quan niệm thần bí, mê tín, dị đoan. Quan điểm duy tâm. Quan điểm duy vật.", "Quan điểm duy tâm. Phản tiến bộ. Quan niệm thần bí, mê tín, dị đoan."], c: 3, r: "Tính khoa học đòi hỏi phải bài trừ các yếu tố duy tâm, phản tiến bộ và mê tín dị đoan." },
                            { q: "Theo quan niệm của Hồ Chí Minh, nền văn hóa mới có mấy chức năng?", a: ["1 chức năng", "2 chức năng", "3 chức năng", "4 chức năng"], c: 2, r: "Theo giáo trình, văn hóa có 3 chức năng cơ bản." },
                            { q: "Nội dung chức năng của văn hóa theo quan niệm của Hồ Chí Minh là gì?", a: ["Bồi dưỡng tư tưởng đúng đắn và tình cảm cao đẹp", "Nâng cao dân trí", "Bồi dưỡng phẩm chất, phong cách và lối sống đẹp, hướng con người đến chân, thiện, mỹ", "Bồi dưỡng tư tưởng đúng đắn và tình cảm cao đẹp, nâng cao dân trí, bồi dưỡng phẩm chất, phong cách và lối sống đẹp, hướng con người đến chân, thiện, mỹ."], c: 3, r: "Chức năng của văn hóa bao trùm mọi mặt nhằm hoàn thiện con người về tư tưởng, trí tuệ và đạo đức lối sống." },
                            { q: "Theo Hồ Chí Minh, văn hóa gồm mấy lĩnh vực?", a: ["2 lĩnh vực", "3 lĩnh vực", "4 lĩnh vực", "5 lĩnh vực"], c: 1, r: "Văn hóa được chia thành 3 lĩnh vực chủ yếu: Văn hóa giáo dục, văn hóa văn nghệ và văn hóa đời sống." },
                            { q: "Hồ Chí Minh chỉ ra những hạn chế nào của nền giáo dục phong kiến?", a: ["Từ chương, kinh viện. Xa rời thực tế. Không tạo ra cái mới", "Xa rời thực tế. Bất bình đẳng, trọng nam, khinh nữ. Không tạo ra cái mới", "Bất bình đẳng, trọng nam, khinh nữ. Xa rời thực tế. Không tạo ra cái mới", "Bất bình đẳng, trọng nam, khinh nữ. Xa rời thực tế. Từ chương, kinh viện"], c: 3, r: "Giáo dục phong kiến bị Bác phê phán vì mang tính nhồi sέt (từ chương), xa rời đời sống thực tiễn và phân biệt đối xử giới tính." },
                            { q: "Hồ Chí Minh đánh giá cao nhất yếu tố nào trong giá trị văn hóa dân tộc?", a: ["Ý thức đoàn kết cộng đồng", "Yêu lao động", "Lòng yêu nước", "Lòng thương người"], c: 2, r: "Lòng yêu nước (chủ nghĩa yêu nước) là dòng chảy chính, là giá trị cốt lõi và cao quý nhất của dân tộc Việt Nam." },
                            { q: "Đặc trưng chủ yếu của tư tưởng đạo đức Hồ Chí Minh là gì?", a: ["Lòng thương yêu con người", "Lòng thương yêu nhân dân lao động", "Chủ nghĩa nhân đạo chiến đấu", "Sự thống nhất giữa nói và làm"], c: 2, r: "Đạo đức Hồ Chí Minh không chỉ là lòng thương người thụ động mà là 'chủ nghĩa nhân đạo chiến đấu' (đấu tranh để giải phóng con người)." },
                            { q: "Trong tư tưởng Hồ Chí Minh, đạo đức cách mạng có vai trò gì?", a: ["Là nền tảng lý luận của người cách mạng", "Là phương châm hành động của người cách mạng", "Là cái gốc, là nền tảng của người cách mạng", "Là lẽ sống của người cách mạng"], c: 2, r: "Bác luôn khẳng định: Cũng như sông phải có nguồn, cây phải có gốc. Đạo đức chính là cái gốc của người cách mạng." },
                            { q: "Có mấy nguyên tắc xây dựng đạo đức mới?", a: ["2 nguyên tắc", "3 nguyên tắc", "4 nguyên tắc", "5 nguyên tắc"], c: 1, r: "Gồm 3 nguyên tắc: Nói đi đôi với làm; Xây đi đôi với chống; Tự rèn luyện, tu dưỡng đạo đức suốt đời." },
                            { q: "Con người Việt Nam trong thời đại mới cần có mấy phẩm chất đạo đức?", a: ["3 phẩm chất", "4 phẩm chất", "5 phẩm chất", "6 phẩm chất"], c: 1, r: "Bao gồm 4 phẩm chất: Trung với nước hiếu với dân; Cần kiệm liêm chính chí công vô tư; Yêu thương con người; Tinh thần quốc tế trong sáng." },
                            { q: "“Cũng như sông thì có nguồn mới có nước, không có nguồn thì sông cạn. Cây phải có gốc, không có gốc thì cây héo. Người cách mạng phải có đạo đức...”. Câu trên trích từ tác phẩm nào?", a: ["Đường cách mạng", "Chính cương sách lược vắn tắt", "Di chúc", "Đạo đức cách mạng"], c: 3, r: "Ví von này được Bác sử dụng trong tác phẩm 'Đạo đức cách mạng' viết năm 1958." },
                            { q: "Theo Hồ Chí Minh, trong tình hình thực tế, yếu tố nào của chủ nghĩa xã hội có sức hấp dẫn đặc biệt?", a: ["Lý tưởng cao đẹp", "Mức sống vật chất dồi dào", "Những giá trị đạo đức cao đẹp", "Tư tưởng được tự do giải phóng"], c: 2, r: "Trong bối cảnh đất nước còn nghèo, chính sức mạnh của những giá trị đạo đức cao đẹp mới là thứ tạo ra sức hấp dẫn lớn nhất đối với quần chúng." },
                            { q: "Nội dung của lòng trung với nước, hiếu với dân trong tư tưởng Hồ Chí Minh?", a: ["Suốt đời phấn đấu cho Đảng, cho cách mạng. Phục vụ lợi ích của nhân dân. Dựa vào dân", "Thương dân, tin dân, dựa vào dân. Suốt đời phấn đấu cho Đảng, cho cách mạng. Phục vụ lợi ích của nhân dân", "Dựa vào dân, coi dân là gốc của nước. Suốt đời phấn đấu cho Đảng, cho cách mạng. Phục vụ lợi ích của nhân dân", "Thương dân, tin dân, dựa vào dân. Dựa vào dân, coi dân là gốc của nước. Suốt đời phấn đấu cho Đảng, cho cách mạng"], c: 3, r: "Trung với nước hiếu với dân đòi hỏi sự tận tụy trọn đời cho sự nghiệp, đồng thời luôn yêu thương và lấy dân làm gốc." },
                            { q: "“Trời có bốn mùa: Xuân, Hạ, Thu, Đông / Đất có bốn phương Đông, Tây, Nam, Bắc / Thiếu một mùa thì không thành trời... Thiếu một đức thì không thành người”. Những câu trên trích từ tác phẩm nào của Hồ Chí Minh?", a: ["Đạo đức cách mạng", "Nâng cao đạo đức cách mạng, quét sạch chủ nghĩa cá nhân", "Bài nói chuyện tại trường Đại học nhân dân Việt Nam năm 1956", "Bài nói chuyện tại đại học Bách khoa Hà Nội"], c: 2, r: "Bài thơ giải thích về chữ 'Cần, Kiệm, Liêm, Chính' này được Bác đọc khi nói chuyện tại Đại học nhân dân Việt Nam (1956)." },
                            { q: "“Hiểu chủ nghĩa Mác – Lenin là phải sống với nhau có nghĩa, có tình. Nếu thuộc bao nhiêu sách mà sống không có tình, có nghĩa thì sao gọi là hiểu chủ nghĩa Mác – Lenin được”. Câu trên trích từ tác phẩm nào?", a: ["Đạo đức cách mạng", "Nâng cao đạo đức cách mạng, quét sạch chủ nghĩa cá nhân", "Hồ Chí Minh toàn tập, tập 12", "Di chúc"], c: 2, r: "Đây là lời nhắc nhở thấm thía của Bác về việc học lý luận phải gắn với đạo đức, lối sống nhân ái, nằm trong Hồ Chí Minh toàn tập (Tập 12)." },
                            { q: "Theo quan niệm của Hồ Chí Minh, trong mỗi con người chỉ có:", a: ["Cái thiện", "Cái ác", "Có tốt, có xấu", "Tùy thuộc từng người"], c: 2, r: "Bác cho rằng con người luôn có tính hai mặt: phần thiện (tốt) và phần ác (xấu) cùng tồn tại." },
                            { q: "“Khi ngủ ai cũng như lương thiện / Tỉnh dậy phân ra kẻ dữ, hiền / Hiền dữ đâu phải là tính sẵn / Phần nhiều do giáo dục mà nên”. Ai là tác giả bài thơ trên?", a: ["Khổng Tử", "Hồ Chí Minh", "Lý Bạch", "Vãn Thiên Tường"], c: 1, r: "Đây là bài thơ nổi tiếng mang tên 'Nửa đêm' trích trong tập Nhật ký trong tù do chính Hồ Chí Minh sáng tác." },
                            { q: "Hồ Chí Minh cho rằng, muốn xây dựng nền đạo đức mới, phải tuân thủ những nguyên tắc nào?", a: ["Nói đi đôi với làm. Tự rèn luyện đạo đức. Nói được làm được", "Xây đi đôi với chống. Tự rèn luyện đạo đức. Nói được làm được", "Tự rèn luyện đạo đức. Xây đi đôi với chống. Vừa hồng vừa chuyên", "Nói đi đôi với làm. Xây đi đôi với chống. Tự rèn luyện đạo đức"], c: 3, r: "Ba nguyên tắc vàng: Lời nói phải đi đôi với việc làm; xây dựng cái tốt phải kết hợp bài trừ cái xấu; và phải tự rèn luyện không ngừng." },
                            { q: "“Nói chung thì các dân tộc phương Đông đều giàu tình cảm, đối với họ một tấm gương sống còn có giá trị hơn một trăm bài diễn văn tuyên truyền”. Câu trên trích từ tác phẩm nào của Hồ Chủ tịch?", a: ["Hồ Chí Minh toàn tập, tập 1", "Di chúc", "Đạo đức cách mạng", "Nâng cao đạo đức cách mạng, quét sạch chủ nghĩa cá nhân"], c: 0, r: "Lời nhắc nhở về sự gương mẫu của cán bộ này được in trong Hồ Chí Minh toàn tập (Tập 1)." },
                            { q: "“Đạo đức cách mạng không phải ở trên trời sa xuống. Nó do đấu tranh, rèn luyện bền bỉ hàng ngày mà phát triển và củng cố...”. Câu trên trích từ tác phẩm nào?", a: ["Di chúc", "Đạo đức cách mạng", "Nâng cao đạo đức cách mạng, quét sạch chủ nghĩa cá nhân", "Hồ Chí Minh toàn tập, tập 9"], c: 3, r: "Câu nói kinh điển về quá trình rèn luyện đạo đức gian khổ được tổng hợp trong Hồ Chí Minh toàn tập (Tập 9)." },
                            { q: "“Chính tâm tu thân đức là cải tạo. Cải tạo cũng phải trường kỳ gian khổ. Vì đó là một cuộc cách mạng trong bản thân mỗi người...”. Câu trên trích từ đâu?", a: ["Di chúc", "Hồ Chí Minh toàn tập, tập 7", "Đạo đức cách mạng", "Nâng cao đạo đức cách mạng, quét sạch chủ nghĩa cá nhân"], c: 1, r: "Quá trình tự cải tạo, tu dưỡng đạo đức cá nhân luôn được Bác coi là một cuộc cách mạng nội tâm gay go (Hồ Chí Minh toàn tập, Tập 7)." },

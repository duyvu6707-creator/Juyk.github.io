<!DOCTYPE html>
<html lang="vi">
<head>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Doraemon EvoWars: Divine Magic Pro</title>
    <style>
        :root {
            --dora-blue: #0099FF; --dora-red: #FF3333; --dora-yellow: #FFCC00;
            --lightning: #00f2ff; --magic-gold: #ffcc00;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020208;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            user-select: none; touch-action: none;
        }
        #game-container { 
            position: relative; width: 100vw; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            overflow: hidden;
        }
        canvas { display: block; background: radial-gradient(circle at center, #0a1220 0%, #020208 100%); }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        /* --- MÀN HÌNH ENTRY --- */
        #entry-screen {
            position: absolute; z-index: 500; pointer-events: auto;
            background: #020208; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        .entry-bg {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0, 153, 255, 0.15) 0%, transparent 70%);
            animation: pulseBg 10s infinite ease-in-out;
        }
        @keyframes pulseBg { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- START MENU --- */
        #start-menu {
            position: absolute; z-index: 100; pointer-events: auto;
            background: radial-gradient(circle at center, rgba(0, 40, 100, 0.3) 0%, rgba(2, 2, 8, 0.98) 100%);
            width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center; color: white;
            transition: opacity 0.8s ease;
        }
        .menu-frame {
            position: relative; padding: 8vmin 12vmin;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(0, 153, 255, 0.25);
            border-radius: 5vmin; display: flex; flex-direction: column; align-items: center;
            backdrop-filter: blur(15px); box-shadow: 0 0 12vmin rgba(0, 153, 255, 0.15);
        }
        .menu-frame::before {
            content: ''; position: absolute; width: 115%; height: 115%;
            border: 1px dashed rgba(255, 204, 0, 0.15); border-radius: 50%;
            animation: spin 40s linear infinite; pointer-events: none;
        }
        .game-title {
            font-size: 11vmin; font-weight: 950; margin: 0;
            background: linear-gradient(to bottom, #fff 20%, var(--magic-gold) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 4vmin rgba(255, 204, 0, 0.4));
            letter-spacing: 0.3vmin; text-transform: uppercase; text-align: center;
            animation: titlePulse 4s ease-in-out infinite;
        }
        @keyframes titlePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); filter: brightness(1.2); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-action {
            background: linear-gradient(135deg, var(--magic-gold), #ff8800); 
            color: #000; border: none; padding: 2.5vmin 12vmin;
            font-size: 4vmin; font-weight: 950; border-radius: 100px; cursor: pointer;
            box-shadow: 0 1.2vmin 4vmin rgba(255, 136, 0, 0.3); 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; margin-top: 6vmin; letter-spacing: 0.4vmin;
            position: relative; overflow: hidden;
        }
        .btn-action:hover { transform: scale(1.05); box-shadow: 0 0 6vmin var(--magic-gold); }
        .btn-action:active { transform: scale(0.95); }

        /* --- STREAMING_CHUNK: Styling the character naming input --- */
        #name-input-container {
            margin-top: 4vmin;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        #player-name-input {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 153, 255, 0.4);
            border-radius: 2vmin;
            padding: 2vmin 4vmin;
            color: white;
            font-size: 4vmin;
            text-align: center;
            width: 80%;
            outline: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        #player-name-input:focus {
            border-color: var(--magic-gold);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.3);
            background: rgba(255, 255, 255, 0.1);
        }

        #minimap-ui {
            position: absolute; top: 3vmin; left: 3vmin; 
            width: 28vmin; height: 28vmin;
            max-width: 200px; max-height: 200px; 
            min-width: 140px; min-height: 140px;
            background: rgba(0, 5, 15, 0.9); 
            border: 2px solid rgba(0, 242, 255, 0.6);
            border-radius: 4px; overflow: hidden; 
            display: none; backdrop-filter: blur(15px); 
            z-index: 600; box-shadow: 0 0 25px rgba(0, 153, 255, 0.2);
        }

        #hud { position: absolute; bottom: 4vmin; left: 4vmin; display: none; width: 40%; max-width: 400px; pointer-events: none; z-index: 600;}
        .exp-bar-container { width: 100%; height: 2.5vmin; background: rgba(0,0,0,0.7); border-radius: 3vmin; border: 2px solid rgba(255,255,255,0.2); overflow: hidden; margin-top: 1vmin; position: relative; }
        #exp-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00f2ff, #007acc, #00f2ff); background-size: 200% 100%; animation: barFlow 2s linear infinite; }

        @keyframes barFlow { from { background-position: 0% 0%; } to { background-position: 200% 0%; } }

        #kill-notif {
            position: absolute; top: 18%; left: 50%; transform: translateX(-50%) scale(0) skewX(-20deg);
            padding: 2.5vmin 12vmin; font-size: 7vmin; font-weight: 950; color: white; text-align: center;
            text-shadow: 2px 2px 0px #000; opacity: 0; pointer-events: none; font-style: italic;
            border-top: 3px solid #fff; border-bottom: 3px solid #fff;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 150;
        }
        .active-streak { opacity: 1 !important; transform: translateX(-50%) scale(1) skewX(-20deg) !important; }

        #skill-buttons { 
            position: absolute; bottom: 8vmin; right: 8vmin; 
            display: none; pointer-events: none; 
            align-items: flex-end; z-index: 700; 
        }
        .skill-btn { 
            position: relative; width: 18vmin; height: 18vmin; 
            max-width: 120px; max-height: 120px; min-width: 70px; min-height: 70px;
            background: rgba(255, 255, 255, 0.1); border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 7vmin; border: 3px solid rgba(255,255,255,0.8); 
            pointer-events: auto; backdrop-filter: blur(8px); 
            transition: transform 0.05s; margin-left: 5vmin;
        }
        .skill-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.2); }
        .cd-overlay { position: absolute; bottom: 0; width: 100%; height: 0%; background: rgba(0,0,0,0.6); border-radius: 50%; }

        #joystick-container { 
            position: absolute; bottom: 8vmin; left: 8vmin; 
            width: 28vmin; height: 28vmin; 
            background: rgba(255,255,255,0.05); border-radius: 50%; 
            display: none; pointer-events: auto; 
            border: 2px solid rgba(255,255,255,0.2); z-index: 700; 
        }
        #joystick-knob { 
            position: absolute; width: 40%; height: 45%; 
            background: radial-gradient(circle at 30% 30%, #fff 0%, #bbb 100%); 
            border-radius: 50%; top: 27.5%; left: 27.5%; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #game-over-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            opacity: 0; pointer-events: none; background: rgba(8, 2, 2, 0.95); 
            transition: all 0.5s ease; z-index: 1000; backdrop-filter: blur(20px); 
        }
        #game-over-screen.visible { opacity: 1; pointer-events: auto; }
        .death-panel { 
            background: linear-gradient(145deg, #1a0505, #080202); 
            padding: 6vmin 8vmin; border-radius: 5vmin; border: 3px solid var(--dora-red); 
            text-align: center; color: #fff; width: 80%; max-width: 500px;
        }
        .stat-circle {
            width: 22vmin; height: 22vmin; border: 1vmin solid #fff; border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 3vmin auto; position: relative;
        }

        #orientation-warning {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; color: white; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        @media screen and (max-width: 900px) and (orientation: portrait) {
            #orientation-warning { display: flex; }
        }
    </style>
</head>
<body>
    <div id="entry-screen">
        <div class="entry-bg"></div>
        <div class="menu-frame" style="border-radius: 8vmin;">
            <h1 class="game-title" style="margin-bottom: 4vmin;">EVOWARS<br>DIVINE MAGIC</h1>
            <button class="btn-action" id="entry-btn" style="padding: 2vmin 12vmin; font-size: 4.5vmin;">VÀO GAME</button>
        </div>
    </div>

    <div id="orientation-warning">
        <div style="font-size: 15vmin; margin-bottom: 5vmin;">🔄</div>
        <div style="font-size: 5vmin; font-weight: bold;">Vui lòng xoay ngang điện thoại!</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="start-menu">
                <div class="menu-frame">
                    <h1 class="game-title">Doraemon<br>EvoWars</h1>
                    <p style="color: rgba(255,255,255,0.5); margin-top: 1.5vmin; font-weight: 600; font-size: 3vmin;">DIVINE EDITION</p>
                    
                    <div id="name-input-container">
                        <input type="text" id="player-name-input" maxlength="12" placeholder="NHẬP TÊN..." autocomplete="off">
                    </div>

                    <button class="btn-action" id="start-btn">XUẤT CHIẾN</button>
                </div>
            </div>

            <div id="game-over-screen">
                <div class="death-panel">
                    <h2 style="font-size: 7vmin; color: var(--dora-red); font-weight: 900;">THẤT BẠI</h2>
                    <div class="stat-circle">
                        <span style="font-size: 3vmin; color: #aaa;">CẤP ĐỘ</span>
                        <span id="final-lv" style="font-size: 9vmin; font-weight: 900;">1</span>
                    </div>
                    <div id="final-tier" style="font-size: 4vmin; color: var(--magic-gold); margin-bottom: 4vmin;">LASER BLUE</div>
                    <button class="btn-action" id="rebirth-btn" style="margin: 0; padding: 2vmin 10vmin;">CHƠI LẠI</button>
                </div>
            </div>

            <div id="minimap-ui"><canvas id="minimapCanvas"></canvas></div>

            <div id="hud">
                <div id="rank-name" style="font-size: 3.5vmin; font-weight: 900; color: #00f2ff;">Laser Blue Lv.1</div>
                <div class="exp-bar-container"><div id="exp-fill"></div></div>
            </div>

            <div id="kill-notif">GODLIKE!</div>

            <div id="joystick-container"><div id="joystick-knob"></div></div>
            <div id="skill-buttons">
                <div class="skill-btn" id="btn-bolt" style="color:var(--lightning); border-color:var(--lightning);">⚡<div class="cd-overlay" id="bolt-cd"></div></div>
                <div class="skill-btn" id="btn-attack" style="font-size:10vmin; border-color: #f55;">⚔️<div class="cd-overlay" id="atk-cd"></div></div>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false, desynchronized: true });
    const mmCanvas = document.getElementById('minimapCanvas');
    const mmCtx = mmCanvas.getContext('2d');

    const WORLD_SIZE = 7000;
    const BOT_COUNT = 36;
    const FOOD_COUNT = 850; 
    const GRID_SIZE = 700;

    const TIERS = [
        { lv: 10, color: "#00E5FF", name: "Laser Blue" }, { lv: 20, color: "#C0C0C0", name: "Laser Silver" }, 
        { lv: 30, color: "#00FF41", name: "Laser Green" }, { lv: 40, color: "#FFD700", name: "Laser Gold" }, 
        { lv: 50, color: "#D500F9", name: "Laser Purple" }, { lv: 60, color: "#FF9100", name: "Laser Orange" }, 
        { lv: 70, color: "#00FFFF", name: "Laser Cyan" }, { lv: 80, name: "Laser Pink", color: "#FF4081" }, 
        { lv: 90, color: "#FF1744", name: "Laser Red God" }, { lv: 100, color: "rainbow", name: "DIVINE RAINBOW" }
    ];

    let player = null, foods = [], bots = [], trails = [], embers = [], isPlaying = false;
    let keys = {}, mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    let camera = { x: 0, y: 0, zoom: 1 };
    let joystick = { active: false, angle: 0, identifier: null, cx: 0, cy: 0 };
    let foodGrid = new Map(), gridPattern = null;
    let playerName = "Doraemon";

    const isMobile = ('ontouchstart' in window || navigator.maxTouchPoints > 0);

    function distSq(x1, y1, x2, y2) { return (x1 - x2)**2 + (y1 - y2)**2; }

    function resolveCollisions() {
        const all = [player, ...bots].filter(e => e && e.alive);
        for (let i = 0; i < all.length; i++) {
            for (let j = i + 1; j < all.length; j++) {
                const e1 = all[i], e2 = all[j];
                const dx = e2.x - e1.x; const dy = e2.y - e1.y;
                const d2 = dx * dx + dy * dy;
                const minD = e1.radius + e2.radius;
                if (d2 < minD * minD && d2 > 0) {
                    const dist = Math.sqrt(d2);
                    const overlap = (minD - dist) * 0.45;
                    const nx = dx / dist; const ny = dy / dist;
                    e1.x -= nx * overlap; e1.y -= ny * overlap;
                    e2.x += nx * overlap; e2.y += ny * overlap;
                }
            }
        }
    }

    function createPattern() {
        const pSize = 1000;
        const pCanvas = document.createElement('canvas'); pCanvas.width = pSize; pCanvas.height = pSize;
        const pCtx = pCanvas.getContext('2d');
        pCtx.fillStyle = "#020208"; pCtx.fillRect(0,0,pSize,pSize);
        pCtx.strokeStyle = "rgba(0, 153, 255, 0.1)"; pCtx.strokeRect(0,0,pSize,pSize);
        pCtx.fillStyle = "#fff";
        for(let i=0; i < (isMobile ? 120 : 250); i++) { pCtx.globalAlpha = Math.random(); pCtx.beginPath(); pCtx.arc(Math.random()*pSize, Math.random()*pSize, Math.random()*1.3, 0, 7); pCtx.fill(); }
        gridPattern = ctx.createPattern(pCanvas, 'repeat');
    }

    function isVisible(px, py, pad = 1500) {
        if (!player) return false;
        const vw = (window.innerWidth / camera.zoom) * 0.5 + pad;
        const vh = (window.innerHeight / camera.zoom) * 0.5 + pad;
        return px > camera.x - vw && px < camera.x + vw && py > camera.y - vh && py < camera.y + vh;
    }

    function updateFoodGrid() {
        if (!isPlaying) return;
        foodGrid.clear();
        for (let f of foods) {
            if (f.eaten && f.xp < 100) continue;
            const gx = (f.x / GRID_SIZE) | 0, gy = (f.y / GRID_SIZE) | 0;
            const key = (gx << 16) | gy;
            if (!foodGrid.has(key)) foodGrid.set(key, []);
            foodGrid.get(key).push(f);
        }
    }

    function drawEnergyParticle(x, y, color, isSuper = false) {
        const fColor = color === 'rainbow' ? `hsl(${Date.now()/6 % 360}, 100%, 55%)` : color;
        const size = isSuper ? 14 : 6;
        ctx.save(); ctx.translate(x, y);
        if (isSuper) {
            const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, size * 3.5);
            glow.addColorStop(0, fColor); glow.addColorStop(1, "transparent");
            ctx.globalAlpha = 0.4; ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(0, 0, size * 3.5, 0, 7); ctx.fill();
            ctx.globalAlpha = 1; ctx.fillStyle = fColor; ctx.beginPath(); ctx.arc(0, 0, size, 0, 7); ctx.fill();
        } else {
            ctx.fillStyle = fColor; ctx.beginPath(); ctx.arc(0, 0, size, 0, 7); ctx.fill();
        }
        ctx.restore();
    }

    class Entity {
        constructor(x, y, isPlayer = false, name = "") {
            this.x = x; this.y = y; this.isPlayer = isPlayer;
            this.name = name;
            this.level = 1; this.xp = 0; this.targetXp = 100;
            this.angle = Math.random() * Math.PI * 2; this.radius = 32;
            this.alive = true; this.shield = 0;
            this.atkCd = 0; this.teleCd = 0;
            this.swing = -Math.PI/2; this.isAttacking = false;
            this.auraAngle = 0; this.streak = 0; this.lastKill = 0;
            this.isOverlord = false; this.isElite = false; 
            this.isEnforcer = false; 
            this.aiTarget = null;
            this.aiTick = 0; 
        }

        getStats() {
            const scale = 1 + (this.level * 0.038);
            const tierIdx = Math.min(9, Math.floor((this.level - 1) / 10));
            const tier = TIERS[tierIdx];
            const speed = (isMobile ? 6.3 : 4.8 + (this.level >= 40 ? (this.level - 40) * 0.06 : 0)) / Math.sqrt(scale);
            
            let baseColor = tier.color;
            if (this.level >= 41 && baseColor !== 'rainbow') {
                const r = parseInt(baseColor.slice(1, 3), 16);
                const g = parseInt(baseColor.slice(3, 5), 16);
                const b = parseInt(baseColor.slice(5, 7), 16);
                const nr = Math.floor(r + (255 - r) * 0.35);
                const ng = Math.floor(g + (255 - g) * 0.35);
                const nb = Math.floor(b + (255 - b) * 0.35);
                baseColor = `rgb(${nr}, ${ng}, ${nb})`;
            }

            return { scale, speed, color: baseColor, name: tier.name, laserLen: 95 + this.level * 6 };
        }

        update() {
            if (!this.alive) return;
            this.auraAngle += 0.045; 
            const stats = this.getStats();
            this.radius = 32 * stats.scale;
            if (this.isPlayer) { 
                this.handleInput(stats.speed); 
                if (Date.now() - this.lastKill > 8000) this.streak = 0; 
            } else {
                this.handleAI(stats);
            }
            
            this.x = Math.max(this.radius, Math.min(WORLD_SIZE - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(WORLD_SIZE - this.radius, this.y));
            
            if (this.atkCd > 0) this.atkCd--; if (this.teleCd > 0) this.teleCd--;
            if (this.isAttacking) {
                this.swing += isMobile ? 0.75 : 0.65; 
                this.checkCombat(stats);
                if (this.swing >= Math.PI / 2) { this.isAttacking = false; this.swing = -Math.PI / 2; }
            }
            
            if (isVisible(this.x, this.y, 800) && Math.random() < (isMobile ? 0.12 : 0.22) && embers.length < 70) {
                const pColor = stats.color === 'rainbow' ? `hsl(${Date.now() / 6 % 360}, 100%, 55%)` : stats.color;
                embers.push({ x: this.x + (Math.random()-0.5)*this.radius*2.5, y: this.y + (Math.random()-0.5)*this.radius*2.5, vx: (Math.random()-0.5)*1.2, vy: -Math.random()*2, life: 50, color: pColor });
            }
        }

        handleInput(speed) {
            let tx = 0, ty = 0;
            if (keys['w']) ty--; if (keys['s']) ty++; if (keys['a']) tx--; if (keys['d']) tx++;
            
            if (joystick.active) {
                this.angle = joystick.angle;
                this.x += Math.cos(this.angle) * speed;
                this.y += Math.sin(this.angle) * speed;
            } else if (tx !== 0 || ty !== 0) {
                this.angle = Math.atan2(ty, tx);
                const mm = (this.isAttacking ? 0.65 : 1.0);
                this.x += Math.cos(this.angle) * speed * mm;
                this.y += Math.sin(this.angle) * speed * mm;
            } else if (!isMobile && isPlaying) {
                const dx = mouse.x - window.innerWidth / 2;
                const dy = mouse.y - window.innerHeight / 2;
                if (Math.abs(dx) > 15 || Math.abs(dy) > 15) {
                    this.angle = Math.atan2(dy, dx);
                    const mm = (this.isAttacking ? 0.65 : 1.0);
                    this.x += Math.cos(this.angle) * speed * mm;
                    this.y += Math.sin(this.angle) * speed * mm;
                }
            }
        }

        handleAI(stats) {
            this.aiTick++;
            let targetAngle = this.angle;
            const isNormalBot = !this.isOverlord && !this.isElite && !this.isEnforcer;

            if (this.aiTick % 10 === 0 || !this.aiTarget) {
                let nearestEntity = null;
                let minDistSq = Infinity;
                const potentialTargets = [player, ...bots].filter(e => e && e.alive && e !== this);
                
                for (const target of potentialTargets) {
                    const d2 = distSq(this.x, this.y, target.x, target.y);
                    if (d2 < minDistSq) {
                        minDistSq = d2;
                        nearestEntity = target;
                    }
                }
                this.aiTarget = nearestEntity;
            }

            const aggroRange = (this.isOverlord || this.isEnforcer) ? 2200 : 1600;
            const giveUpRange = (this.isOverlord || this.isEnforcer) ? 1400 : 1800; 

            if (this.aiTarget && isVisible(this.x, this.y, 1000)) {
                const d2 = distSq(this.x, this.y, this.aiTarget.x, this.aiTarget.y);
                
                if ((this.isOverlord || this.isEnforcer) && d2 > giveUpRange**2) {
                    this.aiTarget = null;
                }

                if (this.aiTarget && d2 < aggroRange**2) {
                    if (this.aiTarget.level < this.level + 3 || !isNormalBot) {
                        targetAngle = Math.atan2(this.aiTarget.y - this.y, this.aiTarget.x - this.x);
                        let atkRate = isNormalBot ? 0.05 : 0.1;
                        if (d2 < (stats.laserLen + 150)**2 && Math.random() < atkRate) this.attack();
                    } else {
                        targetAngle = Math.atan2(this.y - this.aiTarget.y, this.x - this.aiTarget.x);
                    }
                } else {
                    this.huntFood();
                    targetAngle = this.angle;
                }
            } else {
                this.huntFood();
                targetAngle = this.angle;
            }
            
            const margin = 500;
            if (this.x < margin) targetAngle = 0; if (this.x > WORLD_SIZE - margin) targetAngle = Math.PI;
            if (this.y < margin) targetAngle = Math.PI / 2; if (this.y > WORLD_SIZE - margin) targetAngle = -Math.PI / 2;
            
            let diff = targetAngle - this.angle;
            while (diff > Math.PI) diff -= Math.PI * 2; while (diff < -Math.PI) diff += Math.PI * 2;
            this.angle += diff * 0.14;
            this.x += Math.cos(this.angle) * stats.speed; this.y += Math.sin(this.angle) * stats.speed;
        }

        huntFood() {
            if (Math.random() > (isMobile ? 0.04 : 0.06)) return;
            let nearestDist = Infinity; let targetFood = null;
            const gx = (this.x / GRID_SIZE) | 0, gy = (this.y / GRID_SIZE) | 0;
            for (let ox = -1; ox <= 1; ox++) {
                for (let oy = -1; oy <= 1; oy++) {
                    const cell = foodGrid.get(((gx+ox) << 16) | (gy+oy));
                    if (cell) for (let f of cell) if (!f.eaten) { 
                        const d2 = distSq(this.x, this.y, f.x, f.y); 
                        if (d2 < nearestDist) { nearestDist = d2; targetFood = f; } 
                    }
                }
            }
            if (targetFood) this.angle = Math.atan2(targetFood.y - this.y, targetFood.x - this.x);
        }

        attack() { if (this.atkCd <= 0) { this.isAttacking = true; this.atkCd = 35; this.swing = -Math.PI / 2; } }

        useTeleport() {
            if (this.teleCd > 0) return;
            const stats = this.getStats(); const oldX = this.x, oldY = this.y;
            const teleportDist = 750;
            this.x += Math.cos(this.angle) * teleportDist; 
            this.y += Math.sin(this.angle) * teleportDist;
            
            const lColor = stats.color === 'rainbow' ? `hsl(${Date.now() / 6 % 360}, 100%, 65%)` : stats.color;
            
            const boltCount = isMobile ? 1 : 2;
            for(let j=0; j < boltCount; j++) {
                const pts = [];
                const segments = 12; 
                const dx = this.x - oldX;
                const dy = this.y - oldY;
                const angle = Math.atan2(dy, dx);

                for(let i=0; i <= segments; i++) {
                    const t = i / segments;
                    let px = oldX + dx * t;
                    let py = oldY + dy * t;
                    if(i > 0 && i < segments) {
                        const offset = (Math.random() - 0.5) * 110;
                        px += Math.cos(angle + Math.PI/2) * offset;
                        py += Math.sin(angle + Math.PI/2) * offset;
                    }
                    pts.push({x: px, y: py});
                }
                trails.push({ pts, life: 15, color: lColor, isLightning: true });
            }
            
            this.teleCd = 240; if (this.isPlayer && 'vibrate' in navigator) navigator.vibrate(55);
        }

        checkCombat(stats) {
            const rangeLimit = stats.laserLen + this.radius + 120;
            const targets = [player, ...bots];
            for (let t of targets) {
                if (!t || !t.alive || t === this) continue;
                if (distSq(this.x, this.y, t.x, t.y) < rangeLimit**2) {
                    const aToT = Math.atan2(t.y - this.y, t.x - this.x);
                    let diff = (this.angle + this.swing) - aToT;
                    while (diff > Math.PI) diff -= Math.PI * 2;
                    while (diff < -Math.PI) diff += Math.PI * 2;
                    if (Math.abs(diff) < Math.PI / 2) { 
                        t.die(this); if (this.isPlayer) this.registerKill(); 
                    }
                }
            }
        }

        registerKill() {
            this.streak++; this.lastKill = Date.now();
            const titles = ["", "", "DOUBLE KILL", "TRIPLE KILL", "QUADRA KILL", "PENTA KILL", "GODLIKE!"];
            const colors = ["", "", "#00f2ff", "#ffcc00", "#D500F9", "#FF1744", "#ff0000"];
            const idx = Math.min(this.streak, 6);
            if (idx >= 2) {
                const kn = document.getElementById('kill-notif'); kn.innerText = titles[idx];
                kn.style.textShadow = `0 0 10px ${colors[idx]}`;
                kn.classList.remove('active-streak'); void kn.offsetWidth; kn.classList.add('active-streak');
                setTimeout(() => kn.classList.remove('active-streak'), 2800);
            }
        }

        die(killer) {
            this.alive = false;
            if (this.isPlayer) {
                setTimeout(() => {
                    isPlaying = false;
                    document.getElementById('final-lv').innerText = this.level;
                    document.getElementById('final-tier').innerText = this.getStats().name;
                    document.getElementById('game-over-screen').classList.add('visible');
                }, 1000);
            } else {
                let isBotVsBot = killer && !killer.isPlayer;
                let dropCount = isBotVsBot ? 3 : 8; 
                let xpValue = (500 + this.level * 10) * (isBotVsBot ? 0.3 : 1);
                for (let i = 0; i < dropCount; i++) spawnFood(this.x + (Math.random()-0.5)*350, this.y + (Math.random()-0.5)*350, true, xpValue);
                setTimeout(() => spawnBot(), 3000);
            }
        }

        addXp(val) {
            let mult = (this.level <= 40) ? 5.5 : 1.85; 
            this.xp += val * mult;
            if (this.xp >= this.targetXp) { 
                this.xp = 0; this.level = Math.min(100, this.level + 1); 
                this.targetXp = 100 + this.level * (this.level < 40 ? 60 : 215); 
                if (this.isPlayer && 'vibrate' in navigator) navigator.vibrate(35); 
            }
        }

        drawParticleOrbit(r, color, scale, time, ringIndex) {
            ctx.save();
            const isAdvanced = this.level >= 41;
            const currentR = r * scale * (1.1 + ringIndex * 0.45);
            const rotation = time * (ringIndex % 2 ? -0.8 : 0.8) * (isAdvanced ? 1.4 : 1);
            const pulse = 1 + Math.sin(time * 3 + ringIndex) * (isAdvanced ? 0.05 : 0.02);
            
            ctx.strokeStyle = color; 
            ctx.lineWidth = (isMobile ? 1 : 1.5) * (isAdvanced ? 2.5 : 1); 
            ctx.globalAlpha = isAdvanced ? 0.4 : 0.15; 
            ctx.beginPath(); ctx.arc(0, 0, currentR * pulse, 0, 7); ctx.stroke();
            
            const dustCount = (isMobile ? 8 : 15) * (isAdvanced ? 2.2 : 1);
            for(let i=0; i<dustCount; i++) {
                const dAng = (i / dustCount) * Math.PI * 2 + rotation * 1.5;
                const dx = Math.cos(dAng) * currentR * pulse; const dy = Math.sin(dAng) * currentR * pulse;
                ctx.fillStyle = "#fff"; 
                ctx.globalAlpha = (0.4 + Math.random() * 0.4) * (isAdvanced ? 1.4 : 1);
                ctx.beginPath(); ctx.arc(dx, dy, isAdvanced ? 2.2 : 1, 0, 7); ctx.fill();
            }

            const pCount = (5 + ringIndex * 2) * (isAdvanced ? 1.8 : 1);
            for(let i=0; i<pCount; i++) {
                ctx.save(); 
                const pAng = (i / pCount) * Math.PI * 2 + rotation; 
                const px = Math.cos(pAng) * currentR * pulse; const py = Math.sin(pAng) * currentR * pulse;
                const pSize = (10 + ringIndex * 2) * pulse * (isAdvanced ? 1.8 : 1);
                
                const pGrad = ctx.createRadialGradient(px, py, 0, px, py, pSize); 
                pGrad.addColorStop(0, "#fff"); 
                pGrad.addColorStop(0.3, color); 
                pGrad.addColorStop(1, "transparent");
                
                ctx.globalAlpha = isAdvanced ? 1.0 : 0.85; 
                ctx.fillStyle = pGrad; 
                ctx.beginPath(); ctx.arc(px, py, pSize, 0, 7); ctx.fill(); 
                
                ctx.fillStyle = "#fff"; ctx.globalAlpha = 1;
                ctx.beginPath(); ctx.arc(px, py, isAdvanced ? 3.2 : 1.5, 0, 7); ctx.fill();
                ctx.restore();
            }
            ctx.restore();
        }

        drawMagicArray(r, color, scale, time) {
            ctx.save(); 
            const isAdvanced = this.level >= 41;
            const pulse = 1 + Math.sin(time * 3) * (isAdvanced ? 0.08 : 0.05); 
            const baseR = r * scale * pulse;
            const patternSeed = isAdvanced ? (this.level - 40) : 0;
            
            const wideGlow = ctx.createRadialGradient(0, 0, 0, 0, 0, baseR * (isAdvanced ? 4.5 : 2.5));
            wideGlow.addColorStop(0, color); wideGlow.addColorStop(1, "transparent");
            ctx.globalAlpha = isAdvanced ? 0.25 : 0.1; 
            ctx.fillStyle = wideGlow; ctx.beginPath(); ctx.arc(0, 0, baseR * (isAdvanced ? 4.5 : 2.5), 0, 7); ctx.fill();

            if (isAdvanced) {
                ctx.strokeStyle = color; ctx.globalAlpha = 0.3; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 0, baseR * (0.7 + (patternSeed % 3) * 0.1), 0, 7); ctx.stroke();
                ctx.beginPath(); ctx.arc(0, 0, baseR * (1.1 + (patternSeed % 2) * 0.15), 0, 7); ctx.stroke();
                
                ctx.save();
                ctx.rotate(time * 0.1);
                ctx.beginPath();
                const lines = 4 + (patternSeed % 5);
                for(let i=0; i<lines; i++) {
                    const a = (i/lines) * Math.PI * 2;
                    ctx.moveTo(0,0); ctx.lineTo(Math.cos(a)*baseR*1.8, Math.sin(a)*baseR*1.8);
                }
                ctx.stroke();
                ctx.restore();
            }

            ctx.save(); 
            ctx.rotate(time * (isAdvanced ? 0.7 : 0.4)); 
            ctx.strokeStyle = color; 
            ctx.lineWidth = isAdvanced ? 5 : 2.5; 
            ctx.globalAlpha = isAdvanced ? 1.0 : 0.7;
            
            const starPoints = isAdvanced ? (3 + (patternSeed % 6)) : 3; 
            const starLayers = isAdvanced ? (2 + (patternSeed % 2)) : 2;
            
            for(let i=0; i<starLayers; i++) { 
                ctx.rotate(Math.PI/starPoints); ctx.beginPath(); const starR = baseR * 0.95; 
                for(let j=0; j<starPoints; j++) { 
                    const ang = (j * Math.PI * 2 / starPoints); 
                    ctx.lineTo(Math.cos(ang)*starR, Math.sin(ang)*starR); 
                } 
                ctx.closePath(); ctx.stroke(); 
            }
            ctx.restore();

            ctx.save(); ctx.rotate(-time * (isAdvanced ? 0.5 : 0.3)); 
            ctx.lineWidth = isAdvanced ? 4 : 2;
            ctx.beginPath(); ctx.arc(0, 0, baseR * 1.35, 0, 7); ctx.stroke();
            ctx.beginPath(); ctx.arc(0, 0, baseR * 1.55, 0, 7); ctx.stroke();
            const runes = ["ᚱ", "ᚧ", "ᚦ", "ᚠ", "ᛊ", "ᛊ", "ᛒ", "ᛗ", "ᛝ", "ᛟ", "ᚢ", "ᚲ"];
            for(let i=0; i<runes.length; i++) { 
                const ang = (i/runes.length) * Math.PI * 2; 
                ctx.save(); ctx.translate(Math.cos(ang)*baseR*1.45, Math.sin(ang)*baseR*1.45); ctx.rotate(ang + Math.PI/2); 
                ctx.font = `bold ${baseR * (isAdvanced ? 0.38 : 0.22)}px serif`; 
                ctx.fillStyle = color; ctx.textAlign = "center";
                if (isAdvanced) { ctx.shadowBlur = 10; ctx.shadowColor = color; }
                ctx.fillText(runes[i], 0, 0); 
                if(Math.random() < (isAdvanced ? 0.45 : 0.1)) { ctx.fillStyle = "#fff"; ctx.fillText(runes[i], 0, 0); }
                ctx.restore(); 
            }
            ctx.restore();

            ctx.save(); ctx.rotate(time * 0.25); const outerR = baseR * (isAdvanced ? 2.25 : 1.95); 
            ctx.lineWidth = isAdvanced ? 8 : 4; ctx.stroke();
            const nodeCount = isAdvanced ? (8 + (patternSeed % 8)) : 12;
            for(let i=0; i<nodeCount; i++) { 
                const ang = (i/nodeCount) * Math.PI * 2; const sx = Math.cos(ang) * outerR; const sy = Math.sin(ang) * outerR; 
                ctx.fillStyle = "#020208"; ctx.beginPath(); ctx.arc(sx, sy, baseR * (isAdvanced ? 0.42 : 0.28), 0, 7); ctx.fill(); 
                ctx.strokeStyle = color; ctx.lineWidth = isAdvanced ? 4.5 : 2.2; ctx.stroke(); 
                if (isAdvanced) {
                    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(sx, sy, baseR * 0.15, 0, 7); ctx.fill();
                    const nGrad = ctx.createRadialGradient(sx, sy, 0, sx, sy, baseR * 0.5);
                    nGrad.addColorStop(0, color); nGrad.addColorStop(1, "transparent");
                    ctx.fillStyle = nGrad; ctx.globalAlpha = 0.6; ctx.beginPath(); ctx.arc(sx, sy, baseR * 0.5, 0, 7); ctx.fill();
                }
            }
            ctx.restore();

            const coreGrad = ctx.createRadialGradient(0,0,0,0,0, baseR * (isAdvanced ? 1.7 : 1.25)); 
            coreGrad.addColorStop(0, "white"); coreGrad.addColorStop(0.2, color); coreGrad.addColorStop(1, "transparent");
            ctx.fillStyle = coreGrad; ctx.globalAlpha = isAdvanced ? 0.9 : 0.6; ctx.beginPath(); ctx.arc(0, 0, baseR * (isAdvanced ? 1.7 : 1.25), 0, 7); ctx.fill();
            
            if (this.level >= 75) {
                ctx.save(); ctx.globalAlpha = 0.35 + Math.sin(time*5)*0.15;
                for(let i=0; i<2; i++) {
                    const side = i === 0 ? 1 : -1;
                    ctx.save(); ctx.scale(side, 1); ctx.translate(-baseR*2.1, 0); ctx.rotate(Math.sin(time*2.2)*0.1);
                    const wingGrad = ctx.createLinearGradient(0,0,-baseR*5, 0);
                    wingGrad.addColorStop(0, color); wingGrad.addColorStop(1, "transparent");
                    ctx.fillStyle = wingGrad;
                    ctx.beginPath(); ctx.moveTo(0,0);
                    ctx.bezierCurveTo(-baseR*2, -baseR*3.5, -baseR*4, -baseR*1.5, -baseR*6, -baseR*4);
                    ctx.bezierCurveTo(-baseR*5, baseR, -baseR*2, baseR*1.5, 0, 0);
                    ctx.fill(); ctx.restore();
                }
                ctx.restore();
            }
            ctx.restore();
        }

        draw() {
            if (!this.alive || !isVisible(this.x, this.y, 1500)) return;
            const stats = this.getStats(), color = stats.color === 'rainbow' ? `hsl(${Date.now()/6 % 360}, 100%, 55%)` : stats.color, r = this.radius;
            ctx.save(); ctx.translate(this.x, this.y);
            const time = Date.now() / 1000;
            const isAdvanced = this.level >= 41;
            const magicArrayScale = 1.1 + (this.level / 70); 
            
            const ringCount = isAdvanced ? 4 : Math.min(3, Math.floor((this.level - 1) / 16) + 1);
            for (let i = 0; i < ringCount; i++) { this.drawParticleOrbit(r, color, 1.1, time, i); }
            
            if (this.isPlayer || this.isOverlord || this.isEnforcer || this.level >= 41) { 
                this.drawMagicArray(r, color, magicArrayScale, time); 
            } else { 
                ctx.globalAlpha = 0.2; ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, 0, r * 1.9, 0, 7); ctx.fill(); ctx.globalAlpha = 1; 
            }

            if (this.level >= 50) {
                let soulColor = (this.level >= 100) ? "#FFD700" : (this.level >= 90) ? "#FF1744" : "#D500F9";
                for (let i = 0; i < Math.min(9, Math.floor((this.level - 40) / 6.5) + 1); i++) {
                    ctx.save(); const ringRadius = r * (1.2 + i * 0.08); ctx.rotate(time * 0.2 + i * 0.1);
                    ctx.beginPath(); ctx.ellipse(0, 0, ringRadius * 1.7, ringRadius * 0.5, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = soulColor; ctx.lineWidth = isMobile ? 2 : 3.5; 
                    if (!isMobile) { ctx.shadowBlur = 12; ctx.shadowColor = soulColor; }
                    ctx.globalAlpha = 0.85 - (i * 0.06); ctx.stroke(); ctx.restore();
                }
            }

            ctx.rotate(this.angle);
            ctx.fillStyle = "white"; ctx.strokeStyle = "#111"; ctx.lineWidth = r/15;
            ctx.beginPath(); ctx.arc(r*0.45, r*0.78, r*0.3, 0, 7); ctx.fill(); ctx.stroke(); 
            ctx.beginPath(); ctx.arc(r*0.45, -r*0.78, r*0.3, 0, 7); ctx.fill(); ctx.stroke(); 

            ctx.fillStyle = (this.isPlayer || this.isOverlord || this.isEnforcer) ? "#0a0a1a" : "#0099FF";
            ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
            ctx.strokeStyle = (this.isPlayer || this.isOverlord || this.isEnforcer) ? color : "#007acc";
            ctx.lineWidth = r/8; ctx.stroke();

            ctx.fillStyle = "#FF3333"; ctx.fillRect(r*0.4, -r*0.6, r*0.2, r*1.2); 
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(r*0.3, 0, r*0.88, -2.4, 2.4); ctx.fill();
            ctx.fillStyle = (this.isPlayer || this.level >= 60 || this.isOverlord || this.isEnforcer) ? color : "#000";
            ctx.beginPath(); ctx.arc(r*0.58, -r*0.22, r*0.14, 0, 7); ctx.fill();
            ctx.beginPath(); ctx.arc(r*0.58, r*0.22, r*0.14, 0, 7); ctx.fill();
            ctx.fillStyle = "#f33"; ctx.beginPath(); ctx.arc(r*0.82, 0, r*0.18, 0, 7); ctx.fill();

            // --- DIVINE BLADE ---
            ctx.save(); 
            ctx.rotate(this.isAttacking ? this.swing : -0.85); 
            
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(r - 5, -8, 15, 16); 
            ctx.fillStyle = "#333";
            ctx.fillRect(r + 10, -25, 8, 50); 
            ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.strokeRect(r + 10, -25, 8, 50);

            const bladeLen = stats.laserLen + 60;
            const bladeWidth = 22;

            if (this.isAttacking) {
                ctx.globalAlpha = 0.25; ctx.fillStyle = color;
                ctx.beginPath(); ctx.moveTo(0,0);
                ctx.arc(0,0, r + bladeLen + 40, -0.65, 0.65); ctx.fill();
            }

            if (!isMobile) { ctx.shadowBlur = 50; ctx.shadowColor = color; }
            
            const flicker = 0.9 + Math.random() * 0.2;
            ctx.globalAlpha = 0.5 * flicker; ctx.fillStyle = color;
            ctx.beginPath(); ctx.moveTo(r+18, -bladeWidth); ctx.lineTo(r+bladeLen+20, 0); ctx.lineTo(r+18, bladeWidth); ctx.fill();
            
            ctx.globalAlpha = 0.8; ctx.fillStyle = color;
            ctx.beginPath(); ctx.moveTo(r+22, -bladeWidth/2); ctx.lineTo(r+bladeLen, 0); ctx.lineTo(r+22, bladeWidth/2); ctx.fill();
            
            ctx.globalAlpha = 1.0; ctx.fillStyle = "#fff";
            ctx.beginPath(); ctx.moveTo(r+25, -4); ctx.lineTo(r+bladeLen-20, 0); ctx.lineTo(r+25, 4); ctx.fill();

            if (this.level >= 75) {
                ctx.save();
                for(let i=0; i<3; i++) {
                    const offsetA = time*2 + i*2.1;
                    const sx = r + bladeLen/2 + Math.cos(offsetA)*30;
                    const sy = Math.sin(offsetA)*25;
                    ctx.fillStyle = color; ctx.globalAlpha = 0.6;
                    ctx.beginPath(); ctx.arc(sx, sy, 3, 0, 7); ctx.fill();
                }
                ctx.restore();
            }

            ctx.restore(); 
            ctx.restore(); 

            let label = `Lv.${this.level}`;
            if (this.isPlayer) label = `${this.name} (Lv.${this.level})`;
            else if (this.isEnforcer) label = "⚠ ENFORCER ⚠";
            else if (this.isOverlord) label = "★ OVERLORD ★";
            
            ctx.fillStyle = (this.isPlayer || this.isOverlord || this.isEnforcer) ? color : "#fff"; 
            ctx.font = `bold ${Math.max(18, r/1.1)}px sans-serif`; ctx.textAlign = "center";
            ctx.fillText(label, this.x, this.y - r - 75);
        }
    }

    function spawnFood(x, y, isSuper = false, xp = 50) {
        foods.push({ x: x??Math.random()*WORLD_SIZE, y: y??Math.random()*WORLD_SIZE, isSuper, xp, eaten: false, color: isSuper?"#FFCC00":"#00f2ff" });
    }

    function spawnBot() {
        if (!isPlaying) return;
        const enforcers = bots.filter(b => b.alive && b.isEnforcer);
        const safePos = getSafeLocation();
        const b = new Entity(safePos.x, safePos.y);
        
        if (enforcers.length < 2) {
            b.isEnforcer = true;
            b.level = Math.min(100, (player ? player.level : 1) + 35 + Math.floor(Math.random()*10));
        } else {
            let baseLv = player ? player.level : 1;
            let offset = (baseLv < 40) ? Math.floor(Math.random()*20 - 15) : Math.floor(Math.random()*40 - 20);
            b.level = Math.max(1, baseLv + offset);
            if (Math.random() < 0.08) b.isOverlord = true;
            else if (Math.random() < 0.15) b.isElite = true;
        }
        bots.push(b);
    }

    function getSafeLocation() {
        let bestPos = { x: WORLD_SIZE / 2, y: WORLD_SIZE / 2 };
        let maxMinDist = -1;
        const vw = (window.innerWidth / camera.zoom) * 0.5;
        const vh = (window.innerHeight / camera.zoom) * 0.5;

        for(let i=0; i<100; i++) {
            const tx = 800 + Math.random() * (WORLD_SIZE - 1600);
            const ty = 800 + Math.random() * (WORLD_SIZE - 1600);
            if (player) {
                const isVisibleToPlayer = tx > camera.x - vw - 200 && tx < camera.x + vw + 200 &&
                                          ty > camera.y - vh - 200 && ty < camera.y + vh + 200;
                if (isVisibleToPlayer) continue; 
            }

            let minDistToThreat = Infinity;
            for (let b of bots) if (b.alive) {
                const d = Math.sqrt(distSq(tx, ty, b.x, b.y));
                const weight = (b.isEnforcer || b.isOverlord) ? 2.8 : 1.0;
                if (d / weight < minDistToThreat) minDistToThreat = d / weight;
            }
            if (player && player.alive) {
                const d = Math.sqrt(distSq(tx, ty, player.x, player.y));
                if (d < minDistToThreat) minDistToThreat = d;
            }
            if (minDistToThreat > 1500) return { x: tx, y: ty };
            if (minDistToThreat > maxMinDist) { maxMinDist = minDistToThreat; bestPos = { x: tx, y: ty }; }
        }
        return bestPos;
    }
    
    function resize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        canvas.width = window.innerWidth * dpr; canvas.height = window.innerHeight * dpr;
        canvas.style.width = window.innerWidth + 'px'; canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0); 
        const mmSize = Math.max(140, Math.min(200, window.innerWidth * 0.22));
        mmCanvas.width = mmSize * dpr; mmCanvas.height = mmSize * dpr; 
        mmCanvas.style.width = mmSize + 'px'; mmCanvas.style.height = mmSize + 'px';
        if (isPlaying) createPattern();
    }

    function update() {
        if (!player) return; 
        player.update(); 
        
        camera.x += (player.x - camera.x) * 0.12;
        camera.y += (player.y - camera.y) * 0.12;
        const targetZoom = (isMobile ? 0.65 : 0.95) / (1.1 + player.level * 0.026);
        camera.zoom += (targetZoom - camera.zoom) * 0.05;
        
        resolveCollisions();
        const gx = (player.x/GRID_SIZE)|0, gy = (player.y/GRID_SIZE)|0;
        for(let ox=-1; ox<=1; ox++) {
            for(let oy=-1; oy<=1; oy++) {
                const cell = foodGrid.get(((gx+ox)<<16)|(gy+oy));
                if(cell) for(let i=cell.length-1; i >= 0; i--) { 
                    let f = cell[i]; 
                    if(!f.eaten && distSq(player.x, player.y, f.x, f.y) < (player.radius + 60)**2) { 
                        f.eaten = true; player.addXp(f.xp); 
                        if(f.xp === 50) { f.x = Math.random()*WORLD_SIZE; f.y = Math.random()*WORLD_SIZE; f.eaten = false; } 
                    } 
                }
            }
        }
        foods = foods.filter(f => !f.eaten || f.xp > 50);
        bots.forEach(b => b.update()); 
        trails.forEach(t => (t.life--));
        trails = trails.filter(t => t.life > 0);
        embers.forEach(e => { e.x += e.vx; e.y += e.vy; e.life--; }); 
        if (embers.length > 70) embers.shift();
        embers = embers.filter(e => e.life > 0);
        document.getElementById('exp-fill').style.width = (player.xp/player.targetXp*100)+'%';
        document.getElementById('rank-name').innerText = `${player.getStats().name} Lv.${player.level}`;
        document.getElementById('atk-cd').style.height = (player.atkCd/35*100)+'%';
        document.getElementById('bolt-cd').style.height = (player.teleCd/240*100)+'%';
    }

    function drawMM() {
        const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
        mmCtx.setTransform(dpr, 0, 0, dpr, 0, 0); 
        const mmW = mmCanvas.width / dpr;
        mmCtx.clearRect(0, 0, mmW, mmW);
        const ratio = mmW / WORLD_SIZE;
        
        mmCtx.strokeStyle = "rgba(0, 242, 255, 0.4)";
        mmCtx.lineWidth = 1.5;
        mmCtx.strokeRect(0, 0, mmW, mmW);


        for(let b of bots) if(b.alive) { 
            mmCtx.fillStyle = (b.isEnforcer || b.isOverlord) ? "#ff0" : (b.isElite ? "#f44" : "#900"); 
            const bSize = (b.isEnforcer || b.isOverlord) ? 3.5 : 2;
            mmCtx.beginPath(); mmCtx.arc(b.x*ratio, b.y*ratio, bSize, 0, 7); mmCtx.fill(); 
        }
        if (player && player.alive) {
            mmCtx.fillStyle = "#0f0"; mmCtx.shadowBlur = 8; mmCtx.shadowColor = "#0f0";
            mmCtx.beginPath(); mmCtx.arc(player.x*ratio, player.y*ratio, 4.5, 0, 7); mmCtx.fill();
            mmCtx.shadowBlur = 0;
        }
    }

    function draw() {
        ctx.fillStyle = "#020208"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (!player) return; ctx.save(); ctx.translate(window.innerWidth/2, window.innerHeight/2); ctx.scale(camera.zoom, camera.zoom); ctx.translate(-camera.x, -camera.y);
        ctx.fillStyle = gridPattern; ctx.fillRect(0,0, WORLD_SIZE, WORLD_SIZE);
        ctx.strokeStyle = "rgba(0, 153, 255, 0.35)"; ctx.lineWidth = 40; ctx.strokeRect(0, 0, WORLD_SIZE, WORLD_SIZE);
        for (let f of foods) if (!f.eaten && isVisible(f.x, f.y)) drawEnergyParticle(f.x, f.y, f.color, f.isSuper);
        for (let e of embers) { ctx.globalAlpha = e.life/50; ctx.fillStyle = e.color; ctx.beginPath(); ctx.arc(e.x, e.y, 3, 0, 7); ctx.fill(); }
        ctx.globalAlpha = 1;
        
        trails.forEach(t => {
            ctx.beginPath();
            if (t.isLightning) {
                ctx.strokeStyle = t.color; 
                ctx.lineWidth = 8 * (t.life / 15);
                ctx.moveTo(t.pts[0].x, t.pts[0].y);
                for(let i=1; i < t.pts.length; i++) ctx.lineTo(t.pts[i].x, t.pts[i].y);
                ctx.stroke();
                ctx.beginPath();
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 3 * (t.life / 15);
                ctx.moveTo(t.pts[0].x, t.pts[0].y);
                for(let i=1; i < t.pts.length; i++) ctx.lineTo(t.pts[i].x, t.pts[i].y);
                ctx.stroke();
            } else { 
                ctx.strokeStyle = t.color; ctx.lineWidth = 10 * (t.life / 30); 
                ctx.moveTo(t.pts[0].x, t.pts[0].y);
                for(let i=1; i < t.pts.length; i++) ctx.lineTo(t.pts[i].x, t.pts[i].y);
                ctx.stroke();
            }
        });
        bots.forEach(b => b.draw()); if(player.alive) player.draw(); 
        ctx.restore();
        if (isPlaying) drawMM();
    }

    function loop() { if (isPlaying) { update(); draw(); requestAnimationFrame(loop); } }
    
    const toggleFullscreen = async () => {
        try {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) await docEl.requestFullscreen();
            if (screen.orientation && screen.orientation.lock) await screen.orientation.lock("landscape");
        } catch (e) {}
    };

    const setupMobileControls = () => {
        const joy = document.getElementById('joystick-container'), knob = document.getElementById('joystick-knob');
        const btnAtk = document.getElementById('btn-attack'), btnBolt = document.getElementById('btn-bolt');
        joy.addEventListener('touchstart', (e) => { e.preventDefault(); joystick.active = true; joystick.identifier = e.changedTouches[0].identifier; const rect = joy.getBoundingClientRect(); joystick.cx = rect.left + rect.width / 2; joystick.cy = rect.top + rect.height / 2; }, { passive: false });
        window.addEventListener('touchmove', (e) => { 
            if (!joystick.active) return; 
            for (let i = 0; i < e.changedTouches.length; i++) { 
                const t = e.changedTouches[i]; 
                if (t.identifier === joystick.identifier) { 
                    const dx = t.clientX - joystick.cx, dy = t.clientY - joystick.cy; 
                    const d = Math.sqrt(dx * dx + dy * dy); 
                    joystick.angle = Math.atan2(dy, dx); 
                    const moveD = Math.min(d, 55); 
                    knob.style.transform = `translate(${Math.cos(joystick.angle)*moveD}px, ${Math.sin(joystick.angle)*moveD}px)`; 
                } 
            } 
        }, { passive: false });
        window.addEventListener('touchend', (e) => { for (let i = 0; i < e.changedTouches.length; i++) if (e.changedTouches[i].identifier === joystick.identifier) { joystick.active = false; joystick.identifier = null; knob.style.transform = 'translate(0,0)'; } });
        btnAtk.addEventListener('touchstart', (e) => { e.preventDefault(); if (isPlaying && player && player.alive) player.attack(); }, { passive: false });
        btnBolt.addEventListener('touchstart', (e) => { e.preventDefault(); if (isPlaying && player && player.alive) player.useTeleport(); }, { passive: false });
    };

    document.getElementById('entry-btn').onclick = async () => {
        await toggleFullscreen();
        document.getElementById('entry-screen').style.display = 'none';
        document.getElementById('start-menu').style.display = 'flex';
    };

    document.getElementById('start-btn').onclick = async () => {
        const nameInput = document.getElementById('player-name-input');
        playerName = nameInput.value.trim() || "Doraemon";

        await toggleFullscreen();
        document.getElementById('start-menu').style.opacity = 0; 
        setTimeout(() => { document.getElementById('start-menu').style.display = 'none'; }, 600); 
        document.getElementById('hud').style.display = 'block'; 
        document.getElementById('minimap-ui').style.display = 'block'; 
        if (isMobile) { 
            document.getElementById('joystick-container').style.display = 'block'; 
            document.getElementById('skill-buttons').style.display = 'flex'; 
            setupMobileControls();
        } 
        createPattern(); 
        isPlaying = true; 
        foods = []; bots = []; trails = []; embers = [];
        for (let i=0; i<BOT_COUNT; i++) spawnBot();
        for (let i=0; i<FOOD_COUNT; i++) spawnFood(); 
        const safePos = getSafeLocation();
        player = new Entity(safePos.x, safePos.y, true, playerName);
        camera.x = player.x; camera.y = player.y;
        setInterval(() => { if (!isPlaying) return; updateFoodGrid(); }, 1200); 
        loop(); 
    };

    document.getElementById('rebirth-btn').onclick = () => {
        document.getElementById('game-over-screen').classList.remove('visible');
        document.getElementById('start-menu').style.display = 'flex';
        document.getElementById('start-menu').style.opacity = 1;
        document.getElementById('hud').style.display = 'none';
        document.getElementById('minimap-ui').style.display = 'none';
        isPlaying = false; player = null; foods = []; bots = []; trails = []; embers = [];
    };

    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mousedown', e => { if(isPlaying && player && player.alive && !isMobile) player.attack(); });
    window.addEventListener('keydown', e => { 
        keys[e.key.toLowerCase()] = true; 
        if (isPlaying && player && player.alive) { 
            if (e.key === ' ') player.attack(); 
            if (e.key === '1') player.useTeleport(); 
        } 
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    resize();
</script>
</body>

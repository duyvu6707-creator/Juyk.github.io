                            q: "Thừa kế thế vị là trường hợp cháu được hưởng phần di sản thay cho cha hoặc mẹ của cháu nếu cha hoặc mẹ chết trước hoặc cùng thời điểm với người để lại di sản.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Đây là quy định tại Điều 652 BLDS 2015 nhằm đảm bảo quyền lợi cho cháu (hoặc chắt) khi người đáng lẽ được hưởng di sản đã chết trước hoặc chết cùng lúc với người để lại di sản [16]." 
                            },

                            // --- Hợp đồng dân sự ---
                            { 
                            q: "Mọi hợp đồng dân sự đều bắt buộc phải lập thành văn bản và có công chứng, chứng thực mới có hiệu lực.", 
                            a: ["Đúng", "Sai"], 
                            c: 1, 
                            r: "Sai. Hình thức hợp đồng có thể bằng miệng, bằng văn bản, hoặc văn bản có công chứng/chứng thực. Chỉ những loại tài sản có đăng ký quyền sở hữu (như quyền sử dụng đất) mới bắt buộc phải lập văn bản có công chứng, chứng thực [17, 18]." 
                            },
                            { 
                            q: "Người từ đủ 15 tuổi đến chưa đủ 18 tuổi có tài sản riêng bảo đảm thực hiện nghĩa vụ thì có thể tự mình xác lập, thực hiện giao dịch dân sự mà không cần sự đồng ý của người đại diện.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Theo quy định, nếu họ có tài sản riêng đảm bảo nghĩa vụ thì có quyền tự mình xác lập, thực hiện giao dịch dân sự, trừ trường hợp pháp luật có quy định khác [19]." 
                            },
                            { 
                            q: "Khi hợp đồng dân sự vô hiệu, các bên phải khôi phục lại tình trạng ban đầu, hoàn trả cho nhau những gì đã nhận.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Đây là hậu quả pháp lý cơ bản của hợp đồng dân sự vô hiệu; nếu không hoàn trả được bằng hiện vật thì phải hoàn trả bằng tiền. Bên nào có lỗi thì phải bồi thường [20]." 
                            },
                            { 
                            q: "Trong hợp đồng dân sự, nếu không có sự thỏa thuận về bồi thường thiệt hại thì bên bị vi phạm không có quyền yêu cầu bên vi phạm bồi thường thiệt hại.", 
                            a: ["Đúng", "Sai"], 
                            c: 0, 
                            r: "Đúng. Theo giáo trình quy định: 'nếu không có sự thỏa thuận về bồi thường thiệt hại trong hợp đồng thì bên bị vi phạm không có quyền yêu cầu bên vi phạm bồi thường thiệt hại', bên vi phạm nghĩa vụ chỉ phải nộp tiền phạt vi phạm [21, 22]." 
                            }
                        ]
                    },
                    13: {
                        group: "BÀI TẬP ĐIỀN KHUYẾT",
                        title: "1. Những vấn đề cơ bản về Nhà nước và Pháp luật",
                        questions: [
                            // --- Phần I. NHỮNG VẤN ĐỀ CƠ BẢN VỀ NHÀ NƯỚC ---
                            { 
                            q: "Nhà nước xuất hiện một cách khách quan khi xã hội phát triển đến một giai đoạn nhất định: Có sự phân công lao động, xuất hiện chế độ tư hữu về tư liệu sản xuất và xã hội phân chia thành các ...... đối kháng không thể điều hòa được.", 
                            a: ["A. tầng lớp", "B. giai cấp", "C. nhóm người", "D. tập đoàn"], 
                            c: 1, 
                            r: "Theo quan điểm Mac - Lênin, sự xuất hiện của chế độ tư hữu và phân chia giai cấp đối kháng không thể điều hòa là nguồn gốc ra đời của nhà nước." 
                            },
                            { 
                            q: "Nhà nước là 1 tổ chức đặc biệt của quyền lực chính trị, một bộ máy chuyên làm nhiệm vụ ...... và thực hiện các chức năng quản lý đặc biệt, nhằm duy trì trật tự xã hội, bảo vệ địa vị của giai cấp thống trị trong xã hội.", 
                            a: ["A. giáo dục", "B. xét xử", "C. cưỡng chế", "D. điều hành"], 
                            c: 2, 
                            r: "Định nghĩa về nhà nước nhấn mạnh đây là một bộ máy chuyên làm nhiệm vụ cưỡng chế và quản lý đặc biệt." 
                            },
                            { 
                            q: "Bản chất của nhà nước gồm tính giai cấp và tính xã hội. Trong đó, tính giai cấp thể hiện: Nhà nước là công cụ để giai cấp thống trị thực hiện sự ...... đối với giai cấp khác.", 
                            a: ["A. quản lý", "B. áp bức", "C. bóc lột", "D. thống trị"], 
                            c: 3, 
                            r: "Nhà nước do giai cấp thống trị lập ra, thể hiện ý chí của giai cấp thống trị và là công cụ để thực hiện sự thống trị." 
                            },

                            },

                            a: ["A. cơ sở thực tiễn", "B. căn cứ pháp lý", "C. văn bản ràng buộc", "D. thỏa thuận bắt buộc"], 
                            c: 1, 
                            r: "Trong giao lưu dân sự, hợp đồng đóng vai trò là 'căn cứ pháp lý' phổ biến nhất để làm phát sinh quyền và nghĩa vụ giữa các bên [3]."

            hcm: {
                name: "Tư Tưởng Hồ Chí Minh",
                color: "#e84393", // Màu hồng đồng bộ với giao diện nút
                data: {
                    1: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: "Phần 1: Khái niệm, Nguồn gốc và Quá trình hình thành",
                        questions: [
                            { q: "Truyền thống quý báu nhất của dân tộc Việt Nam được Hồ Chí Minh kế thừa và phát triển là gì?", a: ["Lòng nhân ái", "Chủ nghĩa yêu nước", "Tinh thần hiếu học", "Cần cù lao động"], c: 1, r: "Chủ nghĩa yêu nước là giá trị cốt lõi, là động lực mạnh mẽ nhất thôi thúc Bác ra đi tìm đường cứu nước [1]." },
                            { q: "Hồ Chí Minh thành lập Hội Việt Nam cách mạng thanh niên vào năm nào?", a: ["Năm 1920", "Năm 1925", "Năm 1927", "Năm 1930"], c: 1, r: "Hội Việt Nam Cách mạng Thanh niên được Bác thành lập tại Quảng Châu (Trung Quốc) vào năm 1925 [1]." },
                            { q: "Tìm một đáp án SAI trong đoạn sau đây: Trong 10 năm đầu (1911 - 1920) của quá trình bôn ba tìm đường cứu nước, Nguyễn Ái Quốc đã:", a: ["Vượt qua 3 đại dương, 4 châu lục.", "Đến khoảng gần 30 nước.", "Sống, làm thuê và tự học tại các nước Mỹ, Anh, Pháp.", "Đến Matxcơva dự Hội nghị Quốc tế nông dân."], c: 3, r: "Năm 1923 Bác mới lần đầu tiên đến Matxcơva (Liên Xô) để dự Hội nghị Quốc tế Nông dân, không nằm trong giai đoạn 1911-1920 [1], [2]." },
                            { q: "Tìm một điểm nhầm lẫn trong đoạn viết dưới đây: Một trong những nguồn gốc của tư tưởng Hồ Chí Minh là tiếp thu văn hóa phương Đông. Cụ thể là:", a: ["Những mặt tích cực của Nho giáo.", "Tư tưởng vị tha của Phật giáo.", "Kế thừa lòng nhân ái, đức hy sinh của Hồi giáo", "Tư tưởng Tam dân của Tôn Trung Sơn"], c: 2, r: "Hồi giáo không phải là nguồn gốc hình thành tư tưởng Hồ Chí Minh. Các tư tưởng phương Đông Bác tiếp thu chủ yếu là Nho giáo, Phật giáo và tư tưởng Tôn Trung Sơn [2], [3]." },
                            { q: "Tìm một điểm nhầm lẫn trong đoạn viết sau đây: Một trong những nguồn gốc của tư tưởng Hồ Chí Minh là tiếp thu văn hóa phương Đông. Cụ thể là:", a: ["Những mặt tích cực của Nho giáo.", "Kế thừa các giá trị văn hóa tiến bộ của thời kỳ Phục hưng.", "Tư tưởng vị tha của Phật giáo.", "Tư tưởng Tam dân của Tôn Trung Sơn"], c: 1, r: "Văn hóa thời kỳ Phục hưng thuộc về phương Tây (Châu Âu), không phải là giá trị văn hóa phương Đông [3]." },
                            { q: "Tìm một điểm nhầm lẫn trong đoạn viết sau đây: Một trong những nguồn gốc của tư tưởng Hồ Chí Minh là tiếp văn hóa phương Đông. Cụ thể là:", a: ["Những mặt tích cực của Nho giáo.", "Tư tưởng vị tha của Phật giáo.", "Tư tưởng của Khổng Tử về một xã hội bình yên không bao giờ thay đổi.", "Tư tưởng Tam dân của Tôn Trung Sơn."], c: 2, r: "Tư tưởng về một xã hội 'không bao giờ thay đổi' là yếu tố bảo thủ, tiêu cực của Nho giáo mà Bác đã phê phán, không phải là yếu tố Bác tiếp thu [3], [4]." },
                            { q: "Hồ Chí Minh đã từng dạy học ở ngôi trường nào?", a: ["Trường tiểu học Pháp - Việt ở Vinh.", "Trường tiểu học Đông Ba ở Huế.", "Trường Quốc học Huế.", "Trường Dục Thanh ở Phan Thiết."], c: 3, r: "Năm 1910, trước khi vào Sài Gòn, Bác đã có một thời gian ngắn dạy học tại trường Dục Thanh (Phan Thiết) do các sĩ phu yêu nước lập ra [4]." },
                            { q: "Tác phẩm Bản án chế độ thực dân Pháp của Nguyễn Ái Quốc được xuất bản lần đầu tiên vào năm nào?", a: ["1920.", "1922.", "1925.", "1927."], c: 2, r: "Tác phẩm này được xuất bản lần đầu tiên tại Paris (Pháp) vào năm 1925 [4], [5]." },
                            { q: "Tác phẩm Đường kách mệnh của Nguyễn Ái Quốc được xuất bản lần đầu tiên vào năm nào?", a: ["1920.", "1925.", "1927.", "1930."], c: 2, r: "Cuốn sách tập hợp các bài giảng của Bác tại lớp huấn luyện cán bộ ở Quảng Châu, được xuất bản năm 1927 [5]." },
                            { q: "Thuật ngữ Tư tưởng Hồ Chí Minh được Đảng ta chính thức sử dụng bắt đầu từ bao giờ?", a: ["Từ năm 1969.", "Từ năm 1990.", "Từ năm 1986.", "Từ năm 1991"], c: 3, r: "Tại Đại hội Đại biểu toàn quốc lần thứ VII (năm 1991), Đảng ta mới chính thức sử dụng khái niệm này trong Cương lĩnh [5]." },
                            { q: "Tư tưởng Hồ Chí Minh được hình thành từ những nguồn gốc nào?", a: ["Giá trị truyền thống của dân tộc Việt Nam.", "Tinh hoa văn hóa nhân loại (trong đó có chủ nghĩa Mác – Lênin).", "Những phẩm chất chủ quan của Hồ Chí Minh?", "Cả ba đáp án còn lại đều đúng."], c: 3, r: "Tư tưởng Hồ Chí Minh là kết tinh của 3 nguồn gốc khách quan (Truyền thống dân tộc, tinh hoa nhân loại, Mác-Lênin) và điều kiện chủ quan (Phẩm chất cá nhân của Bác) [6]." },
                            { q: "Chọn đáp án trả lời đúng nhất về tư tưởng Hồ Chí Minh:", a: ["Tư tưởng Hồ Chí Minh là kết quả của sự vận dụng sáng tạo chủ nghĩa Mác - Lênin vào điều kiện thực tế của nước ta.", "Tư tưởng Hồ Chí Minh là kết quả của sự vận dụng và phát triển sáng tạo chủ nghĩa Mác - Lênin vào điều kiện cụ thể của nước ta.", "Tư tưởng Hồ Chí Minh là kết quả của sự phát triển sáng tạo chủ nghĩa Mác - Lênin vào điều kiện thực tế của nước ta.", "Tư tưởng Hồ Chí Minh là chủ nghĩa Mác – Lênin ở Việt Nam."], c: 1, r: "Định nghĩa chuẩn của Đảng nhấn mạnh cả hai vế: 'vận dụng' và 'phát triển sáng tạo' học thuyết Mác - Lênin vào hoàn cảnh đặc thù Việt Nam [6], [7]." },
                            { q: "Hồ Chí Minh rời Tổ quốc đi tìm đường cứu nước vào năm nào?", a: ["Năm 1905", "Năm 1908", "Năm 1911", "Năm 1912"], c: 2, r: "Ngày 5/6/1911, Bác ra đi tìm đường cứu nước tại Bến cảng Nhà Rồng (Sài Gòn) [7]." },
                            { q: "Từ năm 1920 đến năm 1945, Hồ Chí Minh bị địch bắt và giam giữ mấy lần?", a: ["2 lần", "3 lần", "4 lần", "1 lần"], c: 0, r: "Bác bị bắt 2 lần: Lần 1 ở Hồng Kông (1931-1933) bởi thực dân Anh, và Lần 2 ở Quảng Tây - Trung Quốc (1942-1943) bởi chính quyền Tưởng Giới Thạch [7], [8]." },
                            { q: "Hồ Chí Minh bắt đầu viết bản Di chúc lịch sử vào thời gian nào?", a: ["Năm 1960", "Năm 1965", "Năm 1968", "Năm 1969"], c: 1, r: "Bác bắt đầu viết những dòng đầu tiên của Bản Di chúc vào dịp sinh nhật 75 tuổi, tháng 5 năm 1965 [8]." },
                            { q: "Nguyễn Sinh Cung là người con thứ mấy trong gia đình?", a: ["1", "2", "3", "4"], c: 2, r: "Nguyễn Sinh Cung (Bác Hồ) là người con thứ 3. Trên Bác có chị gái Nguyễn Thị Thanh, anh trai Nguyễn Sinh Khiêm, dưới Bác có em trai Nguyễn Sinh Xin [8]." },
                            { q: "Lần đầu tiên Nguyễn Tất Thành đặt chân lên đất Pháp tại địa danh nào?", a: ["Mác xây", "Lơ Havrơ", "Noóc măng đi", "Thủ đô Pari"], c: 0, r: "Tháng 7/1911, con tàu Amiral Latouche Tréville cập cảng Marseille (Mác xây), Bác lần đầu tiên bước lên đất Pháp [8], [9]." },
                            { q: "Nguyễn Tất Thành từ Anh trở lại Pháp vào năm nào?", a: ["Cuối năm 1915", "Cuối năm 1916", "Cuối năm 1917", "Cuối năm 1918"], c: 2, r: "Sau khoảng 4 năm sống và làm việc tại Anh, cuối năm 1917 Bác đã trở lại Pháp để hoạt động chính trị [9]." },
                            { q: "Nguyễn Tất Thành vào Đảng xã hội Pháp năm nào?", a: ["Đầu năm 1917", "Đầu năm 1918", "Đầu năm 1919", "Đầu năm 1920"], c: 2, r: "Đầu năm 1919, Người gia nhập Đảng Xã hội Pháp, một tổ chức chính trị tiến bộ nhất nước Pháp lúc bấy giờ [9]." },
                            { q: "Hồ Chí Minh vĩnh biệt chúng ta vào ngày tháng năm nào?", a: ["Ngày 1/9/1969", "Ngày 2/9/1969", "Ngày 3/9/1969", "Ngày 4/9/1969"], c: 1, r: "Chủ tịch Hồ Chí Minh qua đời vào ngày 2/9/1969 (lúc 9h47 phút sáng) [9], [10]." },
                            { q: "'Đảng lấy chủ nghĩa Mác-Lênin và tư tưởng Hồ Chí Minh làm nền tảng tư tưởng và kim chỉ nam cho mọi hành động cách mạng'. Câu nói trên được Đảng ta khẳng định lần đầu tiên tại Đại hội đại biểu toàn quốc lần thứ mấy?", a: ["Đại hội lần thứ V", "Đại hội lần thứ VI", "Đại hội lần thứ VII", "Đại hội lần thứ VIII"], c: 2, r: "Tại Đại hội VII (1991), Đảng chính thức nâng tầm Tư tưởng Hồ Chí Minh thành nền tảng tư tưởng của Đảng [10], [11]." },
                            { q: "Tư tưởng Hồ Chí Minh hình thành và phát triển qua mấy thời kỳ?", a: ["3", "4", "5", "6"], c: 2, r: "Gồm 5 thời kỳ: Trước 1911; 1911-1920; 1920-1930; 1930-1945 và 1945-1969 [11]." },
                            { q: "'Dân tộc ta, nhân dân ta, non sông đất nước ta đã sinh ra Hồ Chủ tịch, người anh hùng dân tộc vĩ đại...'. Câu nói trên ở trong văn kiện nào?", a: ["Lời kêu gọi Ban chấp hành Trung ương Đảng lao động Việt Nam ngày 3/9/1969", "Điếu văn của Ban Chấp hành Trung ương Đảng lao động Việt Nam đọc tại lễ truy diệu Chủ tịch Hồ Chí Minh ngày 9/9/1969.", "Diễn văn của Ban Chấp hành Trung ương Đảng LĐVN đọc tại lễ kỷ niệm 80 năm ngày sinh của Hồ Chí Minh.", "Diễn văn của Ban Chấp hành Trung ương Đảng CSVN đọc tại lễ kỷ niệm 100 năm ngày sinh của Hồ Chí Minh."], c: 1, r: "Đây là câu mở đầu vô cùng xúc động trong bản Điếu văn do đồng chí Lê Duẩn đọc trong Lễ truy điệu Bác ngày 9/9/1969 [11], [12]." },
                            { q: "Hãy lựa chọn câu trả lời đúng nhất:", a: ["Hồ Chí Minh là anh hùng giải phóng dân tộc và là nhà văn hóa lớn.", "Hồ Chí Minh là anh hùng giải phóng của dân tộc Việt Nam và là danh nhân văn hóa kiệt xuất của thế giới.", "Hồ Chí Minh là anh hùng giải phóng dân tộc và là nhà văn hóa kiệt xuất của Việt Nam.", "Hồ Chí Minh là anh hùng giải phóng dân tộc của dân tộc Việt Nam và là nhà văn hoá lỗi lạc."], c: 2, r: "Năm 1987, UNESCO đã vinh danh Bác với 2 danh hiệu chính thức: 'Anh hùng giải phóng dân tộc và Nhà văn hóa kiệt xuất của Việt Nam' [12], [13]." },
                            { q: "Chọn đáp án trả lời đúng nhất:", a: ["Chủ nghĩa Mác - Lênin là nền tảng tư tưởng, kim chỉ nam cho hành động của Đảng ta.", "Tư tưởng Hồ Chí Minh là nền tảng tư tưởng, kim chỉ nam cho hành động của Đảng ta.", "Cùng với chủ nghĩa Mác - Lênin, tư tưởng Hồ Chí Minh là nền tảng tư tưởng và kim chỉ nam cho hành động cách mạng của Đảng ta.", "Cả ba đáp án còn lại đều đúng."], c: 2, r: "Đảng ta luôn khẳng định lấy cả Chủ nghĩa Mác - Lênin VÀ Tư tưởng Hồ Chí Minh làm nền tảng tư tưởng [13], [14]." },
                            { q: "Theo Hồ Chí Minh, ưu điểm lớn nhất của học thuyết Khổng Tử là gì?", a: ["Tinh thần hiếu học.", "Quản lý xã hội bằng đạo đức.", "Sự tu dưỡng đạo đức cá nhân.", "Đề cao văn hoá, lễ giáo."], c: 2, r: "Bác đánh giá cao Nho giáo (Khổng Tử) ở điểm cốt lõi là luôn chú trọng việc 'tu thân' (tu dưỡng đạo đức cá nhân) [14]." },
                            { q: "Hồ Chí Minh đã tiếp thu những yếu tố tích cực nào của Phật giáo?", a: ["Tư tưởng vị tha", "Tinh thần từ bi, bác ái", "Tinh thần cứu khổ, cứu nạn", "Cả ba đáp án còn lại đều đúng"], c: 3, r: "Bác đã gạn lọc và kế thừa toàn bộ tinh thần vị tha, từ bi bác ái và mong muốn cứu khổ chúng sinh của Phật giáo [14]." },
                            { q: "Theo Hồ Chí Minh, ưu điểm lớn nhất của chủ nghĩa Mác là gì?", a: ["Bản chất cách mạng", "Bản chất khoa học", "Chủ nghĩa nhân đạo cộng sản", "Phương pháp làm việc biện chứng"], c: 3, r: "Bác nhận định: Ưu điểm vĩ đại nhất của chủ nghĩa Mác chính là cung cấp cho nhân loại 'phương pháp làm việc biện chứng' [14], [15]." },
                            { q: "Hồ Chí Minh lần đầu tiên đến Liên Xô vào thời gian nào?", a: ["Năm 1921", "Năm 1922", "Năm 1923", "Năm 1924"], c: 2, r: "Bác bí mật rời nước Pháp, vượt qua Đức và đến Liên Xô vào tháng 6 năm 1923 [15]." },
                            { q: "Chọn đáp án trả lời đúng với tư tưởng Hồ Chí Minh:", a: ["Từ năm 1890 đến năm 1911: Thời kỳ nghiên cứu, khảo sát thực tế, đến với chủ nghĩa Mác - Lênin.", "Từ năm 1911 - 1920: Thời kỳ hình thành tư tưởng yêu nước, chí hướng cứu nước.", "Từ năm 1921 - 1930: Thời kỳ hình thành cơ bản tư tưởng về con đường cách mạng Việt Nam.", "Cả ba đáp án còn lại đều đúng"], c: 2, r: "Giai đoạn 1921 - 1930 (với sự ra đời của Đường Kách mệnh và Cương lĩnh chính trị đầu tiên) là thời kỳ hình thành cơ bản tư tưởng về con đường cách mạng VN [15], [16]." }
                        ]
                    },
                    2: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: "Phần 2: Con đường cứu nước, Giải phóng dân tộc và Chủ nghĩa Xã hội",
                        questions: [
                            { q: "Trong quá trình hình thành và phát triển tư tưởng Hồ Chí Minh, thời kỳ nào là thời kỳ tìm tòi con đường cứu nước giải phóng dân tộc?", a: ["Trước năm 1911", "1911 - 1920", "1921 - 1930", "1930 - 1945"], c: 1, r: "Giai đoạn 1911 (Bác ra đi tìm đường cứu nước) đến năm 1920 (Bác đọc Luận cương của Lênin) là thời kỳ Người đi khắp năm châu để khảo sát và tìm tòi con đường cứu nước đúng đắn." },
                            { q: "Trong quá trình hình thành và phát triển tư tưởng Hồ Chí Minh, thời kỳ nào là thời kỳ hình thành về cơ bản tư tưởng cách mạng Việt Nam?", a: ["1911 - 1920", "1921 - 1930", "1930 - 1945", "1945 - 1969"], c: 1, r: "Giai đoạn 1921-1930, với hàng loạt tác phẩm như Bản án chế độ thực dân Pháp, Đường Kách mệnh và đặc biệt là Cương lĩnh chính trị đầu tiên (1930), tư tưởng về con đường cách mạng Việt Nam đã được định hình cơ bản." },
                            { q: "Trong quá trình hình thành và phát triển tư tưởng Hồ Chí Minh, thời kỳ nào là thời kỳ vượt qua thử thách, kiên trì giữ vững lập trường cách mạng?", a: ["1911 - 1920", "1921 - 1930", "1930 - 1945", "1945 - 1969"], c: 2, r: "Từ 1930-1945, Bác phải đối mặt với một số hiểu lầm từ Quốc tế Cộng sản về vấn đề dân tộc, nhưng Người vẫn kiên định với lập trường giải phóng dân tộc là nhiệm vụ số một." },
                            { q: "Trong quá trình hình thành và phát triển tư tưởng Hồ Chí Minh, thời kỳ nào là Tư tưởng Hồ Chí Minh tiếp tục phát triển, hoàn thiện?", a: ["1911 - 1920", "1921 - 1930", "1930 - 1945", "1945 - 1969"], c: 3, r: "Thời kỳ 1945-1969, trên cương vị người đứng đầu Đảng và Nhà nước lãnh đạo hai cuộc kháng chiến và xây dựng CNXH ở miền Bắc, tư tưởng của Người đã phát triển và hoàn thiện tột bậc." },
                            { q: "Tư tưởng Hồ Chí Minh là hệ thống quan điểm toàn diện và sâu sắc về những vấn đề cơ bản của cách mạng Việt Nam. Những vấn đề đó thuộc phạm vi nào?", a: ["Trong cách mạng dân tộc dân chủ nhân dân.", "Trong cách mạng xã hội chủ nghĩa.", "Cả trong cách mạng dân tộc dân chủ nhân dân và cách mạng xã hội chủ nghĩa.", "Trong thế kỷ XX."], c: 2, r: "Tư tưởng của Bác vạch ra đường lối chiến lược xuyên suốt: hoàn thành giải phóng dân tộc (cách mạng dân tộc dân chủ) và tiến thẳng lên Chủ nghĩa xã hội." },
                            { q: "Chọn cụm từ đúng điền vào dấu....: Tháng 7 năm 1920, Hồ Chí Minh đọc ... của V.I. Lênin.", a: ["Tác phẩm 'Nhà nước và cách mạng'.", "Tác phẩm 'Những nhiệm vụ trước mắt của chính quyền xô viết'.", "Sơ thảo lần thứ nhất Luận cương về các vấn đề dân tộc.", "Sơ thảo lần thứ nhất Luận cương về các vấn đề dân tộc và vấn đề thuộc địa."], c: 3, r: "Bản Luận cương nổi tiếng này của Lênin đăng trên báo L'Humanité đã giúp Bác tìm ra con đường cứu nước đúng đắn cho dân tộc Việt Nam." },
                            { q: "Hồ Chí Minh được Đại hội đồng UNESCO ra Nghị quyết công nhận là 'Anh hùng giải phóng dân tộc và Nhà văn hóa kiệt xuất của Việt Nam' vào năm nào?", a: ["Năm 1969", "Năm 1975", "Năm 1987", "Năm 1990"], c: 2, r: "Năm 1987, UNESCO đã thông qua Nghị quyết số 24C/18.65 để tôn vinh Chủ tịch Hồ Chí Minh nhân dịp kỷ niệm 100 năm ngày sinh của Người (vào năm 1990)." },
                            { q: "Hồ Chí Minh nói câu: 'Không có gì quý hơn độc lập, tự do' vào thời gian nào?", a: ["Năm 1945", "Năm 1954", "Năm 1960", "Năm 1966"], c: 3, r: "Chân lý thời đại 'Không có gì quý hơn độc lập, tự do' được Bác khẳng định trong Lời kêu gọi đồng bào và chiến sĩ cả nước vào ngày 17/7/1966 khi Mỹ leo thang đánh phá miền Bắc." },
                            { q: "Theo Hồ Chí Minh, cách mạng giải phóng dân tộc muốn giành được thắng lợi cần phải:", a: ["Đi theo con đường cách mạng vô sản.", "Có Đảng cộng sản lãnh đạo.", "Tiến hành bằng bạo lực cách mạng.", "Cả ba đáp án còn lại đều đúng."], c: 3, r: "Ba yếu tố cốt lõi: đi theo quỹ đạo vô sản, sự lãnh đạo của Đảng và sử dụng sức mạnh bạo lực cách mạng của quần chúng là điều kiện bắt buộc để giành thắng lợi." },
                            { q: "Chọn đáp án trả lời đúng với tư tưởng Hồ Chí Minh về mối quan hệ giữa cách mạng thuộc địa và cách mạng ở chính quốc:", a: ["Giành thắng lợi đồng thời với cách mạng vô sản ở chính quốc.", "Phụ thuộc vào thắng lợi của cách mạng vô sản ở chính quốc.", "Cách mạng giải phóng dân tộc ở thuộc địa có khả năng giành được thắng lợi trước cách mạng vô sản ở chính quốc.", "Không có mối liên hệ nào với nhau."], c: 2, r: "Đây là một luận điểm sáng tạo đột phá của Bác. Bác cho rằng thuộc địa là 'nọc độc và sức sống' của CNTB, cách mạng thuộc địa có thể nổ ra và thắng lợi trước để hỗ trợ chính quốc." },
                            { q: "Chọn cụm từ đúng điền vào chỗ trống trong câu viết sau đây của Hồ Chí Minh: 'Toàn quốc đồng bào hãy đứng dậy.... mà tự giải phóng cho ta'.", a: ["dựa vào sự giúp đỡ quốc tế", "đem sức ta", "dựa vào sự đoàn kết toàn dân", "dưới sự lãnh đạo của Đảng"], c: 1, r: "Quan điểm 'Đem sức ta mà tự giải phóng cho ta' nhấn mạnh tinh thần độc lập, tự chủ và tự lực cánh sinh dựa vào sức mạnh nội lực là chính." },
                            { q: "Chọn cụm từ đúng điền vào chỗ trống trong câu viết sau đây của Hồ Chí Minh: 'Toàn thể dân tộc Việt Nam quyết đem...... để giữ vững quyền tự do, độc lập ấy'.", a: ["lòng dũng cảm và sự hy sinh", "toàn bộ sức lực.", "tất cả tinh thần và lực lượng.", "tất cả tinh thần và lực lượng, tính mạng và của cải."], c: 3, r: "Đây là lời thề đanh thép, kết tinh ý chí của cả dân tộc được Bác đọc ở đoạn kết của bản Tuyên ngôn Độc lập ngày 2/9/1945." },
                            { q: "Hồ Chí Minh viết bản Tuyên ngôn Độc lập khai sinh nước Việt Nam Dân chủ Cộng hòa vào năm nào?", a: ["Năm 1930", "Năm 1941", "Năm 1945", "Năm 1946"], c: 2, r: "Bác trực tiếp soạn thảo bản Tuyên ngôn Độc lập tại nhà số 48 Hàng Ngang (Hà Nội) vào những ngày cuối tháng 8 và đọc vào ngày 2/9/1945." },
                            { q: "Tác phẩm 'Bản án chế độ thực dân Pháp' của Hồ Chí Minh được xuất bản lần đầu tiên ở đâu?", a: ["Mỹ.", "Anh.", "Pháp.", "Trung Quốc."], c: 2, r: "Để công kích trực diện kẻ thù, Bác đã viết và xuất bản tác phẩm này bằng chính ngôn ngữ của thực dân (tiếng Pháp) tại thủ đô Paris năm 1925." },
                            { q: "Hồ Chí Minh ra 'Lời kêu gọi toàn quốc kháng chiến' chống thực dân Pháp vào thời gian nào?", a: ["Ngày 19-12-1945.", "Ngày 19-12-1946.", "Ngày 19-12-1947.", "Ngày 19-12-1948."], c: 1, r: "Đêm ngày 19/12/1946, khi thực dân Pháp quyết tâm cướp nước ta một lần nữa, Bác đã phát lệnh Toàn quốc kháng chiến từ làng Vạn Phúc, Hà Đông." },
                            { q: "Chủ tịch Hồ Chí Minh lần đầu tiên từ nước ngoài trở về Tổ quốc (sau 30 năm bôn ba) vào thời gian nào?", a: ["Năm 1930", "Năm 1941", "Năm 1944", "Năm 1945"], c: 1, r: "Ngày 28/1/1941, Bác đã bước qua cột mốc 108 tại biên giới Việt - Trung để trở về Pác Bó (Cao Bằng), trực tiếp lãnh đạo phong trào cách mạng." },
                            { q: "Trong những tác phẩm dưới đây, tác phẩm nào KHÔNG phải do Hồ Chí Minh viết?", a: ["Bản án chế độ thực dân Pháp.", "Đường cách mệnh.", "Tuyên ngôn Độc lập.", "Tuyên ngôn của Đảng Cộng sản."], c: 3, r: "Tuyên ngôn của Đảng Cộng sản là tác phẩm kinh điển của C. Mác và Ph. Ăng-ghen xuất bản năm 1848, không phải của Bác Hồ." },
                            { q: "Hồ Chí Minh khẳng định độc lập, tự do là quyền thiêng liêng, bất khả xâm phạm của tất cả các dân tộc vào thời gian nào?", a: ["Trong cách mạng tháng 8-1945.", "Trong kháng chiến chống Pháp.", "Trong kháng chiến chống Mỹ.", "Cả các đáp án còn lại đều đúng."], c: 3, r: "Chân lý độc lập, tự do là sợi chỉ đỏ xuyên suốt trong toàn bộ hệ thống tư tưởng của Bác ở mọi giai đoạn lịch sử." },
                            { q: "Hồ Chí Minh khẳng định chủ nghĩa dân tộc là một động lực lớn ở các nước đang đấu tranh giành độc lập. Đó là chủ nghĩa dân tộc nào?", a: ["Chủ nghĩa nhân đạo cộng sản.", "Chủ nghĩa dân tộc chân chính.", "Chủ nghĩa sô vanh, nước lớn.", "Chủ nghĩa dân tộc vị kỷ."], c: 1, r: "Chủ nghĩa dân tộc chân chính (chủ nghĩa yêu nước truyền thống) mang sức mạnh to lớn, hoàn toàn khác biệt với chủ nghĩa dân tộc cực đoan hay hẹp hòi." },
                            { q: "Việc Hồ Chí Minh kết hợp nhuần nhuyễn vấn đề dân tộc với vấn đề giai cấp, độc lập dân tộc và chủ nghĩa xã hội, phản ánh điều gì?", a: ["Quy luật khách quan của cách mạng giải phóng dân tộc trong thời đại cách mạng vô sản.", "Quy luật khách quan của mối quan hệ giữa các mục tiêu giải phóng dân tộc, giải phóng giai cấp và giải phóng con người.", "Mối quan hệ giữa mục tiêu trước mắt và mục tiêu lâu dài.", "Cả ba đáp án còn lại đều đúng."], c: 3, r: "Sự kết hợp này vừa đáp ứng đòi hỏi của thực tiễn lịch sử, vừa thể hiện tính quy luật khách quan của cuộc cách mạng ở các nước thuộc địa." },
                            { q: "Nội dung giải phóng dân tộc theo con đường cách mạng vô sản bao gồm những gì?", a: ["Đi từ giải phóng dân tộc tiến tới xã hội cộng sản.", "Lực lượng lãnh đạo là giai cấp công nhân.", "Lực lượng cách mạng là toàn dân tộc.", "Cả ba đáp án còn lại đều đúng."], c: 3, r: "Con đường cách mạng vô sản đòi hỏi phải do Đảng của giai cấp công nhân lãnh đạo, phát huy sức mạnh toàn dân tộc để tiến lên CNXH và CNCS." },
                            { q: "Cách mạng giải phóng dân tộc trong thời đại mới phải do Đảng Cộng sản lãnh đạo, để làm gì?", a: ["Giác ngộ dân chúng.", "Tổ chức, tập hợp dân chúng.", "Đoàn kết với giai cấp vô sản và các dân tộc bị áp bức trên thế giới.", "Cả ba đáp án còn lại đều đúng."], c: 3, r: "Đảng Cộng sản là bộ tham mưu đóng vai trò thức tỉnh quần chúng, tổ chức lực lượng và kết nối sức mạnh quốc tế." },
                            { q: "Lực lượng trong cách mạng giải phóng dân tộc gồm có những thành phần nào?", a: ["Công nhân, nông dân.", "Công nhân, nông dân, trí thức.", "Công nhân, nông dân, tiểu tư sản, tư sản dân tộc.", "Toàn dân tộc."], c: 3, r: "Cách mạng giải phóng dân tộc không phải là việc của một, hai giai cấp mà là sự nghiệp chung của khối đại đoàn kết toàn dân tộc." },
                            { q: "Cách mạng bạo lực được thực hiện thông qua những hình thức đấu tranh nào?", a: ["Đấu tranh vũ trang.", "Đấu tranh chính trị.", "Sự kết hợp giữa đấu tranh vũ trang và đấu tranh chính trị.", "Cả ba đáp án còn lại đều đúng."], c: 2, r: "Bạo lực cách mạng theo tư tưởng Bác Hồ là sức mạnh tổng hợp của quần chúng, kết hợp nhuần nhuyễn giữa bạo lực chính trị và bạo lực vũ trang." },
                            { q: "Kiên trì con đường Hồ Chí Minh đã lựa chọn có nghĩa là gì?", a: ["Giữ vững nền độc lập dân tộc.", "Thực hiện triệt để cuộc cách mạng dân tộc dân chủ nhân dân.", "Thực hiện mục tiêu độc lập dân tộc gắn liền với chủ nghĩa xã hội.", "Hội nhập với nền kinh tế thế giới."], c: 2, r: "Độc lập dân tộc gắn liền với chủ nghĩa xã hội là tư tưởng cốt lõi, là sợi chỉ đỏ xuyên suốt con đường cách mạng mà Bác đã vạch ra." },
                            { q: "Trong bản 'Yêu sách của nhân dân An Nam' gửi đến Hội nghị Véc xây, lúc đó Hồ Chí Minh mang tên là gì?", a: ["Nguyễn Tất Thành", "Nguyễn Ái Quốc", "Văn Ba", "Trần Vương"], c: 1, r: "Năm 1919, Bác đã thay mặt những người Việt Nam yêu nước ký tên Nguyễn Ái Quốc dưới bản Yêu sách 8 điểm gửi Hội nghị Versailles." },
                            { q: "Những câu sau đây, câu nào là quan điểm của Hồ Chí Minh?", a: ["Sự tàn bạo của chủ nghĩa tư bản đã chuẩn bị đất rồi, CNXH chỉ còn phải làm cái việc là gieo hạt giống...", "Xem xét lại chủ nghĩa Mác về cơ sở lịch sử của nó, củng cố nó bằng dân tộc học phương Đông.", "Chủ nghĩa dân tộc là động lực lớn của đất nước.", "Cả ba đáp án còn lại đều đúng."], c: 3, r: "Đây đều là những nhận định vô cùng sâu sắc và sáng tạo của Bác khi vận dụng chủ nghĩa Mác - Lênin vào đặc thù các nước phương Đông." },
                            { q: "Câu: '... Chủ trương làm tư sản dân quyền cách mạng và thổ địa cách mạng để đi tới xã hội cộng sản' được trích từ văn kiện nào của Hồ Chí Minh?", a: ["Đường cách mệnh.", "Chính cương vắn tắt của Đảng.", "Sách lược vắn tắt của Đảng.", "Chương trình tóm tắt của Đảng."], c: 1, r: "Đây là đường lối chiến lược cơ bản đầu tiên của cách mạng Việt Nam được Bác vạch ra trong Chánh cương vắn tắt (1930)." },
                            { q: "Trong lời kêu gọi của Hồ Chí Minh có câu: 'Toàn quốc đồng bào hãy đứng dậy đem sức ta mà tự giải phóng cho ta'. Lời kêu gọi đó ra đời vào thời gian nào?", a: ["Tháng 3/1945", "Tháng 8/1945", "Tháng 9/1945", "Tháng 12/1946"], c: 1, r: "Đây là câu trích trong Thư kêu gọi Tổng khởi nghĩa của Bác gửi đồng bào cả nước vào giữa tháng 8 năm 1945." },
                            { q: "Câu nói: 'Chúng ta thà hy sinh tất cả chứ nhất định không chịu mất nước, nhất định không chịu làm nô lệ' được Hồ Chí Minh phát biểu vào thời gian nào?", a: ["Tháng 8/1945", "Tháng 9/1945", "Tháng 12/1946", "Tháng 6/1966"], c: 2, r: "Đoạn văn hào hùng này nằm trong Lời kêu gọi Toàn quốc kháng chiến chống thực dân Pháp ban hành ngày 19/12/1946." },
                            { q: "Câu nói: 'Chiến tranh có thể kéo dài 5 năm, 10 năm, 20 năm hoặc lâu hơn nữa... Không có gì quý hơn độc lập tự do' được công bố vào dịp nào?", a: ["Lời kêu gọi ngày 19 - 12 - 1946", "Lời kêu gọi ngày 17 - 7 - 1966", "Thư chúc tết đầu Xuân 1969", "Bản Di chúc của Hồ Chí Minh"], c: 1, r: "Lời thề quyết tâm kháng chiến chống Mỹ cứu nước này được Bác đọc trong Lời kêu gọi đồng bào và chiến sĩ cả nước ngày 17/7/1966." },
                            { q: "Ai là người đã có công lớn trong việc giúp Hồ Chí Minh thoát khỏi nhà tù của thực dân Anh ở Hồng Kông (1931-1933)?", a: ["Tô mát Xautôn", "Luật sư Lôdơbai (Lôdơbi)", "Luật sư Nôoen Pri", "Đồng chí Hồ Tùng Mậu"], c: 1, r: "Vợ chồng vị Luật sư người Anh Loseby (Lô-dơ-by) đã tận tình bào chữa và bố trí cho Bác bí mật rời khỏi Hồng Kông an toàn." },
                            { q: "Hội nghị Ban Chấp hành Trung ương Đảng lần thứ 8 (tháng 5/1941) tại Pác Bó do ai làm chủ tọa?", a: ["Nguyễn Ái Quốc", "Trường Chinh", "Hoàng Quốc Việt", "Hoàng Văn Thụ"], c: 0, r: "Sau khi về nước, lãnh tụ Nguyễn Ái Quốc đã trực tiếp triệu tập và chủ trì Hội nghị Trung ương 8 lịch sử để chuyển hướng chỉ đạo chiến lược." },
                            { q: "Đảng ta khẳng định: 'Trong lúc này, quyền lợi của dân tộc phải đặt lên trên hết, trước hết'. Đó là nghị quyết của Hội nghị Trung ương nào?", a: ["Hội nghị TW6 (11/1939)", "Hội nghị TW7 (11/1940)", "Hội nghị TW8 (5/1941)", "Hội nghị toàn quốc của Đảng (8/1945)"], c: 2, r: "Tại Hội nghị Trung ương 8 (5/1941), Đảng quyết định tạm gác khẩu hiệu cách mạng ruộng đất để tập trung tối đa cho nhiệm vụ giải phóng dân tộc." },
                            { q: "Đoạn văn: 'Toàn thể dân tộc Việt Nam quyết đem tất cả tinh thần và lực lượng, tính mạng và của cải để giữ vững quyền tự do, độc lập ấy' được trích từ đâu?", a: ["Thư kêu gọi Tổng khởi nghĩa.", "Tuyên ngôn Độc lập.", "Lời kêu gọi Toàn quốc kháng chiến.", "Thư gửi đồng bào Nam bộ."], c: 1, r: "Đây là câu chốt đanh thép ở phần cuối của bản Tuyên ngôn Độc lập khai sinh nước Việt Nam Dân chủ Cộng hòa." },
                            { q: "Trong những câu dưới đây, câu nào bị trích dẫn SAI nguyên văn của Hồ Chí Minh?", a: ["Không có gì quý hơn độc lập, tự do.", "Không có gì quý bằng độc lập, tự do.", "Cay đắng chi bằng mất tự do.", "Chúng ta thà hy sinh tất cả, chứ nhất định không chịu mất nước..."], c: 1, r: "Nguyên văn đúng mà Bác dùng là từ 'hơn' (Không có gì quý HƠN độc lập, tự do), không phải dùng từ 'bằng'." },
                            { q: "Cơ sở nào hình thành quan niệm của Hồ Chí Minh về những đặc trưng bản chất của CNXH?", a: ["Chủ nghĩa Mác-Lênin.", "Thực tiễn xây dựng CNXH ở Việt Nam.", "Nghiên cứu kinh nghiệm của các nước xã hội chủ nghĩa.", "Chủ nghĩa Mác-Lênin và thực tiễn xây dựng CNXH ở Việt Nam."], c: 3, r: "Tư tưởng của Bác là sự kết hợp nhuần nhuyễn giữa lý luận khoa học của chủ nghĩa Mác-Lênin và quá trình tổng kết thực tiễn cách mạng Việt Nam." },
                            { q: "Theo quan điểm của Hồ Chí Minh về Nhà nước của dân thì:", a: ["Nhân dân là người chịu sự quản lý.", "Nhân dân là người phục vụ.", "Nhân dân là người đại diện cho quyền lực nhà nước.", "Dân là chủ và dân làm chủ."], c: 3, r: "Bác khẳng định rất rõ ràng: 'Nước ta là nước dân chủ, bao nhiêu quyền hành và lực lượng đều ở nơi dân'. Dân là người chủ của đất nước." },
                            { q: "Chế độ chính trị do nhân dân làm chủ được hiểu như thế nào?", a: ["Nhân dân có quyền bầu cử, ứng cử.", "Nhân dân có quyền kiểm soát, bãi miễn đại biểu Quốc hội, HĐND.", "Nhân dân phải thực hiện các nghĩa vụ công dân.", "Nhân dân có tất cả các quyền và nghĩa vụ nêu trong ba phương án còn lại."], c: 3, r: "Dân chủ thể hiện toàn diện trên mọi phương diện: quyền tham gia bầu cử, quyền giám sát bãi miễn và nghĩa vụ trách nhiệm đối với đất nước." },
                            { q: "Theo quan điểm của Hồ Chí Minh, nền kinh tế XHCN là nền kinh tế có đặc điểm thế nào?", a: ["Có công nghiệp hiện đại.", "Có nông nghiệp hiện đại.", "Có khoa học, kỹ thuật tiên tiến.", "Có công nghiệp, nông nghiệp hiện đại, có khoa học - kỹ thuật tiên tiến."], c: 3, r: "CNXH phải được xây dựng trên một cơ sở vật chất - kỹ thuật hiện đại, bao gồm cả công - nông nghiệp phát triển gắn với khoa học tiên tiến." },
                            { q: "Biện pháp để khơi dậy động lực của mỗi cá nhân trong xây dựng CNXH là:", a: ["Tác động vào nhu cầu và lợi ích của con người.", "Tác động vào các động lực chính trị, tinh thần.", "Phát huy vai trò lãnh đạo của Đảng và quản lý của Nhà nước.", "Cả ba phương án còn lại đều đúng."], c: 3, r: "Cần phải kết hợp hài hòa lợi ích vật chất, cổ vũ tinh thần và có sự tổ chức quản lý chặt chẽ từ phía Đảng và Nhà nước." },
                            { q: "Theo Hồ Chí Minh, những trở lực nào kìm hãm sự phát triển của CNXH?", a: ["Chủ nghĩa cá nhân.", "Bệnh tham ô, lãng phí, quan liêu.", "Sự chia rẽ, bè phái, mất đoàn kết.", "Cả ba phương án còn lại đều đúng."], c: 3, r: "Tất cả những thói hư tật xấu như chủ nghĩa cá nhân, bè phái hay tham ô lãng phí đều được Bác coi là 'giặc nội xâm' cản bước tiến lên CNXH." },
                            { q: "Nhiệm vụ lịch sử của thời kỳ quá độ lên CNXH ở Việt Nam là:", a: ["Xây dựng nền tảng vật chất và kĩ thuật của chủ nghĩa xã hội.", "Cải tạo nền kinh tế cũ, xây dựng nền kinh tế mới.", "Thực hiện cả cải tạo nền kinh tế cũ và xây dựng nền tảng vật chất kỹ thuật mới.", "Xây dựng hệ thống chính trị vững mạnh."], c: 2, r: "Quá độ là một quá trình cải biến sâu sắc, do đó nhiệm vụ phải bao gồm cả 2 mặt: cải tạo tận gốc rễ nền kinh tế cũ và xây dựng lực lượng sản xuất mới." },
                            { q: "Theo Hồ Chí Minh, chủ nghĩa cộng sản (cách mạng vô sản) thích ứng ở đâu dễ hơn?", a: ["Ở các nước châu Âu.", "Ở các nước châu Á, phương Đông.", "Ở các nước tư bản phát triển nhất.", "Ở tất cả châu lục."], c: 1, r: "Trái với dự đoán của C. Mác, Bác nhận định sự áp bức bóc lột nặng nề của thực dân và văn hóa làng xã khiến CNCS dễ nổ ra ở phương Đông hơn." },
                            { q: "Theo giáo trình Tư tưởng Hồ Chí Minh, nguyên tắc phân phối chủ yếu trong chủ nghĩa xã hội là gì?", a: ["Làm theo năng lực, hưởng theo nhu cầu.", "Làm theo năng lực, hưởng theo lao động.", "Phân phối bình quân cho tất cả mọi người.", "Theo lao động và cổ phần đóng góp."], c: 1, r: "CNXH áp dụng nguyên tắc phân phối công bằng: 'Làm theo năng lực, hưởng theo lao động', ai làm nhiều hưởng nhiều, không làm không hưởng." },
                            { q: "Theo Hồ Chí Minh, tại sao cần thực hiện chế độ 'làm khoán' dưới chủ nghĩa xã hội?", a: ["Khuyến khích được lợi ích của người lao động.", "Có lợi cho tập thể.", "Có lợi cho Nhà nước.", "Cả ba phương án còn lại đều đúng."], c: 3, r: "Chế độ khoán kết hợp được hài hòa cả 3 mặt lợi ích: cá nhân, tập thể và nhà nước, từ đó tạo ra động lực to lớn thúc đẩy sản xuất." },
                            { q: "Điều mong muốn cuối cùng của Hồ Chí Minh được nêu ở đoạn kết Di chúc là gì?", a: ["… làm sao cho nước ta được hoàn toàn độc lập, dân ta được hoàn toàn tự do...", "Không có gì quý hơn độc lập tự do!...", "Đưa cuộc kháng chiến chống Mỹ cứu nước đến thắng lợi hoàn toàn.", "Toàn Đảng, toàn dân ta đoàn kết phấn đấu xây dựng một nước Việt Nam hòa bình, thống nhất, độc lập, dân chủ, giàu mạnh và góp phần xứng đáng vào sự nghiệp cách mạng thế giới."], c: 3, r: "Đây là khát vọng tột bậc, là lời gửi gắm tâm huyết nhất của Bác mong muốn toàn dân tộc tiếp tục vững bước xây dựng đất nước." },
                            { q: "Theo Hồ Chí Minh, mục tiêu cao nhất của CNXH là:", a: ["Khoa học - kỹ thuật tiên tiến.", "Kinh tế phát triển.", "Xã hội bình đẳng.", "Nâng cao đời sống nhân dân."], c: 3, r: "Mục tiêu tối thượng và bản chất nhân văn của chủ nghĩa xã hội mà Bác hướng tới chính là không ngừng cải thiện, nâng cao đời sống cho nhân dân." },
                            { q: "Mặt trận Việt Minh (Việt Nam Độc lập Đồng minh) được Hồ Chí Minh thành lập vào thời gian nào?", a: ["Năm 1938", "Năm 1941", "Năm 1944", "Năm 1946"], c: 1, r: "Tháng 5 năm 1941 (tại Hội nghị Trung ương 8), Bác quyết định thành lập Mặt trận Việt Minh để tập hợp rộng rãi lực lượng toàn dân tộc." },
                            { q: "Mặt trận thống nhất Liên - Việt được thành lập vào thời gian nào?", a: ["Năm 1945", "Năm 1951", "Năm 1960", "Năm 1955"], c: 1, r: "Tháng 3/1951, Đại hội đại biểu Mặt trận Việt Minh và Mặt trận Liên Việt đã nhất trí hợp nhất thành một tổ chức chung lấy tên là Mặt trận Liên - Việt." }
                        ]
                    },
                    3: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: "Phần 3: Tư tưởng về Đảng, Nhà nước và Đại đoàn kết dân tộc",
                        questions: [
                            { q: "Sức mạnh dân tộc bao gồm những yếu tố chủ yếu nào?", a: ["Chủ nghĩa yêu nước.", "Tinh thần đoàn kết.", "Ý thức tự lực, tự cường.", "Cả 3 phương án trên."], c: 3, r: "Sức mạnh nội lực của dân tộc Việt Nam được cấu thành từ truyền thống yêu nước nồng nàn, tinh thần đoàn kết keo sơn và ý chí tự lực, tự cường." },
                            { q: "Theo giáo trình Tư tưởng Hồ Chí Minh, động lực chủ yếu của sự phát triển nước ta hiện nay là gì?", a: ["Phát huy sức mạnh đại đoàn kết dân tộc.", "Đẩy mạnh quá trình hội nhập quốc tế.", "Ra sức tranh thủ nguồn vốn đầu tư của nước ngoài.", "Nâng cao năng lực cạnh tranh của nền kinh tế."], c: 0, r: "Đại đoàn kết toàn dân tộc luôn được Đảng ta xác định là nguồn sức mạnh, là động lực chủ yếu và là nhân tố có ý nghĩa quyết định bảo đảm thắng lợi bền vững." },
                            { q: "Tìm yếu tố KHÔNG nằm trong cơ cấu mặt trận dân tộc thống nhất?", a: ["Đảng Cộng sản.", "Nhà nước xã hội chủ nghĩa.", "Các tổ chức chính trị - xã hội.", "Tất cả các phương án trên."], c: 1, r: "Mặt trận Dân tộc thống nhất là một bộ phận của hệ thống chính trị (gồm Đảng, Nhà nước và Mặt trận). Do đó, Nhà nước là một thực thể quản lý độc lập, không nằm 'trong' cơ cấu Mặt trận." },
                            { q: "Theo tư tưởng Hồ Chí Minh, động lực quyết định nhất của chủ nghĩa xã hội là gì?", a: ["Nguồn tài nguyên, đất đai.", "Cơ sở vật chất – kỹ thuật hiện có.", "Con người.", "Sự hợp tác quốc tế."], c: 2, r: "Chủ nghĩa xã hội lấy con người làm mục tiêu, đồng thời bản thân con người (với tri thức, đạo đức, sức sáng tạo) cũng chính là động lực sống còn, quyết định nhất." },
                            { q: "Theo Hồ Chí Minh, biện pháp nào quan trọng nhất trong xây dựng chủ nghĩa xã hội?", a: ["Tranh thủ tối đa sự giúp đỡ, viện trợ quốc tế.", "Huy động các nguồn lực sẵn có trong dân.", "Kết hợp cải tạo xã hội cũ với xây dựng xã hội mới.", "Kết hợp xây dựng và bảo vệ đất nước."], c: 1, r: "Bác luôn nhấn mạnh: 'Đem tài dân, sức dân, của dân làm lợi cho dân'. Huy động tối đa nguồn nội lực trong nhân dân là biện pháp kiến thiết quan trọng nhất." },
                            { q: "Nhận định: 'Dân ta có một lòng nồng nàn yêu nước. Đó là một truyền thống quý báu của ta. Từ xưa đến nay, mỗi khi Tổ quốc bị xâm lăng...' được trích từ tác phẩm nào?", a: ["Tuyên ngôn Độc lập.", "Lời kêu gọi toàn quốc kháng chiến.", "Báo cáo chính trị tại Đại hội đại biểu toàn quốc lần thứ II của Đảng.", "Diễn văn khai mạc Đại hội III của Đảng."], c: 2, r: "Đoạn văn tự hào về sức mạnh của lòng yêu nước này được Bác đọc trong Báo cáo chính trị tại Đại hội Đảng lần thứ II (1951)." },
                            { q: "Khẩu hiệu chiến lược: 'Giai cấp vô sản tất cả các nước và các dân tộc bị áp bức đoàn kết lại!' là của tác giả nào?", a: ["Các Mác.", "Ph. Ăngghen.", "V.I.Lênin.", "Hồ Chí Minh."], c: 2, r: "Đây là khẩu hiệu nổi tiếng do V.I. Lênin đề xướng, mở rộng từ khẩu hiệu của C.Mác ('Vô sản toàn thế giới liên hiệp lại') để bổ sung thêm lực lượng các dân tộc bị áp bức." },
                            { q: "Chọn câu trả lời đúng với tư tưởng Hồ Chí Minh về Đại đoàn kết:", a: ["Đại đoàn kết dân tộc là vấn đề sách lược.", "Đại đoàn kết dân tộc là vấn đề có ý nghĩa chiến lược.", "Đại đoàn kết dân tộc là khẩu hiệu tập hợp lực lượng cách mạng.", "Cả 3 phương án trên."], c: 1, r: "Bác khẳng định: 'Đoàn kết, đoàn kết, đại đoàn kết / Thành công, thành công, đại thành công'. Đây là vấn đề có ý nghĩa chiến lược, quyết định sự thành bại của cách mạng." },
                            { q: "Theo tư tưởng Hồ Chí Minh, lực lượng nền tảng của khối đại đoàn kết dân tộc gồm những thành phần nào?", a: ["Mọi người Việt Nam yêu nước.", "Công nhân, nông dân.", "Khối liên minh công - nông dân - lao động trí óc.", "Toàn thể dân tộc Việt Nam."], c: 2, r: "Đại đoàn kết là tập hợp toàn dân, nhưng nền tảng (cái gốc) của khối đại đoàn kết đó phải là liên minh vững chắc giữa giai cấp công nhân, nông dân và tầng lớp trí thức." },
                            { q: "Chọn câu trả lời đúng nhất với tư tưởng Hồ Chí Minh về Đảng và Mặt trận:", a: ["Đảng Cộng sản Việt Nam là thành viên của Mặt trận dân tộc thống nhất.", "Đảng Cộng sản Việt Nam là lực lượng lãnh đạo Mặt trận dân tộc thống nhất.", "Đảng Cộng sản Việt Nam vừa là thành viên, vừa là lực lượng lãnh đạo Mặt trận dân tộc thống nhất.", "Cả 3 phương án trên."], c: 2, r: "Đảng là một tổ chức cấu thành (thành viên) của Mặt trận, nhưng bằng đường lối đúng đắn và sự tiên phong, Đảng đồng thời giữ vai trò là lực lượng lãnh đạo Mặt trận." },
                            { q: "Mặt trận dân tộc thống nhất được tổ chức như thế nào theo tư tưởng Hồ Chí Minh?", a: ["Là tổ chức của các đảng phái, các đoàn thể, các nhân sĩ.", "Là tổ chức của các tầng lớp nhân dân.", "Là tổ chức của giai cấp công nhân, nông dân, lao động trí óc.", "Là nơi quy tụ mọi tổ chức chính trị - xã hội và cá nhân người Việt Nam ở trong nước và nước ngoài."], c: 3, r: "Mặt trận là hình thức tổ chức rộng rãi nhất, quy tụ mọi tổ chức, cá nhân, giai tầng người Việt Nam yêu nước bất kể trong hay ngoài nước." },
                            { q: "Cơ sở hình thành tư tưởng Hồ Chí Minh về đại đoàn kết dân tộc là gì?", a: ["Truyền thống yêu nước, đoàn kết, nhân nghĩa của dân tộc.", "Tổng kết kinh nghiệm phong trào cách mạng Việt Nam và thế giới.", "Quan điểm của chủ nghĩa Mác-Lênin.", "Cả 3 phương án trên."], c: 3, r: "Tư tưởng đại đoàn kết của Bác được hình thành từ 3 nguồn: truyền thống dân tộc, tổng kết thực tiễn cách mạng và lý luận của chủ nghĩa Mác - Lênin." },
                            { q: "Chọn đáp án trả lời đúng theo tư tưởng Hồ Chí Minh về Đoàn kết:", a: ["Đoàn kết là sức mạnh.", "Đoàn kết là then chốt của mọi thành công.", "Đoàn kết là nguồn gốc của mọi thắng lợi.", "Cả 3 phương án trên."], c: 3, r: "Bác luôn khẳng định sự đoàn kết chính là cội nguồn của sức mạnh, là then chốt và là nguyên nhân gốc rễ đưa đến mọi thắng lợi." },
                            { q: "Đại đoàn kết dân tộc có vị trí như thế nào trong sự nghiệp cách mạng?", a: ["Là mục tiêu, nhiệm vụ hàng đầu của Đảng.", "Là mục tiêu, nhiệm vụ hàng đầu của dân tộc.", "Vừa là mục tiêu, vừa là nhiệm vụ hàng đầu của Đảng và dân tộc.", "Là khẩu hiệu sách lược tạm thời."], c: 2, r: "Đại đoàn kết không chỉ là phương tiện mà còn là mục tiêu, là nhiệm vụ hàng đầu xuyên suốt của cả Đảng và toàn dân tộc." },
                            { q: "Nguyên tắc, phương châm xây dựng Mặt trận dân tộc thống nhất là gì?", a: ["Hiệp thương dân chủ.", "Dựa trên nền tảng liên minh công – nông – lao động trí óc.", "Đoàn kết chặt chẽ, lâu dài, đoàn kết thật sự chân thành.", "Cả 3 phương án trên."], c: 3, r: "Mặt trận hoạt động dựa trên sự thương lượng bàn bạc bình đẳng (hiệp thương dân chủ), có nền tảng vững chắc và đoàn kết chân thành, lâu dài." },
                            { q: "Luận điểm sau đây là của ai? 'Đảng tiêu biểu cho trí tuệ, danh dự, lương tâm của dân tộc và thời đại'.", a: ["Các Mác.", "V.I. Lênin.", "Xtalin.", "Hồ Chí Minh."], c: 3, r: "Đây là lời khẳng định tự hào của Bác Hồ về phẩm chất đạo đức, trí tuệ và vai trò cao cả của Đảng Cộng sản Việt Nam." },
                            { q: "Hồ Chí Minh đến với chủ nghĩa Mác - Lênin và trở thành người cộng sản đầu tiên của Việt Nam vào thời gian nào?", a: ["Năm 1919", "Năm 1920", "Năm 1925", "Năm 1930"], c: 1, r: "Tháng 7/1920, sau khi đọc Sơ thảo Luận cương của Lênin, Bác đã tìm thấy con đường cứu nước. Cuối năm 1920, Bác bỏ phiếu gia nhập Quốc tế Cộng sản, trở thành người cộng sản Việt Nam đầu tiên." },
                            { q: "Luận điểm: 'Cách mệnh trước hết phải có cái gì? Trước hết phải có đảng cách mệnh, để trong thì vận động và tổ chức dân chúng...' được trích từ tác phẩm nào?", a: ["Bản án chế độ thực dân Pháp.", "Đường Kách mệnh.", "Chánh cương vắn tắt của Đảng.", "Thường thức chính trị."], c: 1, r: "Đây là câu mở đầu mang tính nền tảng về tầm quan trọng của Đảng trong tác phẩm Đường Kách mệnh (1927)." },
                            { q: "Theo Hồ Chí Minh, các yếu tố nào dẫn đến sự ra đời của Đảng Cộng sản Việt Nam?", a: ["Chủ nghĩa Mác - Lênin.", "Phong trào công nhân.", "Phong trào yêu nước.", "Sự kết hợp chủ nghĩa Mác - Lênin với phong trào công nhân và phong trào yêu nước."], c: 3, r: "Khác với quy luật chung của thế giới (chỉ gồm Chủ nghĩa Mác kết hợp phong trào công nhân), Bác chỉ rõ ở Việt Nam có thêm yếu tố 'phong trào yêu nước'." },
                            { q: "Luận điểm: 'Đảng muốn vững thì phải có chủ nghĩa làm cốt... Đảng mà không có chủ nghĩa cũng như người không có trí khôn, tàu không có bàn chỉ nam' trích từ tác phẩm nào?", a: ["Tuyên ngôn Độc lập.", "Đường Kách mệnh.", "Điều lệ vắn tắt của Đảng.", "Thường thức chính trị."], c: 1, r: "Câu nói nhấn mạnh tầm quan trọng cốt lõi của lý luận Mác - Lênin đối với Đảng cũng được Bác viết trong 'Đường Kách mệnh'." },
                            { q: "Bản chất giai cấp của Đảng Cộng sản Việt Nam được Hồ Chí Minh xác định như thế nào?", a: ["Là Đảng của giai cấp công nhân.", "Là Đảng của nhân dân lao động.", "Là Đảng của giai cấp công nhân, của nhân dân lao động và của dân tộc Việt Nam.", "Là Đảng của mọi giai cấp trong xã hội."], c: 2, r: "Bác đã phát triển sáng tạo học thuyết Mác - Lênin khi khẳng định Đảng không chỉ đại biểu cho lợi ích của công nhân mà còn của nhân dân lao động và toàn thể dân tộc." },
                            { q: "Tư tưởng Hồ Chí Minh về xây dựng Đảng Cộng sản Việt Nam có mấy nguyên tắc?", a: ["4 nguyên tắc.", "5 nguyên tắc.", "6 nguyên tắc.", "7 nguyên tắc."], c: 1, r: "Bác đề ra 5 nguyên tắc cốt lõi: Tập trung dân chủ; Tập thể lãnh đạo cá nhân phụ trách; Tự phê bình và phê bình; Kỷ luật nghiêm minh tự giác; Đoàn kết thống nhất." },
                            { q: "Luận điểm: 'Phải giữ gìn Đảng ta thật trong sạch, phải xứng đáng là người lãnh đạo, là người đầy tớ thật trung thành của nhân dân' được trích từ đâu?", a: ["Đường Cách mệnh.", "Thường thức chính trị.", "Sửa đổi lối làm việc.", "Di chúc."], c: 3, r: "Đây là lời căn dặn thiết tha, tâm huyết nhất về tư cách và đạo đức của Đảng được Bác viết trong phần mở đầu của Bản Di chúc." },
                            { q: "Theo tư tưởng Hồ Chí Minh, việc đổi mới, chỉnh đốn Đảng được hiểu là:", a: ["Một giải pháp tình thế khi gặp khủng hoảng.", "Việc làm thường xuyên của Đảng.", "Khi Đảng không còn vững mạnh mới làm.", "Khi cách mạng ở vào thời kỳ khó khăn."], c: 1, r: "Chỉnh đốn Đảng không phải là giải pháp tình thế mà là quy luật tồn tại và phát triển, là công việc phải làm thường xuyên, liên tục." },
                            { q: "Quan điểm: 'Đảng ta là đạo đức, là văn minh' được Hồ Chí Minh trình bày trong sự kiện nào?", a: ["Đại hội đại biểu toàn quốc lần thứ II của Đảng.", "Lễ kỷ niệm 30 năm ngày thành lập Đảng (1960).", "Lễ khai mạc Đại hội đại biểu toàn quốc lần thứ III.", "Trong Bản Di chúc."], c: 1, r: "Trong bài Diễn văn tại lễ kỷ niệm 30 năm thành lập Đảng, Bác đã tự hào khẳng định: 'Đảng ta là đạo đức, là văn minh'." },
                            { q: "Đảng Cộng sản Việt Nam trở thành Đảng cầm quyền bắt đầu từ năm nào?", a: ["1930", "1945", "1954", "1975"], c: 1, r: "Sau thành công của Cách mạng tháng Tám năm 1945, nhân dân ta giành được chính quyền, Đảng chính thức trở thành Đảng cầm quyền." },
                            { q: "Quan điểm: 'Đảng ta là một Đảng cầm quyền' được Hồ Chí Minh trình bày trang trọng trong văn kiện nào?", a: ["Chánh cương vắn tắt của Đảng.", "Báo cáo chính trị tại Đại hội lần thứ II.", "Diễn văn khai mạc Đại hội III.", "Di chúc."], c: 3, r: "Trong Bản Di chúc lịch sử (1969), lời đầu tiên nói về Đảng, Bác đã căn dặn 'Đảng ta là một Đảng cầm quyền'." },
                            { q: "Đoạn văn: 'Đảng ta là một Đảng cầm quyền. Mỗi đảng viên và cán bộ phải thật sự thấm nhuần đạo đức cách mạng... phải xứng đáng là người lãnh đạo, là người đầy tớ thật trung thành của nhân dân' nằm ở tác phẩm nào?", a: ["Đạo đức cách mạng.", "Đường cách mệnh.", "Di chúc.", "Sửa đổi lối làm việc."], c: 2, r: "Đoạn văn kinh điển này là toàn bộ tâm huyết của Bác dặn dò về công tác xây dựng Đảng trong Di chúc." },
                            { q: "Hồ Chí Minh dặn: 'Đoàn kết là một truyền thống cực kỳ quý báu của Đảng và của dân ta... cần phải giữ gìn sự đoàn kết nhất trí của Đảng như giữ gìn...'. Bác ví với việc giữ gìn điều gì?", a: ["Tài sản của Đảng.", "Bản chất giai cấp công nhân.", "Con ngươi của mắt mình.", "Sinh mạng của mình."], c: 2, r: "Bác dùng hình ảnh so sánh 'như giữ gìn con ngươi của mắt mình' trong Di chúc để nhấn mạnh tính sống còn của sự đoàn kết, nhất trí trong Đảng." },
                            { q: "Câu: 'Đảng có vững cách mệnh mới thành công, cũng như người cầm lái có vững thuyền mới chạy' trích từ tác phẩm nào?", a: ["Bản án chế độ thực dân Pháp.", "Chánh cương vắn tắt của Đảng.", "Đường cách mệnh.", "Lời kêu gọi nhân dịp thành lập Đảng."], c: 2, r: "Đây là hình ảnh ví von dễ hiểu và vô cùng sâu sắc của Bác trong tác phẩm Đường Kách mệnh (1927)." },
                            { q: "Theo Hồ Chí Minh, vai trò lãnh đạo của giai cấp công nhân trong cách mạng Việt Nam do yếu tố nào quy định?", a: ["Do ý muốn của Đảng Cộng sản.", "Do số lượng giai cấp công nhân đông đảo.", "Do đặc điểm của thời đại mới.", "Do đặc tính của giai cấp công nhân."], c: 3, r: "Sứ mệnh lịch sử của giai cấp công nhân do chính đặc tính tiên tiến, triệt để cách mạng và tính tổ chức kỷ luật cao của giai cấp này quy định." },
                            { q: "Khi mới thành lập (Tháng 2/1930), Đảng ta có tên gọi là gì?", a: ["Đảng Cộng sản Việt Nam.", "Đảng Cộng sản Đông Dương.", "Đông Dương cộng sản Đảng.", "Đảng Lao động Việt Nam."], c: 0, r: "Tại Hội nghị hợp nhất tháng 2/1930, Bác đã quyết định đặt tên Đảng là Đảng Cộng sản Việt Nam (sau này tháng 10/1930 mới đổi thành ĐCS Đông Dương)." },
                            { q: "Đảng ta có tên gọi là Đảng Lao động Việt Nam từ thời gian nào?", a: ["Năm 1930.", "Năm 1945.", "Năm 1951.", "Năm 1960."], c: 2, r: "Tại Đại hội đại biểu toàn quốc lần thứ II (tháng 2/1951), Đảng ra hoạt động công khai và lấy tên là Đảng Lao động Việt Nam." },
                            { q: "Loại bỏ đáp án trả lời SAI trong các câu sau đây: Theo quan niệm của Bác, Nhà nước vì dân là Nhà nước:", a: ["Phục vụ nhân dân, đem lại lợi ích cho dân.", "Chăm lo mọi mặt đời sống nhân dân.", "Trong sạch, không được phép đặc quyền, đặc lợi.", "Do dân làm chủ, do dân tổ chức nên."], c: 3, r: "Khái niệm 'Do dân làm chủ, do dân tổ chức nên' thuộc về đặc trưng Nhà nước 'của dân' và 'do dân', không phải là mô tả bản chất Nhà nước 'vì dân'." },
                            { q: "Theo Hồ Chí Minh, Đảng lãnh đạo Nhà nước bằng phương thức nào?", a: ["Bằng đường lối, quan điểm, chủ trương, định hướng.", "Qua hoạt động của các tổ chức đảng và đảng viên trong bộ máy nhà nước.", "Bằng công tác kiểm tra, giám sát.", "Cả 3 phương thức trên."], c: 3, r: "Đảng lãnh đạo Nhà nước toàn diện thông qua đường lối, sự gương mẫu của đảng viên và công tác thanh tra, kiểm tra." }
                        ]
                    },
                    4: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: "Phần 4: Về Hiến pháp, Đạo đức, Văn hóa và Xây dựng con người mới",
                        questions: [
                            { q: "Quốc hội khóa I của nước ta được bầu ra vào thời gian nào?", a: ["Năm 1945.", "Năm 1946.", "Năm 1948.", "Năm 1950."], c: 1, r: "Quốc hội khóa I của nước ta được bầu ra vào ngày 6/1/1946." },
                            { q: "Quốc hội khóa I của nước ta có bao nhiêu đại biểu?", a: ["333.", "365.", "425.", "475."], c: 0, r: "Quốc hội khóa I có 333 đại biểu." },
                            { q: "Hiến pháp đầu tiên của nước ta được thông qua vào năm nào?", a: ["Năm 1945.", "Năm 1946.", "Năm 1955.", "Năm 1959."], c: 1, r: "Hiến pháp đầu tiên được Quốc hội thông qua vào ngày 9/11/1946." },
                            { q: "Hiến pháp thứ hai của nước ta được thông qua vào năm nào?", a: ["Năm 1954.", "Năm 1959.", "Năm 1965.", "Năm 1980."], c: 1, r: "Hiến pháp thứ hai được thông qua năm 1959." },
                            { q: "Những căn bệnh nào trong bộ máy nhà nước mà Hồ Chí Minh gọi là 'giặc nội xâm'?", a: ["Cậy thế, hủ hoá, tư túng.", "Tham ô, lãng phí, quan liêu.", "Trái phép, chia rẽ, kiêu ngạo.", "Đặc quyền, đặc lợi."], c: 1, r: "Hồ Chí Minh gọi tham ô, lãng phí, quan liêu là 'giặc nội xâm', nguy hiểm như giặc ngoại xâm." },
                            { q: "Việc chống những căn bệnh nào trong bộ máy nhà nước được Hồ Chí Minh so sánh giống việc cần kíp như đánh giặc trên mặt trận?", a: ["Trái phép, cậy thế, hủ hoá.", "Tư túng, chia rẽ, kiêu ngạo.", "Tham ô, lãng phí, quan liêu.", "Đặc quyền, đặc lợi."], c: 2, r: "Chống tham ô, lãng phí, quan liêu cũng quan trọng và cần kíp như đánh giặc trên mặt trận." },
                            { q: "Theo tư tưởng Hồ Chí Minh: Nhà nước của dân là:", a: ["Nhà nước do nhân dân tổ chức nên.", "Dân là chủ, quyền lực nhà nước thuộc về nhân dân.", "Nhà nước phục vụ nhân dân, đem lại lợi ích cho nhân dân.", "Nhà nước mang bản chất giai cấp công nhân."], c: 1, r: "Nhà nước của dân nghĩa là dân là chủ, mọi quyền lực nhà nước đều thuộc về nhân dân." },
                            { q: "Theo tư tưởng Hồ Chí Minh, Nhà nước Việt Nam...", a: ["Mang bản chất giai cấp công nhân.", "Có tính dân tộc, tính nhân dân sâu sắc.", "Có sự thống nhất bản chất giai cấp công nhân với tính nhân dân và tính dân tộc.", "Mang tính dân tộc."], c: 2, r: "Nhà nước ta mang bản chất giai cấp công nhân, thống nhất chặt chẽ với tính nhân dân và tính dân tộc." },
                            { q: "Uỷ ban dự thảo Hiến pháp đầu tiên của nước Việt Nam Dân chủ Cộng hòa do ai đứng đầu?", a: ["Trường Chinh.", "Huỳnh Thúc Kháng.", "Hồ Chí Minh.", "Lê Văn Hiến."], c: 2, r: "Chủ tịch Hồ Chí Minh đích thân làm Trưởng ban soạn thảo Hiến pháp 1946." },
                            { q: "Chọn một đáp án đúng điền vào chỗ trống để hoàn thiện câu sau của Hồ Chí Minh: 'Chống …………… và bệnh quan liêu cũng quan trọng và cần kíp như việc đánh giặc trên mặt trận'.", a: ["Phá hoại của công", "Tham ô, lãng phí", "Vi phạm kỷ luật", "Lãng phí"], c: 1, r: "Đó là chống tham ô, lãng phí và bệnh quan liêu." },
                            { q: "'Việc gì có lợi cho dân, ta phải hết sức làm. Việc gì hại đến dân, ta phải hết sức tránh...'. Những câu trên trích từ bài viết nào của Hồ Chí Minh?", a: ["Bài phát biểu tại kỳ họp đầu tiên của Quốc hội khoá I, năm 1946.", "Thư gửi các đồng chí tỉnh nhà.", "Thư gửi ủy ban nhân dân các kỳ, tỉnh, huyện và làng.", "Thư gửi các đồng chí Bắc Bộ."], c: 2, r: "Câu này trích từ Thư gửi ủy ban nhân dân các kỳ, tỉnh, huyện và làng." },
                            { q: "Nguồn gốc hình thành tư tưởng đạo đức Hồ Chí Minh?", a: ["Truyền thống đạo đức của dân tộc Việt Nam.", "Tinh hoa đạo đức của nhân loại.", "Tư tưởng đạo đức của Mác, Ăng ghen và Lênin.", "Cả 3 phương án trên."], c: 3, r: "Đạo đức Hồ Chí Minh được hình thành từ truyền thống dân tộc, tinh hoa nhân loại và tư tưởng đạo đức Mác-Lênin." },
                            { q: "Theo Hồ Chí Minh, vai trò của đạo đức được xác định là:", a: ["Nền tảng của người cách mạng.", "Chỗ dựa của người cách mạng.", "Vũ khí của người cách mạng.", "Hành trang của người cách mạng."], c: 0, r: "Đạo đức là cái gốc, là nền tảng của người cách mạng." },
                            { q: "Những phẩm chất đạo đức cơ bản của con người Việt Nam trong thời đại mới trong tư tưởng Hồ Chí Minh gồm mấy phẩm chất:", a: ["3", "4", "5", "6"], c: 1, r: "Gồm 4 phẩm chất: Trung với nước hiếu với dân; Cần kiệm liêm chính chí công vô tư; Yêu thương con người; Tinh thần quốc tế trong sáng." },
                            { q: "Trong các phẩm chất đạo đức cơ bản của con người Việt Nam trong thời đại mới, phẩm chất đạo đức nào quan trọng nhất, bao trùm nhất?", a: ["Yêu thương con người.", "Cần, kiệm, liêm, chính, chí công vô tư.", "Trung với nước, hiếu với dân.", "Tinh thần quốc tế trong sáng."], c: 2, r: "Trung với nước, hiếu với dân là phẩm chất đạo đức quan trọng nhất, bao trùm nhất." },
                            { q: "Theo tư tưởng Hồ Chí Minh về đạo đức, 'Hiếu với dân' được hiểu là:", a: ["Yêu thương dân.", "Phục vụ dân hết lòng.", "Yêu thương dân và phục vụ dân hết lòng.", "Trung thành với dân."], c: 2, r: "Hiếu với dân không chỉ là yêu thương dân mà còn phải phục vụ nhân dân hết lòng." },
                            { q: "Theo tư tưởng Hồ Chí Minh về đạo đức, 'Tinh thần quốc tế trong sáng' được hiểu là:", a: ["Tinh thần đoàn kết quốc tế vô sản.", "Tinh thần đoàn kết với các dân tộc bị áp bức, với nhân dân lao động các nước.", "Tinh thần đoàn kết với tất cả những người tiến bộ trên thế giới.", "Cả 3 phương án trên."], c: 3, r: "Tinh thần quốc tế trong sáng bao gồm sự đoàn kết với giai cấp vô sản, các dân tộc bị áp bức và toàn thể những người tiến bộ trên thế giới." },
                            { q: "Để xây dựng những phẩm chất đạo đức tốt đẹp và chống lại những cái vô đạo đức có kết quả, theo quan điểm của Hồ Chí Minh phải:", a: ["Tạo thành phong trào quần chúng rộng rãi.", "Động viên từng cá nhân thực hiện.", "Bắt buộc từng cá nhân thực hiện.", "Chống chủ nghĩa cá nhân."], c: 0, r: "Phải tạo thành phong trào quần chúng rộng rãi để mọi người cùng rèn luyện đạo đức." },
                            { q: "Việc tu dưỡng đạo đức ở mỗi người phải được thực hiện trong:", a: ["Mọi hoạt động thực tiễn.", "Mọi mối quan hệ xã hội.", "Mọi hoạt động thực tiễn, mọi mối quan hệ xã hội.", "Trong đời tư và đời công."], c: 2, r: "Tu dưỡng đạo đức là việc làm thường xuyên trong mọi hoạt động thực tiễn và mọi mối quan hệ xã hội." },
                            { q: "Mục tiêu của văn hoá giáo dục là gì?", a: ["Nâng cao dân trí.", "Bồi dưỡng tư tưởng đúng đắn và tình cảm cao đẹp.", "Bồi dưỡng những phẩm chất tốt đẹp, những phong cách lành mạnh.", "Thực hiện cả ba chức năng của văn hoá bằng giáo dục."], c: 3, r: "Mục tiêu là thực hiện cả ba chức năng của văn hóa bằng giáo dục." },
                            { q: "Nội dung giáo dục theo tư tưởng Hồ Chí Minh phải bao gồm:", a: ["Văn hoá.", "Chính trị.", "Khoa học - kĩ thuật, chuyên môn nghiệp vụ.", "Toàn diện."], c: 3, r: "Giáo dục phải toàn diện các mặt: đức, trí, thể, mỹ." },
                            { q: "Theo Hồ Chí Minh, việc học phải được tiến hành như thế nào?", a: ["Học ở mọi lúc, mọi nơi, suốt đời.", "Học ở mọi người.", "Tự học, tự đào tạo và đào tạo lại.", "Cả 3 phương án trên."], c: 3, r: "Việc học không bao giờ cùng, phải học mọi lúc, mọi nơi và học suốt đời." },
                            { q: "Ý nghĩa của việc thực hiện phương châm của Hồ Chí Minh về giáo dục: Học đi đôi với hành, lý luận liên hệ với thực tế; kết hợp gia đình - nhà trường - xã hội là gì?", a: ["Để có chất lượng và hiệu quả cao trong học tập.", "Để tạo ra phong trào rộng rãi trong cả nước.", "Tận dụng tất cả các điều kiện cho học tập.", "Để mọi người đều có cơ hội học tập."], c: 0, r: "Để có chất lượng và hiệu quả cao trong học tập." },
                            { q: "Theo tư tưởng Hồ Chí Minh, mục đích của việc học tập để làm gì?", a: ["Để hiểu biết nhiều kiến thức.", "Để có danh tiếng, địa vị trong xã hội.", "Để làm việc, làm người, làm cán bộ.", "Để lãnh đạo người khác."], c: 2, r: "Bác dạy học là để làm việc, làm người, làm cán bộ, học để phụng sự Tổ quốc, phụng sự nhân dân." },
                            { q: "Vai trò của người nghệ sỹ trong lĩnh vực văn hoá văn nghệ theo tư tưởng Hồ Chí Minh?", a: ["Là tác giả.", "Là người chiến sĩ.", "Vừa là người sáng tác, vừa là người phê bình.", "Cả 3 phương án trên."], c: 1, r: "Hồ Chí Minh khẳng định: Văn hóa nghệ thuật cũng là một mặt trận. Anh chị em là chiến sĩ trên mặt trận ấy." },
                            { q: "Vai trò của tác phẩm văn nghệ trong lĩnh vực văn hoá văn nghệ theo tư tưởng Hồ Chí Minh?", a: ["Kết tinh trí tuệ, tâm hồn của văn nghệ sĩ.", "Là vũ khí sắc bén trong đấu tranh cách mạng, xây dựng xã hội mới, con người mới.", "Là món ăn tinh thần của mọi người trong cuộc sống.", "Là cơ sở để đánh giá tài năng của người nghệ sỹ."], c: 1, r: "Tác phẩm văn nghệ là vũ khí sắc bén trong đấu tranh cách mạng và xây dựng xã hội mới." },
                            { q: "Vấn đề xây dựng đời sống mới được Hồ Chí Minh đặt ra từ khi nào?", a: ["Sau Cách mạng Tháng Tám năm 1945.", "Sau khi miền Bắc được hoàn toàn giải phóng.", "Trong cải tạo XHCN nền kinh tế miền Bắc.", "Sau khi hoàn thành cuộc kháng chiến chống Mỹ cứu nước."], c: 0, r: "Được đặt ra ngay sau Cách mạng Tháng Tám năm 1945." },
                            { q: "Vận dụng tư tưởng Hồ Chí Minh về văn hoá hiện nay cần:", a: ["Giữ gìn và phát huy bản sắc văn hoá dân tộc.", "Tiếp thu tinh hoa văn hoá nhân loại.", "Chống văn hoá phản tiến bộ.", "Cả 3 phương án trên."], c: 3, r: "Cần kết hợp giữa giữ gìn bản sắc dân tộc, tiếp thu tinh hoa nhân loại và chống văn hóa phản tiến bộ." },
                            { q: "Hồ Chí Minh xác định yếu tố nào là gốc của người cách mạng?", a: ["Tài năng.", "Phẩm chất chính trị.", "Đạo đức.", "Cả 3 phương án trên."], c: 2, r: "Đạo đức là cái gốc của người cách mạng." },
                            { q: "Luận điểm: 'Đạo đức cách mạng không phải trên trời sa xuống. Nó do đấu tranh, rèn luyện bền bỉ hàng ngày mà phát triển và củng cố...' là của ai?", a: ["Các Mác.", "V.I. Lênin.", "Hồ Chí Minh.", "Lê Duẩn."], c: 2, r: "Đây là câu nói nổi tiếng của Bác Hồ về sự rèn luyện đạo đức." },
                            { q: "Theo Hồ Chí Minh, chữ 'người' nghĩa là gì?", a: ["Gia đình, anh em, họ hàng, bầu bạn.", "Đồng bào cả nước.", "Cả loài người.", "Cả 3 phương án trên."], c: 3, r: "Chữ 'người' được Bác hiểu theo nghĩa từ hẹp đến rộng: gia đình, đồng bào, và cả nhân loại." },
                            { q: "Các câu nói dưới đây, câu nói nào là của Hồ Chí Minh?", a: ["Học không biết chán, dạy không biết mỏi.", "Học, học nữa, học mãi.", "Việc học không bao giờ cùng, còn sống còn phải học.", "Ăn vóc, học hay."], c: 2, r: "Câu này là của Chủ tịch Hồ Chí Minh dặn dò về tinh thần học tập suốt đời." },
                            { q: "Năm 1943, Hồ Chí Minh đã vạch chương trình xây dựng nền văn hoá nước Việt Nam, chương trình đó bao gồm mấy điểm?", a: ["3.", "4.", "5.", "6."], c: 2, r: "Chương trình đó bao gồm 5 điểm cơ bản định hướng cho nền văn hóa." },
                            { q: "Chọn luận điểm đúng với tư tưởng Hồ Chí Minh:", a: ["Muốn tiến lên chủ nghĩa xã hội thì phải phát triển văn hoá và kinh tế.", "Muốn tiến lên chủ nghĩa xã hội thì phải phát triển kinh tế và văn hoá.", "Muốn tiến lên chủ nghĩa xã hội thì phải phát triển kinh tế.", "Muốn tiến lên chủ nghĩa xã hội thì phải phát triển văn hoá."], c: 1, r: "Bác viết: 'Muốn tiến lên chủ nghĩa xã hội thì phải phát triển kinh tế và văn hoá'." },
                            { q: "Chọn cụm từ đúng điền vào chỗ trống trong câu nói của Hồ Chí Minh: 'Một dân tộc dốt là một dân tộc …'", a: ["Chậm phát triển.", "Lạc hậu.", "Yếu.", "Không thể trở thành phú cường."], c: 2, r: "Trong phiên họp đầu tiên của Chính phủ (3/9/1945), Bác đã nhấn mạnh: 'Một dân tộc dốt là một dân tộc yếu'." },
                            { q: "Theo Hồ Chí Minh, học để làm gì?", a: ["Làm việc.", "Làm người.", "Làm cán bộ.", "Cả 3 phương án trên."], c: 3, r: "Bác dạy học là để làm việc, làm người, làm cán bộ, học để phụng sự Tổ quốc, phụng sự nhân dân." },
                            { q: "Theo tư tưởng Hồ Chí Minh, đời sống văn hoá mới KHÔNG bao gồm mặt nào?", a: ["Đạo đức mới.", "Lối sống mới.", "Nếp sống mới.", "Cách sống mới."], c: 3, r: "Đời sống mới theo Bác bao gồm đạo đức mới, lối sống mới và nếp sống mới." },
                            { q: "Tác phẩm đầu tiên của Hồ Chí Minh đề cập đến đạo đức cách mạng là tác phẩm nào?", a: ["Bản án chế độ thực dân Pháp (1925).", "Đường cách mệnh (1927).", "Thường thức chính trị (1953).", "Đạo đức cách mạng (1955)."], c: 1, r: "Ngay từ những trang đầu của cuốn Đường Kách mệnh (1927), Bác đã trình bày về Tư cách một người cách mệnh." },
                            { q: "Hồ Chí Minh đề cập đạo đức trong những quan hệ nào của mỗi người?", a: ["Đối với mình.", "Đối với người.", "Đối với việc.", "Cả 3 phương án trên."], c: 3, r: "Đạo đức thể hiện ở 3 mặt quan hệ: đối với mình, đối với người, và đối với việc." },
                            { q: "Theo giáo trình Tư tưởng Hồ Chí Minh, văn hoá có mấy chức năng?", a: ["2", "3", "4", "5"], c: 1, r: "Văn hóa có 3 chức năng cơ bản." },
                            { q: "Theo giáo trình Tư tưởng Hồ Chí Minh, có mấy nguyên tắc xây dựng đạo đức mới?", a: ["3", "4", "5", "6"], c: 0, r: "Có 3 nguyên tắc xây dựng đạo đức mới: Nói đi đôi với làm; Xây đi đôi với chống; Tu dưỡng đạo đức suốt đời." },
                            { q: "Trong cách mạng dân tộc dân chủ nhân dân, nền văn hoá mới có những tính chất nào?", a: ["Tính dân tộc.", "Tính khoa học.", "Tính đại chúng.", "Cả 3 phương án trên."], c: 3, r: "Nền văn hóa mới phải bao gồm đủ 3 tính chất: Dân tộc, khoa học, và đại chúng." },
                            { q: "Theo Hồ Chí Minh, mục tiêu của giáo dục là gì?", a: ["Xoá nạn mù chữ, làm cho mọi người dân biết đọc, biết viết.", "Hình thành đội ngũ trí thức cách mạng.", "Đào tạo những con người tốt, có ích cho xã hội.", "Phát triển khoa học nước nhà."], c: 2, r: "Mục tiêu tối cao của giáo dục là đào tạo những con người tốt, có ích cho xã hội." },
                            { q: "Theo Hồ Chí Minh, nội dung của nền giáo dục mới là gì?", a: ["Giáo dục toàn diện cả đức, trí, thể, mỹ.", "Giáo dục tư tưởng chính trị.", "Giáo dục thái độ lao động.", "Giáo dục tri thức văn hoá."], c: 0, r: "Nền giáo dục mới phải là một nền giáo dục toàn diện bao gồm cả đức, trí, thể, mỹ." },
                            { q: "Lựa chọn đáp án trả lời đúng nhất về vai trò của văn hoá:", a: ["Phục vụ nhiệm vụ chính trị.", "Thúc đẩy xây dựng và phát triển kinh tế.", "Phục vụ nhiệm vụ chính trị, thúc đẩy xây dựng và phát triển kinh tế.", "Không có ảnh hưởng gì đến kinh tế và chính trị."], c: 2, r: "Văn hóa phải phục vụ nhiệm vụ chính trị, đồng thời thúc đẩy kinh tế phát triển." },
                            { q: "Phương hướng vận dụng và phát triển tư tưởng Hồ Chí Minh trong sự nghiệp đổi mới là:", a: ["Nắm vững quan điểm thực tiễn.", "Vận dụng và phát triển sáng tạo tư tưởng Hồ Chí Minh.", "Giải quyết đúng những vấn đề do thực tiễn đặt ra.", "Cả 3 phương án trên."], c: 3, r: "Cả 3 phương hướng này đều cần thiết để vận dụng hiệu quả tư tưởng của Bác vào thực tiễn đổi mới." },
                            { q: "Đặc điểm nổi bật của tình hình thế giới hiện nay là gì?", a: ["Có nguy cơ diễn ra chiến tranh thế giới.", "Nạn khủng bố hoành hành.", "Xuất hiện các vấn đề toàn cầu.", "Cuộc cách mạng khoa học – công nghệ phát triển mạnh mẽ."], c: 3, r: "Cuộc cách mạng khoa học - công nghệ phát triển mạnh mẽ là đặc điểm nổi bật nhất của thời đại." },
                            { q: "Thành tựu nổi bật nhất của Việt Nam về chính trị trong những năm đổi mới là gì?", a: ["Giữ vững độc lập dân tộc.", "Cơ bản ổn định.", "Phát triển theo định hướng xã hội chủ nghĩa.", "Không có xung đột sắc tộc, tôn giáo."], c: 1, r: "Sự ổn định cơ bản về chính trị là thành tựu nổi bật giúp Việt Nam tự tin đổi mới và phát triển." },
                            { q: "Hãy cho biết động lực chủ yếu của sự phát triển đất nước ta hiện nay là gì?", a: ["Thực hiện cải tạo xã hội cũ, xây dựng xã hội mới.", "Phát huy sức mạnh đại đoàn kết dân tộc.", "Thực hiện bình đẳng và công bằng xã hội.", "Kết hợp sức mạnh dân tộc với sức mạnh thời đại."], c: 1, r: "Đại đoàn kết toàn dân tộc luôn là động lực chủ yếu của sự phát triển đất nước." },
                            { q: "Hãy cho biết mục tiêu cách mạng của đất nước ta hiện nay là gì?", a: ["Độc lập dân tộc gắn liền với chủ nghĩa xã hội.", "Dân giàu, nước mạnh.", "Xã hội công bằng, dân chủ, văn minh.", "Cả 3 phương án trên."], c: 3, r: "Mục tiêu tổng quát bao gồm cả giữ vững độc lập dân tộc gắn với CNXH, xây dựng nước ta dân giàu, nước mạnh, dân chủ, công bằng, văn minh." },
                            { q: "Cơ chế vận hành của hệ thống chính trị nước ta là gì?", a: ["Nhà nước lãnh đạo, Đảng quản lý, nhân dân làm chủ.", "Nhà nước làm chủ, Đảng lãnh đạo, nhân dân quản lý.", "Đảng lãnh đạo, Nhà nước quản lý, nhân dân làm chủ.", "Đảng và Nhà nước lãnh đạo, quản lý, nhân dân làm chủ."], c: 2, r: "Cơ chế vận hành nhất quán của hệ thống chính trị Việt Nam là 'Đảng lãnh đạo, Nhà nước quản lý, nhân dân làm chủ'." },
                            { q: "Đánh dấu loại bỏ đáp án trả lời SAI: Những mặt tích cực của Nho giáo là:", a: ["Triết lý hành động, tư tưởng nhập thế, hành đạo giúp đời.", "Ước vọng về một xã hội bình trị, thế giới đại đồng.", "Tư tưởng tự do, bình đẳng, dân chủ.", "Triết lý nhân sinh; tu dưỡng, rèn luyện đạo đức."], c: 2, r: "Tư tưởng tự do, bình đẳng, dân chủ là đặc trưng của văn hóa phương Tây, không phải là mặt tích cực của Nho giáo." },
                            { q: "Đánh dấu loại bỏ đáp án trả lời SAI: Những mặt tích cực của Phật giáo là:", a: ["Tư tưởng vị tha, từ bi, bác ái, cứu khổ cứu nạn.", "Tinh thần bình đẳng, dân chủ chất phác, không phân biệt đẳng cấp.", "Đề cao văn hoá, lễ giáo, tạo ra truyền thống hiếu học.", "Coi trọng tu dưỡng đạo đức, giản dị, trong sạch, chăm lo làm điều thiện."], c: 2, r: "Đề cao văn hóa, lễ giáo, tạo ra truyền thống hiếu học là mặt tích cực của Nho giáo, không phải Phật giáo." },
                            { q: "Đánh dấu loại bỏ đáp án trả lời SAI: Những truyền thống tốt đẹp của dân tộc Việt Nam là:", a: ["Chủ nghĩa yêu nước; tinh thần đấu tranh anh dũng, bất khuất.", "Tinh thần nhân nghĩa, truyền thống đoàn kết, tương thân, tương ái.", "Đề cao quyền tự do, bình đẳng, dân chủ.", "Cần cù, dũng cảm, thông minh, sáng tạo, ham học hỏi."], c: 2, r: "Đề cao quyền tự do, bình đẳng, dân chủ là giá trị của phong trào Khai sáng phương Tây, không phải truyền thống cổ truyền của Việt Nam." },
                            { q: "Đánh dấu loại bỏ đáp án trả lời SAI: Những mặt tích cực của văn hoá phương Tây là:", a: ["Tư tưởng tự do, bình đẳng, bác ái.", "Tư tưởng dân chủ và cách mạng.", "Đề cao quyền bình đẳng, quyền sống, quyền tự do và quyền mưu cầu hạnh phúc.", "Đề cao văn hoá, lễ giáo, trung quân, ái quốc."], c: 3, r: "Trung quân, ái quốc, đề cao lễ giáo là tư tưởng của Nho giáo (phương Đông), không phải của phương Tây." },
                            { q: "Tư tưởng Hồ Chí Minh khẳng định: độc lập tự do là quyền thiêng liêng bất khả xâm phạm là cho dân tộc nào?", a: ["Dân tộc Việt Nam.", "Các dân tộc bị áp bức.", "Các dân tộc bị áp bức và giai cấp vô sản thế giới.", "Tất cả các dân tộc trên thế giới."], c: 3, r: "Bác khẳng định quyền độc lập, tự do là quyền bình đẳng của tất cả các dân tộc trên thế giới." },
                            { q: "'Luận cương của V. I. Lênin làm cho tôi rất cảm động, phấn khởi, sáng tỏ, tin tưởng biết bao...'. Nguyễn Ái Quốc nói câu ấy khi đang ở đâu?", a: ["Luân Đôn, Anh.", "Quảng Châu, Trung Quốc.", "Paris, Pháp.", "Máxcơva, Liên Xô."], c: 2, r: "Bác đọc bản Luận cương của Lênin đăng trên báo L'Humanité khi đang hoạt động tại Paris, Pháp (năm 1920)." },
                            { q: "Nguyễn Ái Quốc đã trích dẫn luận điểm nổi tiếng của V. I. Lênin: 'Không có lý luận cách mệnh thì không có cách mệnh vận động ...'. Câu nói được ghi ở trang đầu tiên của cuốn sách nào?", a: ["Bản án chế độ thực dân Pháp.", "Nhật ký trong tù.", "Đường cách mệnh.", "V. I. Lênin và các dân tộc thuộc địa."], c: 2, r: "Bác trích dẫn câu này ở ngay trang đầu tiên của cuốn Đường Kách mệnh để nhấn mạnh vai trò của lý luận." },
                            { q: "Công nông là gốc cách mệnh. Học trò, nhà buôn nhỏ, điền chủ nhỏ là bầu bạn cách mệnh của công nông. Quan điểm đó của Nguyễn Ái Quốc viết trong tác phẩm nào?", a: ["Bản án chế độ thực dân Pháp.", "Nông dân Trung Quốc.", "V. I. Lênin và Phương Đông.", "Đường cách mệnh."], c: 3, r: "Quan điểm về lực lượng cách mạng này được viết trong tác phẩm Đường Kách mệnh (1927)." },
                            { q: "'Trước hết phải có Đảng cách mệnh để trong thì vận động và tổ chức dân chúng, ngoài thì liên lạc với dân tộc bị áp bức và vô sản giai cấp mọi nơi'. Câu nói đó đựơc viết trong tác phẩm nào?", a: ["Đường cách mệnh.", "Sửa đổi lối làm việc.", "Đây 'công lý' của thực dân Pháp.", "V. I. Lênin và Phương Đông."], c: 0, r: "Luận điểm về sự cần thiết phải có Đảng lãnh đạo được Bác trình bày trong Đường Kách mệnh." },
                            { q: "Nguyễn Ái Quốc đọc tham luận tại Đại hội nào của Quốc tế Cộng sản?", a: ["Đại hội V.", "Đại hội VI.", "Đại hội VII.", "Cả ba Đại hội trên."], c: 0, r: "Năm 1924, Bác đã đọc nhiều bài tham luận cực kỳ xuất sắc tại Đại hội V Quốc tế Cộng sản ở Liên Xô." },
                            { q: "Nguyễn Ái Quốc đã tham dự những Đại hội nào của Quốc tế Cộng sản?", a: ["Đại hội II & V.", "Đại hội IV & V.", "Đại hội V & VI.", "Đại hội V & VII."], c: 3, r: "Bác đã trực tiếp tham dự Đại hội V (1924) và Đại hội VII (1935) của Quốc tế Cộng sản." },
                            { q: "Trong thời gian hoạt động ở Pháp (1917 – 1923), Nguyễn Ái Quốc là thành viên của tổ chức chính trị nào dưới đây?", a: ["Đảng Xã hội Pháp.", "Đảng Cộng sản Pháp.", "Hội liên hiệp thuộc địa.", "Cả ba tổ chức trên."], c: 3, r: "Bác tham gia Đảng Xã hội Pháp, tham gia sáng lập Đảng Cộng sản Pháp và Hội liên hiệp thuộc địa." },
                            { q: "Nguyễn Ái Quốc KHÔNG tham gia vào việc sáng lập tổ chức chính trị nào dưới đây?", a: ["Hội những người Việt Nam yêu nước.", "Đảng Xã hội Pháp.", "Đảng Cộng sản Pháp.", "Hội liên hiệp thuộc địa."], c: 1, r: "Đảng Xã hội Pháp là tổ chức đã có từ trước, Bác chỉ gia nhập chứ không phải là người tham gia sáng lập." }
                        ]
                    },
                    5: {
                        group: "Trắc nghiệm chọn đáp án",
                        title: "Phần 5: Chuỗi câu hỏi chuyên sâu về Tiểu sử Bác Hồ",
                        questions: [
                            { q: "Các địa danh sau, địa danh nào chỉ đúng Quê hương Bác Hồ?", a: ["Xã Kim Liên, Huyện Nam Đàn, Tỉnh Nghệ An.", "Làng Sen, Nam Đàn, Nghệ An.", "Làng Sen, Kim Liên, Nghệ An.", "Kim Liên, Nam Đàn, Nghệ Tĩnh."], c: 0, r: "Quê nội của Chủ tịch Hồ Chí Minh là Làng Sen, thuộc xã Kim Liên, huyện Nam Đàn, tỉnh Nghệ An." },
                            { q: "Địa danh quê ngoại Bác Hồ ở đâu?", a: ["Kim Liên", "Hoàng Trù", "Làng Sen", "Nam Đàn"], c: 1, r: "Quê ngoại của Bác là làng Hoàng Trù (hay còn gọi là làng Chùa), nằm cách làng Sen khoảng 2km." },
                            { q: "Năm 1901 (thực tế là 1906), Ông Nguyễn Sinh Sắc đưa vợ và hai con vào Huế với mục đích gì?", a: ["Lo cho các con ăn học", "Lo cuộc sống gia đình", "Làm quan trong triều đình", "Lo cho mình học để thi phó bảng"], c: 2, r: "Năm 1906, sau khi đỗ Phó Bảng, cụ Nguyễn Sinh Sắc được triều đình nhà Nguyễn bổ nhiệm vào Huế làm quan (Thừa biện Bộ Lễ) nên đã đưa các con vào cùng." },
                            { q: "Từ nhỏ Hồ Chí Minh đã nhận thấy đặc điểm gì của triều đình nhà Nguyễn?", a: ["Ươn hèn, nhu nhược", "Phản bội", "Cấu kết với thực dân Pháp", "Cả 3 phương án trên"], c: 3, r: "Sống tại kinh thành Huế, Bác sớm chứng kiến và nhận rõ bộ mặt ươn hèn, phản bội, cam tâm làm tay sai cho thực dân Pháp của triều đình nhà Nguyễn." },
                            { q: "Đức tính nào của cha ảnh hưởng lớn đến chí hướng cách mạng của Bác Hồ?", a: ["Cần cù vượt khó", "Yêu quê hương", "Yêu nước, thương dân", "Cả 3 phương án trên"], c: 3, r: "Cụ Phó bảng Nguyễn Sinh Sắc là một nhà nho yêu nước, thương dân, lối sống cần kiệm của cụ đã ảnh hưởng sâu sắc đến tư tưởng của Bác." },
                            { q: "Thành phần gia đình Bác Hồ thuộc tầng lớp nào?", a: ["Nông dân", "Công nhân", "Trí thức, nhà giáo", "Nhà nho yêu nước"], c: 3, r: "Bác sinh ra trong một gia đình nhà nho yêu nước, cha đỗ Phó bảng nhưng luôn gần gũi và đứng về phía nhân dân lao động." },
                            { q: "Đặc điểm truyền thống của quê hương Bác Hồ?", a: ["Yêu nước, căm thù giặc Kiên cường chống giặc ngoại xâm", "Tinh thần quốc tế cao cả", "Căm thù giặc, khinh ghét vua quan nhà Nguyễn ươn hèn", "Cả 3 phương án trên"], c: 0, r: "Xứ Nghệ (Nghệ An - Hà Tĩnh) từ ngàn đời nay nổi tiếng là vùng đất địa linh nhân kiệt, có truyền thống yêu nước, chống ngoại xâm vô cùng kiên cường." },

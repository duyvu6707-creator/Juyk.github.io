                            { q: "Trong Hệ thống chính trị XHCN Việt Nam, Mặt trận Tổ quốc được xác định là:", a: ["Một tổ chức chính trị đặc biệt.", "Một tổ chức đặc biệt của quyền lực chính trị.", "Một tổ chức chính trị – xã hội.", "Một tổ chức xã hội tự quản."], c: 2, r: "Mặt trận Tổ quốc Việt Nam là một tổ chức chính trị - xã hội, đóng vai trò là cơ sở chính trị của chính quyền nhân dân [5]." },
                            { q: "Hình thức chính thể của nhà nước Việt Nam là:", a: ["Cộng hòa Nghị viện nhân dân.", "Cộng hòa hỗn hợp.", "Cộng hòa dân chủ nhân dân.", "Cộng hòa xã hội chủ nghĩa."], c: 3, r: "Theo Điều 1 Hiến pháp, nước ta được tổ chức theo hình thức chính thể là nước Cộng hòa xã hội chủ nghĩa [6]." },
                            { q: "Hình thức cấu trúc bộ máy Nhà nước của Việt Nam là:", a: ["Nhà nước Liên bang.", "Nhà nước đơn nhất.", "Nhà nước Liên minh.", "Không có đáp án nào đúng."], c: 1, r: "Việt Nam là một nhà nước đơn nhất, quyền lực nhà nước là thống nhất và lãnh thổ là toàn vẹn, bất khả phân chia [6]." },
                            { q: "Nền kinh tế thị trường ở Việt Nam hiện nay có bản chất:", a: ["Nền kinh tế thị trường có sự bảo hộ của nhà nước.", "Nền kinh tế thị trường định hướng xã hội chủ nghĩa.", "Nền kinh tế thị trường tự nhiên.", "Tất cả các đáp án trên."], c: 1, r: "Mô hình kinh tế tổng quát của nước ta được Hiến pháp quy định là nền kinh tế thị trường định hướng xã hội chủ nghĩa [7]." },
                            { q: "Nhiệm kì của Quốc hội là:", a: ["05 năm, kể từ ngày khai mạc kỳ họp thứ nhất của Quốc hội khóa đó đến ngày khai mạc kỳ họp thứ nhất của Quốc hội khoá sau.", "05 năm, kể từ ngày bế mạc kỳ họp cuối cùng của Quốc hội khóa trước đến ngày bế mạc kỳ họp cuối của Quốc hội khoá sau.", "Từ đủ 04 năm...", "Từ đủ 04 năm..."], c: 0, r: "Theo quy định, nhiệm kỳ của mỗi khóa Quốc hội kéo dài 5 năm, tính từ mốc khai mạc kỳ họp thứ nhất của khóa này đến khai mạc kỳ họp thứ nhất của khóa kế tiếp [7, 8]." },
                            { q: "Nguyên tắc làm việc của Quốc hội là:", a: ["Làm việc theo chế độ hội nghị và quyết định theo đa số.", "Làm việc theo chế độ hội nghị.", "Làm việc theo chế độ hữu nghị và quyết định theo đa số.", "Làm việc bằng chế độ quyết định theo đa số."], c: 0, r: "Quốc hội là cơ quan tập thể, làm việc theo chế độ hội nghị (các kỳ họp) và thông qua các quyết định dựa trên nguyên tắc đa số [8]." },
                            { q: "Quốc hội quyết định ban hành Hiến pháp, sửa đổi Hiến pháp khi có số lượng đại biểu Quốc hội biểu quyết tán thành:", a: ["Ít nhất ba phần tư tổng số đại biểu Quốc hội biểu quyết tán thành.", "Ít nhất ba phần tư tổng số đại biểu Quốc hội có mặt biểu quyết tán thành.", "Ít nhất hai phần ba tổng số đại biểu Quốc hội biểu quyết tán thành.", "Ít nhất hai phần ba tổng số đại biểu Quốc hội có mặt biểu quyết tán thành."], c: 2, r: "Do tính chất quan trọng của đạo luật gốc, việc thông qua hoặc sửa đổi Hiến pháp đòi hỏi tỷ lệ tán thành rất cao: ít nhất 2/3 tổng số đại biểu Quốc hội [9]." },
                            { q: "Luật tổ chức Quốc hội có hiệu lực vào ngày tháng năm:", a: ["Ngày 01 tháng 07 năm 2016.", "Ngày 01 tháng 01 năm 2015.", "Ngày 01 tháng 01 năm 2016.", "Ngày 01 tháng 07 năm 2015."], c: 2, r: "Luật Tổ chức Quốc hội năm 2014 chính thức có hiệu lực thi hành từ ngày 01/01/2016 [10]." },
                            { q: "Kiến nghị của đại biểu Quốc hội được gửi bằng văn bản đến:", a: ["Quốc hội thông qua con đường trực tiếp.", "Ủy ban thường vụ Quốc hội.", "Quốc hội thông qua con đường thông qua con đường gián tiếp.", "Ủy ban thường vụ Quốc hội thông qua con đường gián tiếp."], c: 1, r: "Các kiến nghị của đại biểu Quốc hội thường được tập hợp và gửi bằng văn bản đến Ủy ban Thường vụ Quốc hội để xử lý [10]." },
                            { q: "Theo Hiến pháp 2013, Chính phủ là:", a: ["Cơ quan hành chính nhà nước cao nhất của nước Cộng hòa xã hội chủ nghĩa Việt Nam, thực hiện quyền hành pháp, là cơ quan chấp hành của Quốc hội.", "Cơ quan nhà nước, là cơ quan chấp hành của Quốc hội.", "Cơ quan nhà nước cao nhất của nước Cộng hòa xã hội chủ nghĩa Việt Nam, thực hiện quyền hành pháp...", "Cơ quan hành chính nhà nước cao nhất... thực hiện quyền tư pháp..."], c: 0, r: "Chính phủ là cơ quan hành chính nhà nước cao nhất, nắm giữ quyền hành pháp và đóng vai trò là cơ quan chấp hành của Quốc hội [10, 11]." },
                            { q: "Việc thành lập, bãi bỏ Bộ, cơ quan ngang Bộ do:", a: ["Chính phủ trình Ủy ban thường vụ Quốc hội quyết định.", "Chính phủ quyết định.", "Chính phủ trình Quốc hội quyết định.", "Thủ tướng Chính phủ quyết định."], c: 2, r: "Quốc hội có thẩm quyền tối cao trong việc quyết định thành lập, giải thể các Bộ và cơ quan ngang Bộ theo đề nghị của Chính phủ [11, 12]." },
                            { q: "Nhiệm kỳ của Chính phủ:", a: ["Theo nhiệm kỳ của Quốc hội. Khi Quốc hội hết nhiệm kỳ, Chính phủ tiếp tục làm nhiệm vụ cho đến khi Quốc hội khóa mới thành lập Chính phủ.", "Theo nhiệm kỳ của Quốc hội. Khi Quốc hội hết nhiệm kỳ, Chính phủ không còn tiếp tục làm nhiệm vụ.", "Theo nhiệm kỳ của Ủy ban thường vụ Quốc hội...", "Theo nhiệm kỳ của Ủy ban thường vụ Quốc hội..."], c: 0, r: "Nhiệm kỳ của Chính phủ đồng hành cùng Quốc hội (5 năm). Để đảm bảo tính liên tục, Chính phủ cũ vẫn làm việc cho đến khi có Chính phủ khóa mới [12, 13]." },
                            { q: "Đại sứ đặc mệnh toàn quyền của Cộng hòa xã hội chủ nghĩa Việt Nam do:", a: ["Thủ tướng Chính phủ trình Ủy ban thường vụ Quốc hội phê chuẩn việc bổ nhiệm, miễn nhiệm.", "Thủ tướng Chính phủ trình Quốc hội phê chuẩn việc bổ nhiệm, miễn nhiệm.", "Chủ tịch nước trình Ủy ban thường vụ Quốc hội phê chuẩn việc bổ nhiệm, miễn nhiệm.", "Chủ tịch nước trình Quốc hội phê chuẩn việc bổ nhiệm, miễn nhiệm."], c: 0, r: "Theo Hiến pháp 2013 (Điều 74), Ủy ban Thường vụ Quốc hội phê chuẩn đề nghị của Thủ tướng Chính phủ về việc bổ nhiệm, miễn nhiệm đại sứ [13]." },
                            { q: "Theo Hiến pháp 1959, Chủ tịch nước phải:", a: ["Từ 35 tuổi trở lên và được Quốc hội bầu ra trong số các Đại biểu Quốc hội.", "Từ 35 tuổi trở lên và được Quốc hội bầu, không cần là Đại biểu Quốc hội.", "Từ đủ 35 tuổi trở lên và được Quốc hội bầu ra trong số các Đại biểu Quốc hội.", "Từ đủ 35 tuổi trở lên và được Quốc hội bầu, không cần là Đại biểu Quốc hội."], c: 1, r: "Khác với quy định hiện hành bắt buộc Chủ tịch nước phải là đại biểu Quốc hội, Hiến pháp 1959 chỉ yêu cầu công dân từ 35 tuổi trở lên [13, 14]." },
                            { q: "Hiến pháp 1980 cơ quan giúp việc cho Quốc hội là:", a: ["Uỷ ban thường vụ quốc hội.", "Ban thường vụ quốc hội.", "Hội đồng nhân dân.", "Hội đồng nhà nước."], c: 3, r: "Trong Hiến pháp 1980, không có Ủy ban Thường vụ Quốc hội mà Hội đồng Nhà nước vừa là cơ quan cao nhất hoạt động thường xuyên của Quốc hội, vừa là Chủ tịch nước tập thể [14]." },
                            { q: "Bản Hiến pháp hiện hành của nước ta là Hiến pháp năm:", a: ["1980.", "1992.", "2001.", "2013."], c: 3, r: "Hiến pháp hiện hành đang có hiệu lực là bản Hiến pháp được Quốc hội thông qua vào năm 2013 [14, 15]." },
                            { q: "Hiến pháp do chủ thể nào công bố?", a: ["Quốc hội.", "Ủy ban thường vụ Quốc hội.", "Chủ tịch nước.", "Chính phủ."], c: 2, r: "Sau khi được Quốc hội thông qua, Chủ tịch nước là người có thẩm quyền ban hành Lệnh công bố Hiến pháp và luật [15]." },
                            { q: "Hiện nay nước ta có bao nhiêu cấp hành chính?", a: ["2 cấp.", "3 cấp.", "4 cấp.", "5 cấp."], c: 1, r: "Hệ thống hành chính lãnh thổ Việt Nam gồm 3 cấp: Cấp Tỉnh, cấp Huyện và cấp Xã [15]." },
                            { q: "Trong bộ máy Nhà nước cộng hòa xã hội chủ nghĩa Việt Nam thì Quốc hội là:", a: ["Cơ quan quyền lực nhà nước cao nhất.", "Cơ quan đại biểu cao nhất của nhân dân.", "Cơ quan có quyền lập hiến, lập pháp.", "Cả A, B, C đều đúng."], c: 3, r: "Quốc hội hội tụ đầy đủ các đặc điểm: là cơ quan quyền lực cao nhất, đại biểu cao nhất của nhân dân và nắm giữ quyền lập hiến, lập pháp [15]." },
                            { q: "Cơ quan nào trong bộ máy Nhà nước Việt Nam có quyền hành pháp?", a: ["Quốc hội.", "Chính Phủ.", "Toà án.", "Viện kiểm sát."], c: 1, r: "Chính phủ là cơ quan hành chính nhà nước cao nhất, thực hiện quyền hành pháp [15, 16]." },
                            { q: "Căn cứ vào hình thức thì Hiến pháp Việt Nam là Hiến pháp:", a: ["Cương tính.", "Thành văn.", "Nhu tính.", "Bất thành văn."], c: 1, r: "Dựa vào hình thức thể hiện, Hiến pháp Việt Nam được hệ thống hóa thành văn bản pháp luật cụ thể, tức là Hiến pháp thành văn [16]." },
                            { q: "Hiến pháp là ngành luật độc lập trong hệ thống pháp luật Việt Nam vì:", a: ["Có đối tượng điều chỉnh riêng.", "Có phương pháp điều chỉnh riêng.", "Có đối tượng điều chỉnh riêng và phương pháp điều chỉnh riêng.", "Hiến pháp chi phối các ngành luật khác."], c: 2, r: "Một ngành luật được coi là độc lập khi nó sở hữu cả đối tượng điều chỉnh và phương pháp điều chỉnh đặc thù của riêng mình [16]." },
                            { q: "Mọi công dân đều được hưởng quyền và phải thực hiện nghĩa vụ theo quy định của pháp luật là biểu hiện công dân bình đẳng về:", a: ["Quyền và nghĩa vụ.", "Quyền và trách nhiệm.", "Nghĩa vụ và trách nhiệm.", "Trách nhiệm và pháp lý."], c: 0, r: "Bình đẳng trước pháp luật có nghĩa là không ai bị phân biệt đối xử trong việc hưởng quyền và gánh vác nghĩa vụ công dân [17]." },
                            { q: "Bất kì công dân nào vi phạm pháp luật đều phải bị xử lý theo quy định của pháp luật là thể hiện bình đẳng về:", a: ["Trách nhiệm pháp lý.", "Quyền và nghĩa vụ.", "Thực hiện pháp luật.", "Trách nhiệm trước Tòa án."], c: 0, r: "Mọi hành vi vi phạm pháp luật đều bị trừng trị công bằng như nhau, điều này phản ánh sự bình đẳng về mặt gánh chịu trách nhiệm pháp lý [18]." },
                            { q: "Công dân từ bao nhiêu tuổi trở lên có quyền bầu cử đại biểu Quốc hội và Hội đồng nhân dân?", a: ["Từ đủ 18 tuổi.", "Từ đủ 19 tuổi.", "Từ đủ 20 tuổi.", "Từ đủ 21 tuổi."], c: 0, r: "Công dân từ đủ 18 tuổi trở lên có quyền đi bầu cử (bỏ phiếu) chọn ra đại biểu Quốc hội và HĐND các cấp [18, 19]." },
                            { q: "Công dân đủ bao nhiêu tuổi trở lên mới được quyền ứng cử đại biểu Quốc hội và Hội đồng nhân dân?", a: ["Đủ 21 tuổi.", "Đủ 20 tuổi.", "Đủ 19 tuổi.", "Đủ 18 tuổi."], c: 0, r: "Công dân từ đủ 21 tuổi trở lên mới đáp ứng đủ điều kiện độ tuổi để tự mình ứng cử vào các cơ quan quyền lực nhà nước [19]." },
                            { q: "Luật, pháp lệnh phải được công bố chậm nhất là bao nhiêu ngày, kể từ ngày được thông qua, trừ trường hợp Chủ tịch nước đề nghị xem xét lại pháp lệnh:", a: ["Mười ngày.", "Mười lăm ngày.", "Hai mươi ngày.", "Ba mươi ngày."], c: 1, r: "Theo quy định, Lệnh công bố luật, pháp lệnh phải được Chủ tịch nước ban hành chậm nhất là 15 ngày kể từ ngày văn bản được thông qua [21, 22]." },
                            { q: "Thẩm quyền quyết định đại xá là:", a: ["Chính phủ.", "Chủ tịch nước.", "Quốc hội.", "Thủ tướng chính phủ."], c: 2, r: "Quốc hội là cơ quan duy nhất có thẩm quyền quyết định đại xá (tha tội cho một diện người rộng lớn), còn Chủ tịch nước quyết định đặc xá [22]." },
                            { q: "Cơ quan nào có thẩm quyền giải thích Hiến pháp, luật, pháp lệnh?", a: ["Quốc hội.", "Ủy ban thường vụ Quốc hội.", "Hội đồng thẩm phán Tòa án nhân dân tối cao.", "Tất cả các cơ quan trên."], c: 1, r: "Ủy ban Thường vụ Quốc hội là cơ quan được giao trọng trách chính thức trong việc giải thích Hiến pháp, luật và pháp lệnh [22]." },
                            { q: "Theo Hiến pháp 2013 thì tội nào là nặng nhất?", a: ["Tội giết người.", "Tội đầu hàng giặc.", "Tội phản bội tổ quốc.", "Tội đào ngũ."], c: 2, r: "Hiến pháp 2013 (Điều 44) khẳng định đanh thép: 'Phản bội Tổ quốc là tội nặng nhất' [23]." },
                            { q: "Cơ quan nào có thẩm quyền thành lập, giải thể, nhập, chia, điều chỉnh địa giới hành chính tỉnh, thành phố trực thuộc trung ương?", a: ["Quốc hội.", "Chính phủ.", "Bộ Nội vụ.", "Uỷ ban thường vụ Quốc hội."], c: 0, r: "Việc thay đổi địa giới hành chính cấp Tỉnh (cấp cao nhất) thuộc thẩm quyền quyết định của Quốc hội [24]." },
                            { q: "Trong trường hợp đặc biệt, nếu được ít nhất bao nhiêu tổng số đại biểu Quốc hội biểu quyết tán thành thì Quốc hội quyết định rút ngắn hoặc kéo dài nhiệm kỳ của mình theo đề nghị của Ủy ban thường vụ Quốc hội?", a: ["Hai phần ba.", "Một phần hai.", "Ba phần tư.", "Tất cả."], c: 0, r: "Việc kéo dài hay rút ngắn nhiệm kỳ của Quốc hội yêu cầu sự đồng thuận rất cao, tối thiểu phải đạt 2/3 tổng số đại biểu tán thành [25, 26]." },
                            { q: "Việc bầu cử đại biểu Quốc hội và đại biểu Hội đồng nhân dân được tiến hành theo nguyên tắc:", a: ["bình đẳng, phổ thông, trực tiếp và bỏ phiếu kín.", "phổ thông, bình đẳng, trực tiếp và bỏ phiếu kín.", "trực tiếp, phổ thông, bình đẳng và bỏ phiếu kín.", "phổ thông, trực tiếp, bình đẳng và bỏ phiếu kín."], c: 1, r: "Nguyên tắc bầu cử cốt lõi được quy định rõ trong Hiến pháp là: Phổ thông, bình đẳng, trực tiếp và bỏ phiếu kín [26]." },
                            { q: "So với Hiến pháp năm 1992, Bản Hiến pháp mới năm 2013 có bao nhiêu điều được giữ nguyên? Có bao nhiêu điều được sửa đổi, bổ sung?", a: ["10 điều giữ nguyên; 106 điều sửa đổi, bổ sung và 04 điều mới.", "22 điều giữ nguyên; 66 điều sửa đổi, bổ sung và 32 điều mới.", "02 điều giữ nguyên; 106 điều sửa đổi, bổ sung và 12 điều mới.", "12 điều giữ nguyên; 86 điều sửa đổi, bổ sung và 22 điều mới."], c: 2, r: "Hiến pháp 2013 có 120 điều, trong đó có 12 điều được viết mới hoàn toàn, 106 điều sửa đổi bổ sung và chỉ giữ nguyên một số ít điều (theo phương án trắc nghiệm chuẩn của tài liệu) [29, 30]." },
                            { q: "Theo Hiến pháp Việt Nam năm 2013, Hệ thống các Cơ quan nhà nước nước ta bao gồm các cơ quan nào?", a: ["Quốc hội; Chủ tịch nước; Chính phủ; Toàn án nhân dân; Viện Kiểm sát nhân dân; Chính quyền địa phương các cấp; Uỷ ban nhân dân các cấp; Hội đồng bầu cử quốc gia.", "Quốc hội; Chủ tịch nước; Chính phủ; Tòa án nhân dân; Viện Kiểm sát nhân dân; Hội đồng nhân dân các cấp; Uỷ ban nhân dân các cấp; Kiểm toán nhà nước.", "Quốc hội; Chủ tịch nước; Chính phủ; Tòa án nhân dân; Viện Kiểm sát nhân dân; Hội đồng nhân dân các cấp; Uỷ ban nhân dân các cấp; Hội đồng bầu cử quốc gia.", "Quốc hội; Chủ tịch nước; Chính phủ; Tòa án nhân dân; Viện Kiểm sát nhân dân; Chính quyền địa phương các cấp; Hội đồng bầu cử quốc gia; Kiểm toán nhà nước."], c: 3, r: "Hiến pháp 2013 đã hệ thống hóa và bổ sung thêm 2 thiết chế hiến định độc lập mới là Hội đồng bầu cử quốc gia và Kiểm toán nhà nước vào bộ máy nhà nước [30, 31]." },
                            { q: "So với các Điều ước quốc tế, Hiến pháp có giá trị hiệu lực như thế nào?", a: ["Hiến pháp có hiệu lực pháp lý cao hơn.", "Hiến pháp có hiệu lực pháp lý thấp hơn các Điều ước quốc tế.", "Hiến pháp không có mối quan hệ về mặt pháp lý đối với các Điều ước quốc tế.", "Hiến pháp có hiệu lực ngang bằng so với Điều ước quốc tế."], c: 0, r: "Hiến pháp là đạo luật cơ bản, có hiệu lực pháp lý cao nhất trong hệ thống pháp luật của một quốc gia độc lập có chủ quyền [33]." },
                            { q: "Sau khi được bầu, phải tuyên thệ trung thành với Tổ quốc, Nhân dân và Hiến pháp đó là:", a: ["Chủ tịch nước, Chủ tịch Quốc hội, Thủ tướng Chính phủ, Chánh án Tòa án nhân dân tối cao.", "Chủ tịch nước, Chủ tịch Quốc hội.", "Chủ tịch nước, Chủ tịch Quốc hội, Thủ tướng Chính phủ.", "Chủ tịch nước, Chủ tịch Quốc hội, Chánh án Tòa án nhân dân tối cao."], c: 0, r: "Theo Hiến pháp 2013, 4 chức danh lãnh đạo cấp cao nhất bắt buộc phải thực hiện nghi thức tuyên thệ khi nhậm chức [34, 35]." },
                            { q: "Quốc tịch được xác định là:", a: ["Giá trị pháp lý cao nhất để xác định tư cách công dân cho một cá nhân.", "Là một dạng chủ thể làm cá nhân tham gia vào quan hệ pháp luật.", "Là mối quan hệ chính trị – pháp lý giữa cá nhân với nhà nước.", "Tất cả các phương án trên."], c: 2, r: "Bản chất của quốc tịch là mối dây liên kết chặt chẽ về mặt chính trị và pháp lý giữa một cá nhân cụ thể với một nhà nước có chủ quyền [37]." },
                            { q: "Nguyên tắc xác định quốc tịch cho công dân ở Việt Nam hiện nay là:", a: ["Nguyên tắc huyết thống.", "Nguyên tắc lãnh thổ (nơi sinh).", "Nguyên tắc quốc tịch hữu hiệu (quốc tịch theo thỏa thuận).", "Là sự kết hợp linh hoạt của cả ba nguyên tắc trên."], c: 3, r: "Pháp luật Việt Nam không áp dụng cứng nhắc một nguyên tắc mà kết hợp linh hoạt các nguyên tắc (huyết thống, lãnh thổ...) để giải quyết vấn đề quốc tịch [37, 38]." },
                            { q: "Cơ quan nào có thẩm quyền Quyết định thành lập, giải thể, nhập, chia, điều chỉnh địa giới đơn vị hành chính dưới tỉnh, thành phố trực thuộc trung ương.", a: ["Quốc hội.", "Ủy ban thường vụ Quốc hội.", "Chính phủ.", "HĐND cấp tỉnh."], c: 1, r: "Nếu chia tách cấp Tỉnh do Quốc hội quyết định, thì đối với các đơn vị hành chính dưới cấp Tỉnh (Huyện, Xã), thẩm quyền quyết định thuộc về Ủy ban Thường vụ Quốc hội [46]." },
                            { q: "Cơ quan nào có thẩm quyền bãi bỏ nghị quyết của Hội đồng nhân dân tỉnh, thành phố trực thuộc trung ương trái với Hiến pháp, luật và văn bản của cơ quan nhà nước cấp trên:", a: ["Quốc hội.", "Ủy ban thường vụ Quốc hội.", "Chính phủ.", "Tất cả các cơ quan trên."], c: 1, r: "Ủy ban Thường vụ Quốc hội có chức năng giám sát HĐND cấp tỉnh và có quyền bãi bỏ nghị quyết sai trái của cơ quan này [47]." }
                        ]
                    },
                    2: {
                        title: "Phần 2: Pháp luật Dân sự (Sở hữu, Hợp đồng và Thừa kế)",
                        questions: [
                            { q: "Bộ luật Dân sự năm 2015 được ban hành khi nào và có hiệu lực kể từ ngày nào?", a: ["Ban hành 24/11/2015, hiệu lực 01/7/2016.", "Ban hành 20/11/2015, hiệu lực 01/12/2016.", "Ban hành 24/11/2015, hiệu lực 01/01/2017.", "Ban hành 20/11/2015, hiệu lực 01/01/2017."], c: 2, r: "Bộ luật Dân sự số 91/2015/QH13 được Quốc hội thông qua ngày 24/11/2015 và chính thức có hiệu lực từ ngày 01/01/2017." },
                            { q: "Bộ luật Dân sự đầu tiên của Việt Nam là bộ luật nào?", a: ["Bộ luật dân sự 1992.", "Bộ luật dân sự 1995.", "Bộ luật dân sự 2000.", "Bộ luật dân sự 2005."], c: 1, r: "Bộ luật Dân sự đầu tiên của nước ta được Quốc hội thông qua vào năm 1995." },
                            { q: "Bộ luật Dân sự năm 2015 điều chỉnh những nội dung nào dưới đây?", a: ["Quy định địa vị pháp lý, chuẩn mực pháp lý về cách ứng xử của cá nhân, pháp nhân.", "Quy định địa vị pháp lý, chuẩn mực pháp lý về cách ứng xử của cá nhân, pháp nhân và chủ thể khác.", "Quyền, nghĩa vụ về nhân thân và tài sản của cá nhân, pháp nhân trong các quan hệ được hình thành trên cơ sở bình đẳng, tự do ý chí, độc lập về tài sản và tự chịu trách nhiệm.", "Cả A và C đều đúng."], c: 2, r: "Theo Điều 1 BLDS 2015, Bộ luật này quy định địa vị pháp lý, chuẩn mực pháp lý về cách ứng xử của cá nhân, pháp nhân; quyền, nghĩa vụ về nhân thân và tài sản của các chủ thể trên cơ sở bình đẳng, tự do ý chí." },
                            { q: "Bộ luật Dân sự năm 2015 đã bổ sung người nào dưới đây phải có người giám hộ?", a: ["Người mất năng lực hành vi dân sự.", "Người có khó khăn trong nhận thức, làm chủ hành vi.", "Người hạn chế năng lực hành vi dân sự.", "Người tâm thần."], c: 1, r: "Điểm mới nổi bật của BLDS 2015 là bổ sung chế định 'Người có khó khăn trong nhận thức, làm chủ hành vi' nhằm bảo vệ tốt hơn quyền lợi của nhóm người này." },
                            { q: "Cơ quan nào có thẩm quyền tuyên bố một người là có khó khăn trong nhận thức và làm chủ hành vi và chỉ định việc giám hộ cho người này?", a: ["Ủy ban nhân dân cấp xã.", "Ủy ban nhân dân cấp huyện.", "Tòa án nhân dân.", "Sở tư pháp cấp huyện."], c: 2, r: "Chỉ có Tòa án nhân dân mới có đủ thẩm quyền ra quyết định tuyên bố một người bị hạn chế/mất năng lực hành vi hoặc có khó khăn trong nhận thức dựa trên kết luận giám định pháp y." },
                            { q: "Nhà nước, cơ quan Nhà nước ở Trung ương và địa phương khi tham gia quan hệ dân sự thì thực hiện theo nguyên tắc nào?", a: ["Mệnh lệnh hành chính và không phải chịu trách nhiệm dân sự.", "Bình đẳng với các chủ thể khác và phải chịu trách nhiệm dân sự theo quy định của Bộ luật Dân sự.", "Thoả thuận dân sự, mệnh lệnh hành chính và không phải chịu trách nhiệm hình sự.", "Tất cả các đáp án trên."], c: 1, r: "Trong quan hệ dân sự, cơ quan nhà nước không được dùng mệnh lệnh quyền uy mà phải tham gia bình đẳng như mọi chủ thể khác và tự chịu trách nhiệm dân sự." },
                            { q: "Ai là chủ thể xác lập, thực hiện giao dịch dân sự trong trường hợp hộ gia đình, tổ hợp tác, tổ chức khác không có tư cách pháp nhân tham gia quan hệ dân sự?", a: ["Các thành viên của hộ gia đình, tổ hợp tác khác không có tư cách pháp nhân.", "Người đại diện theo ủy quyền.", "Các thành viên của hộ gia đình, tổ hợp tác, tổ chức khác không có tư cách pháp nhân hoặc người đại diện theo ủy quyền.", "Các thành viên của hộ gia đình, tổ hợp tác, tổ chức khác không có tư cách pháp nhân, người giám hộ."], c: 2, r: "Các tổ chức không có tư cách pháp nhân thì các thành viên phải tự mình tham gia xác lập giao dịch hoặc thông qua người đại diện theo ủy quyền." },
                            { q: "Người trong độ tuổi nào dưới đây khi tham gia các giao dịch dân sự phải được người đại diện theo pháp luật đồng ý?", a: ["Từ đủ 6 tuổi đến chưa đủ 15 tuổi.", "Từ đủ 6 tuổi đến chưa đủ 18 tuổi.", "Từ đủ 6 tuổi đến chưa đủ 16 tuổi.", "Từ đủ 6 tuổi đến chưa đủ 17 tuổi."], c: 0, r: "Theo BLDS 2015, người từ đủ 6 tuổi đến chưa đủ 15 tuổi khi xác lập, thực hiện giao dịch dân sự phải được người đại diện theo pháp luật đồng ý (trừ giao dịch phục vụ nhu cầu sinh hoạt hàng ngày)." },
                            { q: "Để giao dịch dân sự có hiệu lực pháp luật thì cần phải tuân thủ điều kiện nào?", a: ["Chủ thể có năng lực pháp luật, năng lực hành vi dân sự phù hợp với giao dịch.", "Mục đích và nội dung của giao dịch không vi phạm điều cấm của luật, không trái đạo đức xã hội.", "Hình thức giao dịch dân sự là điều kiện có hiệu lực (nếu luật có quy định).", "Tất cả các phương án trên."], c: 3, r: "Điều 117 BLDS 2015 quy định 3 điều kiện cốt lõi để giao dịch dân sự có hiệu lực gồm: Năng lực chủ thể, sự tự nguyện, mục đích/nội dung hợp pháp và hình thức (nếu luật bắt buộc)." },
                            { q: "Giao dịch dân sự vi phạm quy định điều kiện có hiệu lực về hình thức thì vô hiệu, trừ trường hợp nào?", a: ["Văn bản vi phạm quy định nhưng một bên/các bên đã thực hiện 2/3 nghĩa vụ và Tòa án công nhận.", "Văn bản vi phạm bắt buộc về công chứng, chứng thực nhưng một bên đã thực hiện 2/3 nghĩa vụ và Tòa án công nhận.", "Văn bản vi phạm bắt buộc về công chứng, chứng thực nhưng các bên đã thực hiện 2/3 nghĩa vụ và Tòa án công nhận.", "Tất cả các phương án trên."], c: 3, r: "Theo Điều 129 BLDS 2015, nếu hợp đồng vi phạm hình thức (như thiếu công chứng) nhưng một bên hoặc các bên đã thực hiện ít nhất 2/3 nghĩa vụ thì có quyền yêu cầu Tòa án công nhận hiệu lực." },
                            { q: "Trong trường hợp giao dịch dân sự bị vô hiệu thì sẽ có những hậu quả pháp lý nào đối với chủ thể giao dịch?", a: ["Không làm phát sinh, thay đổi, chấm dứt quyền, nghĩa vụ dân sự từ thời điểm xác lập.", "Các bên khôi phục lại tình trạng ban đầu, hoàn trả cho nhau những gì đã nhận.", "Bên ngay tình trong việc thu hoa lợi, lợi tức không phải hoàn trả lại hoa lợi, lợi tức đó.", "Tất cả các phương án trên."], c: 3, r: "Khi giao dịch vô hiệu, nguyên tắc cơ bản là khôi phục lại tình trạng ban đầu và hoàn trả cho nhau những gì đã nhận." },
                            { q: "Quyền đại diện được xác lập dựa trên căn cứ nào?", a: ["Theo ủy quyền giữa người được đại diện và người đại diện.", "Theo quyết định của cơ quan nhà nước có thẩm quyền.", "Theo quy định của pháp luật.", "Tất cả các phương án trên."], c: 3, r: "Đại diện có thể được xác lập thông qua uỷ quyền, hoặc do pháp luật quy định, hoặc do cơ quan nhà nước (như Tòa án) chỉ định." },
                            { q: "Quyền nào dưới đây cho phép người không phải là chủ sở hữu có quyền trực tiếp nắm giữ, chi phối tài sản thuộc quyền sở hữu của người khác?", a: ["Quyền đối với bất động sản liền kề.", "Quyền hưởng dụng.", "Quyền bề mặt.", "Tất cả các phương án trên."], c: 3, r: "Đây là 3 loại 'Quyền khác đối với tài sản' theo BLDS 2015, cho phép chủ thể khai thác, sử dụng tài sản dù không phải là chủ sở hữu." },
                            { q: "Sự kiện nào sau đây chấm dứt quyền sở hữu?", a: ["Đánh rơi tài sản.", "Bỏ quên tài sản.", "Tài sản bị xử lý để thực hiện nghĩa vụ cho người khác.", "Tài sản bị tịch thu."], c: 2, r: "Theo Điều 237 BLDS 2015, tài sản bị xử lý để thực hiện nghĩa vụ (bị thi hành án, phát mãi tài sản thế chấp) là một trong các căn cứ chấm dứt quyền sở hữu." },
                            { q: "Sở hữu chung của vợ chồng là hình thức sở hữu nào?", a: ["Phần quyền sở hữu của hai vợ chồng có được trước và trong thời kỳ hôn nhân.", "Sở hữu chung hợp nhất có thể phân chia.", "Tài sản chung hợp nhất không phân chia.", "Tất cả tài sản mà vợ chồng có."], c: 1, r: "Tài sản chung của vợ chồng là sở hữu chung hợp nhất có thể phân chia (vợ chồng có quyền yêu cầu chia tài sản chung ngay cả trong thời kỳ hôn nhân)." },
                            { q: "Sự kiện nào sau đây chấm dứt sở hữu chung?", a: ["Một trong các đồng sở hữu chung chết.", "Quá 50% phần tài sản thuộc sỡ hữu chung không còn.", "Tài sản chung đã được chia.", "Tài sản riêng không nhập vào tài sản chung."], c: 2, r: "Khi tài sản chung đã được phân chia cho các đồng sở hữu thì hình thức sở hữu chung sẽ chấm dứt, chuyển thành sở hữu riêng của từng người." },
                            { q: "Đối tượng của nghĩa vụ dân sự là gì?", a: ["Nghĩa vụ phải thực hiện.", "Tài sản, công việc phải thực hiện hoặc không được thực hiện.", "Công việc sẽ thực hiện.", "Chế tài phải thực hiện."], c: 1, r: "Theo Điều 276 BLDS 2015, đối tượng của nghĩa vụ là tài sản, công việc phải thực hiện hoặc công việc không được thực hiện." },
                            { q: "Trường hợp một người đã thực hiện toàn bộ nghĩa vụ liên đới thì có quyền gì?", a: ["Yêu cầu những người có nghĩa vụ liên đới khác phải thực hiện phần nghĩa vụ liên đới của họ đối với người thứ ba.", "Yêu cầu những người có nghĩa vụ liên đới khác phải bồi thường phần nghĩa vụ mà mình đã thực hiện thay.", "Yêu cầu những người có nghĩa vụ liên đới khác phải thực hiện phần nghĩa vụ liên đới của họ đối với mình.", "Không có đáp án nào đúng."], c: 2, r: "Người đã thực hiện thay toàn bộ nghĩa vụ liên đới có quyền yêu cầu các đồng nghĩa vụ khác hoàn trả lại phần tài sản tương ứng của họ cho mình." },
                            { q: "Có mấy biện pháp bảo đảm thực hiện nghĩa vụ dân sự theo BLDS 2015?", a: ["6 biện pháp.", "7 biện pháp.", "8 biện pháp.", "9 biện pháp."], c: 3, r: "Điều 292 BLDS 2015 quy định 9 biện pháp: Cầm cố, thế chấp, đặt cọc, ký cược, ký quỹ, bảo lưu quyền sở hữu, bảo lãnh, tín chấp, cầm giữ tài sản." },
                            { q: "Biện pháp bảo đảm thực hiện nghĩa vụ bao gồm những biện pháp nào dưới đây?", a: ["Đặt cọc.", "Bảo lãnh.", "Tín chấp.", "Tất cả các phương án trên."], c: 3, r: "Cả 3 biện pháp này đều thuộc hệ thống 9 biện pháp bảo đảm thực hiện nghĩa vụ dân sự." },
                            { q: "Định nghĩa nào sau đây là đúng về 'cầm giữ tài sản'?", a: ["Việc bên có nghĩa vụ chiếm giữ tài sản hợp pháp của hợp đồng song vụ khi không được thực hiện.", "Việc bên có quyền đang nắm giữ hợp pháp tài sản là đối tượng của hợp đồng song vụ được chiếm giữ tài sản khi bên có nghĩa vụ không thực hiện đúng nghĩa vụ.", "Việc bên có quyền đang nắm giữ tài sản để bán trừ nợ.", "Việc bên có quyền bán tài sản của hợp đồng song vụ."], c: 1, r: "Cầm giữ tài sản là quyền của bên đang nắm giữ hợp pháp tài sản được quyền giữ lại tài sản đó để buộc bên kia phải hoàn thành nghĩa vụ." },
                            { q: "Trong biện pháp Thế chấp, tài sản thế chấp do ai giữ?", a: ["Tài sản thế chấp do bên nhận thế chấp giữ.", "Tài sản thế chấp do bên thế chấp giữ. Các bên có thể thỏa thuận giao cho người thứ ba giữ.", "Tài sản thế chấp bắt buộc phải giao cho người thứ ba giữ.", "Tài sản do Tòa án niêm phong giữ."], c: 1, r: "Khác với cầm cố (giao tài sản), đặc trưng của Thế chấp là bên thế chấp dùng tài sản để bảo đảm nhưng KHÔNG giao tài sản, tự mình vẫn giữ để khai thác sử dụng." },
                            { q: "Tài sản nào được dùng để đặt cọc?", a: ["Tiền, đá quý, kim khí quý hoặc vật có giá trị khác.", "Quyền tài sản.", "Giấy tờ có giá.", "Tất cả các đáp án trên."], c: 0, r: "Theo BLDS 2015, đối tượng của đặt cọc phải là vật chất cụ thể: một khoản tiền, kim khí quý, đá quý hoặc vật có giá trị khác." },
                            { q: "Ông Bình muốn dùng Giấy chứng nhận quyền sử dụng đất (Sổ đỏ) để bảo đảm cho hợp đồng vay tiền tại ngân hàng. Đây là hình thức nào?", a: ["Thế chấp.", "Đặt cọc.", "Ký quỹ.", "Bảo lãnh."], c: 0, r: "Quyền sử dụng đất là bất động sản không thể giao nộp trực tiếp. Việc dùng sổ đỏ bảo đảm khoản vay tại ngân hàng chính là biện pháp Thế chấp." },
                            { q: "Vợ chồng ông Ba nhận chuyển nhượng quyền sử dụng một thửa đất tại Hà Nội. Để hợp đồng chuyển nhượng có hiệu lực thì hình thức hợp đồng phải là:", a: ["Bằng lời nói, có người làm chứng.", "Văn bản thường.", "Văn bản, có công chứng hoặc chứng thực.", "Bằng lời nói hoặc văn bản."], c: 2, r: "Hợp đồng chuyển nhượng bất động sản (quyền sử dụng đất, nhà ở) bắt buộc phải được lập thành văn bản và có công chứng, chứng thực mới có hiệu lực." },
                            { q: "Một trong hai bên có quyền hủy bỏ hợp đồng trong trường hợp nào?", a: ["Bên kia vi phạm một điều khoản nhỏ.", "Bên kia vi phạm nghiêm trọng nghĩa vụ hợp đồng.", "Bên kia chậm giao tiền 1 ngày.", "Bên kia không muốn tiếp tục thực hiện hợp đồng."], c: 1, r: "Hủy bỏ hợp đồng được áp dụng khi một bên vi phạm nghiêm trọng nghĩa vụ (vi phạm làm cho bên kia không đạt được mục đích giao kết)." },
                            { q: "Hợp đồng nào sau đây được gọi là 'Hợp đồng mẫu'?", a: ["Hợp đồng mua bán điện nước.", "Hợp đồng chuyển nhượng quyền sử dụng đất.", "Hợp đồng mua bán xe ô tô.", "Hợp đồng ủy quyền."], c: 0, r: "Hợp đồng mua bán điện, nước, internet là hợp đồng mẫu do một bên (nhà cung cấp) đưa ra với các điều kiện soạn sẵn để bên kia (khách hàng) trả lời đồng ý hoặc không." },
                            { q: "Đâu KHÔNG phải là một loại hợp đồng dân sự?", a: ["Di chúc.", "Hợp đồng song vụ.", "Phụ lục hợp đồng.", "Hợp đồng theo mẫu."], c: 0, r: "Di chúc là một hành vi pháp lý đơn phương thể hiện ý chí của một người, không phải là sự thỏa thuận giữa hai hay nhiều bên nên không phải là hợp đồng." },
                            { q: "A tặng cho B một chiếc xe máy. Mặc dù biết rõ xe bị mất phanh nhưng A không thông báo cho B biết. B đi xe bị tai nạn. Trách nhiệm của A?", a: ["A phải bồi thường thiệt hại cho B.", "A không phải bồi thường thiệt hại cho B.", "A chỉ bồi thường khi B khiếu nại với cơ quan chức năng.", "A không phải bồi thường vì B phải tự kiểm tra khi nhận xe."], c: 0, r: "Điều 458 BLDS 2015 quy định: Nếu bên tặng cho cố ý giấu khuyết tật của tài sản làm cho người được tặng bị thiệt hại thì bên tặng cho phải bồi thường thiệt hại." },
                            { q: "Mức lãi suất trong hợp đồng vay tài sản do các bên thỏa thuận không được vượt quá giới hạn nào?", a: ["Thoải mái thỏa thuận không giới hạn.", "Không vượt quá 30%/năm của khoản tiền vay.", "Không vượt quá 20%/năm của khoản tiền vay.", "Không vượt quá 10%/năm của khoản tiền vay."], c: 2, r: "Điều 468 BLDS 2015 quy định: Lãi suất vay do các bên thỏa thuận nhưng không được vượt quá 20%/năm của khoản tiền vay, để chống nạn tín dụng đen." },
                            { q: "Trong quan hệ dân sự, lỗi cố ý gây thiệt hại được định nghĩa là:", a: ["Nhận thức rõ hành vi của mình sẽ gây thiệt hại mà vẫn thực hiện và mong muốn hoặc để mặc cho thiệt hại xảy ra.", "Không nhận thức được hành vi gây thiệt hại do khách quan.", "Thực hiện hành vi gây thiệt hại do cẩu thả.", "Chưa đủ khả năng nhận thức hành vi."], c: 0, r: "Lỗi cố ý là khi chủ thể hoàn toàn ý thức được hậu quả xấu từ hành vi của mình nhưng vẫn thực hiện, mong muốn hoặc thờ ơ để mặc hậu quả xảy ra." },
                            { q: "Thời điểm mở thừa kế được xác định là:", a: ["Thời điểm người có tài sản bị ốm nặng.", "Thời điểm những người thừa kế nhận được di sản.", "Thời điểm người có tài sản đã chết.", "Thời điểm họp mặt gia đình khai nhận thừa kế."], c: 2, r: "Theo pháp luật dân sự, thời điểm mở thừa kế chính là thời điểm người để lại di sản chết." },
                            { q: "Kể từ thời điểm mở thừa kế, những người thừa kế có quyền và nghĩa vụ gì?", a: ["Có các quyền, nghĩa vụ tài sản do người chết để lại.", "Được toàn quyền sử dụng, bán tài sản của người chết lập tức.", "Có quyền lựa chọn trao đổi các nghĩa vụ tài sản.", "Chỉ có quyền nhận tài sản, không phải chịu nghĩa vụ trả nợ."], c: 0, r: "Ngay từ thời điểm mở thừa kế, những người thừa kế bắt đầu có các quyền và cả nghĩa vụ tài sản do người chết để lại (ví dụ như trả nợ thay người chết trong phạm vi di sản)." },
                            { q: "Thời hiệu để người thừa kế yêu cầu chia di sản đối với bất động sản và động sản là bao lâu?", a: ["10 năm đối với cả hai.", "20 năm đối với bất động sản, 10 năm đối với động sản.", "30 năm đối với bất động sản, 10 năm đối với động sản.", "Không có thời hạn."], c: 2, r: "Thời hiệu yêu cầu chia di sản thừa kế là 30 năm đối với bất động sản (nhà, đất) và 10 năm đối với động sản kể từ thời điểm mở thừa kế." },
                            { q: "Người lập di chúc có quyền nào dưới đây?", a: ["Chỉ định người thừa kế.", "Giao nghĩa vụ cho người thừa kế.", "Truất quyền hưởng di sản của người thừa kế.", "Tất cả các quyền trên."], c: 3, r: "Người lập di chúc có toàn quyền định đoạt tài sản của mình: chọn người cho, quyết định cho bao nhiêu, giao nghĩa vụ đi kèm và truất quyền của người khác." },
                            { q: "Những người nào sau đây là người thừa kế KHÔNG phụ thuộc vào nội dung của di chúc?", a: ["Con chưa thành niên, cha, mẹ, vợ, chồng của người lập di chúc.", "Em chưa thành niên của người lập di chúc.", "Con ngoài giá thú đã thành niên và có khả năng lao động.", "Anh chị em ruột của người để lại di chúc."], c: 0, r: "Điều 644 BLDS 2015 bảo vệ nhóm đối tượng yếu thế: Con chưa thành niên, cha, mẹ, vợ, chồng. Dù di chúc không cho hưởng, họ vẫn được hưởng ít nhất bằng 2/3 suất của một người thừa kế theo pháp luật." },
                            { q: "Trường hợp người lập di chúc không tự mình viết bản di chúc mà nhờ người khác đánh máy thì cần điều kiện gì về người làm chứng?", a: ["Ít nhất 1 người làm chứng.", "Ít nhất 2 người làm chứng.", "Ít nhất 3 người làm chứng.", "Ít nhất 4 người làm chứng."], c: 1, r: "Nếu người lập di chúc không tự viết mà nhờ người đánh máy/viết hộ thì phải có ít nhất 02 người làm chứng cùng ký tên hoặc điểm chỉ xác nhận." },
                            { q: "Những người nào sau đây KHÔNG ĐƯỢC làm chứng cho việc lập di chúc?", a: ["Người thừa kế theo di chúc của người lập di chúc.", "Người thừa kế theo pháp luật của người lập di chúc.", "Cả A và B đều đúng.", "Người hàng xóm không có quyền, nghĩa vụ liên quan."], c: 2, r: "Để đảm bảo tính khách quan, những người có quyền lợi trực tiếp (người thừa kế theo pháp luật hoặc theo di chúc) tuyệt đối không được làm chứng." },
                            { q: "Người từ đủ 15 tuổi đến chưa đủ 18 tuổi được lập di chúc với điều kiện gì?", a: ["Không lập được di chúc.", "Lập được nếu được cha, mẹ hoặc người giám hộ đồng ý bằng văn bản.", "Chỉ lập được di chúc miệng.", "Lập được mà không cần ai đồng ý."], c: 1, r: "Do chưa có năng lực hành vi dân sự đầy đủ, người từ đủ 15 đến dưới 18 tuổi muốn lập di chúc phải có sự đồng ý bằng văn bản của cha mẹ hoặc người giám hộ." },
                            { q: "Những trường hợp nào sau đây sẽ chia thừa kế theo pháp luật?", a: ["Không có di chúc.", "Có di chúc nhưng di chúc không hợp pháp.", "Người thừa kế theo di chúc chết trước hoặc cùng thời điểm với người lập di chúc.", "Tất cả các trường hợp trên."], c: 3, r: "Thừa kế theo pháp luật (chia theo hàng) được áp dụng khi không có di chúc, di chúc vô hiệu, hoặc người được chỉ định trong di chúc đã chết/từ chối nhận di sản." },
                            { q: "Hàng thừa kế thứ nhất theo pháp luật gồm những ai?", a: ["Vợ, chồng, cha đẻ, mẹ đẻ, cha nuôi, mẹ nuôi, con đẻ, con nuôi của người chết.", "Vợ, chồng, cha đẻ, mẹ đẻ của người chết.", "Vợ, chồng, cha đẻ, mẹ đẻ, con đẻ của người chết.", "Vợ, chồng, anh chị em ruột của người chết."], c: 0, r: "Hàng thừa kế thứ nhất bao gồm tất cả những người có quan hệ gần gũi nhất: Vợ/chồng, cha mẹ (đẻ, nuôi) và con (đẻ, nuôi)." },
                            { q: "Việc từ chối nhận di sản thừa kế phải được thể hiện vào thời điểm nào?", a: ["Ngay tại thời điểm mở thừa kế.", "Sau 01 năm kể từ ngày mở thừa kế.", "Sau 06 tháng kể từ thời điểm mở thừa kế.", "Trước thời điểm phân chia di sản."], c: 3, r: "Việc từ chối nhận di sản phải được lập thành văn bản và gửi đến người quản lý di sản trước thời điểm phân chia di sản." },
                            { q: "Những người nào sau đây KHÔNG ĐƯỢC hưởng di sản chia theo pháp luật?", a: ["Người có hành vi ngược đãi, đánh đập cha mẹ.", "Người có hành vi xúc phạm danh dự nhân phẩm người để lại di sản.", "Người vi phạm nghiêm trọng nghĩa vụ nuôi dưỡng người để lại di sản.", "Tất cả các trường hợp trên."], c: 3, r: "Những người có hành vi vi phạm nghiêm trọng đạo đức, pháp luật đối với người để lại di sản sẽ bị tước quyền thừa kế." },
                            { q: "Khi di sản đã bị chia mà tìm thấy di chúc thất lạc thì phải giải quyết thế nào?", a: ["Phải chia lại theo di chúc nếu người thừa kế theo di chúc yêu cầu.", "Người hưởng di sản theo di chúc chỉ được bồi hoàn một phần nhỏ.", "Phải chia lại phần di sản còn lại.", "Thu hồi toàn bộ chia lại từ đầu cho mọi người."], c: 0, r: "Theo Điều 662 BLDS 2015, nếu di chúc thất lạc được tìm thấy thì di sản phải được chia lại theo đúng ý nguyện trong di chúc nếu người có quyền yêu cầu." },
                            { q: "Khi có người thừa kế mới xuất hiện mà di sản đã chia xong thì giải quyết ra sao?", a: ["Phải thu hồi phân chia lại toàn bộ bằng hiện vật.", "Phải yêu cầu Tòa án hủy bỏ toàn bộ kết quả chia cũ.", "Những người đã nhận di sản phải thanh toán lại một khoản tiền tương ứng với phần di sản của người mới tại thời điểm chia.", "Chỉ chia những phần di sản chưa chia."], c: 2, r: "Để đảm bảo ổn định giao dịch, pháp luật quy định không thu hồi hiện vật mà những người đã nhận trước đó phải trích trả bằng tiền thanh toán lại cho người thừa kế mới." },
                            { q: "Các nghĩa vụ tài sản và các chi phí liên quan đến thừa kế được ưu tiên thanh toán theo thứ tự nào?", a: ["Chi phí mai táng -> Tiền bồi thường -> Thuế nhà nước.", "Chi phí mai táng -> Tiền cấp dưỡng còn thiếu -> Chi phí bảo quản di sản -> Các khoản nợ.", "Các khoản nợ ngân hàng -> Tiền bồi thường -> Chi phí mai táng.", "Thuế nhà nước -> Chi phí mai táng -> Các khoản nợ."], c: 1, r: "Thứ tự thanh toán di sản quy định ưu tiên nhất là chi phí mai táng, sau đó là tiền cấp dưỡng, chi phí bảo quản di sản rồi mới đến các khoản nợ tài sản khác." }
                        ]
                    },
                    3: {
                        title: "Phần 3: Pháp luật Hình sự và Xử lý vi phạm hành chính",
                        questions: [
                            { q: "Hành vi nguy hiểm cho xã hội, bị coi là tội phạm được quy định trong Bộ luật Hình sự là hành vi vi phạm:", a: ["Hình sự.", "Hành chính.", "Qui tắc quản lí xã hội.", "An toàn xã hội."], c: 0, r: "Tội phạm là khái niệm pháp lý chỉ tồn tại duy nhất trong lĩnh vực pháp luật hình sự, dùng để chỉ hành vi nguy hiểm cho xã hội vi phạm luật hình sự." },
                            { q: "Bộ luật Hình sự đầu tiên của Việt Nam là:", a: ["Bộ luật hình sự 1985.", "Bộ luật hình sự 1987.", "Bộ luật hình sự 1999.", "Bộ luật hình sự 2001."], c: 0, r: "Bộ luật Hình sự đầu tiên của nước Cộng hòa XHCN Việt Nam được Quốc hội thông qua và ban hành vào năm 1985." },
                            { q: "Bộ luật Hình sự số 100/2015/QH13 (sửa đổi, bổ sung năm 2017) có hiệu lực từ ngày, tháng, năm nào?", a: ["Từ ngày 01/07/2016", "Từ ngày 01/07/2017", "Từ ngày 01/01/2018", "Từ ngày 01/07/2018"], c: 2, r: "Bộ luật Hình sự 2015 sau khi được sửa đổi, bổ sung năm 2017 đã chính thức có hiệu lực thi hành từ ngày 01/01/2018." },
                            { q: "Bộ luật Hình sự năm 2015 đã bổ sung thêm chủ thể nào sau đây phải chịu trách nhiệm hình sự?", a: ["Cá nhân.", "Pháp nhân.", "Pháp nhân thương mại.", "Hộ kinh doanh cá thể."], c: 2, r: "Điểm đột phá của BLHS 2015 là lần đầu tiên quy định trách nhiệm hình sự đối với pháp nhân thương mại (áp dụng cho 33 tội danh cụ thể)." },
                            { q: "Người ở độ tuổi nào dưới đây phải chịu trách nhiệm hình sự về mọi tội phạm?", a: ["Từ đủ 14 tuổi trở lên.", "Từ đủ 16 tuổi trở lên.", "Từ đủ 17 tuổi trở lên.", "Từ đủ 18 tuổi trở lên."], c: 1, r: "Theo Điều 12 BLHS 2015, người từ đủ 16 tuổi trở lên phải chịu trách nhiệm hình sự về mọi tội phạm (trừ những tội phạm mà luật có quy định khác)." },
                            { q: "Người từ đủ bao nhiêu tuổi trở lên phải chịu trách nhiệm hình sự về tội phạm rất nghiêm trọng, tội phạm đặc biệt nghiêm trọng do cố ý?", a: ["Từ đủ 12 tuổi trở lên.", "Từ đủ 14 tuổi trở lên.", "Từ đủ 16 tuổi trở lên.", "Từ đủ 18 tuổi trở lên."], c: 1, r: "Người từ đủ 14 tuổi đến dưới 16 tuổi chỉ phải chịu trách nhiệm hình sự đối với tội phạm rất nghiêm trọng hoặc đặc biệt nghiêm trọng thuộc một số nhóm tội danh luật định." },
                            { q: "Người từ đủ bao nhiêu tuổi trở lên phải chịu trách nhiệm hành chính về mọi vi phạm hành chính do mình gây ra?", a: ["Từ đủ 14 tuổi.", "Từ đủ 16 tuổi.", "Từ đủ 17 tuổi.", "Từ đủ 18 tuổi."], c: 1, r: "Theo Luật Xử lý vi phạm hành chính, người từ đủ 16 tuổi trở lên bị xử phạt VPHC về mọi vi phạm hành chính." },
                            { q: "Người ở độ tuổi nào dưới đây phải chịu trách nhiệm hành chính về vi phạm hành chính do cố ý?", a: ["Từ đủ 14 đến dưới 16.", "Từ đủ 15 dến dưới 16.", "Từ đủ 15 đến dưới 18.", "Từ đủ 14 đến dưới 18."], c: 0, r: "Người từ đủ 14 tuổi đến dưới 16 tuổi chỉ bị xử phạt VPHC đối với những vi phạm hành chính do cố ý." },
                            { q: "Người từ đủ 14 tuổi đến dưới 16 tuổi không phải chịu trách nhiệm hình sự về tội phạm rất nghiêm trọng, tội phạm đặc biệt nghiêm trọng thuộc các tội nào sau đây?", a: ["Tội giết người, tội cố ý gây thương tích hoặc gây tổn hại sức khỏe của người khác.", "Tội cướp tài sản, tội trộm cắp tài sản.", "Tội vận chuyển trái phép chất ma túy, tội mua bán trái phép chất ma túy.", "Tội vi phạm quy định về tham gia giao thông đường bộ."], c: 3, r: "Theo Khoản 2 Điều 12 BLHS 2015, nhóm tuổi này chỉ chịu TNHS đối với 28 tội danh cụ thể (như giết người, cướp, hiếp dâm, ma túy...). Tội vi phạm giao thông không nằm trong số này." },
                            { q: "Người từ đủ 14 tuổi đến dưới 16 tuổi chuẩn bị phạm tội nào thì phải chịu trách nhiệm hình sự?", a: ["Tội giết người và Tội cướp tài sản.", "Tội cướp tài sản và Tội cướp giật tài sản.", "Tội gây rối trật tự công cộng.", "Tội vi phạm quy định về tham gia giao thông đường bộ."], c: 0, r: "Theo Điều 14 BLHS 2015, người từ đủ 14 đến dưới 16 tuổi chỉ chịu TNHS về hành vi 'chuẩn bị phạm tội' đối với 2 tội danh duy nhất: Tội giết người và Tội cướp tài sản." },
                            { q: "Đối với người từ đủ 14 tuổi đến dưới 16 tuổi khi phạm tội, nếu điều luật quy định hình phạt tù chung thân hoặc tử hình, thì mức hình phạt cao nhất được áp dụng là:", a: ["10 năm tù.", "12 năm tù.", "15 năm tù.", "18 năm tù."], c: 1, r: "Chính sách nhân đạo của pháp luật quy định: Người từ đủ 14 đến dưới 16 tuổi nếu phạm tội có khung hình phạt cao nhất là chung thân/tử hình thì chỉ bị phạt tối đa không quá 12 năm tù." },
                            { q: "Phạm tội chưa đạt là cố ý thực hiện tội phạm nhưng không thực hiện được đến cùng vì những nguyên nhân ngoài ý muốn. Người phạm tội chưa đạt có phải chịu trách nhiệm hình sự hay không?", a: ["Có thể.", "Không.", "Có.", "Chỉ áp dụng nếu người đó từ đủ 18 tuổi trở lên."], c: 2, r: "Điều 15 BLHS 2015 khẳng định người phạm tội chưa đạt vẫn phải chịu trách nhiệm hình sự về tội phạm chưa đạt." },
                            { q: "Tự ý nửa chừng chấm dứt việc phạm tội là tự mình không thực hiện tội phạm đến cùng dù không có gì ngăn cản. Người này có được miễn trách nhiệm hình sự không?", a: ["Có thể.", "Không.", "Có.", "Chỉ áp dụng nếu người đó từ đủ 18 tuổi trở lên."], c: 2, r: "Theo Điều 16 BLHS 2015, người tự ý nửa chừng chấm dứt việc phạm tội ĐƯỢC MIỄN trách nhiệm hình sự về tội định phạm." },
                            { q: "Trường hợp nào sau đây KHÔNG được loại trừ trách nhiệm hình sự?", a: ["Tình trạng không có năng lực trách nhiệm hình sự.", "Phòng vệ chính đáng.", "Tình thế cấp thiết.", "Vô ý phạm tội."], c: 3, r: "Vô ý phạm tội vẫn là hành vi cấu thành tội phạm trong nhiều trường hợp (ví dụ: Vô ý làm chết người). Các phương án A, B, C đều là căn cứ loại trừ TNHS." },
                            { q: "Người che giấu tội phạm là ông, bà, cha, mẹ, con, cháu, anh chị em ruột, vợ hoặc chồng của người phạm tội phải chịu trách nhiệm hình sự thuộc trường hợp nào?", a: ["Phải chịu trách nhiệm hình sự về tội che giấu tội phạm đối với mọi loại tội phạm.", "Chỉ chịu trách nhiệm đối với các tội xâm phạm an ninh quốc gia hoặc tội đặc biệt nghiêm trọng khác theo Điều 389.", "Chỉ chịu trách nhiệm đối với tội xâm phạm an ninh quốc gia.", "Không bao giờ phải chịu trách nhiệm hình sự."], c: 1, r: "Pháp luật đề cao tính chất gia đình: Người thân thích chỉ bị truy cứu TNHS về tội che giấu nếu tội đó xâm phạm an ninh quốc gia hoặc các tội đặc biệt nghiêm trọng được chỉ định." },
                            { q: "Người phạm tội trong tình trạng mất khả năng nhận thức hoặc điều khiển hành vi do dùng rượu, bia hoặc chất kích thích mạnh khác có phải chịu trách nhiệm hình sự không?", a: ["Có thể.", "Không.", "Có.", "Chỉ áp dụng nếu người đó từ đủ 18 tuổi trở lên."], c: 2, r: "Điều 13 BLHS 2015 quy định rất rõ: Người phạm tội trong tình trạng say do dùng rượu, bia hoặc chất kích thích mạnh khác thì VẪN PHẢI chịu trách nhiệm hình sự." },
                            { q: "Khoản 1 Điều 108 BLHS năm 2015 quy định công dân Việt Nam câu kết với nước ngoài nhằm gây nguy hại cho độc lập, chủ quyền của Tổ quốc bị phạt tù theo thời hạn nào?", a: ["Từ 12 năm đến 20 năm, chung thân hoặc tử hình.", "Từ 10 năm đến 15 năm.", "Từ 7 năm đến 10 năm.", "Từ 3 năm đến 7 năm."], c: 0, r: "Đây là Tội phản bội Tổ quốc. Là tội đặc biệt nghiêm trọng nhất, do đó khung hình phạt ở khoản 1 cực kỳ nghiêm khắc: 12-20 năm tù, chung thân hoặc tử hình." },
                            { q: "Khoản 1 Điều 168 BLHS năm 2015 quy định người dùng vũ lực, đe dọa dùng vũ lực ngay tức khắc làm nạn nhân không thể chống cự nhằm chiếm đoạt tài sản bị phạt tù thời hạn nào?", a: ["Từ 3 năm đến 7 năm.", "Từ 3 năm đến 10 năm.", "Từ 1 năm đến 5 năm.", "Từ 3 năm đến 5 năm."], c: 1, r: "Đây là cấu thành cơ bản của Tội cướp tài sản. Khung hình phạt khởi điểm cho tội danh này là từ 03 năm đến 10 năm tù." },
                            { q: "Tội giết người là gì?", a: ["Hành vi tước đoạt sinh mạng của người khác một cách trái pháp luật.", "Hành vi cố ý tước đoạt sinh mạng một cách trái pháp luật.", "Hành vi cố ý tước đoạt sinh mạng của người khác một cách trái pháp luật.", "Hành vi cố ý tước đoạt sinh mạng của người khác."], c: 2, r: "Định nghĩa chuẩn xác nhất: Phải là hành vi 'cố ý', nhằm 'tước đoạt sinh mạng của người khác' và thực hiện 'một cách trái pháp luật'." },
                            { q: "T bị người yêu ruồng bỏ trong khi đã có thai. H là thầy bói vì tư thù với gia đình T nên đã dùng những lời lẽ mê tín xúi giục T tự sát. T nghe theo và đã tự sát. H phạm tội gì?", a: ["Giết người.", "Giúp người khác tự sát.", "Xúi giục người khác tự sát.", "Bức tử."], c: 2, r: "Hành vi dùng lời lẽ kích động, dụ dỗ người khác tự kết liễu mạng sống của mình cấu thành Tội xúi giục hoặc giúp người khác tự sát (Điều 131 BLHS)." },
                            { q: "K đã nhờ D giúp đổ thuốc độc vào miệng vì mắc bệnh hiểm nghèo muốn giải thoát. D giúp và K đã chết. D phạm tội gì?", a: ["Giết người.", "Giúp người khác tự sát.", "Xúi giục người khác tự sát.", "Không phạm tội vì có sự đồng ý của nạn nhân."], c: 0, r: "Hành vi 'trực tiếp' đổ thuốc độc vào miệng nạn nhân là hành vi tước đoạt sinh mạng người khác. Dù nạn nhân đồng ý, D vẫn phạm Tội giết người." },
                            { q: "K sử dụng chiếc bơm tiêm trong có máu nhiễm HIV doạ sẽ tiêm ngay lập tức cho D nếu D không trao chiếc xe máy của mình. K phạm tội gì?", a: ["Tội cố ý truyền HIV cho người khác.", "Tội lây truyền HIV cho người khác.", "Tội cướp tài sản.", "Cả A và C."], c: 2, r: "Hành vi dùng kim tiêm dính máu đe dọa vũ lực ngay tức khắc để làm tê liệt ý chí nạn nhân nhằm chiếm đoạt chiếc xe là cấu thành chuẩn của Tội cướp tài sản." },
                            { q: "Do thù ghét, A dùng dao đâm chết B. Đối tượng tác động của tội phạm mà A đã thực hiện là:", a: ["Con dao.", "Con người B.", "Quyền được sống của B.", "Cái chết của B."], c: 1, r: "Trong khoa học luật hình sự, 'Đối tượng tác động' là bộ phận thế giới vật chất mà hành vi phạm tội trực tiếp tác động vào. Ở đây chính là thực thể sinh học (con người B)." },
                            { q: "Anh Khánh ra lệnh cho con chó béc-giê của mình tấn công anh Hoàng Ngọc gây thương tích 21%. Chủ thể của tội phạm là:", a: ["Con chó béc - giê.", "Anh Khánh.", "Anh Khánh và con chó béc - giê.", "Anh Hoàng Ngọc."], c: 1, r: "Động vật không có năng lực trách nhiệm hình sự. Con chó chỉ là công cụ phạm tội. Chủ thể duy nhất chịu trách nhiệm hình sự ở đây là anh Khánh." },
                            { q: "Điều 182 BLHS năm 2015 quy định: Người đang có vợ/chồng mà kết hôn hoặc chung sống như vợ chồng với người khác... sẽ bị phạt khi thuộc trường hợp nào?", a: ["Làm cho quan hệ hôn nhân dẫn đến ly hôn hoặc đã bị xử phạt VPHC mà còn vi phạm.", "Làm cho vợ, chồng hoặc con tự sát.", "Đã có quyết định của Tòa án buộc chấm dứt mà vẫn duy trì.", "Tất cả các trường hợp trên."], c: 3, r: "Tội vi phạm chế độ một vợ, một chồng sẽ bị xử lý hình sự nếu gây hậu quả nghiêm trọng (ly hôn, tự sát) hoặc đã bị xử phạt hành chính/Tòa án cấm mà vẫn ngoan cố vi phạm." },
                            { q: "Chị G. phạm tội và bị phạt tù, nhưng do đang mang thai nên được hoãn chấp hành hình phạt. Việc hoãn này kéo dài đến khi nào?", a: ["Sau khi sinh con.", "Sau khi sinh và phục hồi sức khỏe.", "Đến khi cai sữa cho con.", "Đến khi con 36 tháng tuổi."], c: 3, r: "Chính sách nhân đạo quy định phụ nữ có thai hoặc đang nuôi con nhỏ dưới 36 tháng tuổi được hoãn chấp hành hình phạt tù cho đến khi con đủ 36 tháng tuổi." },
                            { q: "Khi nào thì một người bị truy cứu TNHS về tội tảo hôn?", a: ["Cố ý duy trì quan hệ vợ chồng trái pháp luật với người chưa đủ tuổi kết hôn.", "Đã có quyết định của tòa án buộc chấm dứt quan hệ đó.", "Đã bị xử phạt hành chính về hành vi này mà còn vi phạm.", "Cả A, B và C đều đúng."], c: 3, r: "Tội tảo hôn (Điều 114) cấu thành khi có hành vi duy trì quan hệ vợ chồng trái pháp luật với người chưa đủ tuổi dù đã có quyết định của Tòa án hoặc đã bị xử phạt hành chính." },
                            { q: "Do mâu thuẫn cá nhân, K đã đánh H bị thương tích nặng với tỷ lệ thương tật 14%. H phải điều trị tốn kém hơn 40 triệu đồng. K phải chịu trách nhiệm pháp lý nào?", a: ["Hình sự.", "Hành chính.", "Hình sự và kỷ luật.", "Hình sự và dân sự."], c: 3, r: "Đánh người gây thương tích 14% là vi phạm Hình sự (Tội cố ý gây thương tích). Đồng thời, K phải có trách nhiệm Dân sự là bồi thường thiệt hại 40 triệu đồng cho H." },
                            { q: "Ông Đ đi xe máy ngược chiều, đâm vào một người đi đúng làm người này bị thương phải vào viện. Ông Đ bị xử phạt vi phạm giao thông và phải bồi thường. Trách nhiệm pháp lý của ông Đ là?", a: ["Hình sự và hành chính.", "Kỷ luật và dân sự.", "Hành chính và dân sự.", "Hành chính và kỷ luật."], c: 2, r: "Vi phạm luật giao thông (đi ngược chiều) bị phạt tiền là trách nhiệm Hành chính. Việc bồi thường thuốc men cho người bị hại là trách nhiệm Dân sự." },
                            { q: "Lê S bị phạt 7 năm tù về tội trộm cắp. Bản án hiệu lực 01/01/2001. Giả sử S không phạm tội mới, đến khi nào thì án tích đối với S được xóa? (Căn cứ BLHS áp dụng lúc bấy giờ)", a: ["Hết ngày 01/01/2009.", "Hết ngày 01/01/2011.", "Hết ngày 01/01/2013.", "Hết ngày 01/01/2015."], c: 2, r: "Người chấp hành xong án phạt 7 năm tù (vào 01/01/2008), cộng thêm thời hạn thử thách để xóa án tích (với mức án 5-15 năm là 5 năm). Vậy đến 01/01/2013 S sẽ được xóa án tích." },
                            { q: "Trục xuất KHÔNG PHẢI là chế tài của ngành luật nào?", a: ["Hình sự.", "Hành chính.", "Dân sự.", "Cả A, B, C."], c: 2, r: "Trục xuất có thể là hình phạt (chế tài Hình sự) hoặc biện pháp xử lý (chế tài Hành chính) đối với người nước ngoài. Dân sự không có chế tài trục xuất." },
                            { q: "Chế tài nào sau đây KHÔNG CÓ biện pháp cảnh cáo?", a: ["Hình sự.", "Hành chính.", "Kỷ luật.", "Dân sự."], c: 3, r: "Hình sự, Hành chính và Kỷ luật đều có hình thức Cảnh cáo. Luật Dân sự chỉ quy định bồi thường, phạt vi phạm hợp đồng, không có chế tài 'Cảnh cáo'." },
                            { q: "Ông Nguyễn Văn Đ là đại biểu HĐND, nghi ngờ cháu P đổ sơn nhà mình nên đã bắt giữ cháu P và tra khảo. Hành vi của ông Đ có dấu hiệu tội gì?", a: ["Tội lợi dụng chức vụ, quyền hạn bắt, giữ, giam người trái pháp luật.", "Tội vi phạm quy định về giam giữ.", "Tội bắt, giữ hoặc giam người trái pháp luật.", "Tội lợi dụng chức vụ, quyền hạn gây ảnh hưởng để trục lợi."], c: 2, r: "Ông Đ là đại biểu HĐND nhưng không có thẩm quyền giam giữ người. Việc ông tự ý bắt giữ công dân cấu thành Tội bắt, giữ hoặc giam người trái pháp luật." },
                            { q: "Để nhanh chóng phá án, Điều tra viên H đã đe dọa đánh ép anh Đ phải khai nhận là đã sát hại nạn nhân. Hành vi của Điều tra viên H có dấu hiệu tội gì?", a: ["Tội bức cung.", "Tội lợi dụng chức vụ, quyền hạn giam, giữ người trái pháp luật.", "Tội cưỡng ép người khác khai báo, cung cấp tài liệu.", "Tội dùng nhục hình."], c: 0, r: "Điều tra viên sử dụng thủ đoạn đe dọa, ép buộc nghi can phải khai sai sự thật (nhận tội) là hành vi đặc trưng của Tội bức cung (Điều 374 BLHS)." },
                            { q: "Người dưới 18 tuổi đang chấp hành án phạt tù có thể được tha tù trước thời hạn khi có điều kiện nào sau đây?", a: ["Phạm tội lần đầu.", "Có nhiều tiến bộ, có ý thức cải tạo tốt.", "Đã chấp hành được một phần ba thời hạn phạt tù.", "Tất cả các đáp án trên."], c: 3, r: "Pháp luật khoan hồng đối với người dưới 18 tuổi, cho phép họ được tha tù trước thời hạn nếu hội đủ 3 yếu tố: phạm tội lần đầu, cải tạo tốt và đã chấp hành được 1/3 thời gian." },
                            { q: "Biện pháp giám sát, giáo dục nào áp dụng cho người dưới 18 tuổi phạm tội trong trường hợp được MIỄN trách nhiệm hình sự?", a: ["Biện pháp khiển trách.", "Biện pháp hòa giải tại cộng đồng.", "Biện pháp giáo dục tại xã, phường, thị trấn.", "Cả A, B, C."], c: 3, r: "Đây là 3 biện pháp mang tính chất giáo dục, phòng ngừa, không để lại án tích, được áp dụng thay thế cho hình phạt khi người dưới 18 tuổi được miễn trách nhiệm hình sự." },
                            { q: "Là công dân Việt Nam, theo sự chỉ đạo của nước ngoài, N đã xâm nhập lãnh thổ Việt Nam để thực hiện hành vi phá hoại nhằm chống chính quyền là phạm tội:", a: ["Xâm phạm an ninh lãnh thổ.", "Gián điệp.", "Khủng bố nhằm chống chính quyền.", "Hoạt động phỉ."], c: 1, r: "Công dân VN hoặc người nước ngoài hoạt động theo sự chỉ đạo của nước ngoài tiến hành các hoạt động tình báo, phá hoại chống lại nhà nước VN cấu thành Tội gián điệp." },
                            { q: "Khoản 1 Điều 330 BLHS quy định người dùng vũ lực, đe dọa dùng vũ lực ép buộc người thi hành công vụ thực hiện hành vi trái pháp luật bị phạt như thế nào?", a: ["Phạt tù từ 02 năm đến 07 năm.", "Phạt cải tạo không giam giữ đến 03 năm hoặc phạt tù từ 06 tháng đến 03 năm.", "Phạt tù từ 02 năm đến 05 năm.", "Phạt tù từ 02 năm đến 03 năm."], c: 1, r: "Khung cơ bản (khoản 1) của Tội chống người thi hành công vụ là phạt cải tạo không giam giữ đến 3 năm hoặc phạt tù từ 6 tháng đến 3 năm." },
                            { q: "Khoản 1 Điều 249 BLHS quy định người tàng trữ trái phép từ 01g đến dưới 20g ma túy thể rắn (không nhằm mục đích mua bán/sản xuất) bị phạt thời hạn nào?", a: ["Từ 2 năm đến 7 năm.", "Từ 1 năm đến 5 năm.", "Từ 2 năm đến 5 năm.", "Từ 3 năm đến 5 năm."], c: 1, r: "Đây là khung cơ bản của Tội tàng trữ trái phép chất ma túy. Mức phạt được quy định là phạt tù từ 01 năm đến 05 năm." },
                            { q: "Công dân Việt Nam bị kết án phạt tù về tội xâm phạm an ninh quốc gia bị tước quyền công dân nào sau đây?", a: ["Quyền ứng cử, làm việc nhà nước và phục vụ vũ trang.", "Quyền ứng cử, bầu cử đại biểu cơ quan quyền lực NN; quyền làm việc cơ quan nhà nước và phục vụ lực lượng vũ trang.", "Quyền ứng cử đại biểu Quốc hội, HĐND.", "Quyền tự do đi lại và cư trú."], c: 1, r: "Tước một số quyền công dân (Điều 44 BLHS) đối với tội ANQG bao gồm: tước quyền bầu cử, ứng cử; quyền làm việc trong cơ quan nhà nước và phục vụ trong lực lượng vũ trang." }
                        ]
                    },
                    4: {
                        title: "Phần 4: Pháp luật về Phòng, chống tham nhũng",
                        questions: [
                            { q: "Thế nào là tham nhũng?", a: ["Hành vi của cán bộ, công chức nhà nước đã lợi dụng chức vụ, quyền hạn đó vì vụ lợi.", "Hành vi lợi dụng chức vụ, quyền hạn để vụ lợi.", "Hành vi của người có chức vụ, quyền hạn đã lợi dụng chức vụ, quyền hạn đó vì vụ lợi.", "Hành vi cửa quyền, hách dịch, đòi hỏi, gây khó khăn, phiền hà của người có chức vụ, quyền hạn trong khi thực hiện nhiệm vụ."], c: 2, r: "Theo Điều 3 Luật Phòng, chống tham nhũng 2018, tham nhũng là hành vi của người có chức vụ, quyền hạn đã lợi dụng chức vụ, quyền hạn đó vì vụ lợi." },
                            { q: "Công dân có quyền gì trong công tác phòng, chống tham nhũng?", a: ["Công dân chỉ có quyền phát hiện nhà báo tin về hành vi tham nhũng.", "Công dân chỉ có quyền giám sát việc thực hiện pháp luật về phòng, chống tham nhũng.", "Công dân chỉ có quyền phát hiện, kiến nghị với cơ quan nhà nước hoàn thiện pháp luật về phòng, chống tham nhũng và giám sát việc thực hiện.", "Có quyền phát hiện, phản ánh, tố cáo, tố giác, báo tin về hành vi tham nhũng và được bảo vệ, khen thưởng; có quyền kiến nghị với cơ quan nhà nước hoàn thiện pháp luật và giám sát việc thực hiện."], c: 3, r: "Pháp luật quy định công dân có quyền lực rất rộng rãi: từ phát hiện, tố cáo, báo tin, giám sát cho đến kiến nghị hoàn thiện pháp luật." },
                            { q: "Thời hạn định kỳ chuyển đổi vị trí công tác là bao nhiêu năm?", a: ["Từ đủ 02 năm đến 05 năm theo đặc thù của từng ngành, lĩnh vực.", "Từ đủ 03 năm đến 06 năm theo đặc thù của từng ngành, lĩnh vực.", "Từ đủ 02 năm đến 04 năm theo đặc thù của từng ngành, lĩnh vực.", "Từ đủ 04 năm đến 05 năm theo đặc thù của từng ngành, lĩnh vực."], c: 0, r: "Theo quy định, thời hạn định kỳ chuyển đổi vị trí công tác đối với cán bộ, công chức là từ đủ 02 năm đến 05 năm tùy theo đặc thù của từng ngành, lĩnh vực." },
                            { q: "Những người nào có nghĩa vụ kê khai tài sản?", a: ["Cán bộ, công chức nhà nước.", "Sĩ quan Công an nhân dân; sĩ quan Quân đội nhân dân, quân nhân chuyên nghiệp.", "Người giữ chức vụ từ Phó trưởng phòng và tương đương trở lên công tác tại đơn vị sự nghiệp công lập, doanh nghiệp nhà nước; Người ứng cử ĐBQH, HĐND.", "Cả ba phương án trên."], c: 3, r: "Điều 34 Luật PCTN 2018 quy định rất rộng rãi đối tượng phải kê khai tài sản, bao gồm tất cả các nhóm đối tượng được nêu ở phương án A, B và C." },
                            { q: "Theo Luật phòng, chống tham nhũng, người đứng đầu, cấp phó của người đứng đầu cơ quan không được bố trí những người nào dưới đây giữ chức vụ quản lý nhân sự, kế toán, thủ quỹ, thủ kho, mua bán hàng hóa cho cơ quan đó?", a: ["Vợ hoặc chồng.", "Vợ hoặc chồng, bố, mẹ, con, anh, chị, em ruột.", "Bố, mẹ, con, anh, chị, em ruột.", "Con, anh, chị, em ruột."], c: 1, r: "Để tránh xung đột lợi ích và tư lợi, pháp luật nghiêm cấm bố trí người thân thích (Vợ, chồng, bố, mẹ, con, anh, chị, em ruột) vào các vị trí nhạy cảm về tài chính, nhân sự." },
                            { q: "Có bao nhiêu hình thức công khai về tổ chức và hoạt động của cơ quan, tổ chức, đơn vị?", a: ["5 hình thức.", "6 hình thức.", "7 hình thức.", "8 hình thức."], c: 3, r: "Điều 11 Luật PCTN 2018 quy định 8 hình thức công khai (niêm yết, thông báo, phát hành ấn phẩm, họp báo, đưa lên cổng TTĐT...)." },
                            { q: "Thế nào là vụ lợi?", a: ["Là hành vi của người có chức vụ, quyền hạn đã lợi dụng chức vụ, quyền hạn đó để tham nhũng.", "Là việc công chức lợi dụng chức vụ, quyền hạn nhằm đạt được lợi ích vật chất hoặc lợi ích phi vật chất không chính đáng.", "Là việc người có chức vụ, quyền hạn đã lợi dụng chức vụ, quyền hạn nhằm đạt được lợi ích vật chất hoặc lợi ích phi vật chất không chính đáng.", "Là hành vi lợi dụng chức vụ, quyền hạn đó để tham nhũng."], c: 2, r: "Vụ lợi được hiểu là mục đích nhằm đạt được lợi ích vật chất (tiền bạc, tài sản) hoặc lợi ích phi vật chất (địa vị, thành tích) một cách không chính đáng." },
                            { q: "Chọn đáp án đúng về quyền phản ánh, tố cáo:", a: ["Cá nhân, tổ chức có quyền phản ánh, tố cáo về hành vi tham nhũng.", "Cá nhân, tổ chức có quyền phản ánh về hành vi tham nhũng, cá nhân có quyền tố cáo về hành vi tham nhũng theo quy định của pháp luật.", "Tổ chức có quyền phản ánh về hành vi tham nhũng, cá nhân có quyền tố cáo về hành vi tham nhũng theo quy định của pháp luật.", "Tất cả đáp án trên."], c: 2, r: "Theo pháp luật Việt Nam, chỉ có 'cá nhân' mới có quyền tố cáo, còn 'tổ chức' thì thực hiện quyền kiến nghị, phản ánh." },
                            { q: "Luật phòng, chống tham nhũng quy định việc tặng quà của cơ quan, tổ chức, đơn vị, người có chức vụ, quyền hạn như thế nào?", a: ["Không được sử dụng tài chính công, tài sản công làm quà tặng, trừ trường hợp tặng quà vì mục đích từ thiện, đối ngoại và trong trường hợp cần thiết khác theo quy định của pháp luật.", "Tuyệt đối không được sử dụng tài chính công, tài sản công làm quà tặng.", "Được sử dụng tài chính công, tài sản công làm quà tặng.", "Chỉ được sử dụng tài chính công, tài sản công làm quà tặng, vì mục đích từ thiện."], c: 0, r: "Pháp luật cấm lấy tài sản, tài chính công làm quà tặng ngoại trừ các trường hợp được quy định nghiêm ngặt như từ thiện, đối ngoại." },
                            { q: "Luật phòng, chống tham nhũng quy định việc nhận quà tặng của cơ quan, tổ chức, đơn vị, người có chức vụ, quyền hạn như thế nào?", a: ["Được trực tiếp hoặc gián tiếp nhận quà tặng dưới mọi hình thức của cơ quan, tổ chức, đơn vị, cá nhân có liên quan đến công việc do mình giải quyết.", "Được trực tiếp nhận quà tặng dưới mọi hình thức...", "Được gián tiếp nhận quà tặng dưới mọi hình thức...", "Không được trực tiếp hoặc gián tiếp nhận quà tặng dưới mọi hình thức của cơ quan, tổ chức, cá nhân có liên quan đến công việc do mình giải quyết hoặc thuộc phạm vi quản lý của mình."], c: 3, r: "Để đảm bảo sự liêm chính, cán bộ, công chức tuyệt đối không được nhận quà (dù trực tiếp hay gián tiếp) từ những người có liên quan đến công việc mình đang giải quyết." },
                            { q: "Luật phòng, chống tham nhũng năm 2018 có hiệu lực khi nào?", a: ["Từ ngày 01 tháng 8 năm 2019.", "Từ ngày 01 tháng 7 năm 2019.", "Từ ngày 02 tháng 7 năm 2019.", "Từ ngày 02 tháng 8 năm 2019."], c: 1, r: "Luật PCTN năm 2018 được Quốc hội thông qua và chính thức có hiệu lực từ ngày 01/07/2019." },
                            { q: "Luật Phòng chống tham nhũng năm 2018 quy định việc xử lý tài sản tham nhũng phải được như thế nào?", a: ["Thu hồi theo quy định của pháp luật.", "Trả lại cho chủ sở hữu, người quản lý hợp pháp theo quy định của pháp luật.", "Tịch thu theo quy định của pháp luật.", "Thu hồi, trả lại cho chủ sở hữu, người quản lý hợp pháp hoặc tịch thu theo quy định của pháp luật."], c: 3, r: "Tài sản tham nhũng tùy từng trường hợp cụ thể sẽ bị thu hồi nộp ngân sách, tịch thu hoặc được trả lại cho chủ sở hữu hợp pháp bị chiếm đoạt." },
                            { q: "Nội dung xác minh tài sản, thu nhập trong công tác kiểm soát tài sản, thu nhập của người có chức vụ, quyền hạn như thế nào?", a: ["Tính trung thực, đầy đủ, rõ ràng của bản kê khai; tính trung thực trong việc giải trình về nguồn gốc của tài sản, thu nhập tăng thêm.", "Tính rõ ràng của bản kê khai và trong việc giải trình về nguồn gốc của tài sản, thu nhập tăng thêm.", "Tính trung thực, đầy đủ, rõ ràng của bản kê khai.", "Tính trung thực trong việc giải trình về nguồn gốc của tài sản, thu nhập tăng thêm."], c: 0, r: "Xác minh tài sản phải đánh giá toàn diện cả 2 mặt: tính trung thực, rõ ràng của bản kê khai và tính minh bạch của nguồn gốc phần tài sản tăng thêm." },
                            { q: "Tài sản, thu nhập phải kê khai bao gồm những gì?", a: ["Quyền sử dụng đất, nhà ở; kim khí quý, đá quý, tiền... có giá trị từ 50 triệu trở lên.", "Chỉ kê khai quyền sử dụng đất, nhà ở, công trình xây dựng.", "Quyền sử dụng đất, nhà ở...; kim khí quý, tiền... có giá trị từ 50 triệu trở lên; tài sản, tài khoản ở nước ngoài; tổng thu nhập giữa 02 lần kê khai.", "Chỉ kê khai tài sản, tài khoản ở nước ngoài."], c: 2, r: "Quy định yêu cầu kê khai bất động sản, các tài sản có giá trị lớn (từ 50 triệu VNĐ), tài khoản ở nước ngoài và mọi biến động thu nhập giữa 2 lần kê khai." },
                            { q: "Theo Luật phòng, chống tham nhũng, khi phát hiện có dấu hiệu tham nhũng trong cơ quan thì cán bộ, công chức, viên chức phải báo cáo ngay với ai?", a: ["Cơ quan thanh tra.", "Người đứng đầu cơ quan, tổ chức, đơn vị đó; trường hợp người đứng đầu có liên quan thì báo cáo với người đứng đầu cơ quan có thẩm quyền quản lý cán bộ.", "Cơ quan cảnh sát điều tra.", "Lãnh đạo trực tiếp của mình."], c: 1, r: "Theo quy trình, phải báo cáo cho người đứng đầu cơ quan đó xử lý. Nếu người đứng đầu dính líu, phải báo cáo vượt cấp lên cơ quan quản lý cấp trên." },
                            { q: "Người kê khai tài sản, thu nhập phải có nghĩa vụ gì?", a: ["Kê khai tài sản, thu nhập và biến động về tài sản, thu nhập của mình.", "Kê khai tài sản, thu nhập và biến động về tài sản, thu nhập của mình, của vợ hoặc chồng.", "Kê khai tài sản, thu nhập và biến động về tài sản, thu nhập của mình, của vợ hoặc chồng, con chưa thành niên.", "Kê khai tài sản, thu nhập và biến động về tài sản, thu nhập của mình, con chưa thành niên."], c: 2, r: "Để chống tẩu tán tài sản, đối tượng kê khai phải báo cáo tài sản của bản thân, của vợ/chồng và của cả con cái chưa đủ 18 tuổi." },
                            { q: "Trong phòng, chống tham nhũng công tác kiểm tra của cơ quan, tổ chức, đơn vị bao gồm những hình thức nào?", a: ["Kiểm tra thường xuyên được tiến hành theo chương trình, kế hoạch.", "Chỉ kiểm tra đột xuất được tiến hành khi phát hiện có dấu hiệu tham nhũng.", "Kiểm tra thường xuyên được tiến hành theo kế hoạch và tập trung vào lĩnh vực dễ phát sinh tham nhũng; kiểm tra đột xuất được tiến hành khi phát hiện có dấu hiệu tham nhũng.", "Kiểm tra thường xuyên và kiểm tra đột xuất."], c: 2, r: "Công tác kiểm tra được kết hợp chặt chẽ giữa 'kiểm tra thường xuyên' theo kế hoạch ở những khâu nhạy cảm và 'kiểm tra đột xuất' khi có manh mối vi phạm." },
                            { q: "Khi phát hiện có hành vi tham nhũng, người đứng đầu cơ quan quản lý nhà nước phải làm gì?", a: ["Kịp thời xử lý theo thẩm quyền hoặc báo cho cơ quan có thẩm quyền xử lý theo quy định của pháp luật.", "Kịp thời xử lý theo thẩm quyền.", "Báo cho cơ quan có thẩm quyền xử lý theo quy định của pháp luật.", "Họp cơ quan và xử lý nội bộ."], c: 0, r: "Không được bao che hay chỉ 'đóng cửa bảo nhau'. Người đứng đầu phải tự xử lý nếu trong thẩm quyền, hoặc chuyển ngay hồ sơ cho cơ quan chức năng có thẩm quyền." },
                            { q: "Hiện nay, Trưởng ban Chỉ đạo Trung ương về phòng, chống tham nhũng là ai?", a: ["Tổng Bí thư.", "Chủ tịch nước.", "Thủ tướng Chính phủ.", "Trưởng Ban Nội chính Trung ương."], c: 0, r: "Theo chủ trương của Đảng, Tổng Bí thư trực tiếp làm Trưởng ban Chỉ đạo Trung ương về phòng, chống tham nhũng, tiêu cực để đảm bảo tính quyết liệt, triệt để." },
                            { q: "Ông P chỉ đạo N làm chứng từ giả để chiếm đoạt tài sản. N sợ bị đuổi việc nên làm theo. M khuyên N làm theo 'sếp'. Hành vi này làm thâm hụt ngân sách hàng trăm tỉ đồng. Ông P sẽ bị:", a: ["Truy cứu trách nhiệm hình sự, tịch thu tài sản.", "Tịch thu tài sản, khiển trách trước công ty.", "Tịch thu tài sản, kỉ luật cách chức giám đốc.", "Tịch thu tài sản, cho nghỉ hưu trước tuổi."], c: 0, r: "Chỉ đạo làm giả chứng từ chiếm đoạt số tiền khổng lồ là hành vi tội phạm đặc biệt nghiêm trọng, chắc chắn phải bị truy cứu trách nhiệm hình sự và bị tịch thu tài sản." },
                            { q: "Đảng và Nhà nước ta coi tham nhũng là:", a: ["Nghiêm trọng.", "Nóng bỏng.", "Đặc biệt nghiêm trọng.", "Nguy cơ."], c: 3, r: "Đảng ta đã chỉ rõ tham nhũng là một 'quốc nạn', là một trong bốn nguy cơ lớn đe dọa trực tiếp đến sự tồn vong của chế độ." },
                            { q: "Ban nội chính tỉnh ủy có chức năng gì?", a: ["Phòng, chống tham nhũng.", "Tham mưu phòng, chống tham nhũng.", "Tham mưu quy hoạch nhân sự.", "Xử lí cán bộ tham nhũng."], c: 1, r: "Ban Nội chính là cơ quan tham mưu, giúp việc đắc lực cho cấp ủy Đảng trong công tác lãnh đạo, chỉ đạo phòng, chống tham nhũng ở địa phương." },
                            { q: "Một trong những biện pháp hữu hiệu nhất nhằm đấu tranh phòng, chống tham ô, lãng phí, quan liêu là:", a: ["Giáo dục tư tưởng cho quần chúng.", "Sử dụng pháp luật.", "Răn đe, bắt buộc thực hiện.", "Đấu tranh của quần chúng nhân dân."], c: 3, r: "Sức mạnh của nhân dân là vô địch. Dựa vào sự giám sát và đấu tranh của quần chúng nhân dân là giải pháp hữu hiệu và căn cơ nhất để loại bỏ tham nhũng." },
                            { q: "Ai là người khởi xướng, phát động, chỉ đạo phong trào phê bình và tự phê bình trong đội ngũ cán bộ, đảng viên?", a: ["Chủ tịch Hồ Chí Minh.", "Tổng bí thư Nguyễn Phú Trọng.", "Nguyên Tổng bí thư Đỗ Mười.", "Nguyên tổng bí thư Nông Đức mạnh."], c: 0, r: "Chủ tịch Hồ Chí Minh là người luôn đề cao và trực tiếp phát động phong trào phê bình, tự phê bình để giữ gìn sự trong sạch của Đảng ngay từ những ngày đầu." },
                            { q: "Chống tham nhũng ngoài việc xử lý hành vi tham nhũng cần quan tâm đến:", a: ["Tịch thu, thu hồi tài sản tham nhũng.", "Giáo dục ý thức chính trị.", "Phê bình và tự phê bình.", "Phổ biến pháp luật."], c: 0, r: "Việc xử lý người vi phạm phải đi đôi với việc quyết liệt thu hồi, tịch thu triệt để những tài sản tham nhũng đã bị tẩu tán, chiếm đoạt." },
                            { q: "Những hành vi tham nhũng có tác hại gì đối với con người?", a: ["Mất hết nhân phẩm, danh dự, tương lai.", "Mất tính nghiêm minh của pháp luật.", "Gây ra những tiêu cực trong xã hội.", "Mất lòng tin của nhân dân."], c: 0, r: "Đối với cá nhân người thực hiện hành vi tham nhũng, hậu quả trực tiếp nhất là sự suy đồi về đạo đức, đánh mất nhân phẩm, danh dự và tiêu tan tương lai sự nghiệp." },
                            { q: "Biểu hiện nào sau đây bị xem là tham nhũng?", a: ["Tiền biển thủ công quỹ.", "Tiền lương.", "Ngân sách Nhà nước.", "Quà làm từ thiện."], c: 0, r: "Biển thủ công quỹ (tham ô tài sản) là một trong những hành vi đặc trưng và phổ biến nhất của tội phạm tham nhũng." },
                            { q: "Theo Luật Phòng, chống tham nhũng, người tố cáo hành vi tham nhũng có trách nhiệm nào sau đây?", a: ["Phải gửi đơn đến đúng cơ quan có thẩm quyền, khai báo trung thực.", "Phải tố cáo trung thực, nêu rõ họ, tên, địa chỉ, cung cấp thông tin, tài liệu mà mình có và hợp tác với cơ quan có thẩm quyền giải quyết tố cáo.", "Phải nộp lệ phí cho cơ quan trực tiếp thụ lý đơn tố cáo.", "Phải nộp đơn, ghi rõ danh tính, khai báo trung thực, nộp lệ phí tố cáo."], c: 1, r: "Người tố cáo phải có trách nhiệm cung cấp danh tính rõ ràng, cung cấp bằng chứng trung thực và hợp tác với cơ quan điều tra (Pháp luật không thu lệ phí tố cáo)." },
                            { q: "Chủ tịch Hồ Chí Minh khẳng định: Quan liêu, tham ô, lãng phí là bạn đồng minh của:", a: ["Thực dân, phong kiến.", "Toàn Đảng, toàn dân.", "Quân đội nhân dân.", "Công an nhân dân."], c: 0, r: "Người gọi tham ô, lãng phí là 'giặc nội xâm', là bạn đồng minh của thực dân, phong kiến vì nó phá hoại công cuộc cách mạng từ bên trong." },
                            { q: "Trong phong trào chống tham ô, lãng phí, quan liêu cần phải:", a: ["Giáo dục là chính, trừng phạt là phụ.", "Giáo dục là phụ.", "Trừng phạt là chính.", "Cưỡng chế, trừng phạt là chính."], c: 0, r: "Quan điểm nhất quán của Đảng ta và Bác Hồ là lấy phòng ngừa, giáo dục làm gốc (chính), chỉ trừng phạt những kẻ ngoan cố, vi phạm nghiêm trọng (phụ)." },
                            { q: "Đâu là yếu tố thể hiện sự quan liêu của một cán sự lớp (Lớp trưởng)?", a: ["Hay quát nạt, thích được khen, xử lý công việc lớp qua loa, bao che bạn vi phạm.", "Hay quát nạt bạn bè.", "Thích được các bạn khen hơn chê.", "Nghiêm khắc xử lý công việc."], c: 0, r: "Sự hách dịch (quát nạt), thích nghe báo cáo láo (thích khen) và làm việc hời hợt, bao che chính là căn bệnh quan liêu thu nhỏ." },
                            { q: "Đâu là yếu tố đạo đức của con người cần loại bỏ để phòng, ngừa tham nhũng?", a: ["Bảo thủ, cố chấp, trọng sĩ diện, chưa nêu cao tinh thần tự phê bình.", "Tính bảo thủ.", "Cố chấp.", "Trọng sĩ diện."], c: 0, r: "Phương án A bao hàm đầy đủ nhất các thói hư tật xấu, cái tôi cá nhân ích kỷ cần phải loại bỏ để rèn luyện sự liêm chính." },
                            { q: "Nguyên nhân nào khiến con người có hành vi tham nhũng?", a: ["Không tự chủ, không kiềm chế được lòng tham bất chính, thiếu ý thức rèn luyện đạo đức, coi thường pháp luật.", "Không kiềm chế được lòng tham.", "Quyền lực, đồng tiền là tất cả.", "Coi thường pháp luật."], c: 0, r: "Nguyên nhân gốc rễ xuất phát từ sự sa ngã của cá nhân: không thắng nổi lòng tham, thiếu tu dưỡng đạo đức và coi thường sự trừng phạt của pháp luật." },
                            { q: "Theo Kết luận của Ban Chấp hành Trung ương Đảng tại Hội nghị Trung ương lần thứ 5 (khóa XI), Ban Chỉ đạo phòng, chống tham nhũng được thành lập ở cấp nào?", a: ["Trung ương.", "Cấp tỉnh.", "Cấp huyện.", "Cả 3 phương án trên."], c: 0, r: "Tại Hội nghị này, Trung ương đã quyết định thành lập Ban Chỉ đạo Trung ương về phòng, chống tham nhũng trực thuộc Bộ Chính trị để trực tiếp lãnh đạo." },
                            { q: "Việc huy động và sử dụng các khoản đóng góp của nhân dân để đầu tư xây dựng công trình địa phương phải được thực hiện như thế nào?", a: ["Phải lấy ý kiến nhân dân và được HĐND cùng cấp xem xét, quyết định.", "Phải được công khai để nhân dân giám sát.", "Công khai mục đích huy động, mức đóng góp, việc sử dụng, kết quả và báo cáo quyết toán.", "Cả 3 phương án trên."], c: 3, r: "Các khoản đóng góp tự nguyện của nhân dân phải minh bạch tuyệt đối, được HĐND thông qua và phải công khai mọi khâu thu chi để dân giám sát." },
                            { q: "Theo quy định, tài sản nào sau đây của người có nghĩa vụ kê khai tài sản khi tăng thêm phải giải trình nguồn gốc?", a: ["Tăng về số lượng, diện tích hoặc thay đổi về cấp nhà, công trình, loại đất so với kỳ kê khai trước đó.", "Sổ tiết kiệm tăng thêm 45 triệu đồng.", "Đá quý trị giá 49 triệu đồng.", "Xe máy trị giá 40 triệu đồng."], c: 0, r: "Mọi sự thay đổi, gia tăng về bất động sản (số lượng, diện tích, cấp nhà) đều bắt buộc phải giải trình rõ nguồn gốc tiền mua. Các tài sản động sản khác trong đáp án chưa đạt mức quy định phải giải trình (50 triệu)." },
                            { q: "Việc công khai bản kê khai tài sản, thu nhập của người có nghĩa vụ kê khai được công khai ở đâu?", a: ["Tại trụ sở Ủy ban nhân dân nơi người đó cư trú.", "Trong cơ quan, tổ chức, đơn vị nơi người có nghĩa vụ kê khai thường xuyên làm việc.", "Trên phương tiện thông tin đại chúng.", "Cả 3 phương án trên."], c: 1, r: "Bản kê khai tài sản của cán bộ phải được công khai tại cơ quan, đơn vị nơi người đó đang trực tiếp công tác để đồng nghiệp, cấp dưới dễ dàng giám sát." },
                            { q: "Công chức kê khai tài sản, thu nhập, giải trình nguồn gốc tài sản tăng thêm không trung thực tùy theo mức độ vi phạm phải bị áp dụng một trong các hình thức kỷ luật nào?", a: ["Khiển trách, cảnh cáo, cách chức, bãi nhiệm.", "Khiển trách, cảnh cáo, hạ bậc lương, giáng chức, cách chức.", "Khiển trách, cảnh cáo, phạt tiền, hạ ngạch, giáng chức, cách chức.", "Khiển trách, cảnh cáo, hạ bậc lương, hạ ngạch, giáng chức, cách chức."], c: 1, r: "Sự không trung thực trong kê khai tài sản sẽ bị xử lý kỷ luật nghiêm khắc theo Luật Cán bộ, công chức với các hình thức: Khiển trách, cảnh cáo, hạ bậc lương, giáng chức, cách chức." },
                            { q: "Hành vi nào sau đây được coi là nhận hối lộ?", a: ["Đồng nghiệp tặng quà cho nhau.", "Để nhận được sự đề bạt của cấp trên, nhân viên mang món quà trị giá 1,5 triệu đồng đến biếu sếp.", "Nhân dịp sinh nhật con trai, nhân viên mang tặng lãnh đạo một bình hoa cổ trị giá 50 triệu đồng.", "Cả B & C."], c: 3, r: "Hành vi tặng quà nhằm đổi lấy sự thiên vị trong công việc (đề bạt) hay việc tặng những món quà có giá trị vật chất quá lớn (50 triệu) đều có dấu hiệu của việc đưa và nhận hối lộ biến tướng." },
                            { q: "Khi nhận được tố cáo hành vi tham nhũng, người đứng đầu cơ quan, tổ chức có thẩm quyền phải làm gì?", a: ["Xem xét, xử lý; thông báo kết quả giải quyết cho người tố cáo khi có yêu cầu.", "Giữ bí mật họ, tên, địa chỉ và các thông tin khác của người tố cáo.", "Áp dụng kịp thời các biện pháp cần thiết để bảo vệ người tố cáo khi bị đe doạ, trả thù.", "Cả 3 phương án trên."], c: 3, r: "Cơ quan tiếp nhận phải có trách nhiệm giải quyết, phản hồi kết quả, giữ bí mật tuyệt đối danh tính và bảo vệ an toàn cho người tố cáo tham nhũng." },
                            { q: "Theo Luật PCTN, những việc nào sau đây cán bộ, công chức, viên chức không được làm?", a: ["Cửa quyền, hách dịch, gây khó khăn, phiền hà.", "Tham gia quản lý, điều hành doanh nghiệp tư nhân, công ty TNHH, cổ phần, bệnh viện tư... trừ trường hợp luật có quy định khác.", "Làm tư vấn cho doanh nghiệp, tổ chức trong và ngoài nước về các việc liên quan đến bí mật nhà nước, việc thuộc thẩm quyền mình giải quyết.", "Cả 3 phương án trên."], c: 3, r: "Cả 3 hành vi trên (hách dịch, điều hành công ty tư nhân bên ngoài, làm tư vấn cho việc mình quản lý) đều bị nghiêm cấm để phòng ngừa nguy cơ tham nhũng, lợi ích nhóm." }
                        ]
                    }
                }
            }
        };

        let currentSubject = null;
        let currentChapter = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;

        // CHUYỂN ĐỔI MÔN HỌC CHÍNH
        function switchSubject(subjectKey) {
            currentSubject = subjectKey;

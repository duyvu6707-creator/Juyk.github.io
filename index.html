                            { q: "Sinh viên cần học những gì ở đạo đức Hồ Chí Minh?", a: ["Học trung với nước, hiếu với dân; cần, kiệm, liêm, chính...", "Học đức tin vào sức mạnh của nhân dân, luôn nhân ái, vị tha...", "Học tấm gương về ý chí và nghị lực tinh thần to lớn...", "Học trung với nước, hiếu với dân; cần, kiệm, liêm, chính. Học đức tin vào sức mạnh của nhân dân, luôn nhân ái, vị tha, khoan dung độ lượng. Học tấm gương về ý chí và nghị lực tinh thần to lớn..."], c: 3, r: "Việc học tập Bác phải toàn diện: từ tình yêu quê hương đất nước, phẩm chất cần kiệm, lòng nhân ái bao la đến ý chí nghị lực sắt đá." },
                            { q: "Hồ Chí Minh nhìn nhận con người trên những bình diện nào?", a: ["Con người được nhìn nhận như một chỉnh thể, đa chiều. Con người cụ thể, lịch sử. Phần nhiều do giáo dục mà nên", "Bản chất con người mang tính xã hội. Con người được nhìn nhận như một chỉnh thể, đa chiều. Phần nhiều do giáo dục mà nên", "Bản chất con người mang tính xã hội. Con người được nhìn nhận như một chỉnh thể, đa chiều và có tính xã hội.", "Con người được nhìn nhận như một chỉnh thể, đa chiều. Con người cụ thể, lịch sử. Bản chất con người mang tính xã hội"], c: 3, r: "Bác nhìn nhận con người không trừu tượng mà rất cụ thể trong từng hoàn cảnh lịch sử, là một chỉnh thể và mang bản chất xã hội." },
                            { q: "Trên bình diện chỉnh thể, đa chiều, con người trong quan niệm của Hồ Chí Minh là sự thống nhất giữa:", a: ["Đoàn kết các lực lượng cách mạng. Tâm lực, thể lực và các hoạt động của nó...", "Đoàn kết các lực lượng cách mạng. Thống nhất trong đa dạng...", "Thống nhất giữa hai mặt thiện – ác, tốt – xấu, hay – dở...", "Tâm lực, thể lực và các hoạt động của nó. Thống nhất giữa hai mặt thiện – ác, tốt – xấu, hay – dở, mặt xã hội và bản năng sinh vật. Thống nhất trong đa dạng..."], c: 3, r: "Con người là một thể thống nhất vô cùng phức tạp: giữa thiện và ác, giữa mặt sinh vật và mặt xã hội, vừa có điểm chung vừa mang tính đa dạng." },
                            { q: "“Trong bầu trời không có gì quý bằng nhân dân, trong thế giới không có gì mạnh bằng lực lượng đoàn kết của nhân dân”. Câu trên trích từ đâu?", a: ["Di chúc", "Hồ Chí Minh toàn tập, tập 5", "Đạo đức cách mạng", "Nâng cao đạo đức cách mạng, quét sạch chủ nghĩa cá nhân"], c: 1, r: "Lời đề cao tuyệt đối sức mạnh vô địch của nhân dân này nằm trong Hồ Chí Minh toàn tập (Tập 5)." },
                            { q: "Theo quan niệm của Hồ Chí Minh, việc đầu tiên cần làm sau chiến tranh là gì?", a: ["Ăn mừng chiến thắng", "Khôi phục kinh tế", "Công việc đối với con người", "Chỉnh đốn Đảng"], c: 2, r: "Trong Di chúc, Bác căn dặn: Ngay sau khi chiến tranh kết thúc, việc đầu tiên phải làm là 'Công việc đối với con người' (đền ơn đáp nghĩa, hàn gắn vết thương chiến tranh)." },
                            { q: "Theo quan niệm của chủ tịch Hồ Chí Minh, trong sự nghiệp cách mạng nói chung và trong xây dựng CNXH nói riêng, vị trí của con người phải đặt ở chỗ nào trong quá trình phát triển?", a: ["Đầu tiên", "Sau cùng", "Vừa đầu tiên, vừa sau cùng của quá trình phát triển", "Vị trí trung tâm của quá trình phát triển"], c: 3, r: "Con người không chỉ là động lực mà còn là mục tiêu, do đó phải luôn đặt con người ở vị trí trung tâm của mọi sự phát triển." },
                            { q: "Bài thơ sau của tác giả nào? “Gạo đem vào giã bao đau đớn / Gạo giã xong rồi trắng tựa bông / Sống ở trên đời người cũng vậy / Gian nan rèn luyện ắt thành công”", a: ["Sóng Hồng", "Lê Đức Thọ", "Võ Nguyên Giáp", "Hồ Chí Minh"], c: 3, r: "Đây là bài thơ 'Nghe tiếng giã gạo' nằm trong tập Nhật ký trong tù của Bác Hồ." },
                            { q: "“Những tư tưởng của Người là hiện thân của những khát vọng của các dân tộc trong việc khẳng định bản sắc dân tộc của mình và tiêu biểu cho việc thúc đẩy sự hiểu biết lẫn nhau”. Ai đã nhận định về Bác Hồ như trên?", a: ["Đảng Cộng sản Việt Nam", "Ủy ban bảo vệ hòa bình thế giới", "UNESCO", "Hội nhân quyền quốc tế"], c: 2, r: "Đó là những lời ca ngợi của tổ chức UNESCO khi ra Nghị quyết vinh danh Chủ tịch Hồ Chí Minh năm 1987." },
                            { q: "“Nước mất mà không biết là bất trí, biết mà không chiến đấu cứu nước là bất trung, chiến đấu mà không quên mình vì nước là bất dũng”. Ai nói với Nguyễn Tất Thành câu trên?", a: ["Nguyễn Sinh Sắc", "Thầy giáo Vương Thúc Quý", "Thầy giáo Hoàng Thông", "Thầy Lê Văn Miến"], c: 3, r: "Đây là lời dạy mang đậm khí phách của Thầy Lê Văn Miến - một thầy giáo cũ của Bác thời đi học." },
                            { q: "Ai là người Việt Nam đầu tiên, khi mất, được Bác Hồ viết văn tế?", a: ["Hồ tùng Mậu – cán bộ cao cấp của Đảng", "Phùng Chí Kiên – cán bộ quân sự cao cấp của quân đội ta", "Nguyễn Thị Thanh – chị gái của Bác", "Một nữ hội viên bình thường của hội phụ nữ cứu quốc tỉnh Cao Bằng"], c: 3, r: "Thể hiện tấm lòng bao la với người dân, Bác đã viết bài văn tế đầu tiên dành cho một hội viên phụ nữ bình thường đã anh dũng hy sinh ở Cao Bằng." },
                            { q: "“... Thiên thời không quan trọng bằng địa lợi, mà địa lợi không quan trọng bằng nhân hòa. Nhân hòa là tất cả mọi người đều nhất trí. Nhân hòa là quan trọng hơn hết”. Trên đây là phát biểu của Bác Hồ trong hội nghị nào?", a: ["Hội nghị quân sự toàn quốc lần thứ 2", "Hội nghị quân sự toàn quốc lần thứ 3", "Hội nghị quân sự toàn quốc lần thứ 4", "Hội nghị quân sự toàn quốc lần thứ 5"], c: 3, r: "Quan điểm lấy lòng người (nhân hòa) làm gốc được Bác nhấn mạnh tại Hội nghị quân sự toàn quốc lần thứ 5." },
                            { q: "Bức tâm thư: “Thằng em của anh gửi thư này chúc anh khỏe mạnh… Dân giang hồ một khi đã theo cách mạng là nhất định sẽ đi tới cùng...”. Thư trên của ai, xuất thân từ thành phần xã hội nào trước khi tham gia cách mạng?", a: ["Một người họ hàng của Bác Hồ", "Một người bạn thân của Bác", "Một người anh em kết nghĩa của Bác", "Một tay giang hồ khét tiếng trước khi gia nhập “Bộ đội cụ Hồ”"], c: 3, r: "Bức thư đặc biệt này là của Tướng Bình Xuyên - Nguyễn Bình (hoặc một số tướng lĩnh giang hồ miền Nam) được cảm hóa bởi đức độ của Bác." },
                            { q: "“Mình và Bác Hồ có giống nhau vì cùng là người thợ. Nhưng mình chỉ bằng Bác Hồ về mặt lao động thôi... Bác Hồ là bậc thầy, mình chỉ là học trò”. Ai phát biểu câu trên?", a: ["Nguyễn Hữu Thọ - nguyên quyền chủ tịch nước", "Trịnh Đình Thảo – một trí thức yêu nước nổi tiếng thời chống Mỹ", "Trần Văn Giàu – nguyên chủ tịch ủy ban hành chính kháng chiến Nam bộ", "Tôn Đức Thắng – nguyên chủ tịch nước Cộng hòa xã hội chủ nghĩa Việt Nam"], c: 3, r: "Đây là lời phát biểu vô cùng khiêm tốn của Bác Tôn (Tôn Đức Thắng) khi nói về Chủ tịch Hồ Chí Minh." },
                            { q: "“Không phải tôi đã cứu sống chủ tịch Hồ Chí Minh, mà chính chủ nghĩa nhân đạo của Người đã cứu Người...”. Luật sư Lô-giơ-bai (Loseby) đã nói câu trên vào thời gian nào?", a: ["1931, khi Bác Hồ bị tù ở Hương Cảng", "1945, khi cách mạng tháng Tám năm 1945 thành công", "1960, khi ông luật sư sang làm khách của chính phủ ta", "1972, khi hồi ký của luật sư được xuất bản"], c: 2, r: "Năm 1960, khi luật sư Loseby và gia đình sang Việt Nam làm thượng khách, ông đã xúc động thốt lên câu nói này." },
                            { q: "Theo Hồ Chí Minh, trong cách mạng xã hội chủ nghĩa, động lực nào quan trọng và quyết định nhất?", a: ["Tiền vốn", "Tài nguyên thiên nhiên", "Người lao động", "Khoa học – kỹ thuật tiên tiến"], c: 2, r: "Người lao động (con người) luôn là chủ thể, là nguồn động lực quyết định nhất để kiến thiết chủ nghĩa xã hội." },
                            { q: "Luận điểm “Học để làm việc, làm người, làm cán bộ. Học để phụng sự nhân dân và tổ quốc” là của ai?", a: ["Các Mác", "Lênin", "Hồ Chí Minh", "Stalin"], c: 2, r: "Đây là lời căn dặn nổi tiếng của Bác Hồ về mục đích chân chính của việc học." },
                            { q: "Theo Hồ Chí Minh, đạo đức con người được thể hiện ở mối quan hệ nào?", a: ["Trong quan hệ với công việc. Trong quan hệ với người khác. Trong quan hệ với cộng đồng", "Trong quan hệ với người khác. Trong quan hệ với bản thân mình. Trong quan hệ với cộng đồng", "Trong quan hệ với bản thân mình. Trong quan hệ với người khác. Trong quan hệ với cấp trên- dưới", "Trong quan hệ với công việc. Trong quan hệ với người khác. Trong quan hệ với bản thân mình"], c: 3, r: "Đạo đức cách mạng theo Bác được thể hiện ở 3 mối quan hệ: đối với mình, đối với người và đối với việc." },
                            { q: "Các định nghĩa dưới đây, định nghĩa nào KHÔNG phải của Hồ Chí Minh khi giải thích về chữ 'người'?", a: ["Chữ “người” theo nghĩa hẹp là gia đình, anh em, họ hàng, bè bạn", "Chữ “người” theo nghĩa rộng là đồng bào cả nước", "Rộng hơn nữa là cả loài người", "Là tổng hòa các mối quan hệ xã hội"], c: 3, r: "Định nghĩa con người 'Là tổng hòa các mối quan hệ xã hội' là luận điểm kinh điển của C. Mác, không phải là cách giải thích về chữ 'người' của Bác Hồ." },
                            { q: "Năm điều dạy thiếu niên, nhi đồng: “Yêu tổ quốc, yêu đồng bào / Học tập tốt, lao động tốt...”. Được Bác Hồ viết vào dịp nào?", a: ["Thư gửi cho thiếu niên, nhi đồng toàn quốc nhân dịp kỷ niệm 20 năm ngày thành lập Đội Thiếu niên tiền phong", "Thư chúc Tết trung thu cho thiếu niên, nhi đồng toàn quốc", "Nhân dịp khai giảng đầu năm học", "Di chúc của Chủ tịch Hồ Chí Minh"], c: 0, r: "5 Điều Bác Hồ dạy ra đời nhân dịp kỷ niệm 20 năm Ngày thành lập Đội Thiếu niên tiền phong (15/5/1961)." },
                            { q: "Muốn tiêu trừ sự tham ô, lãng phí trước tiên chúng ta phải làm gì?", a: ["Tẩy sạch quan liêu", "Tẩy sạch tư túng", "Tẩy sạch chia rẽ, kiêu ngạo", "Tẩy sạch đặc quyền, đặc lợi"], c: 0, r: "Bác chỉ ra rằng bệnh quan liêu (xa rời thực tế, xa rời quần chúng) chính là nguồn gốc dung túng, che chở cho nạn tham ô, lãng phí nảy nở." },
                            { q: "Quan điểm nào của Hồ Chí Minh mang tính chất định hướng cho việc xây dựng một nền văn hoá mới ở Việt Nam?", a: ["Xây dựng nền văn hoá tiên tiến, đậm đà bản sắc dân tộc", "Văn hoá phải tham gia thực hiện những nhiệm vụ chính trị, thúc đẩy xây dựng và phát triển kinh tế", "Văn hoá phải mang bản chất của giai cấp công nhân", "Văn hoá soi đường cho quốc dân đi"], c: 1, r: "Bác định hướng văn hóa không thể đứng độc lập mà phải gắn liền với thực tiễn, phục vụ chính trị và thúc đẩy kinh tế đất nước." },
                            { q: "Theo Hồ Chí Minh, mục tiêu của giáo dục là gì?", a: ["Xoá nạn mù chữ, làm cho mọi người dân biết đọc, biết viết", "Hình thành đội ngũ trí thức cách mạng", "Đào tạo những con người tốt, những cán bộ tốt", "Phát triển nhân cách"], c: 2, r: "Mục đích tối thượng của nền giáo dục mới là đào tạo ra những con người vừa có tài vừa có đức (những cán bộ tốt)." },
                            { q: "Hãy cho biết tác phẩm đầu tiên của Hồ Chí Minh đề cập đến đạo đức cách mạng?", a: ["Bản án chế độ thực dân Pháp", "Đường Kách mệnh", "Sửa đổi lối làm việc", "Đạo đức cách mạng"], c: 1, r: "Ngay trong tác phẩm 'Đường Kách mệnh' (1927), Bác đã dành những trang đầu tiên để răn dạy về 'Tư cách một người cách mệnh'." },
                            { q: "“Tham ô, lãng phí và bệnh quan liêu... phá hoại đạo đức cách mạng của ta là cần, kiệm, liêm, chính”. Câu nói trên của Hồ Chí Minh được ra đời trong hoàn cảnh nào?", a: ["Buổi ra mắt Đảng Lao động Việt Nam", "Lời kêu gọi toàn quốc kháng chiến", "Bài nói nhân dịp phát động phong trào tăng gia sản xuất và thực hành tiết kiệm", "Phát động chống nạn thất học"], c: 3, r: "Đây là lời phát biểu mang tính cảnh tỉnh sâu sắc trong dịp Phát động chống nạn thất học." },
                            { q: "Theo tư tưởng Hồ Chí Minh, phẩm chất đạo đức quan trọng nhất, bao trùm nhất của con người Việt Nam là gì?", a: ["Trung với nước, hiếu với dân", "Yêu thương con người", "Cần, kiệm, liêm, chính, chí công vô tư", "Tinh thần quốc tế trong sáng"], c: 0, r: "Trung với nước, hiếu với dân là phẩm chất đứng đầu, tạo nền tảng cho mọi phẩm chất đạo đức khác." },
                            { q: "Theo Hồ Chí Minh, “Chính” được thể hiện qua những mối quan hệ nào?", a: ["Quan hệ gia đình, làng, xã, quốc gia", "Quan hệ với mình, với người, với việc", "Quan hệ với đồng bào, đồng chí, anh em", "Quan hệ với mình, với việc"], c: 1, r: "Chữ Chính (thẳng thắn, đứng đắn) đòi hỏi con người phải nghiêm khắc với chính mình, công tâm với người khác và tận tụy với công việc." },
                            { q: "Theo Hồ Chí Minh, để xây dựng nền tảng đạo đức mới cần phải dựa trên nguyên tắc lập trường nào?", a: ["Lập trường dân chủ tư sản", "Lập trường dân tộc chủ nghĩa", "Lập trường giai cấp công nhân", "Lập trường yêu nước"], c: 2, r: "Đạo đức mới (đạo đức cộng sản) phải được xây dựng dựa trên lập trường triệt để và tiến bộ của giai cấp công nhân." },
                            { q: "“Chống tham ô, lãng phí, quan liêu cũng quan trọng và cần kíp như việc đánh giặc trên mặt trận”. Câu trên được Hồ Chí Minh nói năm nào?", a: ["1977", "1930", "1945", "1952"], c: 3, r: "Câu nói này được Bác nhấn mạnh vào năm 1952 trong cao trào đẩy mạnh sản xuất và thực hành tiết kiệm." },
                            { q: "“Cũng như sông có nguồn thì mới có nước, không có nguồn thì sông cạn... Người cách mạng phải có đạo đức, không có đạo đức thì dù tài giỏi mấy cũng không lãnh đạo được nhân dân”. Câu nói trên được trích trong tác phẩm nào của Hồ Chí Minh?", a: ["Đường Kách mệnh", "Sửa đổi lối làm việc", "Nhật ký trong tù", "Đạo đức cách mạng"], c: 1, r: "Trong tác phẩm Sửa đổi lối làm việc (1947), Bác ví von đạo đức như cội nguồn của sông, là cái gốc của con người." },
                            { q: "Theo Hồ Chí Minh, phẩm chất đạo đức cách mạng nào gắn với hoạt động hằng ngày của mọi người và là thước đo sự giàu có về mặt vật chất, vững mạnh về tinh thần?", a: ["Trung với nước, hiếu với dân", "Yêu thương con người", "Cần, kiệm, liêm, chính", "Tinh thần quốc tế trong sáng"], c: 2, r: "Cần, Kiệm, Liêm, Chính là những phẩm chất thường nhật, là thước đo sự tu dưỡng hàng ngày của mỗi người." },
                            { q: "“Người mà không liêm, không bằng súc vật”. Câu nói trên là của ai?", a: ["Khổng Tử", "Mạnh Tử", "Các Mác", "Hồ Chí Minh"], c: 0, r: "Bác Hồ đã trích lại câu nói răn dạy vô cùng nghiêm khắc này của Khổng Tử để giáo dục về sự liêm khiết." },
                            { q: "Ba thứ giặc nội xâm theo tư tưởng Hồ Chí Minh là gì?", a: ["Tay sai, bù nhìn, bọn ăn bám", "Bè phái, a dua, nịnh hót", "Tham ô, lãng phí, quan liêu", "Giặc đói, giặc dốt, giặc ngoại xâm"], c: 2, r: "Tham ô, lãng phí và bệnh quan liêu được Bác chỉ mặt đặt tên là 3 thứ 'giặc ở trong lòng', nguy hiểm không kém giặc ngoại xâm." },
                            { q: "Tác phẩm “Đạo đức cách mạng” của Hồ Chí Minh được in lần đầu tiên trên tạp chí nào?", a: ["Tạp chí Quân đội nhân dân", "Tạp chí Học tập", "Tạp chí Những vấn đề hoà bình và chủ nghĩa xã hội", "Tạp chí Xây dựng Đảng"], c: 1, r: "Tác phẩm Đạo đức cách mạng (ký bút danh Trần Lực) được in lần đầu tiên trên Tạp chí Học tập (nay là Tạp chí Cộng sản) vào tháng 12/1958." },
                            { q: "“Không có việc gì khó / Chỉ sợ lòng không bền / Đào núi và lấp biển / Quyết chí ắt làm nên”. Bài thơ trên của Hồ Chí Minh ra đời trong hoàn cảnh nào?", a: ["Trong thư gửi cho thanh niên toàn quốc tháng 7/1947", "Trong buổi nói chuyện với đại biểu nhân dân thành phố Hải Phòng", "Thăm đơn vị thanh niên xung phong trong chiến dịch Biên Giới 1950", "Trong bài nói chuyện tại Đại hội Đại biểu Mặt trận Tổ quốc Việt Nam lần thứ II"], c: 2, r: "Bác đã làm bài thơ này để tặng lực lượng Thanh niên xung phong đang mở đường phục vụ Chiến dịch Biên giới (1950)." },
                            { q: "“Dân tộc ta, nhân dân ta, non sông đất nước ta đã sinh ra Hồ Chủ tịch, người anh hùng vĩ đại...”. Nhận định trên ra đời vào thời gian và hoàn cảnh nào?", a: ["2/9/1969, bản thông cáo đặc biệt", "9/9/1969, lễ truy điệu Chủ tịch Hồ Chí Minh", "20/10 – 20/11/1987, NQ 24C/18.65 của UNESCO", "Ngày 2/9/1990, trong lễ kỷ niệm 100 năm ngày sinh Chủ tịch Hồ Chí Minh"], c: 1, r: "Đây là lời mở đầu đầy bi tráng trong Bản Điếu văn do đồng chí Lê Duẩn đọc tại Lễ truy điệu Bác sáng ngày 9/9/1969." },
                            { q: "Trong thời đại ngày nay, nghiên cứu tư tưởng Hồ Chí Minh giúp chúng ta nhận thức về những vấn đề cơ bản gì?", a: ["Nhận thức về kẻ thù nội xâm và ngoại xâm", "Nhận thức đúng những vấn đề lớn có liên quan đến việc bảo vệ nền độc lập dân tộc, phát triển xã hội và bảo đảm quyền con người", "Nhận thức về đường lối kinh tế", "Nhận thức về phương pháp quân sự"], c: 1, r: "Tư tưởng của Người là ngọn đuốc soi đường giúp chúng ta giải quyết các vấn đề vĩ mô về độc lập, phát triển và nhân quyền." },
                            { q: "Điều mong muốn cuối cùng của Hồ Chí Minh được nêu trong Di chúc là gì?", a: ["Xây dựng một nước Việt Nam giàu mạnh", "Toàn Đảng, toàn dân ta đoàn kết phấn đấu xây dựng một nước Việt Nam hoà bình, thống nhất, độc lập, dân chủ, giàu mạnh và góp phần xứng đáng vào sự nghiệp cách mạng thế giới", "Làm cho mọi người hạnh phúc", "Làm cho mọi người ai cũng có cơm ăn áo mặc, ai cũng được học hành"], c: 1, r: "Khát vọng lớn lao này được Bác đúc kết trọn vẹn ở những dòng cuối cùng trong bản Di chúc lịch sử." },
                            { q: "Nhiệm vụ thực hiện 3 nội dung đạo đức của sinh viên trường Đại học Tôn Đức Thắng là gì?", a: ["Gương mẫu trong hoạt động- học tập tốt- chăm lo cho tập thể và cộng đồng", "Học tập tốt - Sống kỷ luật, nề nếp - Tinh thần vì tập thể", "Có tính kỷ luật – gương mẫu trong hoạt động phong trào – Tôn trọng tập thể", "Học tập tốt - Kỷ luật, nề nếp - Hoạt động phong trào tốt."], c: 1, r: "Đây là 3 nội dung cốt lõi về đạo đức lối sống mà sinh viên Tôn Đức Thắng cần phải không ngừng rèn luyện." }
                        ]
                    },
                    10: {
                        group: "Điền khuyết",
                    }
                }
            }
        };


        let currentSubject = null;
        let currentChapter = null;
        let currentQuestionIndex = 0;
        let score = 0;
        let selectedOption = null;
        let userAnswers = []; // Mảng mới để lưu lịch sử trả lời của người dùng

        // CHUYỂN ĐỔI MÔN HỌC CHÍNH
        function switchSubject(subjectKey) {
            currentSubject = subjectKey;
            const subject = globalQuizDatabase[subjectKey];
            document.getElementById('subject-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
            document.getElementById('app-title').innerText = subject.name;
            document.getElementById('menu-screen-title').innerText = `Danh sách học phần môn ${subject.name}:`;
            document.querySelector('header').style.backgroundColor = subject.color;
            renderChapters();
        }

        function goToSubjects() {
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('subject-screen').classList.add('active');
            document.getElementById('app-title').innerText = "Hệ Thống Ôn Luyện Học Tập";
            document.querySelector('header').style.backgroundColor = "#2c3e50";
        }

        // Biến toàn cục để theo dõi xem người dùng đang ở Màn hình Menu chính hay Menu con
        let currentSelectedGroup = null;

        // HÀM MỚI 1: Xử lý thông minh nút "Quay lại" ở màn hình danh sách
        function handleMenuBack() {
            const subjectData = globalQuizDatabase[currentSubject].data;
            let groups = [];
            for (let ch in subjectData) {
                let g = subjectData[ch].group || "Mặc định";
                if (!groups.includes(g)) groups.push(g);
            }

            // Nếu đang xem các chương bên trong 1 Mục nhỏ -> Quay lại màn hình chọn Mục (Trắc nghiệm thường/Đúng sai)
            if (groups.length > 1 && currentSelectedGroup !== null) {
                currentSelectedGroup = null;
                renderChapters(); 
            } else {
                // Nếu đang ở màn hình chọn Mục hoặc môn học không chia Mục -> Quay hẳn ra Màn hình chính
                goToSubjects();
            }
        }

        // HÀM MỚI 2: Hàm renderChapters được nâng cấp để tạo Thư mục
        function renderChapters() {
            const listContainer = document.getElementById('chapters-list');
            listContainer.innerHTML = '';
            const subjectData = globalQuizDatabase[currentSubject].data;

            // Thu thập danh sách các "Mục" (group) có trong môn học
            let groups = [];
            for (let ch in subjectData) {
                let g = subjectData[ch].group || "Mặc định";
                if (!groups.includes(g)) groups.push(g);
            }

            currentSelectedGroup = null; // Đặt lại trạng thái chưa chọn mục nào

            // Tự động gán lại chức năng cho nút "Quay lại" để nó chạy hàm handleMenuBack mới
            document.querySelector('#menu-screen .btn-back').setAttribute('onclick', 'handleMenuBack()');

            // NẾU MÔN HỌC CÓ CHIA MỤC (Ví dụ: Pháp luật đại cương) -> Hiển thị 2 nút to
            if (groups.length > 1) {
                document.getElementById('menu-screen-title').innerText = `Vui lòng chọn hình thức ôn tập:`;

                groups.forEach(groupName => {
                    const btn = document.createElement('button');
                    btn.className = 'subject-btn'; // Dùng lại CSS của nút ngoài màn hình chính cho đẹp
                    btn.style.width = '100%';
                    btn.style.marginBottom = '15px';
                    btn.style.borderLeftColor = globalQuizDatabase[currentSubject].color;
                    btn.innerHTML = `
                        <h2>${groupName}</h2>
                        <p>Nhấn vào để xem danh sách các bài học tương ứng</p>
                    `;
                    btn.onclick = () => renderChaptersByGroup(groupName);
                    listContainer.appendChild(btn);
                });
            } 
            // NẾU MÔN HỌC KHÔNG CHIA MỤC (Như Kinh tế chính trị) -> Bỏ qua bước chọn, hiển thị luôn các chương
            else {
                renderChaptersByGroup(groups);
            }
        }

        // HÀM MỚI 3: Hàm để vẽ ra các chương nằm bên trong 1 Mục cụ thể
        function renderChaptersByGroup(groupName) {
            currentSelectedGroup = groupName;
            const listContainer = document.getElementById('chapters-list');
            listContainer.innerHTML = '';
            const subjectData = globalQuizDatabase[currentSubject].data;

            document.getElementById('menu-screen-title').innerText = groupName + ':';

            // Quét toàn bộ dữ liệu, bài nào thuộc Mục đang chọn thì mới hiển thị ra
            for (let ch in subjectData) {
                let g = subjectData[ch].group || "Mặc định";
                if (g === groupName) {
                const card = document.createElement('div');
                card.className = 'chapter-card';
                card.onclick = () => startQuiz(ch);
                card.innerHTML = `
                    <h3>${subjectData[ch].title}</h3>
                    <p>Tổng số: ${subjectData[ch].questions.length} câu</p>
                `;
                listContainer.appendChild(card);
                }
            }
        }

        function startQuiz(chapterNum) {
            currentChapter = chapterNum;
            currentQuestionIndex = 0;
            score = 0;
            
            // Khởi tạo mảng rỗng để lưu đáp án người dùng chọn cho chương này
            const totalQ = globalQuizDatabase[currentSubject].data[chapterNum].questions.length;
            userAnswers = new Array(totalQ).fill(null);

            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('quiz-screen').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            // Phục hồi lại đáp án đã chọn nếu câu hỏi này đã được làm trước đó
            selectedOption = userAnswers[currentQuestionIndex];

            const chapter = globalQuizDatabase[currentSubject].data[currentChapter];
            const totalQuestions = chapter.questions.length;
            const qData = chapter.questions[currentQuestionIndex];

            document.getElementById('question-numbering').innerText = `Câu ${currentQuestionIndex + 1}/${totalQuestions}`;
            document.getElementById('progress-fill').style.width = `${((currentQuestionIndex + 1) / totalQuestions) * 100}%`;

            const container = document.getElementById('quiz-container');
            let optionsHTML = '';

            qData.a.forEach((opt, idx) => {
                let btnClass = 'option-btn';
                
                // Nếu câu hỏi đã được trả lời, tự động tô màu đúng/sai lại
                if (selectedOption !== null) {
                    if (idx === qData.c) {
                        btnClass += ' correct';
                    } else if (idx === selectedOption && idx !== qData.c) {
                        btnClass += ' wrong';
                    }
                }

                optionsHTML += `
                <button class="${btnClass}" id="opt-${idx}" onclick="checkAnswer(${idx})">
                    <strong>${String.fromCharCode(65 + idx)}.</strong> ${opt}
                </button>
                `;
            });

            // Render câu hỏi và đáp án
            container.innerHTML = `
                <div class="question-card">
                <div class="question-text">${currentQuestionIndex + 1}. ${qData.q}</div>
                <div class="options-container">${optionsHTML}</div>
                <div class="rationale-box" id="rationale-box" ${selectedOption !== null ? 'style="display:block;"' : ''}>${qData.r}</div>
                </div>
            `;

            // Hiển thị nút "Câu tiếp theo" nếu đã trả lời xong
            if (selectedOption !== null) {
                document.getElementById('next-btn').style.display = 'block';
            } else {
                document.getElementById('next-btn').style.display = 'none';
            }

            // Ẩn/Hiện nút "Câu trước" (Chỉ hiện từ câu số 2 trở đi)
            if (currentQuestionIndex > 0) {
                document.getElementById('prev-btn').style.display = 'block';
            } else {
                document.getElementById('prev-btn').style.display = 'none';
            }
        }

        function checkAnswer(idx) {
            if (selectedOption !== null) return;
            
            selectedOption = idx;
            userAnswers[currentQuestionIndex] = idx; // Ghi nhớ sự lựa chọn của bạn

            const qData = globalQuizDatabase[currentSubject].data[currentChapter].questions[currentQuestionIndex];
            const correctIdx = qData.c;

            const selectedBtn = document.getElementById(`opt-${idx}`);
            const correctBtn = document.getElementById(`opt-${correctIdx}`);
            
            // Xử lý âm thanh
            const soundCorrect = document.getElementById('sound-correct');
            const soundWrong = document.getElementById('sound-wrong');

            if (idx === correctIdx) {
                selectedBtn.classList.add('correct');
                score++;
                if(soundCorrect) { soundCorrect.currentTime = 0; soundCorrect.play(); }
            } else {
                selectedBtn.classList.add('wrong');
                correctBtn.classList.add('correct');
                if(soundWrong) { soundWrong.currentTime = 0; soundWrong.play(); }
            }

            document.getElementById('rationale-box').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            const chapter = globalQuizDatabase[currentSubject].data[currentChapter];
            if (currentQuestionIndex < chapter.questions.length - 1) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                showResult();
            }
        }

        // HÀM MỚI: Quay lại câu hỏi trước
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
            }
        }

        function showResult() {
            const chapter = globalQuizDatabase[currentSubject].data[currentChapter];
            const container = document.getElementById('quiz-container');
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('question-numbering').innerText = "KẾT THÚC BÀI LÀM";
            
            let comment = "Hãy đọc kỹ lại giáo trình và luyện lại các câu sai để ghi nhớ tốt hơn!";
            if(score === chapter.questions.length) comment = "Xuất sắc tuyệt đối! Bạn đã trả lời đúng toàn bộ câu hỏi học phần.";
            else if(score >= (chapter.questions.length * 0.8)) comment = "Rất tốt! Kiến thức nền tảng của bạn cực kỳ chắc chắn.";

            container.innerHTML = `
                <div class="result-card">
                    <h2 style="color: var(--primary-color); font-size: 1.3rem;">Kết Quả Đạt Được</h2>
                    <div class="score-text">${score} / ${chapter.questions.length}</div>
                    <div class="result-comment">${comment}</div>
                    <button class="btn-next" onclick="backToChapters()">Quay lại danh sách chương</button>
                </div>
            `;
        }

        function backToChapters() {
            document.getElementById('quiz-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
            const subject = globalQuizDatabase[currentSubject];
            document.getElementById('app-title').innerText = subject.name;
            renderChapters();
        }
    </script>
</body>
</html>
